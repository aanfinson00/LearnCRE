inner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(n*r/l)*l,s=o/n;return{id:U("grm"),kind:"grossRentMultiplier",prompt:`Purchase price ${g(o)}, gross potential rent ${g(n)}. What's the GRM?`,context:{purchasePrice:o,gpr:n,pgi:n},expected:s,unit:"multiple",tolerance:{type:"pct",band:.05},solution:Em(o,n)}}};function Pm(e,t){const n=$n(e,t);return{formula:"Loan Constant = annualized payment / loan (monthly amort)",steps:[{label:"Constant",expression:`${Ne(t)} amort @ ${C(e)}`,result:`${C(n,2)}  (${Qe(n)})`}],answerDisplay:Qe(n)}}const Im={kind:"loanConstant",label:"Loan Constant",description:"Annualized payment as % of loan for monthly-amortizing debt.",category:"returns",pattern:"PMT(r/12, n×12, −1) × 12   [amortization formula]",tips:["Memorize: 30yr @ 5% ≈ 644 bps; 30yr @ 6% ≈ 720 bps; 30yr @ 7% ≈ 799 bps; 25yr @ 6% ≈ 773 bps.","IO shortcut: loan constant = interest rate exactly (no principal paydown).","Rule of thumb: each +100 bps of rate adds ~60–80 bps to the constant on 30yr amort.","Longer amort → lower constant (but diminishing returns: 30y vs 25y only saves ~40 bps)."],generate(e,t="intermediate"){const n=I(e,$.interestRate,t),r=t==="beginner"?e.pickFromSet([25,30]):e.pickInt($.amortYears.min,$.amortYears.max),l=$n(n,r),o=Math.round(l*1e4);return{id:U("lc"),kind:"loanConstant",prompt:`What's the loan constant for a ${Ne(r)} amortizing loan at ${C(n)} (in bps)?`,context:{interestRate:n,amortYears:r},expected:o,unit:"bps",tolerance:{type:"abs",band:15},solution:Pm(n,r)}}};function Mm(e,t,n){const r=ci(e,t),l=id(e,t,n);return{formula:"IRR = (Out / In)^(1 / years) − 1",steps:[{label:"Equity multiple",expression:`${g(t)} / ${g(e)}`,result:Pe(r)},{label:"IRR",expression:`${Pe(r)}^(1/${n}) − 1`,result:C(l)}],answerDisplay:C(l)}}const Tm={kind:"irrSimple",label:"IRR — Simple",description:"Single-period IRR: equity in, equity out, hold years.",category:"returns",pattern:"(A / B)^(1/n) − 1   [nth root of multiple]",tips:["Rule of 72: years-to-double ≈ 72 / IRR%. 2x in 7 yrs ≈ 10.3% IRR. 2x in 5 yrs ≈ 14.4%. 2x in 10 yrs ≈ 7.2%.","Key anchors: 2.0x over 5y ≈ 14.9%; 2.0x over 7y ≈ 10.4%; 2.0x over 10y ≈ 7.2%; 2.5x over 5y ≈ 20.1%.","Anchor for 10y holds: IRR% × 10 years → EM roughly: 10% → 2.59x, 12% → 3.11x, 15% → 4.05x, 8% → 2.16x.","Sandwich: if EM is 2.2x over 6 years, bracket it — 2.0x over 6y is ~12.2%, 2.5x over 6y is ~16.5%. Interpolate → ~13.6% (actual 14.0%).","Floor approximation: EM ≥ 1 + (IRR × years). 10% × 10y → floor 2.0x; actual 2.59x. Gap is the compounding."],generate(e,t="intermediate"){const n=I(e,$.equityIn,t),r=I(e,$.irrExitMultiple,t),l=t==="beginner"?1e6:t==="advanced"?1e5:5e5,o=Math.round(n*r/l)*l,s=t==="beginner"?e.pickFromSet([5,7,10]):e.pickInt($.holdYears.min,$.holdYears.max),i=id(n,o,s);return{id:U("irr"),kind:"irrSimple",prompt:`You invest ${g(n)} and get ${g(o)} back after ${Ne(s)}. What's the IRR (as a %)?`,context:{equityIn:n,equityOut:o,holdYears:s},expected:i,unit:"pct",tolerance:{type:"abs",band:.005},solution:Mm(n,o,s)}}};function bm(e,t,n){const r=e-t,l=nd({unleveredIrr:e,borrowRate:t,ltv:n});return{formula:"Levered IRR ≈ Unlevered + (LTV × (Unlev − Borrow)) / (1 − LTV)",steps:[{label:"Spread",expression:`${C(e)} − ${C(t)}`,result:C(r,2)},{label:"Leverage multiplier",expression:`${C(n)} / (1 − ${C(n)})`,result:(n/(1-n)).toFixed(2)},{label:"Levered IRR (approx)",expression:`${C(e)} + ${C(r)} × ${(n/(1-n)).toFixed(2)}`,result:C(l,2)}],answerDisplay:C(l,2)}}const Om={kind:"leveredIrr",label:"Levered IRR (Approx)",description:"Approximate levered IRR from unlevered IRR, LTV, and borrow rate.",category:"returns",pattern:"A + (B × (A − C)) / (1 − B)   [unlev + leverage × spread]",tips:["Formula: Levered IRR ≈ Unlevered + LTV × (Unlev − Borrow) / (1 − LTV). Assumes parallel cash flows.","Leverage multiplier: LTV / (1 − LTV). At 60% LTV = 1.5x; at 70% = 2.33x; at 75% = 3x.","If unlevered IRR > borrow rate, leverage is accretive. If unlevered < borrow, leverage destroys returns.","Example: unlev 8%, borrow 5%, 60% LTV → 8% + 3% × 1.5 = 12.5%. Actual levered is usually within 100 bps of this estimate."],generate(e,t="intermediate"){const n=I(e,$.unleveredIrr,t),r=I(e,$.interestRate,t),l=I(e,$.ltv,t),o=nd({unleveredIrr:n,borrowRate:r,ltv:l});return{id:U("levIrr"),kind:"leveredIrr",prompt:`Unlevered IRR is ${C(n)} and you can borrow at ${C(r)} with ${C(l)} LTV. Approximately what's the levered IRR?`,context:{unleveredIrr:n,borrowRate:r,ltv:l},expected:o,unit:"pct",tolerance:{type:"abs",band:.01},solution:bm(n,r,l)}}};function ad(e){const t=e.leaseTermYears*12,n=e.grossRentPerSf*e.leaseTermYears,r=e.grossRentPerSf/12*e.freeMonths;return(n-e.tiPerSf-r)/t*12}function Nl(e){return(e.rentPerSf*e.leaseTermYears-e.tiPerSf)/e.leaseTermYears}function ud(e){const t=Nl({rentPerSf:e.rentA,tiPerSf:e.tiA,leaseTermYears:e.leaseTermYears}),n=Nl({rentPerSf:e.rentB,tiPerSf:e.tiB,leaseTermYears:e.leaseTermYears});return t-n}function cd(e){return e.tiPerSf/e.paybackYears}function dd(e){return(e.newRentPerSf-e.oldRentPerSf)*e.subjectSf*(1-e.vacancy)}function fd(e){return dd(e)/e.capRate}function pd(e){return-(e.purchasePrice*e.newTaxRate-e.oldAnnualTax)/e.capRate}function _m(e){const t=e.years*12,n=e.grossRent/12*e.freeMonths,r=ad({grossRentPerSf:e.grossRent,leaseTermYears:e.years,tiPerSf:e.tiPerSf,freeMonths:e.freeMonths});return{formula:"NER = (Gross × Term − TI − Free Rent) / Term",steps:[{label:"Gross over term",expression:`${_(e.grossRent)} × ${Ne(e.years)}`,result:_(e.grossRent*e.years)},{label:"Free rent /SF",expression:`${_(e.grossRent/12)} × ${e.freeMonths} months`,result:_(n)},{label:"NER",expression:`(${_(e.grossRent*e.years)} − ${_(e.tiPerSf)} − ${_(n)}) / ${t}mo × 12`,result:_(r)}],answerDisplay:_(r)}}const Dm={kind:"netEffectiveRent",label:"Net Effective Rent",description:"Rent after spreading TI + free rent across the lease term.",category:"valuation",pattern:"A − B/n − (f × A / 12) / n   [face − TI/yr − freeRent/yr]",tips:["Annualize every concession. $15/SF TI over 5 years = $3/SF/yr. 3 months free on a $20 rent = $5/SF total = $1/SF/yr over 5y.","Shortcut: NER ≈ face rent − (TI ÷ term years) − (free months × face rent ÷ 12 ÷ term years).","NER drives cap-rate math — always underwrite to NER, not face rent.","Quick check: $20 face, $15 TI over 5y, 3 free months → $20 − $3 − $1 = $16/SF NER."],generate(e,t="intermediate"){const n=I(e,$.rentPerSf,t),r=e.pickInt($.leaseTermYears.min,$.leaseTermYears.max),l=Math.max(5,n*1.2),o=I(e,{min:0,max:l,step:1},t),s=e.pickInt($.freeMonths.min,$.freeMonths.max),i=ad({grossRentPerSf:n,leaseTermYears:r,tiPerSf:o,freeMonths:s}),a=(o>0?`${_(o)} in TI`:"no TI")+(s>0?` and ${s} month${s>1?"s":""} of free rent`:"");return{id:U("ner"),kind:"netEffectiveRent",prompt:`${Ne(r)} lease at ${_(n)} face rent, with ${a}. What's the NER?`,context:{rentPerSf:n,leaseTermYears:r,tiPerSf:o,freeMonths:s},expected:i,unit:"usdPerSf",tolerance:{type:"pct",band:.03},solution:_m({grossRent:n,years:r,tiPerSf:o,freeMonths:s})}}};function Am(e,t,n){return{formula:"ΔNOI = −ΔOpEx;  ΔValue = ΔNOI / Cap",steps:[{label:"NOI change",expression:`−${g(Math.abs(e))}`,result:z(-e)},{label:"Value change",expression:`${z(-e)} / ${C(t)}`,result:z(n)}],answerDisplay:z(n)}}const Lm={kind:"opexChange",label:"OpEx Change Impact",description:"OpEx $ change → NOI and value impact at given cap.",category:"valuation",pattern:"− A / B   where A = opex change, B = cap",tips:["OpEx moves NOI 1-for-1 (with a flipped sign): $50k more OpEx = $50k less NOI.","ΔValue = −ΔOpEx / cap. $50k OpEx lift @ 6% cap = −$50k × 16.67 ≈ −$833k value.","Sandwich at ugly caps: at 5.75% cap, the $1 of OpEx is worth between 16.7x (6%) and 18.2x (5.5%) — pick the midpoint for a fast gut estimate.",'An OpEx cut is the cheapest "yield play" in a deal — a $1 cut is worth 1/cap dollars of value.',`Be careful with "one-time" OpEx: if it's truly one-off it shouldn't get capped at all.`],generate(e,t="intermediate"){const n=e.pickFromSet(ct.opexMoves),r=e.pickFromSet([-1,1]),l=
