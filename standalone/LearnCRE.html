t yield is the lender-side cap rate: NOI / Loan. 9% DY = 11.1x NOI max loan; 10% DY = 10x NOI.","Inverse: Max Loan = NOI / required DY.","Lender check: if debt yield < 8%, most CMBS lenders pass — so 8% is a hard floor for stabilized deals.","Quick math: $800k NOI / 9% → think $800k × 11.11 = $8.89M. Or: $800 / 0.09 = ~$8,890 (shift decimals)."],generate(e,t="intermediate"){const n=E(e,N.noi,t),r=E(e,N.debtYieldTarget,t),l=rd(n,r);return{id:F("dy"),kind:"debtYield",prompt:`NOI is ${g(n)}. Lender requires a ${S(r)} debt yield. What's the max loan?`,context:{noi:n,debtYieldTarget:r},expected:l,unit:"usd",tolerance:{type:"pct",band:.05},solution:Pm(n,r)}}};function Mm(e,t,n){const r=Vl(e,t),l=Jc(r,n);return{formula:"Development Spread = YoC − Market Cap Rate",steps:[{label:"YoC",expression:`${g(e)} / ${g(t)}`,result:S(r)},{label:"Spread",expression:`${S(r)} − ${S(n)}`,result:`${Qe(l)}`}],answerDisplay:Qe(l)}}const Tm={kind:"devSpread",label:"Development Spread",description:"YoC minus market cap — the risk premium for developing vs buying.",category:"valuation",pattern:"(A / B) − C   [YoC minus market cap]",tips:['100–150 bps is thin, 200–300 bps is typical, 500+ bps is a "layup" development.',"If YoC ≈ market cap, you're taking development risk for no extra return — walk away.","Spread compensates for construction risk, lease-up risk, and time value of capital tied up during build.","Mental math: compute YoC first, then subtract market cap. Answer in bps."],generate(e,t="intermediate"){const n=E(e,N.capRate,t),r=E(e,N.yocDelta,t),l=n+r,o=E(e,N.projectCost,t),a=t==="beginner"?25e4:t==="advanced"?25e3:1e5,i=Math.round(o*l/a)*a,s=Jc(Vl(i,o),n),c=Math.round(s*1e4);return{id:F("devSp"),kind:"devSpread",prompt:`Developing to ${g(o)} in total cost with stabilized NOI of ${g(i)}. Market comps trade at a ${S(n)} cap. What's the development spread (in bps)?`,context:{totalProjectCost:o,stabilizedNoi:i,noi:i,marketCapRate:n},expected:c,unit:"bps",tolerance:{type:"abs",band:25},solution:Mm(i,o,n)}}};function hd(e){return`${e.toFixed(2)}x`}function Om(e,t,n,r){const l=Rn(n,r),o=e/t,a=ld({noi:e,dscrTarget:t,annualRate:n,years:r});return{formula:"Max Loan = NOI / (DSCR × Loan Constant)",steps:[{label:"Loan constant",expression:`${he(r)} amort @ ${S(n)}`,result:S(l,2)},{label:"Max annual debt service",expression:`${g(e)} / ${hd(t)}`,result:g(o)},{label:"Max loan",expression:`${g(o)} / ${S(l,2)}`,result:g(a)}],answerDisplay:g(a)}}const Am={kind:"dscrLoanSizing",label:"DSCR Loan Sizing",description:"Max loan given NOI, DSCR target, rate, and amort.",category:"returns",pattern:"A / (B × C)   where A = NOI, B = DSCR, C = loan constant",tips:["Loan constants to memorize — 30yr @ 6% ≈ 0.072; 25yr @ 6% ≈ 0.077; 30yr @ 5% ≈ 0.0644; 30yr @ 7% ≈ 0.0799.",'Formula: Max Loan = NOI / (DSCR × Loan Constant). DSCR × constant is the "effective rate" the loan must support.',"At 1.25x DSCR, every $1 of NOI supports $0.80 of debt service. Then divide by constant to get loan amount.","IO shortcut: for interest-only loans, constant = rate. $500k NOI / (1.25 × 0.06) = $6.67M."],generate(e,t="intermediate"){const n=E(e,N.noi,t),r=t==="beginner"?e.pickFromSet([1.2,1.25,1.3]):E(e,N.dscrTarget,t),l=E(e,N.interestRate,t),o=t==="beginner"?30:e.pickInt(N.amortYears.min,N.amortYears.max),a=ld({noi:n,dscrTarget:r,annualRate:l,years:o});return{id:F("dscr"),kind:"dscrLoanSizing",prompt:`NOI of ${g(n)} needs to cover a ${hd(r)} DSCR on a ${he(o)} amortizing loan at ${S(l)}. What's the max loan?`,context:{noi:n,dscrTarget:r,interestRate:l,amortYears:o},expected:a,unit:"usd",tolerance:{type:"pct",band:.05},solution:Om(n,r,l,o)}}};function hi(e,t){return t/e}function vd(e,t,n){return Math.pow(t/e,1/n)-1}function vi(e,t){return Math.pow(1+e,t)}function Dm(e,t){const n=hi(e,t);return{formula:"Equity Multiple = Equity Out / Equity In",steps:[{label:"Multiple",expression:`${g(t)} / ${g(e)}`,result:Ie(n)}],answerDisplay:Ie(n)}}const _m={kind:"equityMultiple",label:"Equity Multiple",description:"Equity in + equity out → EM.",category:"returns",pattern:"A / B   where A = out, B = in",tips:["EM = Out / In. Doesn't care about time — 2x in 1 year and 2x in 10 years both = 2.0x.","Divide by hundreds: $23M / $10M → 23/10 = 2.3x. $17.5M / $8M → 17.5/8 ≈ 2.19x.","Rule of thumb: institutional value-add deals target 1.7x–2.0x; opportunistic 2.0x+; core ~1.4x–1.6x.","Complement to IRR: EM shows absolute dollars back, IRR shows time-adjusted. Always look at both."],generate(e,t="intermediate"){const n=E(e,N.equityIn,t),r=E(e,N.irrExitMultiple,t),l=t==="beginner"?1e6:t==="advanced"?25e3:1e5,o=Math.round(n*r/l)*l,a=hi(n,o);return{id:F("em"),kind:"equityMultiple",prompt:`You invested ${g(n)} and received ${g(o)} at sale. What's the equity multiple?`,context:{equityIn:n,equityOut:o},expected:a,unit:"multiple",tolerance:{type:"pct",band:.05},solution:Dm(n,o)}}};function Lm(e,t){const n=pd(e,t);return{formula:"Going-in Cap = NOI / Purchase Price",steps:[{label:"Cap rate",expression:`${g(t)} / ${g(e)}`,result:`${S(n)}  (${Qe(n)})`}],answerDisplay:Qe(n)}}const Fm={kind:"goingInCap",label:"Going-in Cap Rate",description:"Price + NOI → cap rate in bps.",category:"valuation",pattern:"A / B   where A = NOI, B = price",tips:["Cap = NOI / Price. Inverse is the NOI multiple: 5% = 20x, 6% = 16.67x, 7% = 14.29x.","Mental shortcut: NOI / Price, round both to 2 sig figs first. $623k / $12.4M ≈ $620 / $12,400 ≈ 5.0%.","Sanity check: if price looks like ~20× NOI you're at 5%, ~15× → ~6.7%, ~10× → 10%.","Round both up or both down together — keeps the error directionally small. Rounding one up and one down stacks errors.","Sandwich: find the nearest clean multiples (e.g. 15× = 6.67%, 16× = 6.25%) and interpolate toward the actual ratio.","Convert cap to bps: 5.25% = 525 bps. Just shift the decimal two places."],generate(e,t="intermediate"){const n=E(e,N.capRate,t),r=E(e,N.noi,t),l=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(r/n/l)*l,a=pd(o,r),i=Math.round(a*1e4);return{id:F("giCap"),kind:"goingInCap",prompt:`Purchase price is ${g(o)} and NOI is ${g(r)}. What's the going-in cap rate (in bps)?`,context:{purchasePrice:o,noi:r},expected:i,unit:"bps",tolerance:{type:"abs",band:15},solution:Lm(o,r)}}};function zm(e,t){const n=e/t;return{formula:"GRM = Purchase Price / Annual Gross Potential Rent",steps:[{label:"GRM",expression:`${g(e)} / ${g(t)}`,result:Ie(n,2)}],answerDisplay:Ie(n,2)}}const Bm={kind:"grossRentMultiplier",label:"Gross Rent Multiplier",description:"Price / PGI — quick multifamily/retail benchmark.",category:"valuation",pattern:"A / B   where A = price, B = gross potential rent",tips:["GRM = Price / PGI. Multifamily typically trades 8–14× GRM; lower is cheaper.","Quick inversion: cap rate ≈ (1 − OpEx ratio) / GRM. 12× GRM with 40% OpEx ≈ 5% cap.","GRM ignores OpEx, so it's most useful when opex structure is consistent across comps.","Trap: high-OpEx assets look cheap by GRM but expensive by cap. Always cross-check."],generate(e,t="intermediate"){const n=E(e,N.gpr,t),r=E(e,{min:7,max:15,step:.5},t),l=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(n*r/l)*l,a=o/n;return{id:F("grm"),kind:"grossRentMultiplier",prompt:`Purchase price ${g(o)}, gross potential rent ${g(n)}. What's the GRM?`,context:{purchasePrice:o,gpr:n,pgi:n},expected:a,unit:"multiple",tolerance:{type:"pct",band:.05},solution:zm(o,n)}}};function Vm(e,t){const n=Rn(e,t);return{formula:"Loan Constant = annualized payment / loan (monthly amort)",steps:[{label:"Constant",expression:`${he(t)} amort @ ${S(e)}`,result:`${S(n,2)}  (${Qe(n)})`}],answerDisplay:Qe(n)}}const Um={kind:"loanConstant",label:"Loan Constant",description:"Annualized payment as % of loan for monthly-amortizing debt.",category:"returns",pattern:"PMT(r/12, n×12, −1) × 12   [amortization formula]",tips:["Memorize: 30yr @ 5% ≈ 644 bps; 30yr @ 6% ≈ 720 bps; 30yr @ 7% ≈ 799 bps; 25yr @ 6% ≈ 773 bps.","IO shortcut: loan constant = interest rate exactly (no principal paydown).","Rule of thumb: each +100 bps of rate adds ~60–80 bps to the constant on 30yr amort.","Longer amort → lower constant (but diminishing returns: 30y vs 25y only saves ~40 bps)."],generate(e,t="intermediate"){const n=E(e,N.interestRate,t),r=t==="beginner"?e.pickFromSet([25,30]):e.pickInt(N.amortYears.min,N.amortYears.max),l=Rn(n,r),o=Math.round(l*1e4);return{id:F("lc"),kind:"loanConstant",prompt:`What's the loan constant for a ${he(r)} amortizing loan at ${S(n)} (in bps)?`,context:{interestRate:n,amortYears:r},expected:o,unit:"bps",tolerance:{type:"abs",band:15},solution:Vm(n,r)}}};function Ym(e,t){const n=e*t,r=dd(e,t);return{formula:"NOI = EGI × (1 − OpEx Ratio)",steps:[{label:"OpEx",expression:`${g(e)} × ${S(t)}`,result:g(n)},{label:"NOI",expression:`${g(e)} − ${g(n)}`,result:g(r)}],answerDisplay:g(r)}}const Wm={kind:"noiFromOer",label:"NOI from OpEx Ratio",description:"Solve NOI given EGI and an OpEx ratio.",category:"valuation",pattern:"A × (1 − B)   where A = EGI, B = opex ratio",tips:["NOI = EGI × (1 − opex ratio). 40% opex ratio → NOI = 60% of EGI.","Shortcut: skip the subtraction — just multiply by the margin. $1M EGI × 60% margin = $600k NOI.","Combine with cap math: Value = EGI × (1 − opex) / cap. $1M × 60% / 6% = $10M in one shot.","Back out: if comps show $10M at 6% cap, implied NOI is $600k, implied EGI is $1M at 40% opex."],generate(e,t="intermediate"){const n=E(e,N.egi,t),r=e.pickFromSet([.25,.3,.35,.4,.45,.5]),l=dd(n,r);return{id:F("noiFromOer"),kind:"noiFromOer",prompt:`EGI is ${g(n)} with an OpEx ratio of ${S(r)}. What's the NOI?`,context:{egi:n,opexRatioValue:r},expected:l,unit:"usd",tolerance:{type:"pct",band:.03},solution:Ym(n,r)}}};function Qm(e,t){const n=cd(e,t);return{formula:"OpEx Ratio = OpEx / EGI",steps:[{label:"Ratio",expression:`${g(e)} / ${g(t)}`,result:S(n,1)}],answerDisplay:S(n,1)}}const Hm={kind:"operatingExpenseRatio",label:"OpEx Ratio",description:"OpEx / EGI — what % of income goes to operating expenses.",category:"valuation",pattern:"A / B   where A = opex, B = EGI",tips:["Typical ranges — multifamily 30–40%, office 35–45%, retail 25–35%, industrial 15–25%, hotels 60%+.","A rising OpEx ratio with flat income is a red flag — margin compression.","Inverse: NOI margin = 1 − OpEx ratio. A 60% OpEx ratio means 40% of EGI drops to NOI.","Shortcut: divide both to 2 sig figs first. $425k / $1.12M ≈ $430 / $1,120 ≈ 38%."],generate(e,t="intermediate"){const n=E(e,N.egi,t),r=e.pickFromSet([.25,.3,.35,.4,.45,.5]),l=t==="beginner"?5e4:t==="advanced"?5e3:25e3,o=Math.round(n*r/l)*l,a=cd(o,n);return{id:F("oer"),kind:"operatingExpenseRatio",prompt:`EGI is ${g(n)} and operating expenses are ${g(o)}. What's the OpEx ratio?`,context:{egi:n,opex:o},expected:a,unit:"pct",tolerance:{type:"abs",band:.015},solution:Qm(o,n)}}};function Gm(e,t){const n=En(e,t);return{formula:"OpEx/Unit = Total OpEx / Units",steps:[{label:"OpEx per unit",expression:`${g(e)} / ${t} units`,result:`${g(n)}/yr`}],answerDisplay:`${g(n)}/yr`}}const qm={kind:"opexPerUnit",label:"OpEx per Unit (annual)",description:"Operating expense per unit per year.",category:"valuation",pattern:"A / B   where A = opex, B = units",tips:["Typical multifamily range: $4,500–$8,500/unit/yr. Hotels 3–5× higher.","Outliers point to market deviation — high-tax states, sub-metered utilities, age of plant.","Fixed + variable split: ~60% fixed (taxes, insurance, admin) / ~40% variable (utilities, repairs).","Shortcut: $600k opex / 100 units = $6,000/unit. Scale linearly."],generate(e,t="intermediate"){const n=E(e,N.units,t),r=E(e,N.opexPerUnitYear,t),l=t==="beginner"?5e4:t==="advanced"?2500:1e4,o=Math.round(n*r/l)*l,a=En(o,n);return{id:F("opu"),kind:"opexPerUnit",prompt:`A ${n}-unit property has ${g(o)} in annual operating expenses. What's the OpEx per unit per year?`,context:{opex:o,units:n},expected:a,unit:"usd",tolerance:{type:"pct",band:.05},solution:Gm(o,n)}}};function Km(e,t){const n=En(e,t);return{formula:"Price/Unit = Purchase Price / Units",steps:[{label:"Price per unit",expression:`${g(e)} / ${t} units`,result:g(n)}],answerDisplay:g(n)}}const Xm={kind:"pricePerUnit",label:"Price per Unit ($/door)",description:"Purchase price per unit (for multifamily, hotels).",category:"valuation",pattern:"A / B   where A = price, B = units",tips:["Primary multifamily benchmark metric alongside cap rate. Typical B-class ranges $150k–$350k/unit.","Coastal gateway markets push $400k+/unit; tertiary Sun Belt can be $100k–$180k.","Compare to replacement cost/unit to gauge if you're buying below new-build economics.","Shortcut: round both to 2 sig figs. $45M / 180 units → $45M / $180 → $250k/unit."],generate(e,t="intermediate"){const n=E(e,N.units,t),r=E(e,N.pricePerUnitValue,t),l=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(n*r/l)*l,a=En(o,n);return{id:F("ppu"),kind:"pricePerUnit",prompt:`A ${n}-unit property is under contract for ${g(o)}. What's the price per unit?`,context:{purchasePrice:o,units:n},expected:a,unit:"usd",tolerance:{type:"pct",band:.05},solution:Km(o,n)}}};function Zm(e,t){const n=En(e,t);return{formula:"Rent/Unit = GPR / Units",steps:[{label:"Annual rent/unit",expression:`${g(e)} / ${t} units`,result:`${g(n)}/yr`},{label:"Monthly rent/unit",expression:`${g(n)} / 12`,result:`${g(n/12)}/mo`}],answerDisplay:`${g(n)}/yr`}}const Jm={kind:"rentPerUnit",label:"Rent per Unit (annual)",description:"Gross potential rent per unit per year.",category:"valuation",pattern:"A / B   where A = GPR, B = units",tips:["Divide by 12 for monthly. $24k/yr = $2,000/mo. $18k/yr = $1,500/mo.","Market benchmark: compare to local comps — $1,500–$2,500/mo typical for B-class multifamily.","If rent/unit looks way below comps, there's mark-to-market upside. Above comps, risk of tenant loss.","Shortcut: round units to nearest 10 and GPR to nearest $100k first."],generate(e,t="intermediate"){const n=E(e,N.units,t),r=E(e,N.rentPerUnitYear,t),l=t==="beginner"?1e5:t==="advanced"?5e3:25e3,o=Math.round(n*r/l)*l,a=En(o,n);return{id:F("rpu"),kind:"rentPerUnit",pro everedIrr:n,borrowRate:r,ltv:l});return{id:F("levIrr"),kind:"leveredIrr",prompt:`Unlevered IRR is ${S(n)} and you can borrow at ${S(r)} with ${S(l)} LTV. Approximately what's the levered IRR?`,context:{unleveredIrr:n,borrowRate:r,ltv:l},expected:o,unit:"pct",tolerance:{type:"abs",band:.01},solution:lh(n,r,l)}}};function gd(e){const t=e.leaseTermYears*12,n=e.grossRentPerSf*e.leaseTermYears,r=e.grossRentPerSf/12*e.freeMonths;return(n-e.tiPerSf-r)/t*12}function $l(e){return(e.rentPerSf*e.leaseTermYears-e.tiPerSf)/e.leaseTermYears}function xd(e){const t=$l({rentPerSf:e.rentA,tiPerSf:e.tiA,leaseTermYears:e.leaseTermYears}),n=$l({rentPerSf:e.rentB,tiPerSf:e.tiB,leaseTermYears:e.leaseTermYears});return t-n}function yd(e){return e.tiPerSf/e.paybackYears}function wd(e){return(e.newRentPerSf-e.oldRentPerSf)*e.subjectSf*(1-e.vacancy)}function kd(e){return wd(e)/e.capRate}function Sd(e){return-(e.purchasePrice*e.newTaxRate-e.oldAnnualTax)/e.capRate}function ah(e){const t=e.years*12,n=e.grossRent/12*e.freeMonths,r=gd({grossRentPerSf:e.grossRent,leaseTermYears:e.years,tiPerSf:e.tiPerSf,freeMonths:e.freeMonths});return{formula:"NER = (Gross × Term − TI − Free Rent) / Term",steps:[{label:"Gross over term",expression:`${A(e.grossRent)} × ${he(e.years)}`,result:A(e.grossRent*e.years)},{label:"Free rent /SF",expression:`${A(e.grossRent/12)} × ${e.freeMonths} months`,result:A(n)},{label:"NER",expression:`(${A(e.grossRent*e.years)} − ${A(e.tiPerSf)} − ${A(n)}) / ${t}mo × 12`,result:A(r)}],answerDisplay:A(r)}}const ih={kind:"netEffectiveRent",label:"Net Effective Rent",description:"Rent after spreading TI + free rent across the lease term.",category:"valuation",pattern:"A − B/n − (f × A / 12) / n   [face − TI/yr − freeRent/yr]",tips:["Annualize every concession. $15/SF TI over 5 years = $3/SF/yr. 3 months free on a $20 rent = $5/SF total = $1/SF/yr over 5y.","Shortcut: NER ≈ face rent − (TI ÷ term years) − (free months × face rent ÷ 12 ÷ term years).","NER drives cap-rate math — always u
