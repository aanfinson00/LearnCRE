ars:o},expected:s,unit:"usd",tolerance:{type:"pct",band:.05},solution:mm(n,r,l,o)}}};function oi(e,t){return t/e}function td(e,t,n){return Math.pow(t/e,1/n)-1}function nd(e,t){return Math.pow(1+e,t)}function vm(e,t){const n=oi(e,t);return{formula:"Equity Multiple = Equity Out / Equity In",steps:[{label:"Multiple",expression:`${g(t)} / ${g(e)}`,result:Qe(n)}],answerDisplay:Qe(n)}}const ym={kind:"equityMultiple",label:"Equity Multiple",description:"Equity in + equity out → EM.",category:"returns",tips:["EM = Out / In. Doesn't care about time — 2x in 1 year and 2x in 10 years both = 2.0x.","Divide by hundreds: $23M / $10M → 23/10 = 2.3x. $17.5M / $8M → 17.5/8 ≈ 2.19x.","Rule of thumb: institutional value-add deals target 1.7x–2.0x; opportunistic 2.0x+; core ~1.4x–1.6x.","Complement to IRR: EM shows absolute dollars back, IRR shows time-adjusted. Always look at both."],generate(e,t="intermediate"){const n=j(e,R.equityIn,t),r=j(e,R.irrExitMultiple,t),l=t==="beginner"?1e6:t==="advanced"?25e3:1e5,o=Math.round(n*r/l)*l,s=oi(n,o);return{id:B("em"),kind:"equityMultiple",prompt:`You invested ${g(n)} and received ${g(o)} at sale. What's the equity multiple?`,context:{equityIn:n,equityOut:o},expected:s,unit:"multiple",tolerance:{type:"pct",band:.05},solution:vm(n,o)}}};function gm(e,t){const n=Xc(e,t);return{formula:"Going-in Cap = NOI / Purchase Price",steps:[{label:"Cap rate",expression:`${g(t)} / ${g(e)}`,result:`${C(n)}  (${We(n)})`}],answerDisplay:We(n)}}const xm={kind:"goingInCap",label:"Going-in Cap Rate",description:"Price + NOI → cap rate in bps.",category:"valuation",tips:["Cap = NOI / Price. Inverse is the NOI multiple: 5% = 20x, 6% = 16.67x, 7% = 14.29x.","Mental shortcut: NOI / Price, round both to 2 sig figs first. $623k / $12.4M ≈ $620 / $12,400 ≈ 5.0%.","Sanity check: if price looks like ~20× NOI you're at 5%, ~15× → ~6.7%, ~10× → 10%.","Round both up or both down together — keeps the error directionally small. Rounding one up and one down stacks errors.","Sandwi
