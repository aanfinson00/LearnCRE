:"((A + B)(1 − C) − D) / E   [gross × (1−vac) − opex, /cap]",tips:["Order of operations: (GPR + Other) × (1 − vacancy) = EGI. EGI − OpEx = NOI. NOI / cap = Value.","Back-of-envelope: if OpEx is ~40% of EGI and vacancy is ~5%, NOI ≈ gross × 0.95 × 0.6 ≈ gross × 0.57.","Then × (1/cap). At 6% cap: gross × 0.57 × 16.67 ≈ gross × 9.5. Ballparks a full proforma in one step.","Sandwich: compute value at the two nearest clean caps (e.g. 5% and 6%) and interpolate to your actual cap. Handles ugly caps without a calculator.","Sanity check: compare implied value-per-SF or $/unit to market comps before trusting the number."],generate(e,t="intermediate",n="mixed"){const r=E(e,M.gpr,t),s=E(e,M.otherIncome,t),a=e.pickFromSet(Lt.vacancySetNonZero),o=e.pickFromSet(Yo(n)),i=t==="beginner"?1e5:t==="advanced"?1e3:1e4,c=Math.round((r+s)*o*(1-a)/i)*i,u=E(e,G("capRate",n),t),x=yt(wa({gpr:r,otherIncome:s,vacancyRate:a,opex:c}),u);return{id:V("combo"),kind:"combinedScenario",prompt:`A ${sp(n)} has GPR ${v(r)}, other income ${v(s)}, vacancy ${b(a)}, OpEx ${v(c)}, cap ${b(u)}. What's the implied value?`,context:{gpr:r,otherIncome:s,vacancyRate:a,opex:c,capRate:u},expected:x,unit:"usd",tolerance:{type:"pct",band:.03},solution:Wh(r,s,a,c,u)}}};function Hh(e,t,n){const r=Math.pow(1+t,n),s=zr(e,t,n);return{formula:"End = Start × (1 + r)^n",steps:[{label:"Growth factor",expression:`(1 + ${b(t,2)})^${n}`,result:r.toFixed(4)},{label:"End value",expression:`${v(e)} × ${r.toFixed(4)}`,result:v(s)}],answerDisplay:v(s)}}const Qh={kind:"compoundGrowth",label:"Compound Growth (forward)",description:"Project a value forward at a fixed growth rate.",category:"returns",pattern:"A × (1 + B)^n   [start × growth factor]",tips:["Rule of 72: a value roughly doubles every 72/r% years. At 3% → 24 years; at 4% → 18; at 6% → 12.","Anchors: (1.03)^5 ≈ 1.159; (1.03)^10 ≈ 1.344; (1.05)^5 ≈ 1.276; (1.05)^10 ≈ 1.629.","Linear approx (floor): End ≥ Start × (1 + r × n). Actual is always higher due to compounding.","Sandwich: bracket with the two nearest round rates and interpolate (e.g. 2.75% sits between 2.5% and 3%)."],generate(e,t="intermediate",n="mixed"){const r=E(e,M.noi,t),s=E(e,M.growthRate,t),a=e.pickInt(M.projectionYears.min,M.projectionYears.max),o=zr(r,s,a);return{id:V("cg"),kind:"compoundGrowth",prompt:`A value of ${v(r)} grows at ${b(s,2)} per year for ${te(a)}. What's the end value?`,context:{startValue:r,growthRate:s,projectionYears:a},expected:o,unit:"usd",tolerance:{type:"pct",band:.03},solution:Hh(r,s,a)}}};function qh(e,t){const n=lp(e,t);return{formula:"Max Loan = NOI / Debt Yield",steps:[{label:"Max loan",expression:`${v(e)} / ${b(t)}`,result:v(n)}],answerDisplay:v(n)}}const Xh={kind:"debtYield",label:"Debt Yield Loan Sizing",description:"Max loan given NOI and required debt yield.",category:"returns",pattern:"A / B   where A = NOI, B = required yield %",tips:["Debt yield is the lender-side cap rate: NOI / Loan. 9% DY = 11.1x NOI max loan; 10% DY = 10x NOI.","Inverse: Max Loan = NOI / required DY.","Lender check: if debt yield < 8%, most CMBS lenders pass — so 8% is a hard floor for stabilized deals.","Quick math: $800k NOI / 9% → think $800k × 11.11 = $8.89M. Or: $800 / 0.09 = ~$8,890 (shift decimals)."],generate(e,t="intermediate",n="mixed"){const r=E(e,M.noi,t),s=E(e,M.debtYieldTarget,t),a=lp(r,s);return{id:V("dy"),kind:"debtYield",prompt:`NOI is ${v(r)}. Lender requires a ${b(s)} debt yield. What's the max loan?`,context:{noi:r,debtYieldTarget:s},expected:a,unit:"usd",tolerance:{type:"pct",band:.05},solution:qh(r,s)}}};function Kh(e,t,n){const r=ga(e,t),s=ep(r,n);return{formula:"Development Spread = YoC − Market Cap Rate",steps:[{label:"YoC",expression:`${v(e)} / ${v(t)}`,result:b(r)},{label:"Spread",expression:`${b(r)} − ${b(n)}`,result:`${_e(s)}`}],answerDisplay:_e(s)}}const Zh={kind:"devSpread",label:"Development Spread",description:"YoC minus market cap — the risk premium for developing vs buying.",category:"valuation",pattern:"(A / B) − C   [YoC minus market cap]",tips:['100–150 bps is thin, 200–300 bps is typical, 500+ bps is a "layup" development.',"If YoC ≈ market cap, you're taking development risk for no extra return — walk away.","Spread compensates for construction risk, lease-up risk, and time value of capital tied up during build.","Mental math: compute YoC first, then subtract market cap. Answer in bps."],generate(e,t="intermediate",n="mixed"){const r=E(e,G("capRate",n),t),s=E(e,M.yocDelta,t),a=r+s,o=E(e,M.projectCost,t),i=t==="beginner"?25e4:t==="advanced"?25e3:1e5,c=Math.round(o*a/i)*i,u=ep(ga(c,o),r),x=Math.round(u*1e4);return{id:V("devSp"),kind:"devSpread",prompt:`Developing to ${v(o)} in total cost with stabilized NOI of ${v(c)}. Market comps trade at a ${b(r)} cap. What's the development spread (in bps)?`,context:{totalProjectCost:o,stabilizedNoi:c,noi:c,marketCapRate:r},expected:x,unit:"bps",tolerance:{type:"abs",band:25},solution:Kh(c,o,r)}}};function hp(e){return`${e.toFixed(2)}x`}function Jh(e,t,n,r){const s=Wt(n,r),a=e/t,o=Wo({noi:e,dscrTarget:t,annualRate:n,years:r});return{formula:"Max Loan = NOI / (DSCR × Loan Constant)",steps:[{label:"Loan constant",expression:`${te(r)} amort @ ${b(n)}`,result:b(s,2)},{label:"Max annual debt service",expression:`${v(e)} / ${hp(t)}`,result:v(a)},{label:"Max loan",expression:`${v(a)} / ${b(s,2)}`,result:v(o)}],answerDisplay:v(o)}}const ex={kind:"dscrLoanSizing",label:"DSCR Loan Sizing",description:"Max loan given NOI, DSCR target, rate, and amort.",category:"returns",pattern:"A / (B × C)   where A = NOI, B = DSCR, C = loan constant",tips:["Loan constants to memorize — 30yr @ 6% ≈ 0.072; 25yr @ 6% ≈ 0.077; 30yr @ 5% ≈ 0.0644; 30yr @ 7% ≈ 0.0799.",'Formula: Max Loan = NOI / (DSCR × Loan Constant). DSCR × constant is the "effective rate" the loan must support.',"At 1.25x DSCR, every $1 of NOI supports $0.80 of debt service. Then divide by constant to get loan amount.","IO shortcut: for interest-only loans, constant = rate. $500k NOI / (1.25 × 0.06) = $6.67M."],generate(e,t="intermediate",n="mixed"){const r=E(e,M.noi,t),s=t==="beginner"?e.pickFromSet([1.2,1.25,1.3]):E(e,M.dscrTarget,t),a=E(e,M.interestRate,t),o=t==="beginner"?30:e.pickInt(M.amortYears.min,M.amortYears.max),i=Wo({noi:r,dscrTarget:s,annualRate:a,years:o});return{id:V("dscr"),kind:"dscrLoanSizing",prompt:`NOI of ${v(r)} needs to cover a ${hp(s)} DSCR on a ${te(o)} amortizing loan at ${b(a)}. What's the max loan?`,context:{noi:r,dscrTarget:s,interestRate:a,amortYears:o},expected:i,unit:"usd",tolerance:{type:"pct",band:.05},solution:Jh(r,s,a,o)}}};function Ho(e,t){return t/e}function Qo(e,t,n){return Math.pow(t/e,1/n)-1}function Br(e,t){return Math.pow(1+e,t)}function tx(e,t,n){return e*Br(t,n)}function nx(e,t){const n=Ho(e,t);return{formula:"Equity Multiple = Equity Out / Equity In",steps:[{label:"Multiple",expression:`${v(t)} / ${v(e)}`,result:we(n)}],answerDisplay:we(n)}}const rx={kind:"equityMultiple",label:"Equity Multiple",description:"Equity in + equity out → EM.",category:"returns",pattern:"A / B   where A = out, B = in",tips:["EM = Out / In. Doesn't care about time — 2x in 1 year and 2x in 10 years both = 2.0x.","Divide by hundreds: $23M / $10M → 23/10 = 2.3x. $17.5M / $8M → 17.5/8 ≈ 2.19x.","Rule of thumb: institutional value-add deals target 1.7x–2.0x; opportunistic 2.0x+; core ~1.4x–1.6x.","Complement to IRR: EM shows absolute dollars back, IRR shows time-adjusted. Always look at both."],generate(e,t="intermediate",n="mixed"){const r=E(e,M.equityIn,t),s=E(e,M.irrExitMultiple,t),a=t==="beginner"?1e6:t==="advanced"?25e3:1e5,o=Math.round(r*s/a)*a,i=Ho(r,o);return{id:V("em"),kind:"equityMultiple",prompt:`You invested ${v(r)} and received ${v(o)} at sale. What's the equity multiple?`,context:{equityIn:r,equityOut:o},expected:i,unit:"multiple",tolerance:{type:"pct",band:.05},solution:nx(r,o)}}};function sx(e,t){const n=fp(e,t);return{formula:"Going-in Cap = NOI / Purchase Price",steps:[{label:"Cap rate",expression:`${v(t)} / ${v(e)}`,result:`${b(n)}  (${_e(n)})`}],answerDisplay:_e(n)}}const ax={kind:"goingInCap",label:"Going-in Cap Rate",description:"Price + NOI → cap rate in bps.",category:"valuation",pattern:"A / B   where A = NOI, B = price",tips:["Cap = NOI / Price. Inverse is the NOI multiple: 5% = 20x, 6% = 16.67x, 7% = 14.29x.","Mental shortcut: NOI / Price, round both to 2 sig figs first. $623k / $12.4M ≈ $620 / $12,400 ≈ 5.0%.","Sanity check: if price looks like ~20× NOI you're at 5%, ~15× → ~6.7%, ~10× → 10%.","Round both up or both down together — keeps the error directionally small. Rounding one up and one down stacks errors.","Sandwich: find the nearest clean multiples (e.g. 15× = 6.67%, 16× = 6.25%) and interpolate toward the actual ratio.","Convert cap to bps: 5.25% = 525 bps. Just shift the decimal two places."],generate(e,t="intermediate",n="mixed"){const r=E(e,G("capRate",n),t),s=E(e,M.noi,t),a=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(s/r/a)*a,i=fp(o,s),c=Math.round(i*1e4);return{id:V("giCap"),kind:"goingInCap",prompt:`Purchase price is ${v(o)} and NOI is ${v(s)}. What's the going-in cap rate (in bps)?`,context:{purchasePrice:o,noi:s},expected:c,unit:"bps",tolerance:{type:"abs",band:15},solution:sx(o,s)}}};function lx(e,t){const n=e/t;return{formula:"GRM = Purchase Price / Annual Gross Potential Rent",steps:[{label:"GRM",expression:`${v(e)} / ${v(t)}`,result:we(n,2)}],answerDisplay:we(n,2)}}const ox={kind:"grossRentMultiplier",label:"Gross Rent Multiplier",description:"Price / PGI — quick multifamily/retail benchmark.",category:"valuation",pattern:"A / B   where A = price, B = gross potential rent",tips:["GRM = Price / PGI. Multifamily typically trades 8–14× GRM; lower is cheaper.","Quick inversion: cap rate ≈ (1 − OpEx ratio) / GRM. 12× GRM with 40% OpEx ≈ 5% cap.","GRM ignores OpEx, so it's most useful when opex structure is consistent across comps.","Trap: high-OpEx assets look cheap by GRM but expensive by cap. Always cross-check."],generate(e,t="intermediate",n="mixed"){const r=E(e,M.gpr,t),s=E(e,{min:7,max:15,step:.5},t),a=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(r*s/a)*a,i=o/r;return{id:V("grm"),kind:"grossRentMultiplier",prompt:`Purchase price ${v(o)}, gross potential rent ${v(r)}. What's the GRM?`,context:{purchasePrice:o,gpr:r,pgi:r},expected:i,unit:"multiple",tolerance:{type:"pct",band:.05},solution:lx(o,r)}}};function ix(e,t){const n=Wt(e,t);return{formula:"Loan Constant = annualized payment / loan (monthly amort)",steps:[{label:"Constant",expression:`${te(t)} amort @ ${b(e)}`,result:`${b(n,2)}  (${_e(n)})`}],answerDisplay:_e(n)}}const cx={kind:"loanConstant",label:"Loan Constant",description:"Annualized payment as % of loan for monthly-amortizing debt.",category:"returns",pattern:"PMT(r/12, n×12, −1) × 12   [amortization formula]",tips:["Memorize: 30yr @ 5% ≈ 644 bps; 30yr @ 6% ≈ 720 bps; 30yr @ 7% ≈ 799 bps; 25yr @ 6% ≈ 773 bps.","IO shortcut: loan constant = interest rate exactly (no principal paydown).","Rule of thumb: each +100 bps of rate adds ~60–80 bps to the constant on 30yr amort.","Longer amort → lower constant (but diminishing returns: 30y vs 25y only saves ~40 bps)."],generate(e,t="intermediate",n="mixed"){const r=E(e,M.interestRate,t),s=t==="beginner"?e.pickFromSet([25,30]):e.pickInt(M.amortYears.min,M.amortYears.max),a=Wt(r,s),o=Math.round(a*1e4);return{id:V("lc"),kind:"loanConstant",prompt:`What's the loan constant for a ${te(s)} amortizing loan at ${b(r)} (in bps)?`,context:{interestRate:r,amortYears:s},expected:o,unit:"bps",tolerance:{type:"abs",band:15},solution:ix(r,s)}}};function ux(e,t){const n=e*t,r=pp(e,t);return{formula:"NOI = EGI × (1 − OpEx Ratio)",steps:[{label:"OpEx",expression:`${v(e)} × ${b(t)}`,result:v(n)},{label:"NOI",expression:`${v(e)} − ${v(n)}`,result:v(r)}],answerDisplay:v(r)}}const dx={kind:"noiFromOer",label:"NOI from OpEx Ratio",description:"Solve NOI given EGI and an OpEx ratio.",category:"valuation",pattern:"A × (1 − B)   where A = EGI, B = opex ratio",tips:["NOI = EGI × (1 −
