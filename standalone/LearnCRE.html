r-year invoices supporting the new $800; ask for an audit (Section 7.4 / 5.4 audit rights typically apply); negotiate a 50/50 split rather than litigate. Most landlords back down on supplemental reconciliations because the optics of going to court over $800 are bad and they'll usually accept a partial recovery."},{label:"You owe the full $800 — Landlord has 12 months from year-end to bill, and November is within that window.",isBest:!1,explanation:"Concedes too quickly. The 12-month clock is technical, but the equity argument (April statement was held out as complete) is real. Plus, a tenant who pays without pushing back on every supplemental is the tenant who gets billed every supplemental for the rest of the lease."},{label:"You owe nothing — once Landlord delivers a CAM Statement, the year is closed; supplemental statements are categorically barred.",isBest:!1,explanation:"Overstates the law. The lease language doesn't expressly close the year on initial delivery. The argument for closure is equity-based, not text-based, and may not win at trial."},{label:"Audit rights are the only remedy — invoke them and pay whatever the audit determines.",isBest:!1,explanation:"Audit rights are *one* remedy but not the only one. Tenant can challenge the supplemental directly under 7.5's implicit one-statement rule, audit the books, and negotiate. Mixing remedies is the smart play."}],takeaway:"CAM reconciliation creates a year-end true-up: monthly estimates → year-end actual → tenant pays / lands credits. The procedural rules matter more than the math. Most lease language gives landlord ~12 months to deliver the Statement; some language allows supplemental adjustments (read carefully) but most reads to mean one Statement per year. When landlord serially supplements, push back: ask for invoices, invoke audit rights, negotiate. Most landlords back down rather than litigate.",tips:["Always read 7.4-7.5 (or equivalent) before paying any supplemental CAM. The language often bars serial supplements.","Annual statements should arrive within 90-180 days of year-end. Delays past 12 months are typically waived under most lease language.","Estimated CAM monthly payments are the landlord's convenience. If estimates are way off, demand a mid-year adjustment.",'Build a "CAM file" each year: invoices, original statement, any supplements, audit results. Tenants with clean records win these arguments; tenants without records pay.',"When in dispute, ask for audit rights *before* paying. Once you pay, you've effectively accepted the bill."]},ek={id:"construction-liquidated-damages",title:"Construction LDs — does this clause actually cover the owner's losses?",category:"document-literacy",difficulty:"advanced",roles:["development","acquisitions"],documentExcerpt:{docType:"construction",label:"Article 12 — Time of Performance / Liquidated Damages",text:`12.1 Substantial Completion Date. Contractor shall achieve
    Substantial Completion of the Work no later than the Substantial
    Completion Date set forth in the Contract Schedule (the "SC
    Date"). Time is of the essence.

12.2 Liquidated Damages. If Contractor fails to achieve Substantial
    Completion by the SC Date, Contractor shall pay Owner, as
    liquidated damages and not as a penalty, the sum of $5,000 per
    calendar day for each day Substantial Completion is delayed past
    the SC Date, up to a maximum aggregate of $500,000 (the
    "Liquidated Damages Cap"). Contractor and Owner agree this
    amount represents a reasonable forecast of just compensation for
    the harm that would be caused by such delay and is not a penalty.

12.3 Excused Delays. The SC Date shall be extended day-for-day for
    delays caused by: (a) Force Majeure; (b) acts or omissions of
    Owner or Owner's agents; (c) changes in the Work approved by
    Owner; (d) abnormal adverse weather conditions reasonably
    documented by Contractor.

12.4 Sole Remedy. Liquidated Damages under this Article 12 shall be
    Owner's sole and exclusive remedy for delay; Owner waives any
    right to recover actual damages, consequential damages, or
    incidental damages arising from delay in Substantial Completion.`},scenario:`Your $50M development project is now 90 days past the contractual Substantial Completion Date. Of the 90 days: 30 are weather-related (well-documented but arguable as "abnormal"); 20 are the result of an Owner-approved change order that pushed the SC Date by exactly 20 days; 40 are unexcused contractor delay. Owner's actual damages from the delay (lost rent, extension fees on construction loan, opportunity cost) come to $1.2M.`,question:"Under the LD clause above, what's the Owner's recovery?",options:[{label:'Owner recovers the LD cap of $500,000. Of the 90-day delay: 20 days excused by Owner change order (12.3(c)), 30 days potentially excused by weather *if* documented as "abnormal" (12.3(d)). Best case for Owner: 90 − 20 = 70 days of unexcused delay × $5,000 = $350,000. Worst case: 90 − 50 = 40 unexcused × $5,000 = $200,000. Either way, well under the $500k cap. The $1.2M of actual damages is *waived* under 12.4 — LDs are the sole remedy. Owner is out ~$700k-$1M of actual losses.',isBest:!0,explanation:"Reading the clause systematically: (1) **Excused day count**: Owner-approved change order pushes the SC Date *day-for-day* per 12.3(c), so those 20 days don't count against Contractor; abnormal weather under 12.3(d) requires Contractor's documentation but is a fact question (likely partially excused). (2) **LD math**: $5,000 per unexcused day. Best case 70 unexcused days = $350k; conservative case 40 days = $200k. Both far under the $500k cap. (3) **Cap as ceiling**: $500k cap is the binding constraint regardless of how bad the delay gets. (4) **Sole remedy**: 12.4 expressly waives consequential, actual, and incidental damages — so the $1.2M of real losses (lost rent, extension fees, etc.) is unrecoverable beyond the LDs. **Practical impact**: Owner negotiated a sub-market LD rate and a low cap, leaving them under-compensated. This is why commercial owners push for higher LD rates ($10-25k/day on a $50M deal isn't unusual) and either no cap or much higher caps (e.g. 5% of contract value = $2.5M on a $50M deal)."},{label:'Owner can recover full $1.2M of actual damages by characterizing the LD clause as a "penalty" and getting it struck.',isBest:!1,explanation:'Hard to win — Section 12.2 has classic anti-penalty language ("reasonable forecast of just compensation, not a penalty"). Courts uphold these clauses unless the LD amount is wildly disproportionate to anticipated damages. $5k/day is on the low side but not "shockingly low."'},{label:"Owner gets $0 — weather and change orders excuse the entire delay.",isBest:!1,explanation:`Even maximally crediting both, only 50 days are excused; 40 remain unexcused at $5k/day = $200k of LDs. Weather requires *documentation* that it's "abnormal," which is a fact question.`},{label:"Owner recovers $500k cap *plus* actual damages above the cap, since LDs and actual damages can stack.",isBest:!1,explanation:'Misreads 12.4. "Sole and exclusive remedy" means LDs *replace* — not stack on top of — actual damages. Owner waived the right to actual damages by signing this clause. Stacking is what owners *want* but rarely get in negotiated GMP/cost-plus contracts.'}],takeaway:`Liquidated damages are negotiated *floors and ceilings* on delay recovery. The owner gives up actual damages (which would otherwise be hard to prove) in exchange for a fixed daily rate × actual delay days, capped. Contractor gives up "I can't calculate damages" defenses in exchange for the cap. Critical drafting moves: (1) push the daily rate to reflect real lost-rent + carry costs; (2) push the cap higher (5-10% of contract value is the modern norm); (3) carefully limit "excused delays" — broad force-majeure clauses gut LDs; (4) preserve actual-damages claims for *catastrophic* delays (6+ months) by carving them out of the "sole remedy" language.`,tips:["LD daily rate should reflect: lost rent + lender extension fees + insurance carry + opportunity cost. Calculate before signing.","LD caps: 3-5% of contract value is sponsor-friendly; 8-10% is balanced; 15%+ is owner-friendly.",`"Sole remedy" language is the contractor's biggest win in negotiation. Push to carve out: gross negligence, willful default, abandonment.`,'"Abnormal weather" is contractor-favorable when used loosely. Define it in the contract: e.g. "weather more severe than the 10-year historical 90th percentile per NOAA records."',"Always model the LD recovery against actual damages at multiple delay severities. If 90 days of delay only recovers $500k against $1M+ of actual damages, you under-negotiated."]},tk={id:"psa-earnest-money-default",title:"PSA earnest money — who keeps the deposit when the deal blows up?",category:"document-literacy",difficulty:"advanced",roles:["acquisitions"],documentExcerpt:{docType:"psa",label:"Article 11 — Default and Remedies",text:`11.1 Buyer's Default. If Buyer fails to consummate the purchase
    of the Property in accordance with this Agreement for any reason
    other than Seller's default or the failure of any condition to
    Buyer's obligation to close that has not been waived, Seller's
    sole and exclusive remedy shall be to terminate this Agreement
    and retain the Earnest Money as liquidated damages, the parties
    acknowledging that Seller's actual damages would be difficult to
    determine.

11.2 Seller's Default. If Seller fails to consummate the sale of
    the Property in accordance with this Agreement for any reason
    other than Buyer's default or the failure of any condition to
    Seller's obligation to close, Buyer may, as Buyer's sole and
    exclusive remedies, either: (i) terminate this Agreement and
    receive a refund of the Earnest Money plus reimbursement of
    Buyer's third-party diligence costs incurred up to a cap of
    $250,000; or (ii) seek specific performance of this Agreement.

11.3 Earnest Money Schedule. The Earnest Money shall consist of:
    (a) the Initial Deposit of $1,000,000, payable by Buyer within
    two (2) Business Days of mutual execution and held by Escrow
    Agent; and (b) the Additional Deposit of $1,500,000, payable by
    Buyer within one (1) Business Day after expiration of the Due
    Diligence Period. The Earnest Money shall become non-refundable
    (except in the event of Seller default) upon the expiration of
    the Due Diligence Period.

11.4 Due Diligence Period. The Due Diligence Period shall expire at
    11:59 p.m. Pacific Time on the date that is forty-five (45) days
    after the Effective Date.`},scenario:`You're Buyer on a $40M industrial acquisition. The DD period was 45 days; it ended yesterday at midnight. Initial Deposit ($1M) was funded at signing; Additional Deposit ($1.5M) is due tomorrow. Today: your debt source pulled out citing "credit market conditions" — your loan commitment was conditional. You can find replacement debt in 30 days but the PSA closing is in 14 days. Seller refuses to extend.`,question:"What's your exposure if you can't close on the contracted date?",options:[{label:`You're exposed for the full $2.5M Earnest Money. The Initial Deposit ($1M) is already with Escrow Agent. The Additional Deposit ($1.5M) is contractually due tomorrow — if you don't fund, you're in default on funding obligation. The DD Period expired yesterday, so 11.3 says the EM is non-refundable except for Seller default. Your "debt fell through" is *not* a Seller default and is *not* a contractual condition (your loan commitment was conditional, but commitments aren't typically PSA closing conditions unless explicitly listed). Specific performance is the Seller's remedy here only by analogy — under 11.1, Seller's sole remedy is to keep the EM. So you lose $2.5M to walk away cleanly.`,isBest:!0,explanation:"PSA default analysis: (1) **DD Period expired** = EM hardens (11.3). (2) **Buyer's loan failure isn't typically a closing condition** unless explicitly listed in the PSA — most institutional deals make loans the *Buyer's problem*; financing contingencies are typically out by DD end. (3) **Seller's remedy** is liquidated damages = the full EM (11.1). $2.5M is a real, hard-dollar loss. (4) **Specific performance** under 11.2 is *Buyer's* remedy against *Seller* — flipped here. (5) **Practical play**: try to negotiate a 30-day extension with Seller for a fee (e.g. $250k of EM goes to Seller as extension consideration); refusing to fund the Additional Deposit and then walking is also an option but Escrow Agent's release of the Initial Deposit ($1M already on hand) is automatic on Seller's claim. The lesson: financing contingencies should run *through closing*, or DD should be long enough to lock the loan commitment unconditionally."},{label:"Your debt source pulling out is a force-majeure-equivalent event; the EM is refundable.",isBest:!1,explanation:`Loan-source failure isn't force majeure under standard PSA language. PSAs typically don't even *include* force majeure for delay; closing date is "of the essence" and the only refundable triggers are Seller default + listed conditions failure.`},{label:"Specific performance is your remedy — you can compel Seller to wait the 30 days.",isBest:!1,explanation:"Inverts the parties. Specific performance under 11.2 is *Buyer's* remedy against *Seller* (forcing Seller to sell). Buyer doesn't have the right to compel Seller to wait while Buyer fixes their own financing problem."},{label:"You only owe the $1M Initial Deposit; the Additional Deposit isn't due until you fund it, so you can refuse and walk with that money saved.",isBest:!1,explanation:`The Additional Deposit is contractually owed (11.3(b)) — refusing to fund it is itself a default under the PSA and gives Seller additional grounds for damages. Plus, if Seller pursues damages beyond the $1M, the "sole remedy" language in 11.1 may not save Buyer if Seller can show Buyer never funded the contracted EM in the first place. Don't assume "I never paid it" gets you out of paying.`}],takeaway:"PSA default mechanics on the buy side: (1) **EM hardens at DD expiration** — past that point, Buyer's only refund triggers are listed contingencies + Seller default. (2) **Buyer default = Seller keeps EM** as liquidated damages; that's typically Seller's sole remedy, but the EM amount is real ($2-5M is common on $30-50M deals). (3) **Seller default = Buyer's choice of refund + diligence reimbursement OR specific performance**. (4) **Loan-source failure is NOT a contingency** unless explicitly listed — most institutional deals push this risk onto Buyer. The defense: structure the financing contingency to run through closing if you can negotiate it; lock unconditional commitments inside DD if you can't.",tips:["EM amounts: 5-10% of purchase price is standard. Under 5% is buyer-friendly; over 10% is a hard-money signal.",`"Sole and exclusive remedy" cuts both ways. Seller can't pursue actual damages beyond EM; Buyer can't pursue specific perf beyond what 11.2 grants.`,"Financing contingencies are mostly extinct on institutional deals. If you need one, push hard at LOI stage; getting it added to the PSA after LOI is very hard.","Always sequence DD end before financing close. If you have 45 days of DD but need 60 days for unconditional debt, your DD period is meaningfully shorter.","Diligence reimbursement caps ($250k here) cover legal + 3rd-party reports but rarely the full DD spend. Track actual costs."]},Sh=[W0,H0,Q0,K0,X0,J0,Z0,e1,t1,a1,n1,s1,r1,i1,o1,l1,c1,u1,d1,p1,m1,h1,f1,g1,x1,y1,b1,v1,w1,k1,S1,N1,C1,$1,j1,P1,R1,I1,M1,T1,A1,E1,D1,L1,O1,B1,F1,q1,z1,G1,V1,Y1,_1,U1,W1,H1,Q1,K1,X1,J1,Z1,ek,tk];function ac(e){return Sh.find(t=>t.id===e)}function ak(e,t){return t==="mixed"||!e.assetClass?!0:e.assetClass===t}function nk(e,t){return t==="all"||e.difficulty===t}function Nh(e){return Sh.filter(t=>!(e.category!=="all"&&t.category!==e.category||!nk(t,e.difficulty)||!ak(t,e.assetClass)||!Ps(t.roles,e.role)))}function Qu(e,t){let a=t>>>0;a===0&&(a=2654435769);for(let n=e.length-1;n>0;n--){a=a*1664525+1013904223>>>0;const s=a%(n+1);[e[n],e[s]]=[e[s],e[n]]}}function sk(e,t,a=Date.now()){const n=[...e];return Qu(n,a),n.slice(0,Math.min(t,n.length)).map((i,o)=>{const l=[...i.options];return Qu(l,(a^(o+1)*2654435769)>>>0),{...i,options:l}})}const rk=[5,10,20],ik=[{id:"all",label:"All"},{id:"beginner",label:"Beginner"},{id:"intermediate",label:"Intermediate"},{id:"advanced",label:"Advanced"}];function ok({onStart:e,onBack:t}){const[a,n]=w.useState("all"),[s,i]=w.useState("all"),[o,l]=w.useSta sset is at 94%. Recent comps in the submarket trade 5.50–6.25%, including one trophy 2018-built asset at 5.50%. Your IRR target is 14% on a 5-year hold; the deal pencils to 13.8% at the OM's assumptions.",data:[{label:"Purchase price",value:"$42M"},{label:"OM going-in cap (T-3 ann.)",value:"5.83%"},{label:"Year-1 NOI growth assumed",value:"5%"},{label:"Capex reserve",value:"$300/unit/yr"},{label:"Exit cap",value:"6.0% (17 bps spread)"},{label:"IRR at OM assumptions",value:"13.8%"},{label:"Subject vintage",value:"1998 (Class B)"},{label:"Comp range",value:"5.50–6.25%"}],question:"In 4-6 sentences: how do you re-cut this OM, what bid do you recommend, and why? Be specific about which assumptions you change and how each one moves the price.",modelAnswer:"The OM stacks aggressive assumptions across multiple lines; each one needs to be re-cut. First, replace the T-3 annualized NOI with T-12 actuals — T-3 misses seasonal vacancy and likely understates real expense run-rate by 5-10%. Second, NOI growth at 5% Year 1 has no value-add story behind it; the asset is stabilized, leased to market, and the submarket is at 6% vacancy. Re-cut to 3% to match historical submarket rent growth. Third, $300/unit/yr capex on a 1998-vintage Class-B asset is light; institutional norms are $400-500/unit/yr for 25-yr-old MF. Fourth, 17 bps of cap expansion over 5 years is aggressively tight in any rate environment; widen to 75-100 bps. Each of these cuts the implied value by ~3-7%. Combined, the deal should pencil at $36-38M, not $42M. Recommend bidding $37M with a clear narrative on which assumptions changed; if seller refuses, walk — there will be other 1998-vintage MF deals at fair pricing.",rubric:[{id:"flags-trended-noi",dimension:"Calls out T-3 annualized as wrong methodology — demands T-12 actuals",weight:1.5},{id:"pushes-back-noi-growth",dimension:"Pushes back on 5% Year-1 NOI growth without a value-add story",weight:1.5},{id:"capex-reserve",dimension:"Identifies $300/unit/yr as light for 1998-vintage Class-B; cites institutional norm"},{id:"exit-cap-spread",dimension:"Calls 17 bps of cap expansion as too tight; widens to 75-100 bps"},{id:"numeric-bid-range",dimension:'Recommends a specific bid number tied to the re-cut math (not just "lower")',weight:1.5},{id:"walk-away-discipline",dimension:"Frames walk-away if seller refuses, rather than chasing the OM's number"}],takeaway:`A "walk me through your bid" answer demonstrates that you can read an OM critically, identify each aggressive assumption, quantify the impact, and arrive at YOUR number rather than the seller's. Senior partners listen for whether you push back on multiple lines (not just one) and whether you can defend a specific bid range with the math behind it.`,tips:["Always re-cut to T-12 actuals; T-3 + annualizing hides seasonality.","NOI growth without a named lever is wishful thinking — flag every time.","Walking is a feature, not a bug. The cleanest signal of underwriting discipline."]},e2={id:"diagnose-noi-miss",title:"Diagnose the NOI miss for the LP IC memo",difficulty:"intermediate",roles:["assetManagement"],assetClass:"multifamily",scenario:"You're the asset manager on a 250-unit MF asset purchased 18 months ago. Year-1 NOI underwriting was $3.0M; trailing-12 NOI just came in at $2.65M — an 11.7% miss. Revenue is $4.85M (vs UW $4.95M, 2% under). Rents are at market, occupancy is 93% (vs UW 94%). OpEx came in at $2.20M vs UW $1.95M — a $250k or 12.8% overage. Insurance jumped 28% YoY at renewal; property tax was reassessed and rose 18%; payroll inflation ran 6%; everything else was within 3% of plan. The LP IC asks for a 2-page memo explaining the variance and proposing actions. You need to draft the variance analysis section.",data:[{label:"UW NOI",value:"$3.0M"},{label:"Actual TTM NOI",value:"$2.65M"},{label:"NOI miss",value:"-$350k (-11.7%)"},{label:"Revenue variance",value:"-$100k (-2%)"},{label:"OpEx variance",value:"+$250k (+12.8%)"},{label:"Insurance",value:"+28% YoY at renewal"},{label:"Property tax",value:"+18% (reassessment)"},{label:"Payroll",value:"+6% inflation"}],question:"Draft the variance analysis section: what caused the miss, what's structural vs one-time, and what's your action plan? Aim for 5-7 sentences in the LP's tone (factual, prioritized, specific).",modelAnswer:"The $350k NOI miss is dominated by OpEx growth, not revenue weakness. Revenue ran 2% under plan due to slightly softer occupancy (93% vs 94%); rents are at market and there's no demand-side concern. The OpEx overage of $250k breaks down as: insurance renewal +$80k (28% increase, market-driven, expected to compound), property tax reassessment +$110k (18% increase, locked in for 3 years until next reassessment), payroll +$35k (general wage inflation, recurring), all other lines roughly on plan. None of this is one-time: the insurance and tax increases are the new run-rate, and payroll growth will continue at ~5% annually. Action plan: (1) refile the property tax appeal — typical recovery is 5-10% of the increase; (2) re-bid the insurance at renewal next year, exploring a higher deductible to claw back ~$15-25k; (3) update the underwriting forward-look to reflect the new OpEx baseline, which compresses the year-5 exit value by ~$1.5M at the same cap rate. Net: this is a structural cost-base reset, not a leasing or operations failure.",rubric:[{id:"attributes-to-opex",dimension:"Correctly attributes the miss to OpEx (not revenue) with the math to support it",weight:2},{id:"breaks-down-opex",dimension:"Breaks down the OpEx variance by line (insurance, tax, payroll) with specific dollars",weight:1.5},{id:"structural-vs-onetime",dimension:"Correctly classifies items as structural (recurring) vs one-time",weight:1.5},{id:"action-plan",dimension:'Specific, named actions (tax appeal, insurance re-bid) — not "we will investigate"',weight:1.5},{id:"forward-impact",dimension:"Quantifies the forward-look impact on exit value or NOI run-rate"},{id:"tone",dimension:"LP-appropriate tone: factual, prioritized, no hedging or excuses"}],takeaway:'A good variance memo distinguishes structural shifts (new run-rate) from one-time events; quantifies dollars by line item rather than reporting at the aggregate; and proposes named actions rather than vague follow-ups. LPs read for "did the asset manager understand what happened, and what are they doing about it" — not for fault.',tips:["Revenue near-plan + NOI miss = OpEx variance by definition. Don't bury that.","Property tax reassessments are structural for 3-5 years until the next cycle. Build it into the run-rate, then appeal.","Insurance increases since 2020 have been 15-30% YoY for many MF assets — market-driven, not asset-specific."]},t2={id:"defend-deal-to-ic",title:"Defend this deal to a skeptical IC",difficulty:"advanced",roles:["acquisitions","portfolioMgmt"],assetClass:"industrial",scenario:`You've underwritten a $65M industrial acquisition. Going-in cap is 5.2% (modeled at $3.4M NOI), exit cap 6.0% (80 bps spread), levered IRR 16.5% on a 5-year hold at 60% LTV. The submarket is tight (3% vacancy), the building is a 2015-vintage Class-A distribution facility leased to a single investment-grade tenant on 9 years of remaining term with 2.5% annual escalations. The IC chairman opens by saying "industrial caps have compressed too far; we're late in the cycle. Why are we buying at 5.2% when the historical avg is 6.5%?"`,data:[{label:"Purchase price",value:"$65M"},{label:"Going-in cap",value:"5.2%"},{label:"Exit cap modeled",value:"6.0% (+80 bps)"},{label:"Levered IRR",value:"16.5%"},{label:"Tenant",value:"IG, 9 yrs remaining, 2.5% escalations"},{label:"Submarket vacancy",value:"3%"},{label:"Vintage",value:"2015 (Class A)"},{label:"20-yr submarket cap avg",value:"~6.5%"}],question:"Defend the buy thesis to the IC in 6-8 sentences. Don't pretend the chairman's concern doesn't exist; address it directly with specific reasons this asset earns the tight cap.",modelAnswer:"The chairman's concern is fair on a market basis but misses three asset-specific reasons this deal warrants tighter pricing than the 20-year average. First, the income stream is bond-like: an IG tenant with 9 years of remaining term plus 2.5% contractual escalations gives us a contractual NOI growth rate of ~17.5% over the hold without market-rent assumption, plus near-zero rollover risk. That earns 50-100 bps of cap compression vs. spec-grade or short-term-leased product, which is exactly what the market is pricing today. Second, on exit underwriting we're modeling 80 bps of cap expansion (5.2% → 6.0%), which absorbs a meaningful normalization scenario; the model isn't assuming the cap stays tight at exit. Third, even at a stress-case 6.5% exit cap (matching the 20-yr historical average), the levered IRR still pencils to ~13%, above our 12% required return. So the buy thesis is: we're paying for income certainty (IG tenant + long lease + escalations), our exit assumes meaningful normalization, and the deal still clears the hurdle in a stress case. The risk we ARE taking is timing — if cap rates move >150 bps in 5 years and rates stay elevated, the IRR drops below 10%. We size the bid accordingly and walk if the seller insists on a tighter exit cap than 6.0%.",rubric:[{id:"acknowledges-concern",dimension:"Acknowledges the chairman's concern as legitimate (not dismissive)",weight:1.5},{id:"tenant-credit-thesis",dimension:"Explains why IG tenant + long lease + escalations earn the tight cap",weight:2},{id:"exit-cap-defense",dimension:"Defends the 80 bps exit-cap spread as conservative-not-aggressive",weight:1.5},{id:"stress-test",dimension:"Runs a stress-case (e.g. 6.5% exit cap) and quantifies the IRR there",weight:1.5},{id:"names-the-risk",dimension:`Names the residual risk explicitly (not "we'll be fine")`,weight:1.5},{id:"walk-discipline",dimension:"Frames a walk threshold — what would change the buy thesis"}],takeaway:`Defending a tight-cap deal to a skeptical IC requires (1) acknowledging the concern is fair, (2) naming specific asset-level reasons it earns the pricing, (3) showing the model already absorbs a meaningful stress case, (4) being explicit about the residual risk you're taking. The worst defense is "the comps support it" — that's circular. The best is "here's what the buyer is paying for, here's the floor on returns if we're wrong, here's when we walk."`,tips:["Acknowledge the concern in plain language; don't fight the framing.",`Always run a stress case in your IC defense. "What if you're wrong about exit cap?" is the next question.`,"Naming the residual risk explicitly is what separates senior thinking from junior."]},a2={id:"refi-or-sell-memo",title:"Recommend: refi or sell — write the IC memo",difficulty:"advanced",roles:["portfolioMgmt","assetManagement"],assetClass:"mixed",scenario:"You're three years into a five-year hold on a stabilized $80M MF asset. Realized IRR through Y3 is 14% to LPs. Two paths to year-5 close-out: (a) hold + refi at year 3 to a 65% LTV loan ($52M new loan vs $30M existing), distribute ~$20M of refi proceeds, sell at year 5; (b) sell now at $85M (current market). After-tax IRR on path A is ~14.2%, path B is ~13.9%. The fund is in year 4 of a 7-year vehicle. The LP base is 60% taxable individuals + family offices, 40% pension funds. The fund's alternative deployment opportunity set today is thin (most viable deals priced at 10-12% IRR). Draft the recommendation memo to the IC.",data:[{label:"Hold-to-date",value:"3 of 5 years"},{label:"Realized LP IRR",value:"14%"},{label:"Refi path after-tax IRR",value:"14.2%"},{label:"Sell path after-tax IRR",value:"13.9%"},{label:"Fund vintage",value:"Year 4 of 7"},{label:"LP base",value:"60% taxable / 40% tax-exempt"},{label:"Alt deployment opportunity",value:"10-12% IRR (thin)"}],question:"Write the recommendation in 6-8 sentences. Take a position; don't hedge. Explain how each non-IRR factor (LP tax mix, fund life, redeployment) shaped the decision.",modelAnswer:"Recommend the **refi path** despite the near-identical after-tax IRRs (14.2% vs 13.9%). Three factors drive the call. First, the LP tax mix: at 60% taxable LPs, the refi defers ~$3-4M of recapture + cap-gains taxes that the sale would crystallize today; that deferral is real value to the taxable side and zero to the tax-exempt side, so the *weighted* benefit favors holding. Second, the fund has 3 years of remaining vehicle life — selling now under fund-life pressure would be a forced disposition; with 3 years of runway, the refi-and-hold gives optionality on selling later if pricing improves. Third, the alt deployment opportunity set is thin (10-12% IRR vs the deal's embedded 14%+); selling and redeploying at 11% destroys ~300 bps of LP return, while the refi extracts capital that LPs can deploy on their own or hold while better deals emerge. The risk on the refi path is cap-rate widening in the next 2 years; we model 75 bps of expansion in our base case and the path still clears 13%. Walk threshold: if cap rates widen materially in Q4, re-evaluate selling in Q1; otherwise, execute the refi.",rubric:[{id:"takes-position",dimension:"Takes a clear position (refi or sell) and defends it — no hedging",weight:2},{id:"tax-mix-analysis",dimension:"Addresses the LP tax mix and how it weighs the decision",weight:1.5},{id:"fund-life",dimension:"Considers fund life / time horizon as a factor",weight:1.5},{id:"redeployment-opportunity",dimension:"Quantifies the cost of redeployment at thinner returns",weight:1.5},{id:"risk-of-recommendation",dimension:"Names the residual risk on the recommended path (cap-rate widening, etc.)"},{id:"walk-threshold",dimension:'Includes a "what would change my mind" / re-evaluation trigger'}],takeaway:'When two paths have similar IRRs, the decision moves to second-order factors. Senior memos take a position, defend it with the named factors (tax mix, fund life, redeployment opportunity), and include a "what changes my mind" trigger. Hedging ("could go either way") reads as junior; pick a side and own it.',tips:["After-tax IRRs that match within 50 bps almost always tip on tax timing or redeployment opportunity.","LP tax mix is the most under-reported decision input. 60/40 vs 80/20 produces different answers.",`Always include a walk threshold: senior thinking has "and here's when I'd revisit."`]},n2={id:"walk-me-through-waterfall",title:"Walk me through a 3-tier American waterfall",difficulty:"intermediate",roles:["portfolioMgmt","acquisitions"],scenario:`You're in a final-round interview at a real-estate PE shop. The senior partner says: "I want to make sure you actually understand fund economics. Walk me through how a 3-tier American waterfall works for a single deal. Pick your own numbers — small enough to do mental math, real enough to ground the explanation. Tell me what each tier does, why it exists, and where the GP's economics come from."`,question:`In 4-6 sentences, walk through the three tiers of an American waterfall on a deal you make up. Address: (1) what each tier does; (2) the order they pay in; (3) why the catch-up tier exists and how it scales; (4) where the GP's economic incentive lives — i.e. what dollars are "promote" vs "pro-rata return".`,modelAnswer:`Take a deal where LP put in $9M and GP put in $1M alongside, 5-year hold, 8% compound pref, 100% catch-up to a 20% promote target, then 80/20 above. Sale generates $20M of cash to distribute. Tier 1 — pref to LP only — pays the LP $9M × ((1.08)^5 − 1) ≈ $4.2M; this is the LP's "interest" on capital, calculated and paid first because LPs put up most of the capital and want a baseline yield before the GP earns anything beyond capital return. Tier 2 — return of capital — pays $9M back to LP and $1M back to GP pro-rata; that takes the cash down to $20M − $4.2M − $10M = $5.8M of residual. Tier 3 has two sub-tiers: first, GP catch-up — until GP has 20% of (pref + cat-up), so $4.2M × 0.20/0.80 ≈ $1.05M to GP; second, the above-split residual ($5.8M − $1.05M = $4.75M) goes 80/20, putting another $0.95M to GP. Total GP take = $1M cap + $1.05M cat-up + $0.95M above = $3.0M; pro-rata at 10% co-invest would have been $1M cap + 10% × ($20M − $10M total profit) = $2M. The $1M delta — *dollars beyond pro-rata of profit* — is the promote, and that's where the GP's real economics come from.`,rubric:[{id:"three-tiers-named",dimension:"Names all three tiers in the right order (pref → ROC → cat-up + above-split)",weight:1.5},{id:"numerical-grounding",dimension:"Picks specific numbers and runs them through; not just abstract description",weight:1.5},{id:"catchup-explained",dimension:"Explains why the catch-up tier exists and how the GP target % scales it"},{id:"promote-vs-prorata",dimension:'Distinguishes "promote dollars" from "pro-rata of profit" cleanly',weight:1.5},{id:"pref-as-interest",dimension:"Frames pref as the LP's baseline yield (not just as a number)"},{id:"fluency",dimension:"Comes across as someone who's actually computed waterfalls — not memorized definitions"}],takeaway:`The "walk me through a waterfall" question is a fluency test. Senior partners care less about whether you know the tier order and more about whether you can ground it in concrete numbers, distinguish the GP's pro-rata cap return from their incentive promote, and articulate *why* each tier exists. Memorized answers without numbers signal you haven't done it; sloppy numbers signal you've done it once. Clean numbers + tier-by-tier explanation signals operating fluency.`,tips:["Always pick your own small numbers ($9M LP / $1M GP / $20M dist) — real-world numbers ground the explanation.",'Distinguish "GP capital returned" (pro-rata, every deal) from "GP promote" (incentive, only when deal clears pref). Senior partners listen for this.',`The catch-up tier is the GP's acceleration to promote economics. Frame it as "100% to GP until they have 20% of (pref + cat-up)" — that phrasing is unambiguous.`]},s2={id:"defend-waterfall-terms",title:"Defend the waterfall terms to IC",difficulty:"advanced",roles:["portfolioMgmt","acquisitions"],scenario:"You're the lead analyst on a $300M co-GP venture pitching the IC of a major institutional LP. Your sponsor is proposing: 6% pref, 50/50 catch-up to a 25% GP target, 70/30 above. The LP's IC counter-proposal: 9% pref, 100% catch-up to 20%, 80/20 above. Both structures clear under base-case modeling, but the dispersion across upside / downside cases is dramatically different. The relationship matters — this LP allocated $200M to the sponsor's last fund. The IC meeting is tomorrow.",data:[{label:"Sponsor proposes",value:"6% / 50-50 catch-up to 25% / 70-30"},{label:"LP IC counter",value:"9% / 100% catch-up to 20% / 80-20"},{label:"Deal size",value:"$300M co-GP"},{label:"LP relationship",value:"$200M in last fund"},{label:"Sponsor edge",value:"Track record + geographic depth"}],question:"Draft a recommendation in 6-8 sentences for *which structure to land on*. Take a position; defend it on math + relationship. Explicitly address: where the sponsor wins on the sponsor proposal, where LP wins on the IC counter, and what middle position you'd propose to close the deal.",modelAnswer:`Recommend landing at **8% pref / 100% catch-up to 22% / 75-25 above** — closer to the LP's ask but with a 200 bps higher promote target and a steeper above-split. Three reasons. First, the sponsor's 6% pref is unmarket-low for institutional capital today (most institutional LPs anchor at 7-9%); pushing 8% is gettable and signals seriousness. Second, 100% catch-up vs 50/50 is a real concession to LP — but the LP's 20% target is also on the low end, so trading "full catch-up" for "22% target" recovers ~10% of the GP's catch-up dollars without the LP losing cash-flow timing. Third, 75-25 above-split (vs 70-30 ask, 80-20 LP counter) is the standard middle position; it hands LP a meaningful concession from the sponsor's starting position while keeping GP economics defensible. Quantitatively, on a $300M deal returning $80M of profit, this middle structure pays GP ~$11M in promote vs $13M (sponsor proposal) and $9M (LP counter); LP's give-up vs IC counter is ~$2M, less than 1% of capital. **Relationship math**: this LP gave you $200M last fund; meeting them mostly on their terms while preserving real GP economics protects the next fundraise. Walk threshold: if LP rejects the catch-up target above 20%, drop to 21% but hold 75-25 — don't give up the above-split too.`,rubric:[{id:"takes-position",dimension:"Picks a specific middle structure with numbers; does not hedge",weight:2},{id:"sponsor-side-economics",dimension:"Quantifies what the sponsor wins on each lever (pref / catch-up / split)",weight:1.5},{id:"lp-side-economics",dimension:"Quantifies what LP wins / loses; addresses LP's actual cash impact",weight:1.5},{id:"relationship-context",dimension:"References the LP relationship + cross-deal economics, not just this deal in isolation",weight:1.5},{id:"middle-position-rationale",dimension:"Explains why the proposed middle position is *defensible* (not arbitrary)"},{id:"walk-threshold",dimension:'Includes a "what would change my mind" / fallback position'}],takeaway:"Real LPA negotiations move on three levers (pref / catch-up / above-split) and one constraint (the LP relationship). Junior analysts pick a middle that splits the difference numerically; senior analysts pick a middle that *trades* concessions across levers — giving up something cheap to gain something valuable. The relationship math matters: a small economic give-up on this deal that protects the next fundraise is almost always the right call. Always include a walk threshold so the sponsor knows your true floor.",tips:["When a counter is on the table, work through which lever the LP cares about most — usually pref + catch-up rate. Concede there; hold above-split.",'Quantify in dollars, not bps. $11M vs $13M of promote on a $300M deal is the conversation; "200 bps of catch-up target" is jargon.','Always model "next fund give-up" — protecting a $200M re-up means the relationship math is worth low-single-digit-millions of GP economics this deal.','Walk thresholds belong in negotiation memos. Senior partners need to know "my floor is X" so they can hold the line.']},Yh=[Zk,e2,t2,a2,n2,s2];function r2(e){return Yh.find(t=>t.id===e)}function i2(e,t){return t==="all"||e.difficulty===t}function _h(e){return Yh.filter(t=>!(!i2(t,e.difficulty)||!Ps(t.roles,e.role)))}function o2(e,t,a=Date.now()){const n=[...e];let s=a>>>0||2654435769;for(let i=n.length-1;i>0;i--){s=s*1664525+1013904223>>>0;const o=s%(i+1);[n[i],n[o]]=[n[o],n[i]]}return n.slice(0,Math.min(t,n.length))}const l2=[1,3,5],c2=[{id:"all",label:"All"},{id:"beginner",label:"Beginner"},{id:"intermediate",label:"Intermediate"},{id:"advanced",label:"Advanced"}];function u2({onStart:e,onBack:t}){const[a,n]=w.useState("all"),[s,i]=w.useState("all"),[o,l]=w.useState(1),c=w.useMemo(()=>_h({difficulty:a,role:s}),[a,s]),u=c.length>0;return r.jsxs("div",{className:"mx-auto max-w-3xl space-y-6 py-10",children:[r.jsxs("header",{className:"flex items-start justify-between gap-6",children:[r.jsxs("div",{className:"space-y-2",children:[r.jsxs("h1",{className:"display text-4xl text-warm-black",children:["Case study",r.jsx("span",{className:"text-copper",children:"."})]}),r.jsx("p",{className:"editorial text-lg text-warm-stone",children:"Long-form prose answers, graded against a model answer + rubric. Practice articulating the right framing — not just picking the right multiple choice. Self-grade for v1; LLM auto-grading is on the roadmap."})]}),r.jsx(A,{variant:"secondary",onClick:t,className:"text-xs",children:"← Back"})]}),r.jsxs(L,{className:"space-y-5",children:[r.jsxs(Hi,{label:"Position focus",children:[r.jsx(tr,{active:s==="all",onClick:()=>i("all"),children:"All"}),js.map(p=>r.jsx(tr,{active:s===p.id,onClick:()=>i(p.id),children:p.label},p.id))]}),r.jsx(Hi,{label:"Difficulty",children:c2.map(p=>r.jsx(tr,{active:a===p.id,
