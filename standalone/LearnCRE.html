((A + B)(1 − C) − D) / E   [gross × (1−vac) − opex, /cap]",tips:["Order of operations: (GPR + Other) × (1 − vacancy) = EGI. EGI − OpEx = NOI. NOI / cap = Value.","Back-of-envelope: if OpEx is ~40% of EGI and vacancy is ~5%, NOI ≈ gross × 0.95 × 0.6 ≈ gross × 0.57.","Then × (1/cap). At 6% cap: gross × 0.57 × 16.67 ≈ gross × 9.5. Ballparks a full proforma in one step.","Sandwich: compute value at the two nearest clean caps (e.g. 5% and 6%) and interpolate to your actual cap. Handles ugly caps without a calculator.","Sanity check: compare implied value-per-SF or $/unit to market comps before trusting the number."],generate(e,t="intermediate",n="mixed"){const r=E(e,M.gpr,t),a=E(e,M.otherIncome,t),s=e.pickFromSet(Ft.vacancySetNonZero),l=e.pickFromSet(Lo(n)),i=t==="beginner"?1e5:t==="advanced"?1e3:1e4,c=Math.round((r+a)*l*(1-s)/i)*i,u=E(e,G("capRate",n),t),x=yt(ms({gpr:r,otherIncome:a,vacancyRate:s,opex:c}),u);return{id:V("combo"),kind:"combinedScenario",prompt:`A ${Hd(n)} has GPR ${g(r)}, other income ${g(a)}, vacancy ${S(s)}, OpEx ${g(c)}, cap ${S(u)}. What's the implied value?`,context:{gpr:r,otherIncome:a,vacancyRate:s,opex:c,capRate:u},expected:x,unit:"usd",tolerance:{type:"pct",band:.03},solution:Eh(r,a,s,c,u)}}};function Ph(e,t,n){const r=Math.pow(1+t,n),a=_r(e,t,n);return{formula:"End = Start × (1 + r)^n",steps:[{label:"Growth factor",expression:`(1 + ${S(t,2)})^${n}`,result:r.toFixed(4)},{label:"End value",expression:`${g(e)} × ${r.toFixed(4)}`,result:g(a)}],answerDisplay:g(a)}}const Mh={kind:"compoundGrowth",label:"Compound Growth (forward)",description:"Project a value forward at a fixed growth rate.",category:"returns",pattern:"A × (1 + B)^n   [start × growth factor]",tips:["Rule of 72: a value roughly doubles every 72/r% years. At 3% → 24 years; at 4% → 18; at 6% → 12.","Anchors: (1.03)^5 ≈ 1.159; (1.03)^10 ≈ 1.344; (1.05)^5 ≈ 1.276; (1.05)^10 ≈ 1.629.","Linear approx (floor): End ≥ Start × (1 + r × n). Actual is always higher due to compounding.","Sandwich: bracket with the two nearest round rates and interpolate (e.g. 2.75% sits between 2.5% and 3%)."],generate(e,t="intermediate",n="mixed"){const r=E(e,M.noi,t),a=E(e,M.growthRate,t),s=e.pickInt(M.projectionYears.min,M.projectionYears.max),l=_r(r,a,s);return{id:V("cg"),kind:"compoundGrowth",prompt:`A value of ${g(r)} grows at ${S(a,2)} per year for ${ee(s)}. What's the end value?`,context:{startValue:r,growthRate:a,projectionYears:s},expected:l,unit:"usd",tolerance:{type:"pct",band:.03},solution:Ph(r,a,s)}}};function Oh(e,t){const n=qd(e,t);return{formula:"Max Loan = NOI / Debt Yield",steps:[{label:"Max loan",expression:`${g(e)} / ${S(t)}`,result:g(n)}],answerDisplay:g(n)}}const Th={kind:"debtYield",label:"Debt Yield Loan Sizing",description:"Max loan given NOI and required debt yield.",category:"returns",pattern:"A / B   where A = NOI, B = required yield %",tips:["Debt yield is the lender-side cap rate: NOI / Loan. 9% DY = 11.1x NOI max loan; 10% DY = 10x NOI.","Inverse: Max Loan = NOI / required DY.","Lender check: if debt yield < 8%, most CMBS lenders pass — so 8% is a hard floor for stabilized deals.","Quick math: $800k NOI / 9% → think $800k × 11.11 = $8.89M. Or: $800 / 0.09 = ~$8,890 (shift decimals)."],generate(e,t="intermediate",n="mixed"){const r=E(e,M.noi,t),a=E(e,M.debtYieldTarget,t),s=qd(r,a);return{id:V("dy"),kind:"debtYield",prompt:`NOI is ${g(r)}. Lender requires a ${S(a)} debt yield. What's the max loan?`,context:{noi:r,debtYieldTarget:a},expected:s,unit:"usd",tolerance:{type:"pct",band:.05},solution:Oh(r,a)}}};function Ah(e,t,n){const r=ds(e,t),a=Ud(r,n);return{formula:"Development Spread = YoC − Market Cap Rate",steps:[{label:"YoC",expression:`${g(e)} / ${g(t)}`,result:S(r)},{label:"Spread",expression:`${S(r)} − ${S(n)}`,result:`${De(a)}`}],answerDisplay:De(a)}}const Dh={kind:"devSpread",label:"Development Spread",description:"YoC minus market cap — the risk premium for developing vs buying.",category:"valuation",pattern:"(A / B) − C   [YoC minus market cap]",tips:['100–150 bps is thin, 200–300 bps is typical, 500+ bps is a "layup" development.',"If YoC ≈ market cap, you're taking development risk for no extra return — walk away.","Spread compensates for construction risk, lease-up risk, and time value of capital tied up during build.","Mental math: compute YoC first, then subtract market cap. Answer in bps."],generate(e,t="intermediate",n="mixed"){const r=E(e,G("capRate",n),t),a=E(e,M.yocDelta,t),s=r+a,l=E(e,M.projectCost,t),i=t==="beginner"?25e4:t==="advanced"?25e3:1e5,c=Math.round(l*s/i)*i,u=Ud(ds(c,l),r),x=Math.round(u*1e4);return{id:V("devSp"),kind:"devSpread",prompt:`Developing to ${g(l)} in total cost with stabilized NOI of ${g(c)}. Market comps trade at a ${S(r)} cap. What's the development spread (in bps)?`,context:{totalProjectCost:l,stabilizedNoi:c,noi:c,marketCapRate:r},expected:x,unit:"bps",tolerance:{type:"abs",band:25},solution:Ah(c,l,r)}}};function ap(e){return`${e.toFixed(2)}x`}function _h(e,t,n,r){const a=Ut(n,r),s=e/t,l=zo({noi:e,dscrTarget:t,annualRate:n,years:r});return{formula:"Max Loan = NOI / (DSCR × Loan Constant)",steps:[{label:"Loan constant",expression:`${ee(r)} amort @ ${S(n)}`,result:S(a,2)},{label:"Max annual debt service",expression:`${g(e)} / ${ap(t)}`,result:g(s)},{label:"Max loan",expression:`${g(s)} / ${S(a,2)}`,result:g(l)}],answerDisplay:g(l)}}const Fh={kind:"dscrLoanSizing",label:"DSCR Loan Sizing",description:"Max loan given NOI, DSCR target, rate, and amort.",category:"returns",pattern:"A / (B × C)   where A = NOI, B = DSCR, C = loan constant",tips:["Loan constants to memorize — 30yr @ 6% ≈ 0.072; 25yr @ 6% ≈ 0.077; 30yr @ 5% ≈ 0.0644; 30yr @ 7% ≈ 0.0799.",'Formula: Max Loan = NOI / (DSCR × Loan Constant). DSCR × constant is the "effective rate" the loan must support.',"At 1.25x DSCR, every $1 of NOI supports $0.80 of debt service. Then divide by constant to get loan amount.","IO shortcut: for interest-only loans, constant = rate. $500k NOI / (1.25 × 0.06) = $6.67M."],generate(e,t="intermediate",n="mixed"){const r=E(e,M.noi,t),a=t==="beginner"?e.pickFromSet([1.2,1.25,1.3]):E(e,M.dscrTarget,t),s=E(e,M.interestRate,t),l=t==="beginner"?30:e.pickInt(M.amortYears.min,M.amortYears.max),i=zo({noi:r,dscrTarget:a,annualRate:s,years:l});return{id:V("dscr"),kind:"dscrLoanSizing",prompt:`NOI of ${g(r)} needs to cover a ${ap(a)} DSCR on a ${ee(l)} amortizing loan at ${S(s)}. What's the max loan?`,context:{noi:r,dscrTarget:a,interestRate:s,amortYears:l},expected:i,unit:"usd",tolerance:{type:"pct",band:.05},solution:_h(r,a,s,l)}}};function Bo(e,t){return t/e}function Uo(e,t,n){return Math.pow(t/e,1/n)-1}function Lr(e,t){return Math.pow(1+e,t)}function Lh(e,t,n){return e*Lr(t,n)}function zh(e,t){const n=Bo(e,t);return{formula:"Equity Multiple = Equity Out / Equity In",steps:[{label:"Multiple",expression:`${g(t)} / ${g(e)}`,result:we(n)}],answerDisplay:we(n)}}const Vh={kind:"equityMultiple",label:"Equity Multiple",description:"Equity in + equity out → EM.",category:"returns",pattern:"A / B   where A = out, B = in",tips:["EM = Out / In. Doesn't care about time — 2x in 1 year and 2x in 10 years both = 2.0x.","Divide by hundreds: $23M / $10M → 23/10 = 2.3x. $17.5M / $8M → 17.5/8 ≈ 2.19x.","Rule of thumb: institutional value-add deals target 1.7x–2.0x; opportunistic 2.0x+; core ~1.4x–1.6x.","Complement to IRR: EM shows absolute dollars back, IRR shows time-adjusted. Always look at both."],generate(e,t="intermediate",n="mixed"){const r=E(e,M.equityIn,t),a=E(e,M.irrExitMultiple,t),s=t==="beginner"?1e6:t==="advanced"?25e3:1e5,l=Math.round(r*a/s)*s,i=Bo(r,l);return{id:V("em"),kind:"equityMultiple",prompt:`You invested ${g(r)} and received ${g(l)} at sale. What's the equity multiple?`,context:{equityIn:r,equityOut:l},expected:i,unit:"multiple",tolerance:{type:"pct",band:.05},solution:zh(r,l)}}};function Bh(e,t){const n=np(e,t);return{formula:"Going-in Cap = NOI / Purchase Price",steps:[{label:"Cap rate",expression:`${g(t)} / ${g(e)}`,result:`${S(n)}  (${De(n)})`}],answerDisplay:De(n)}}const Uh={kind:"goingInCap",label:"Going-in Cap Rate",description:"Price + NOI → cap rate in bps.",category:"valuation",pattern:"A / B   where A = NOI, B = price",tips:["Cap = NOI / Price. Inverse is the NOI multiple: 5% = 20x, 6% = 16.67x, 7% = 14.29x.","Mental shortcut: NOI / Price, round both to 2 sig figs first. $623k / $12.4M ≈ $620 / $12,400 ≈ 5.0%.","Sanity check: if price looks like ~20× NOI you're at 5%, ~15× → ~6.7%, ~10× → 10%.","Round both up or both down together — keeps the error directionally small. Rounding one up and one down stacks errors.","Sandwich: find the nearest clean multiples (e.g. 15× = 6.67%, 16× = 6.25%) and interpolate toward the actual ratio.","Convert cap to bps: 5.25% = 525 bps. Just shift the decimal two places."],generate(e,t="intermediate",n="mixed"){const r=E(e,G("capRate",n),t),a=E(e,M.noi,t),s=t==="beginner"?5e5:t==="advanced"?25e3:1e5,l=Math.round(a/r/s)*s,i=np(l,a),c=Math.round(i*1e4);return{id:V("giCap"),kind:"goingInCap",prompt:`Purchase price is ${g(l)} and NOI is ${g(a)}. What's the going-in cap rate (in bps)?`,context:{purchasePrice:l,noi:a},expected:c,unit:"bps",tolerance:{type:"abs",band:15},solution:Bh(l,a)}}};function Yh(e,t){const n=e/t;return{formula:"GRM = Purchase Price / Annual Gross Potential Rent",steps:[{label:"GRM",expression:`${g(e)} / ${g(t)}`,result:we(n,2)}],answerDisplay:we(n,2)}}const Wh={kind:"grossRentMultiplier",label:"Gross Rent Multiplier",description:"Price / PGI — quick multifamily/retail benchmark.",category:"valuation",pattern:"A / B   where A = price, B = gross potential rent",tips:["GRM = Price / PGI. Multifamily typically trades 8–14× GRM; lower is cheaper.","Quick inversion: cap rate ≈ (1 − OpEx ratio) / GRM. 12× GRM with 40% OpEx ≈ 5% cap.","GRM ignores OpEx, so it's most useful when opex structure is consistent across comps.","Trap: high-OpEx assets look cheap by GRM but expensive by cap. Always cross-check."],generate(e,t="intermediate",n="mixed"){const r=E(e,M.gpr,t),a=E(e,{min:7,max:15,step:.5},t),s=t==="beginner"?5e5:t==="advanced"?25e3:1e5,l=Math.round(r*a/s)*s,i=l/r;return{id:V("grm"),kind:"grossRentMultiplier",prompt:`Purchase price ${g(l)}, gross potential rent ${g(r)}. What's the GRM?`,context:{purchasePrice:l,gpr:r,pgi:r},expected:i,unit:"multiple",tolerance:{type:"pct",band:.05},solution:Yh(l,r)}}};function Gh(e,t){const n=Ut(e,t);return{formula:"Loan Constant = annualized payment / loan (monthly amort)",steps:[{label:"Constant",expression:`${ee(t)} amort @ ${S(e)}`,result:`${S(n,2)}  (${De(n)})`}],answerDisplay:De(n)}}const Hh={kind:"loanConstant",label:"Loan Constant",description:"Annualized payment as % of loan for monthly-amortizing debt.",category:"returns",pattern:"PMT(r/12, n×12, −1) × 12   [amortization formula]",tips:["Memorize: 30yr @ 5% ≈ 644 bps; 30yr @ 6% ≈ 720 bps; 30yr @ 7% ≈ 799 bps; 25yr @ 6% ≈ 773 bps.","IO shortcut: loan constant = interest rate exactly (no principal paydown).","Rule of thumb: each +100 bps of rate adds ~60–80 bps to the constant on 30yr amort.","Longer amort → lower constant (but diminishing returns: 30y vs 25y only saves ~40 bps)."],generate(e,t="intermediate",n="mixed"){const r=E(e,M.interestRate,t),a=t==="beginner"?e.pickFromSet([25,30]):e.pickInt(M.amortYears.min,M.amortYears.max),s=Ut(r,a),l=Math.round(s*1e4);return{id:V("lc"),kind:"loanConstant",prompt:`What's the loan constant for a ${ee(a)} amortizing loan at ${S(r)} (in bps)?`,context:{interestRate:r,amortYears:a},expected:l,unit:"bps",tolerance:{type:"abs",band:15},solution:Gh(r,a)}}};function Qh(e,t){const n=e*t,r=tp(e,t);return{formula:"NOI = EGI × (1 − OpEx Ratio)",steps:[{label:"OpEx",expression:`${g(e)} × ${S(t)}`,result:g(n)},{label:"NOI",expression:`${g(e)} − ${g(n)}`,result:g(r)}],answerDisplay:g(r)}}const qh={kind:"noiFromOer",label:"NOI from OpEx Ratio",description:"Solve NOI given EGI and an OpEx ratio.",category:"valuation",pattern:"A × (1 − B)   where A = EGI, B = opex ratio",tips:["NOI = EGI × (1 − o
