 + B)(1 − C) − D) / E   [gross × (1−vac) − opex, /cap]",tips:["Order of operations: (GPR + Other) × (1 − vacancy) = EGI. EGI − OpEx = NOI. NOI / cap = Value.","Back-of-envelope: if OpEx is ~40% of EGI and vacancy is ~5%, NOI ≈ gross × 0.95 × 0.6 ≈ gross × 0.57.","Then × (1/cap). At 6% cap: gross × 0.57 × 16.67 ≈ gross × 9.5. Ballparks a full proforma in one step.","Sandwich: compute value at the two nearest clean caps (e.g. 5% and 6%) and interpolate to your actual cap. Handles ugly caps without a calculator.","Sanity check: compare implied value-per-SF or $/unit to market comps before trusting the number."],generate(e,t="intermediate",n="mixed"){const r=R(e,M.gpr,t),l=R(e,M.otherIncome,t),a=e.pickFromSet(Mt.vacancySetNonZero),s=e.pickFromSet(ko(n)),i=t==="beginner"?1e5:t==="advanced"?1e3:1e4,u=Math.round((r+l)*s*(1-a)/i)*i,c=R(e,W("capRate",n),t),f=Tt(bo({gpr:r,otherIncome:l,vacancyRate:a,opex:u}),c);return{id:V("combo"),kind:"combinedScenario",prompt:`A ${wd(n)} has GPR ${v(r)}, other income ${v(l)}, vacancy ${k(a)}, OpEx ${v(u)}, cap ${k(c)}. What's the implied value?`,context:{gpr:r,otherIncome:l,vacancyRate:a,opex:u,capRate:c},expected:f,unit:"usd",tolerance:{type:"pct",band:.03},solution:Qm(r,l,a,u,c)}}};function Km(e,t,n){const r=Math.pow(1+t,n),l=br(e,t,n);return{formula:"End = Start × (1 + r)^n",steps:[{label:"Growth factor",expression:`(1 + ${k(t,2)})^${n}`,result:r.toFixed(4)},{label:"End value",expression:`${v(e)} × ${r.toFixed(4)}`,result:v(l)}],answerDisplay:v(l)}}const Xm={kind:"compoundGrowth",label:"Compound Growth (forward)",description:"Project a value forward at a fixed growth rate.",category:"returns",pattern:"A × (1 + B)^n   [start × growth factor]",tips:["Rule of 72: a value roughly doubles every 72/r% years. At 3% → 24 years; at 4% → 18; at 6% → 12.","Anchors: (1.03)^5 ≈ 1.159; (1.03)^10 ≈ 1.344; (1.05)^5 ≈ 1.276; (1.05)^10 ≈ 1.629.","Linear approx (floor): End ≥ Start × (1 + r × n). Actual is always higher due to compounding.","Sandwich: bracket with the two nearest round rates and interpolate (e.g. 2.75% sits between 2.5% and 3%)."],generate(e,t="intermediate",n="mixed"){const r=R(e,M.noi,t),l=R(e,M.growthRate,t),a=e.pickInt(M.projectionYears.min,M.projectionYears.max),s=br(r,l,a);return{id:V("cg"),kind:"compoundGrowth",prompt:`A value of ${v(r)} grows at ${k(l,2)} per year for ${ae(a)}. What's the end value?`,context:{startValue:r,growthRate:l,projectionYears:a},expected:s,unit:"usd",tolerance:{type:"pct",band:.03},solution:Km(r,l,a)}}};function Zm(e,t){const n=Sd(e,t);return{formula:"Max Loan = NOI / Debt Yield",steps:[{label:"Max loan",expression:`${v(e)} / ${k(t)}`,result:v(n)}],answerDisplay:v(n)}}const Jm={kind:"debtYield",label:"Debt Yield Loan Sizing",description:"Max loan given NOI and required debt yield.",category:"returns",pattern:"A / B   where A = NOI, B = required yield %",tips:["Debt yield is the lender-side cap rate: NOI / Loan. 9% DY = 11.1x NOI max loan; 10% DY = 10x NOI.","Inverse: Max Loan = NOI / required DY.","Lender check: if debt yield < 8%, most CMBS lenders pass — so 8% is a hard floor for stabilized deals.","Quick math: $800k NOI / 9% → think $800k × 11.11 = $8.89M. Or: $800 / 0.09 = ~$8,890 (shift decimals)."],generate(e,t="intermediate",n="mixed"){const r=R(e,M.noi,t),l=R(e,M.debtYieldTarget,t),a=Sd(r,l);return{id:V("dy"),kind:"debtYield",prompt:`NOI is ${v(r)}. Lender requires a ${k(l)} debt yield. What's the max loan?`,context:{noi:r,debtYieldTarget:l},expected:a,unit:"usd",tolerance:{type:"pct",band:.05},solution:Zm(r,l)}}};function eh(e,t,n){const r=Ql(e,t),l=xd(r,n);return{formula:"Development Spread = YoC − Market Cap Rate",steps:[{label:"YoC",expression:`${v(e)} / ${v(t)}`,result:k(r)},{label:"Spread",expression:`${k(r)} − ${k(n)}`,result:`${Ue(l)}`}],answerDisplay:Ue(l)}}const th={kind:"devSpread",label:"Development Spread",description:"YoC minus market cap — the risk premium for developing vs buying.",category:"valuation",pattern:"(A / B) − C   [YoC minus market cap]",tips:['100–150 bps is thin, 200–300 bps is typical, 500+ bps is a "layup" development.',"If YoC ≈ market cap, you're taking development risk for no extra return — walk away.","Spread compensates for construction risk, lease-up risk, and time value of capital tied up during build.","Mental math: compute YoC first, then subtract market cap. Answer in bps."],generate(e,t="intermediate",n="mixed"){const r=R(e,W("capRate",n),t),l=R(e,M.yocDelta,t),a=r+l,s=R(e,M.projectCost,t),i=t==="beginner"?25e4:t==="advanced"?25e3:1e5,u=Math.round(s*a/i)*i,c=xd(Ql(u,s),r),f=Math.round(c*1e4);return{id:V("devSp"),kind:"devSpread",prompt:`Developing to ${v(s)} in total cost with stabilized NOI of ${v(u)}. Market comps trade at a ${k(r)} cap. What's the development spread (in bps)?`,context:{totalProjectCost:s,stabilizedNoi:u,noi:u,marketCapRate:r},expected:f,unit:"bps",tolerance:{type:"abs",band:25},solution:eh(u,s,r)}}};function Md(e){return`${e.toFixed(2)}x`}function nh(e,t,n,r){const l=Jt(n,r),a=e/t,s=Nd({noi:e,dscrTarget:t,annualRate:n,years:r});return{formula:"Max Loan = NOI / (DSCR × Loan Constant)",steps:[{label:"Loan constant",expression:`${ae(r)} amort @ ${k(n)}`,result:k(l,2)},{label:"Max annual debt service",expression:`${v(e)} / ${Md(t)}`,result:v(a)},{label:"Max loan",expression:`${v(a)} / ${k(l,2)}`,result:v(s)}],answerDisplay:v(s)}}const rh={kind:"dscrLoanSizing",label:"DSCR Loan Sizing",description:"Max loan given NOI, DSCR target, rate, and amort.",category:"returns",pattern:"A / (B × C)   where A = NOI, B = DSCR, C = loan constant",tips:["Loan constants to memorize — 30yr @ 6% ≈ 0.072; 25yr @ 6% ≈ 0.077; 30yr @ 5% ≈ 0.0644; 30yr @ 7% ≈ 0.0799.",'Formula: Max Loan = NOI / (DSCR × Loan Constant). DSCR × constant is the "effective rate" the loan must support.',"At 1.25x DSCR, every $1 of NOI supports $0.80 of debt service. Then divide by constant to get loan amount.","IO shortcut: for interest-only loans, constant = rate. $500k NOI / (1.25 × 0.06) = $6.67M."],genera `}],answerDisplay:Ue(n)}}const ih={kind:"goingInCap",label:"Going-in Cap Rate",description:"Price + NOI → cap rate in bps.",category:"valuation",pattern:"A / B   where A = NOI, B = price",tips:["Cap = NOI / Price. Inverse is the NOI multiple: 5% = 20x, 6% = 16.67x, 7% = 14.29x.","Mental shortcut: NOI / Price, round both to 2 sig figs first. $623k / $12.4M ≈ $620 / $12,400 ≈ 5.0%.","Sanity check: if price looks like ~20× NOI you're at 5%, ~15× → ~6.7%, ~10× → 10%.","Round both up or both down together — keeps the error directionally small. Rounding one up and one down stacks errors.","Sandwich: find the nearest clean multiples (e.g. 15× = 6.67%, 16× = 6.25%) and interpolate toward the actual ratio.","Convert cap to bps: 5.25% = 525 bps. Just shift the decimal two places."],generate(e,t="intermediate",n="mixed"){const r=R(e,W("capRate",n),t),l=R(e,M.noi,t),a=t==="beginner"?5e5:t==="advanced"?25e3:1e5,s=Math.round(l/r/a)*a,i=Pd(s,l),u=Math.round(i*1e4);return{id:V("giCap"),kind:"goingInCap",prompt:`Purchase price is ${v(s)} and NOI is ${v(l)}. What's the going-in cap rate (in bps)?`,context:{purchasePrice:s,noi:l},expected:u,unit:"bps",tolerance:{type:"abs",band:15},solution:oh(s,l)}}};function uh(e,t){const n=e/t;return{formula:"GRM = Purchase Price / Annual Gross Potential Rent",steps:[{label:"GRM",expression:`${v(e)} / ${v(t)}`,result:ye(n,2)}],answerDisplay:ye(n,2)}}const ch={kind:"grossRentMultiplier",label:"Gross Rent Multiplier",description:"Price / PGI — quick multifamily/retail benchmark.",category:"valuation",pattern:"A / B   where A = price, B = gross potential rent",tips:["GRM = Price / PGI. Multifamily typically trades 8–14× GRM; lower is cheaper.","Quick inversion: cap rate ≈ (1 − OpEx ratio) / GRM. 12× GRM with 40% OpEx ≈ 5% cap.","GRM ignores OpEx, so it's most useful when opex structure is consistent across comps.","Trap: high-OpEx assets look cheap by GRM but expensive by cap. Always cross-check."],generate(e,t="intermediate",n="mixed"){const r=R(e,M.gpr,t),l=R(e,{min:7,max:15,step:.5},t),a=t==="beginner"?5e5:t==="advanced"?25e3:1e5,s=Math.round(r*l/a)*a,i=s/r;return{id:V("grm"),kind:"grossRentMultiplier",prompt:`Purchase price ${v(s)}, gross potential rent ${v(r)}. What's the GRM?`,context:{purchasePrice:s,gpr:r,pgi:r},expected:i,unit:"multiple",tolerance:{type:"pct",band:.05},solution:uh(s,r)}}};function dh(e,t){const n=Jt(e,t);return{formula:"Loan Constant = annualized payment / loan (monthly amort)",steps:[{label:"Constant",expression:`${ae(t)} amort @ ${k(e)}`,result:`${k(n,2)}  (${Ue(n)})`}],answerDisplay:Ue(n)}}const ph={kind:"loanConstant",label:"Loan Constant",description:"Annualized payment as % of loan for monthly-amortizing debt.",category:"returns",pattern:"PMT(r/12, n×12, −1) × 12   [amortization formula]",tips:["Memorize: 30yr @ 5% ≈ 644 bps; 30yr @ 6% ≈ 720 bps; 30yr @ 7% ≈ 799 bps; 25yr @ 6% ≈ 773 bps.","IO shortcut: loan constant = interest rate exactly (no principal paydown).","Rule of thumb: each +100 bps of rate adds ~60–80 bps to the constant on 30yr amort.","Longer amort → lower constant (but diminishing returns: 30y vs 25y only saves ~40 bps)."],generate(e,t="intermediate",n="mixed"){const r=R(e,M.interestRate,t),l=t==="beginner"?e.pickFromSet([25,30]):e.pickInt(M.amortYears.min,M.amortYears.max),a=Jt(r,l),s=Math.round(a*1e4);return{id:V("lc"),kind:"loanConstant",prompt:`What's the loan constant for a ${ae(l)} amortizing loan at ${k(r)} (in bps)?`,context:{interestRate:r,amortYears:l},expected:s,unit:"bps",tolerance:{type:"abs",band:15},solution:dh(r,l)}}};function fh(e,t){const n=e*t,r=Ed(e,t);return{formula:"NOI = EGI × (1 − OpEx Ratio)",steps:[{label:"OpEx",expression:`${v(e)} × ${k(t)}`,result:v(n)},{label:"NOI",expression:`${v(e)} − ${v(n)}`,result:v(r)}],answerDisplay:v(r)}}const mh={kind:"noiFromOer",label:"NOI from OpEx Ratio",description:"Solve NOI given EGI and an OpEx ratio.",category:"valuation",pattern:"A × (1 − B)   where A = EGI, B = opex ratio",tips:["NOI = EGI × (1 − opex
