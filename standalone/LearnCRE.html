 refinance because the debt yield was actually too aggressive.",isBest:!0,explanation:`Debt yield (NOI / loan) is rate- and cap-agnostic — it's the lender's direct return on the dollar without any leverage assumption. DSCR depends on the loan constant, which depends on the rate; cap rates depend on the market. When rates rise, the same loan amount fails DSCR even with the same NOI. When cap rates widen, the LTV implicit in your DSCR-sized loan exceeds what a refi lender will accept. Debt yield is the "stress-resistant" test and is increasingly the binding constraint at most institutional lenders, especially for 5-year balloons.`},{label:"DSCR governs — it directly measures whether the borrower can service the debt today.",isBest:!1,explanation:`True for the *current* loan but misses the refinance risk. DSCR is a Year-1 measure that flatters loans sized in low-rate environments. The sponsor's argument is "we can pay today" — fine, but the lender also needs to believe the deal can refi at maturity, and debt yield is the better proxy for that.`},{label:"Both govern — the loan is sized to the more-restrictive of the two.",isBest:!1,explanation:`Operationally true but doesn't answer "why does debt yield bind here?". The deeper answer is that debt yield is the rate-resistant test. Saying "we use both" without explaining the dominance of debt yield in stress scenarios misses the lesson.`},{label:"DSCR is what banks care about; debt yield is mostly a CMBS/agency thing.",isBest:!1,explanation:`Outdated framing. Debt yield has become the binding constraint at most institutional lenders (life cos, banks, debt funds) for stabilized senior debt, especially since the 2022 rate cycle. Saying "banks don't care" ignores how lender protection has evolved over the past decade.`}],takeaway:`DSCR tells you "can the borrower pay today?" — debt yield tells you "would another lender finance this deal at maturity?". The second question is the harder protection because rates and cap rates move; debt yield doesn't. When DSCR passes but debt yield fails, the loan is rate-sensitive and likely won't refi cleanly. Size to the more-restrictive — almost always the debt yield in 2024+ markets.`,tips:["Debt yield = NOI / loan. Rate-agnostic. Cap-rate-agnostic.","DSCR = NOI / DS. Both rate- and amort-sensitive. Flatters low-rate loans.","Permanent debt: 8.0% debt yield + 1.25x DSCR is a common dual-constraint pair; debt yield usually binds."]},$0={id:"over-weight-office",title:"Fund is 40% office vs 25% target — which assets sell first?",category:"investment-thesis",difficulty:"advanced",roles:["portfolioMgmt"],assetClass:"mixed",scenario:"You manage a $2B value-add fund. Sector allocation has drifted: office is now 40% of NAV vs the 25% IC mandate. You need to bring it down by selling ~$300M of office. The portfolio has 12 office assets ranging from a Class-A trophy with 9 years of WALT (priced tightly) to a half-vacant 1980s suburban park (likely a sale at a meaningful discount to basis). Which assets do you sell first?",data:[{label:"Fund NAV",value:"$2.0B"},{label:"Office allocation",value:"40% (target 25%)"},{label:"Sale needed",value:"~$300M"},{label:"Office portfolio",value:"12 assets, A-trophy to suburban-1980s"}],question:"Which assets do you sell to right-size the allocation?",options:[{label:"Sell the assets with the *worst forward IRR vs alternative deployment* — usually that means the trophy A-class assets (priced for perfection, low forward returns) and the bottom-quartile assets where the basis is permanently impaired. Hold the middle: assets with execution upside still ahead.",isBest:!0,explanation:`Allocation rebalancing isn't about disposing of "bad" assets — it's about freeing up capital for higher-return uses. Trophy assets sell cleanly at full pricing but have low forward IRRs (they're already priced for the certainty you're trying to monetize). Bottom-quartile assets that are structurally impaired (vacant, deferred maintenance, broken submarket) won't produce returns by holding longer; selling them at a loss frees capital for value-add deals at better forward returns. The middle bucket — assets where you're still executing — is where the IRR is highest and shouldn't be sold reactively.`},{label:"Sell the worst-performing assets first — clean up the portfolio and report better numbers.",isBest:!1,explanation:`Emotionally satisfying but value-destroying. Selling at a loss to "clean up the report" crystallizes the loss without any forward benefit. If the bottom assets have any upside left, holding is correct. Only sell impaired assets where the *forward* IRR is below your fund's required return — not because they sit ugly on the report.`},{label:"Sell the best-performing assets first — they'll sell quickly and at strong pricing.",isBest:!1,explanation:"Half-right. The trophies sell cleanly, but selling *only* trophies leaves you with a portfolio of impaired or middle-bucket assets — concentrating the risk you're trying to manage. Mixed sales that include some trophies AND some impaired assets balance proceeds with portfolio quality."},{label:"Don't sell — wait for the office market to recover.",isBest:!1,explanation:`Allocation drift isn't self-correcting. The IC mandate exists to manage sector risk; ignoring it means accepting more office exposure than the fund's investors signed up for. "Wait for recovery" is a thesis, not a discipline — and the longer you delay, the harder the rebalance becomes if office continues to underperform.`}],takeaway:"Portfolio rebalancing is a *forward-IRR* exercise, not a *backward-PnL* one. Sell the assets with the lowest forward IRR vs your fund's alternative uses of capital — that's usually the *fully-priced* trophies + the *structurally-impaired* bottom-quartile, in some mix. Selling the middle (still-executing) assets is the most common rebalancing mistake.",tips:["Forward IRR > backward PnL when deciding what to sell.","Trophies sell at clean prices but have low forward IRRs — they're a natural rebalance source.","Bottom-quartile holds keep the loss off the report but block the capital that could compound elsewhere."]},I0={id:"hold-extension-discipline",title:'The sponsor wants to extend "to capture more growth"',category:"investment-thesis",difficulty:"advanced",roles:["assetManagement","portfolioMgmt"],assetClass:"multifamily",scenario:`You're the LP IC member on a Class-B multifamily deal that's 5 years into a 5-year hold. The sponsor proposes extending 2 more years "to capture additional rent growth from the renovation completed last year." Original-hold IRR is 14% to LPs. The sponsor projects 16% if the extension goes well. The fund's required return on redeployed capital today is also 14%.`,data:[{label:"Original-hold LP IRR",value:"14%"},{label:"Extended-hold projected",value:"16%"},{label:"Extension",value:"2 years"},{label:"Fund alt-deployment hurdle",value:"14%"},{label:"Story",value:"Reno already done; sponsor sees more room"}],question:"How should the IC respond?",options:[{label:"Reject the extension — the marginal *extension* IRR (not the blended) is what matters, and the sponsor needs to defend that the *next 2 years* clear the hurdle, not the overall return. Compute the extension IRR explicitly.",isBest:!0,explanation:"Blended IRR (14% → 16%) is the wrong frame. The extension is a new investment decision: today's asset value is the entry, NOI + exit-2-years-out is the cash flow. If those flows produce <14% on the *extension* alone, the LP is better off taking the cash today and redeploying. A blended improvement from 14% to 16% can mask an extension IRR well below the hurdle. Discipline is to size the extension as a standalone decision."},{label:"Accept — 16% > 14%, the blended return is better.",isBest:!1,explanation:"Compares apples to oranges. The 14% blended IRR is realized through the original hold; the 16% is the projected blended IRR if the 2-year extension goes perfectly. The right comparison is between (a) take cash now + redeploy at 14%, or (b) keep capital deployed in this asset for 2 more years. Whichever has higher *forward* IRR wins — and that's the extension IRR, not the blended."},{label:"Accept — but require the sponsor to share more of the upside via promote.",isBest:!1,explanation:"Renegotiating the waterfall doesn't answer the underlying question of whether the extension itself pencils. If the extension IRR is below the LP hurdle, more promote to the GP doesn't fix the LP's problem. Address the math first, the structure second."},{label:"Reject — but only because the sponsor extended their last deal and missed the projection.",isBest:!1,explanation:"Pattern-matching is informative but not a sufficient reason. Each extension stands on its own underwriting. Bring the math: is the extension IRR ≥ alt-deployment hurdle? If yes, accept; if no, reject. Past sponsor performance informs your view of the projection but doesn't replace the IRR test."}],takeaway:"Hold-extension decisions are forward-IRR decisions. Compute the extension IRR (today's value as entry, NOI + future exit as cash flows) and compare to your alternative deployment. A blended IRR going from 14% to 16% sounds good, but if the *extension* alone returns 8%, you're using LP capital to earn less than you could elsewhere. Discipline beats narrative.",tips:["Extension IRR ≠ blended IRR. Compute them separately.","Today's value is the new entry; everything before is sunk.","Sponsors framing extensions in blended terms are usually hiding a weak forward IRR."]},T0={id:"tax-vs-irr-tradeoff",title:"Same after-tax IRR — what tips the decision?",category:"investment-thesis",difficulty:"advanced",roles:["portfolioMgmt","assetManagement"],assetClass:"mixed",scenario:"You're a fund GP. Two paths produce identical after-tax IRRs to LPs (~13%): (a) sell the asset now, distribute proceeds; (b) hold + refi to a 65% LTV loan, distribute proceeds, sell at the original year-5 mark. The fund is in year 4 of a 7-year vehicle. Sale costs and recapture/cap gains are baked into both numbers.",data:[{label:"After-tax IRR (sell now)",value:"~13%"},{label:"After-tax IRR (refi + hold)",value:"~13%"},{label:"Fund vintage",value:"Year 4 of 7"},{label:"Refi proceeds",value:"~60% of original equity"},{label:"Recapture / cap-gains",value:"Same in both paths (deferred in refi)"}],question:"Which non-IRR factor most likely tips the decision?",options:[{label:"Tax timing — the refi defers the tax event. If your LPs are tax-sensitive and the fund has no compelling redeployment opportunity, deferral is real value even when IRRs match.",isBest:!0,explanation:"Identical after-tax IRRs masks an important difference: the *timing* of the tax event. Sell-now triggers recapture and cap gains today; refi-and-hold defers them to the eventual sale (potentially at a lower rate, or via 1031, or via step-up at death for individual LPs). For tax-sensitive LPs, deferral compounds — same IRR but smaller tax check this year is real after-after-tax value. For institutional / tax-exempt LPs, this matters less, so the answer depends on the LP base."},{label:"Reinvestment risk — if redeploying $X today only nets a 12% deal, holding wins.",isBest:!1,explanation:"Already baked into the 13% figure (the sell-path proceeds get redeployed at market rates, which the IRR comparison should account for). Restating reinvestment risk doesn't add new information."},{label:"Fund life — at year 4 of 7, you have 3 years of runway, so holding is fine.",isBest:!1,explanation:"Fund-life math matters but the prompt says both paths land within fund life. Once the timeline isn't binding, fund life isn't the differentiator — tax treatment is."},{label:"Carry / promote economics for the GP — refi+hold often pays the GP more carry.",isBest:!1,explanation:"Real consideration but pointing the GP toward their own incentives is a conflict, not a decision criterion the LP IC should weight. If the LP-after-tax IRRs match, the LP is indifferent on returns; the *tax* angle is where genuine LP value diverges."}],takeaway:"When after-tax IRRs match, the decision moves to second-order factors — tax timing usually being the biggest. Refi-and-hold defers the tax event, which compounds into real after-after-tax value for tax-sensitive LPs. For tax-exempt LPs (pensions, endowments) the decision flips back to redeployment opportunity. The LP base shapes the answer.",tips:["Identical after-tax IRRs ≠ identical after-after-tax outcomes. Tax timing matters.","Refi defers; sale crystallizes. Compounding favors deferral when rates aren't falling.","The decision should be sensitive to the LP base — institutional vs HNW vs family-office split."]},M0={id:"capex-reserve-discipline",title:"How do you size the capex reserve on a stabilized asset?",category:"diagnostic",difficulty:"intermediate",roles:["assetManagement","acquisitions"],assetClass:"multifamily",scenario:"You're underwriting a 200-unit Class-B multifamily acquisition built in 2005. The OM models a $250/unit/yr capex reserve. The roof is 18 years old (40-yr life), boilers are due in 2 years, and you've identified ~$400k of deferred maintenance from the property tour.",data:[{label:"Units",value:"200"},{label:"Year built",value:"2005 (20 yrs)"},{label:"OM capex reserve",value:"$250/unit/yr ($50k/yr)"},{label:"Roof age",value:"18 yr (40-yr life)"},{label:"Boiler replacement",value:"Due in 2 yrs"},{label:"Deferred maint identified",value:"~$400k"}],question:"How should you re-size the capex reserve in your underwriting?",options:[{label:"Bump the recurring reserve to $400–500/unit/yr ($80–100k/yr) AND budget the boiler + roof + deferred maint as one-time line items in the equity check at closing — recurring reserves don't cover known near-term capital events.",isBest:!0,explanation:"Recurring capex reserves cover the *steady-state* cost of keeping a building leasable: appliance turnover, paint, carpet, HVAC service. For a 20-year-old MF asset, $400-500/unit/yr is the institutional norm. Known near-term capital events (roof, boiler, deferred maint) are *not* recurring — they hit at specific moments and are funded from equity at closing or from a reserve drawn down on an explicit schedule. Stacking them into the recurring reserve under-states both the equity check and the capex line in the proforma."},{label:"Trust the OM's $250/unit/yr — that's a typical Class-B MF figure and the broker has institutional clients who use it.",isBest:!1,explanation:"$250/unit/yr is on the low end even for a young Class-A asset; for a 20-year-old building with identified deferred maintenance and known near-term replacements, it's materially under-funded. Brokers default to low capex assumptions because higher reserves reduce the price the seller can get. Verify, don't accept."},{label:"Add the deferred maintenance ($400k) to the OM's reserve as a one-time event but keep the recurring at $250/unit/yr.",isBest:!1,explanation:`Half-right but ignores the boiler + roof. Both will need replacement during the underwriting horizon (5-yr hold), and neither is a "deferred maintenance" item — they're *known scheduled replacements* coming in years 2 and 5. Treat them as planned capital events with their own line items, not lumped into recurring or deferred.`},{label:"Set the recurring reserve high enough ($800/unit/yr) to absorb everything — roof, boiler, deferred — over the 5-year hold.",isBest:!1,explanation:"Inflates the recurring line beyond the steady-state cost, which makes the asset look like it has a chronic capex problem on the proforma. Year-3 cash flow projections will show artificially low NOI growth. The cleaner approach is to keep recurring at the right steady-state level and call out one-time events separately so each line item tells the truth about what it represents."}],takeaway:"Capex has two layers: recurring (steady-state, sized per unit per year) and one-time (specific known replacements, sized as scheduled events). Conflating them produces under- or over-funded reserves and misleading NOI lines. Class-B MF recurring norms run $300-500/unit/yr; pad it for older / heavier-capex product. One-time events live as their own line items in the equity check or a draw schedule.",tips:["Recurring capex norms by asset class: Class-A MF $250-350/unit · Class-B/C MF $400-600/unit · office $1.50-3.00/SF · industrial $0.50-1.00/SF · retail $1-2/SF.","Roof, HVAC, parking lots, boilers — schedule them. They're not recurring.","Deferred maintenance from the tour goes into Day-1 capex, not into year-1 recurring."]},P0={id:"refi-cap-stress",title:"Stress-testing a permanent loan for refi at maturity",category:"risk",difficulty:"advanced",roles:["mortgageUw"],assetClass:"office",scenario:"You're underwriting a 5-year permanent loan on a stabilized office asset. Going-in cap is 6.5%; the loan sizes to 65% LTV at a 1.30x DSCR + 9% debt yield. Today's market is steady, but you need to confirm the loan will refi cleanly at maturity — even if cap rates widen and rates rise.",data:[{label:"Going-in cap",value:"6.5%"},{label:"LTV at close",value:"65%"},{label:"DSCR / debt yield",value:"1.30x / 9.0%"},{label:"Hold period",value:"5 years"},{label:"Today's 5-yr Treasury",value:"~4.5%"}],question:"What's the tightest refi-stress test you should run?",options:[{label:"Cap-stress to +100 bps (exit 7.5%), rate-stress to +150 bps, and confirm the same loan amount still passes 1.20x DSCR + 8% debt yield against trended NOI. If it doesn't, size lower today.",isBest:!0,explanation:"Refi-stress is a 5-years-from-now exercise. Three variables move: NOI (uncertain — trend or hold flat), cap rate (typically widens 75-150 bps for stabilized office in a stress scenario), and rate (varies, but +100-200 bps is the conservative band). Test the *same loan amount* against degraded numbers. If you size today at 65% LTV / 1.30x and it fails 1.20x at refi-stress, you're over-leveraged for a 5-year hold. Drop LTV at close until refi pencils."},{label:"Test only the rate move — cap rates have been stable for 8 years and shouldn't materially shift in 5.",isBest:!1,explanation:"Cap rates are the dominant refi-stress variable for stabilized assets. Even if rates stay flat, a 100 bps cap widening drops the implied value 13-15% and pushes LTV well above 65%. Ignoring the cap-stress side of the test is the most common refi-modeling mistake."},{label:"Run the stress test with NOI growth at 0% (flat) and call that conservative enough — every other variable should be modeled at today's levels.",isBest:!1,explanation:"Flat NOI is the WRONG conservative — flat-NOI scenarios actually flatter the deal because at the same cap rate, you're refi'ing against the same value (no decline). The downside scenarios are NOI-flat-PLUS-cap-widening, which pushes LTV up. Always pair the assumptions: NOI movement + cap movement + rate movement."},{label:"Stress only the debt yield test — DSCR is already conservative because rates would have to triple to fail it.",isBest:!1,explanation:"False on DSCR being safe. If rates move +200 bps, the loan constant rises and DSCR drops materially. And the debt-yield-only test misses the cap-stress side of the equation. Comprehensive refi-stress tests all three (NOI, cap, rate) simultaneously, not one in isolation."}],takeaway:"Refi-stress is the most under-rated test in lender underwriting. Run it against the *same loan amount* with a triple-degraded forward picture: flat or modestly down NOI, +75-150 bps cap widening, +100-200 bps rate move. If DSCR or debt yield fails the lender's refi threshold (typically 1.20x and 8%), size lower today. Banks that skip this test get burned in the second half of every cycle.",tips:["Office cap-stress: +100-150 bps; industrial/MF: +50-100 bps; retail: +75-150 bps depending on tenant credit mix.","Refi DSCR threshold is typically lower than origination (1.20x vs 1.30x) — the loan has been seasoned.","If the deal only refis at zero stress, you're depending on every variable cooperating for 5 years. Lenders don't."]},A0={id:"fund-vs-deal-irr-gap",title:"Why is fund-level IRR 14% when deal-level is 16%?",category:"diagnostic",difficulty:"advanced",roles:["portfolioMgmt"],assetClass:"mixed",scenario:"You're reviewing an LP report. Deal-level IRRs across the fund's 8 acquisitions average 16%. The fund-level IRR (net to LPs) is 14%. The 200 bps gap is a recurring question from your investor base.",data:[{label:"Deal-level IRR (avg)",value:"16%"},{label:"Fund-level net IRR",value:"14%"},{label:"Gap",value:"200 bps"},{label:"Fund vintage",value:"Year 4 of 7"},{label:"Mgmt fee",value:"1.5% of committed"},{label:"Carry",value:"20% over 8% pref"}],question:"What's the dominant explanation for the 200 bps gap?",options:[{label:"A combination: management fees on committed capital (~75 bps drag), the J-curve from undeployed capital (~50-75 bps), and carry on outperformance (~25-50 bps). All three compound; no single one explains it.",isBest:!0,explanation:`Fund-level vs deal-level IRR gaps come from three structural sources: (1) **fees** — mgmt fee is on committed capital, so undeployed dollars still pay; that's a steady drag of 50-100 bps depending on deployment pace; (2) **J-curve** — capital is called over years 1-3 but doesn't produce returns until invested, so early-year IRRs are negative even on great deals; (3) **carry/promote** — when the fund crosses the pref hurdle, the GP takes a slice of incremental returns, dropping LP-net IRR. Sophisticated LPs expect 200-300 bps of gap and look for *consistent* gap, not "no gap" (which would suggest no deals are clearing pref or the fees aren't being charged).`},{label:"Cash drag from undeployed capital sitting in the fund account earning low interest.",isBest:!1,explanation:"Real but small (typically 25-50 bps, not 200). Most of the gap is fees + J-curve + carry, not idle cash. Capital is usually called close to deployment, so cash-drag is a minor component."},{label:"Bad deals dragging down the average — IRR-weighted means a few losses pull the fund-level number below the average.",isBest:!1,explanation:`Misreads the math. Deal-level IRR *is* an IRR average; if it shows 16%, the bad deals are already baked in. The gap to fund-level isn't about hidden losses — it's about fees + structure. Looking for "bad deals" to explain the gap is a category error.`},{label:"Tax leakage between the deal entity and the fund vehicle.",isBest:!1,explanation:"Tax structures *can* introduce friction in some unusual setups, but for most US-based real estate funds the tax pass-through is clean (LPs report deal-level allocations on their K-1s). Tax leakage isn't a 200 bps systematic source. Fees + J-curve + carry are."}],takeaway:"Fund-level vs deal-level IRR always diverges by 200-300 bps for fully-functioning vehicles. The breakdown is roughly fees (50-100 bps), J-curve (50-75 bps), carry (25-100 bps depending on outperformance). No-gap is a red flag, not a positive — it means either fees aren't being charged or no deals have crossed pref. LPs who understand this don't panic at 200 bps; they panic at 0 bps or 500+ bps.",tips:["Mgmt fee on committed = a constant drag for the first 3-4 years until deployment catches up.","J-curve is sharpest in years 1-2 and self-corrects as distributions begin.","No carry being earned typically means the deals haven't cleared the 8% pref — could be performance or could be timing."]},E0={id:"dev-ltc-vs-ltv",title:"Construction loan: when does LTC bind vs LTV?",category:"risk",difficulty:"advanced",roles:["development","mortgageUw"],assetClass:"mixed",scenario:"You're sizing a construction loan on a $50M total project cost (TPC). The lender quotes 65% LTC and 60% LTV-on-stabilized-value. Stabilized NOI is projected at $4M; market cap is 5.5%. The construction loan converts to permanent at certificate of occupancy.",data:[{label:"TPC",value:"$50M"},{label:"Stabilized NOI",value:"$4M"},{label:"Market cap (stabilized)",value:"5.5%"},{label:"LTC limit",value:"65%"},{label:"LTV-on-stabilized limit",value:"60%"}],question:"Which test binds the loan size, and what does the lender lend?",options:[{label:"LTV binds at $43.6M (60% × $72.7M stabilized value), but LTC binds tighter at $32.5M (65% × $50M TPC). Lender lends $32.5M because both tests must pass and LTC is more restrictive.",isBest:!0,explanation:"Two-constraint sizing — calculate both, the more restrictive wins. LTC = 65% × $50M = $32.5M. Stabilized value = $4M / 5.5% = $72.7M; LTV = 60% × $72.7M = $43.6M. LTC is tighter, so it binds. The lender will lend $32.5M, not $43.6M. This is the typical pattern for *value-creating* developments: the asset is worth more once stabilized than the cost to build it (that's the whole point), so LTC binds. If TPC > stabilized value (a deal that destroys value), LTV would bind instead — which is also a signal not to build."},{label:"LTV binds because $43.6M > $32.5M — the lender lends the larger amount, $43.6M.",isBest:!1,explanation:"Inverts the rule. Two-constraint loan sizing always picks the *smaller* of the two — both tests must pass for the loan to underwrite. The borrower wants the larger amount; the lender, the smaller. Lender protection wins."},{label:"LTV binds at $43.6M; the LTC limit is just a guideline and lenders will exceed it for strong sponsors.",isBest:!1,explanation:'LTC is a hard constraint on most construction loans, not a guideline. Lenders use it as a "skin in the game" test — the borrower must put real equity into the deal proportional to total cost. Sponsor strength can shift terms (rate, recourse) but rarely the LTC floor.'},{label:"Lender lends the average of the two limits ($38M) to balance LTC and LTV concerns.",isBest:!1,explanation:"Not how dual-constraint sizing works. The two limits aren't averaged; the deal must satisfy BOTH simultaneously. Treating them as independent and averaging would routinely produce loans that fail one or both constraints at refi."}],takeaway:"Construction debt sizes to MIN(LTC, LTV-on-stabilized). LTC almost always binds for value-creating developments because TPC < stabilized value (that's the dev spread). When LTV binds instead, your stabilized value isn't materially above your cost — re-examine the deal. The borrower brings (1 − binding%) × TPC of equity to fund the gap.",tips:["LTC limits: 60-65% institutional core dev; 55-60% value-add / repositioning; 50-55% spec / less-stabilized markets.","LTV-on-stabilized: 55-65% range; tighter the riskier the lease-up.","When LTV binds in your model, the deal's economics are weak — investigate before pushing for more leverage."]},O0={id:"distressed-loan-workout",title:"Buying a distressed CRE loan — when does it pencil?",category:"investment-thesis",difficulty:"advanced",roles:["acquisitions","portfolioMgmt"],assetClass:"office",scenario:"A regional bank is offering a non-performing $40M senior loan on a Class-B office building. Original loan: $40M at 4.5%, 4 years remaining. Borrower hasn't paid in 2 quarters. The asset's estimated current value is $30M (loan is 33% under-water). The bank wants to clear it. They're asking $24M (a 40% discount to face).",data:[{label:"Loan face",value:"$40M (senior)"},{label:"Asset current value",value:"~$30M"},{label:"Asking price",value:"$24M (60¢ on the dollar)"},{label:"Borrower status",value:"Non-performing (2 missed quarters)"},{label:"Lien position",value:"1st mortgage"}],question:"How do you frame whether $24M is a buy?",options:[{label:`The buy thesis is "loan-to-own" or "loan-to-collect": at $24M your basis is 80% of asset value ($24M / $30M), so even in a foreclosure scenario you're likely whole. Price the deal off two paths — workout (collect interest at improved terms) or foreclosure (own the asset at $24M / $30M = 80% basis). If the foreclosure path produces an acceptable IRR, the loan workout is upside.`,isBest:!0,explanation:"Distressed loan buying is dual-path math: (1) the *collect* path — borrower works through, pays modified interest, you earn yield; (2) the *own* path — you foreclose and own the asset at your basis. The buy thesis works when the *own* path alone produces an acceptable return. At $24M basis on a $30M asset, you're acquiring at 80% of value with optionality on a workout. If you can't accept the foreclosure outcome, don't buy the loan. Sophisticated debt-fund underwriting always shows both paths in the IC memo."},{label:"Pass — the asset is worth $30M and the loan is $40M. There's no recovery on the $10M shortfall.",isBest:!1,explanation:"Misreads the buy. You're not paying $40M; you're paying $24M. Your basis is $24M against a $30M asset, which is the relevant comparison. The $40M face is what the original lender lost; the buyer's basis is what determines the buyer's outcome."},{label:"Buy at $24M — the bank wouldn't sell at a 40% discount unless they had to. Asymmetric upside.",isBest:!1,explanation:`Right answer for the wrong reason. "Bank wouldn't sell unless they had to" is a heuristic, not a financial test. The buy needs to pencil on the foreclosure path *as the conservative case*, not as a worst-case. Distressed funds get burned when they buy on the seller's motivation rather than on basis math.`},{label:"Negotiate down to $20M; at $30M asset value, $20M basis is the right entry for foreclosure protection.",isBest:!1,explanation:'A negotiation tactic, not a buy/no-buy decision framework. Whether $24M or $20M is the right basis depends on the foreclosure timeline, legal costs, and your IRR hurdle. Going in with "lower is always better" without sizing the workout / own paths is generic; the actual analysis is path-by-path return at varying basis.'}],takeaway:"Distressed CRE loan investing = own-path-or-collect-path math. Compute the IRR at your basis assuming foreclosure (asset becomes yours at the basis price); compute the IRR assuming a workout (modified terms, asset stays with the borrower). Buy when the *worse* of the two paths still hits your hurdle. Basis discipline matters more than face-discount headlines.",tips:['Senior loan + asset value > basis = "loan to own" upside. Junior position changes the math entirely.',"Foreclosure timeline + legal costs eat 5-15% of asset value depending on jurisdiction.","Always model the workout path with explicit interest-rate concessions and a longer maturity."]},D0={id:"lease-structure-nnn-vs-gross",title:"NNN vs Gross — who actually bears the OpEx risk?",category:"lease-econ",difficulty:"intermediate",roles:["assetManagement","acquisitions"],assetClass:"retail",scenario:'You own a single-tenant retail asset on a 10-year NNN lease at $25/SF base rent. Property taxes have risen 8%/yr for the past 3 years (vs 3% expected). The tenant is now pushing to renew on a *gross* basis at a higher face rent ($32/SF) to "make their costs predictable." The new gross rent is, on paper, higher than the NNN base.',data:[{label:"Current lease",value:"NNN, $25/SF base"},{label:"Renewal proposal",value:"Gross, $32/SF"},{label:"Recent tax growth",value:"8%/yr (vs 3% expected)"},{label:"Term",value:"10-yr renewal"},{label:"Asset",value:"Single-tenant retail"}],question:"How do you analyze the NNN-to-gross conversion?",options:[{label:"Gross at $32/SF means YOU bear the OpEx growth risk (taxes, insurance, repairs) for 10 years. The 7%-rent-bump only covers today's OpEx ratio; if costs keep growing 8%/yr, your NER erodes year over year. Counter-propose a gross-with-expense-stop or NNN-with-cap.",isBest:!0,explanation:`NNN vs gross is fundamentally a risk-allocation question, not a rent-level question. Under NNN, the tenant pays OpEx; rising costs hit them. Under gross, the landlord eats OpEx growth above whatever's baked into the rent. The tenant's ask "make our costs predictable" = "make YOUR costs UN-predictable." On a 10-year term with 8%/yr OpEx growth, the gap compounds dramatically. Counter-structures: (a) gross with an expense stop (landlord pays first $X of OpEx; tenant pays the rest) or (b) NNN with a cap on the tenant's annual reimbursement growth (limits the tenant's downside while preserving most of the landlord's protection).`},{label:"Take the gross deal — $32 > $25, so face rent is higher and the lease is more valuable in the cap-rate math.",isBest:!1,explanation:'Cap rates apply to NOI, not face rent, and NOI under gross is `face rent − all OpEx`. The $7/SF "uplift" gets eaten by the OpEx the landlord now bears. If you\'re running 30% OpEx ratio, the effective NOI per SF on gross at $32 is $22.40, vs NNN at $25 = $25 NOI per SF. The gross deal is *worse* by $2.60/SF.'},{label:"Stay NNN and refuse the conversion — the tenant should manage their own OpEx.",isBest:!1,explanation:'Doctrinal but not pragmatic. The tenant is signaling cost stress; if they walk because of it you have a vacant building. Counter-structures (expense stop, NNN cap) keep the lease attractive to the tenant while preserving most of your landlord protection. "Refuse" is an option of last resort, not an opening position.'},{label:"Convert to gross at the proposed $32/SF — the rent uplift makes up for OpEx growth, and the predictability for the tenant reduces re-leasing risk.",isBest:!1,explanation:"Misjudges the math. The $7/SF rent uplift is a *one-time* increase; OpEx grows EVERY year. By year 5, OpEx has compounded ~47% above today's level, eating well past the rent bump. Gross conversions need to price in OpEx growth across the full term, not a one-time uplift."}],takeaway:"Lease structure (NNN, gross, modified gross) is a risk-allocation tool. NNN puts OpEx growth risk on the tenant; gross puts it on the landlord. The face-rent comparison is misleading because it ignores who bears 10 years of cost inflation. When a tenant requests a structure change, run the full-term math at *expected* OpEx growth, not today's OpEx ratio. Hybrid structures (expense stops, recovery caps) are the usual landing zone.",tips:["Quick check: under NNN at NER X, equivalent gross is X + (current OpEx/SF) × inflation factor.","Tenants ask for gross when their costs are rising and they want to push the risk over. Always negotiate.","Expense stops set a floor on the landlord's OpEx burden; recovery caps set a ceiling on the tenant's."]},B0={id:"sponsor-recourse-vs-covenants",title:"Recourse vs covenants — which structures protect the lender?",category:"risk",difficulty:"advanced",roles:["mortgageUw"],assetClass:"multifamily",scenario:"You're structuring a $40M permanent loan on a stabilized MF asset. Sponsor is mid-tier (good track record, modest balance sheet, no public credit rating). Sponsor is asking for non-recourse. The credit committee wants protection beyond just the asset itself.",data:[{label:"Loan size",value:"$40M"},{label:"LTV / DSCR",value:"70% / 1.25x"},{label:"Sponsor",value:"Mid-tier, decent track record"},{label:"Sponsor balance sheet",value:"~$25M net worth (estimated)"},{label:"Term",value:"10-yr / 30-yr amort"}],question:"What's the right protection structure?",options:[{label:'Non-recourse with carve-outs (a "bad-boy" guaranty) PLUS strong financial covenants — DSCR maintenance, minimum debt yield, cash sweep on covenant breach. The carve-outs become full recourse on specific bad acts (fraud, voluntary bankruptcy, environmental). The covenants protect against deterioration without requiring sponsor recourse.',isBest:!0,explanation:'Modern CRE lending almost always uses non-recourse-with-carve-outs (the "bad-boy" guaranty) plus tight covenants. The carve-outs convert non-recourse to full recourse for specific bad acts — fraud, misrepresentation, voluntary bankruptcy filings, environmental contamination, transfer of title without lender consent. They protect the lender against the borrower acting in bad faith without forcing the sponsor to put their personal balance sheet on a perfectly-managed loan. Covenants (DSCR maintenance test at 1.10x, debt yield floor at 7%, cash sweep when triggered) protect against operating decline without requiring the sponsor to backstop. Together, they cover the realistic risk surface without making the loan unattractive to a typical mid-tier sponsor.'},{label:"Demand full recourse — the sponsor's $25M net worth covers the LTV gap and gives the lender a deep-pocket backstop.",isBest:!1,explanation:"Full recourse on $40M against a $25M sponsor balance sheet doesn't actually cover the gap (if the asset goes to $20M and recourse is needed for $20M, the sponsor can't pay). It also makes the loan unattractive — most institutional borrowers won't pledge personal balance sheets on a clean stabilized deal. You'll lose the deal to a competitor who structures non-recourse with covenants."},{label:"Non-recourse with no carve-outs — covenants alone are enough on a stabilized asset with strong DSCR.",isBest:!1,explanation:"Skips the carve-out layer that protects against bad acts. Covenants protect against *performance* decline; carve-outs protect against *behavior* (fraud, transfer without consent, etc.). Lenders need both. Non-recourse without carve-outs is rare and only at very large institutional scale."},{label:"Tight covenants only — DSCR maintenance plus a low LTV floor — and skip both recourse and carve-outs to win the deal.",isBest:!1,explanation:"Loses the bad-act protection (fraud, environmental) which has nothing to do with covenants. Covenants trigger on operating metrics; they don't trigger when the sponsor commits fraud or transfers title. Bad-boy carve-outs are nearly universal in CRE non-recourse lending — skipping them is genuinely uncommon."}],takeaway:"Lender protection is a layered stack: (1) the asset itself (the primary collateral), (2) covenants that catch operating deterioration before default, (3) bad-boy carve-outs that convert to recourse on specific bad acts, (4) full recourse only when the asset/sponsor combination justifies it. Most stabilized CRE permanent loans land at layers 1-3 (non-recourse + carve-outs + covenants), with layer 4 reserved for higher-risk transactions.",tips:["Bad-boy triggers: fraud, misrepresentation, voluntary bankruptcy, environmental, transfer without consent.","Springing-recourse covenants: DSCR maintenance, debt yield floor, cash sweep activation.","Springing recourse triggers full recourse if the borrower breaches a covenant — a middle ground when full recourse is too aggressive."]},F0={id:"ground-lease-vs-fee",title:"Ground lease vs fee simple — what changes in your underwriting?",category:"investment-thesis",difficulty:"advanced",roles:["development","acquisitions"],assetClass:"mixed",scenario:"You're evaluating two land deals for a 200-unit MF development. Site A: $10M fee-simple purchase. Site B: 99-year ground lease at $400k/yr (fixed for 10 years, then 10% bumps every 10 years thereafter). Construction cost is identical at $40M for both sites.",data:[{label:"Site A — fee simple",value:"$10M land cost"},{label:"Site B — ground lease",value:"$0 upfront, $400k/yr"},{label:"Bumps",value:"10%/decade after year 10"},{label:"Term",value:"99 years"},{label:"Construction cost (both)",value:"$40M"}],question:"What's the most important underwriting shift for the ground-lease deal?",options:[{label:"Treat the ground rent as a senior obligation that subordinates everything else — including your debt and equity — so your effective NOI is `building NOI − ground rent`. Your exit cap on the leasehold should be 75-150 bps wider than fee-simple to compensate the next buyer for the same subordination risk plus the eroding remaining term.",isBest:!0,explanation:`A ground lease is a permanent payment that sits ahead of your debt and equity. Your "NOI" is building NOI minus ground rent; that's what your DSCR test and cap rate apply to. Beyond that, leasehold value erodes as the remaining term shortens — a 99-year lease today is great; a 49-year leasehold to a future buyer is worse, and a 19-year leasehold is essentially worthless. Sophisticated leasehold underwriting widens the exit cap by 75-150 bps to price in (a) the subordination, (b) the term-erosion effect, and (c) the harder financing market for leaseholds (most permanent lenders haircut LTV on leasehold collateral). The reduced upfront cost is offset by all of the above.`},{label:"Treat ground rent as an OpEx line — it's an annual cost like property tax, just folded into your expense ratio.",isBest:!1,explanation:"Materially under-prices the structural difference. OpEx is variable and partially controllable; ground rent is fixed (or pre-set escalating) and senior. Lumping them together produces a wrong DSCR and a wrong exit cap on the leasehold. Lenders treat ground rent as senior debt-like for analysis; you should too."},{label:"The $10M upfront savings is the dominant factor — use it as Day-1 IRR juice and treat the rest of the deal as similar to fee-simple.",isBest:!1,explanation:"Reads only the upfront-cost line. The recurring rent + the leasehold-vs-fee exit cap haircut typically eat all of the upfront savings over the hold period. Sophisticated underwriting models the full lifecycle and usually finds fee-simple wins for development deals because of the leasehold exit-cap penalty."},{label:"Use a discount-rate comparison: the present value of ground rents at 7% discount vs the $10M upfront cost — pick whichever is lower.",isBest:!1,explanation:"Misses the exit-cap effect entirely. PV-of-rents vs upfront-cost is one piece of the comparison, but the leasehold haircut at exit is often the dominant difference and isn't captured by simple PV math. Full underwriting compares leasehold IRR to fee IRR with all the structural differences priced in."}],takeaway:"Ground leases trade upfront cost for a permanent senior obligation plus a structural exit penalty. The leasehold-fee gap shows up at three points: (1) ongoing NOI (subtract ground rent), (2) exit cap (75-150 bps wider for leaseholds), (3) financing terms (lower LTV from most lenders). Sometimes ground leases pencil — institutional ground-leased product in tier-1 markets — but for typical MF development, fee simple usually beats leasehold once all three effects are priced.",tips:["Effective NOI on leasehold = building NOI − ground rent. Apply your cap rate to that, not to building NOI.","Leasehold financing: most lenders haircut LTV by 5-15% vs the same fee-simple deal.","Remaining lease term at exit: at least 30-40 years remaining is the typical financeability floor for institutional product."]},zm=[l0,c0,u0,d0,p0,m0,h0,f0,x0,g0,y0,v0,w0,b0,k0,N0,S0,j0,C0,R0,$0,I0,T0,M0,P0,A0,E0,O0,D0,B0,F0];function L0(e){return zm.find(t=>t.id===e)}function z0(e,t){return t==="mixed"||!e.assetClass?!0:e.assetClass===t}function V0(e,t){return t==="all"||e.difficulty===t}function Vm(e){return zm.filter(t=>!(e.category!=="all"&&t.category!==e.category||!V0(t,e.difficulty)||!z0(t,e.assetClass)||!Ks(t.roles,e.role)))}function wu(e,t){let n=t>>>0;n===0&&(n=2654435769);for(let r=e.length-1;r>0;r--){n=n*1664525+1013904223>>>0;const a=n%(r+1);[e[r],e[a]]=[e[a],e[r]]}}function _0(e,t,n=Date.now()){const r=[...e];return wu(r,n),r.slice(0,Math.min(t,r.length)).map((i,o)=>{const l=[...i.options];return wu(l,(n^(o+1)*2654435769)>>>0),{...i,options:l}})}const Y0=[5,10,20],U0=[{id:"all",label:"All"},{id:"beginner",label:"Beginner"},{id:"intermediate",label:"Intermediate"},{id:"advanced",label:"Advanced"}];function q0({onStart:e,onBack:t}){const[n,r]=k.useState("all"),[a,i]=k.useState("all"),[o,l]=k.useState("mixed"),[c,u]=k.useState("all"),[m,d]=k.useState(5),p=k.useMemo(()=>Vm({category:n,difficulty:a,assetClass:o,role:c}),[n,a,o,c]),g=p.length>0,v=()=>{g&&e({category:n,difficulty:a,assetClass:o,length:m,role:c})};return s.jsxs("div",{className:"mx-auto max-w-3xl space-y-6 py-10",children:[s.jsxs("header",{className:"flex items-start justify-between gap-6",children:[s.jsxs("div",{className:"space-y-2",children:[s.jsxs("h1",{className:"display text-4xl text-warm-black",children:["Situational",s.jsx("span",{className:"text-copper",children:"."})]}),s.jsx("p" ain at least one negative and one positive value or IRR has no solution.",solution:`=IRR(B1:B5) → ${(ku*100).toFixed(2)}%. The negative Year 0 cash flow plus four years of positive flows let the solver find the rate where discounted-sum = 0.`},Ym=95e4,Um=.06,qm=.015,Nu=Ym/Um*(1-qm),eb={id:"reversion-value",title:"Reversion value net of sale costs",category:"arithmetic",difficulty:"beginner",roles:["acquisitions"],scenario:"You're modeling exit value at year 5. Stabilized NOI is $950k, you're using a 6.0% exit cap, and you assume 1.5% sale costs (broker commission + closing).",instruction:"In B4, compute the net reversion proceeds: NOI / cap, then reduced by the sale-cost percentage.",targetCell:"B4",expected:Nu,tolerancePct:.005,exampleFormula:"=B1/B2*(1-B3)",layout:{rows:4,cols:2,cells:[{address:"A1",role:"header",text:"Exit NOI"},{address:"B1",role:"assumption",value:Ym,format:"usd"},{address:"A2",role:"header",text:"Exit cap"},{address:"B2",role:"assumption",value:Um,format:"pct"},{address:"A3",role:"header",text:"Sale costs %"},{address:"B3",role:"assumption",value:qm,format:"pct"},{address:"A4",role:"header",text:"Net reversion"},{address:"B4",role:"target",format:"usd"}]},takeaway:"Reversion = exit NOI / exit cap, less sale costs. Sale costs (1–2.5%) are the most-frequently-omitted line in junior models. They reduce equity proceeds dollar-for-dollar at exit and meaningfully impact levered IRR — never skip them.",solution:`=B1/B2*(1-B3) = $950,000 / 0.06 × (1 − 0.015) = $15,833,333 × 0.985 ≈ $${Math.round(Nu).toLocaleString()}.`},tb={B1:.06,B2:3,B3:30,B4:1e7},Su=rr("=PPMT(B1,B2,B3,B4)",tb),nb={id:"amortization-principal",title:"Year-3 principal payment on a 30-year loan",category:"finance",difficulty:"intermediate",roles:["mortgageUw"],scenario:"A $10M loan at 6% annual interest amortizes over 30 years with annual payments. You're building an amortization schedule and need to know how much of year 3's payment goes to principal (vs. interest).",instruction:"In B
