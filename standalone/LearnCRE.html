:"((A + B)(1 − C) − D) / E   [gross × (1−vac) − opex, /cap]",tips:["Order of operations: (GPR + Other) × (1 − vacancy) = EGI. EGI − OpEx = NOI. NOI / cap = Value.","Back-of-envelope: if OpEx is ~40% of EGI and vacancy is ~5%, NOI ≈ gross × 0.95 × 0.6 ≈ gross × 0.57.","Then × (1/cap). At 6% cap: gross × 0.57 × 16.67 ≈ gross × 9.5. Ballparks a full proforma in one step.","Sandwich: compute value at the two nearest clean caps (e.g. 5% and 6%) and interpolate to your actual cap. Handles ugly caps without a calculator.","Sanity check: compare implied value-per-SF or $/unit to market comps before trusting the number."],generate(e,t="intermediate",n="mixed"){const r=I(e,M.gpr,t),s=I(e,M.otherIncome,t),a=e.pickFromSet(Lt.vacancySetNonZero),i=e.pickFromSet(Ki(n)),o=t==="beginner"?1e5:t==="advanced"?1e3:1e4,c=Math.round((r+s)*i*(1-a)/o)*o,u=I(e,H("capRate",n),t),f=yt(ba({gpr:r,otherIncome:s,vacancyRate:a,opex:c}),u);return{id:V("combo"),kind:"combinedScenario",prompt:`A ${ip(n)} has GPR ${v(r)}, other income ${v(s)}, vacancy ${N(a)}, OpEx ${v(c)}, cap ${N(u)}. What's the implied value?`,context:{gpr:r,otherIncome:s,vacancyRate:a,opex:c,capRate:u},expected:f,unit:"usd",tolerance:{type:"pct",band:.03},solution:qh(r,s,a,c,u)}}};function Xh(e,t,n){const r=Math.pow(1+t,n),s=Br(e,t,n);return{formula:"End = Start × (1 + r)^n",steps:[{label:"Growth factor",expression:`(1 + ${N(t,2)})^${n}`,result:r.toFixed(4)},{label:"End value",expression:`${v(e)} × ${r.toFixed(4)}`,result:v(s)}],answerDisplay:v(s)}}const Kh={kind:"compoundGrowth",label:"Compound Growth (forward)",description:"Project a value forward at a fixed growth rate.",category:"returns",pattern:"A × (1 + B)^n   [start × growth factor]",tips:["Rule of 72: a value roughly doubles every 72/r% years. At 3% → 24 years; at 4% → 18; at 6% → 12.","Anchors: (1.03)^5 ≈ 1.159; (1.03)^10 ≈ 1.344; (1.05)^5 ≈ 1.276; (1.05)^10 ≈ 1.629.","Linear approx (floor): End ≥ Start × (1 + r × n). Actual is always higher due to compounding.","Sandwich: bracket with the two nearest round rates and interpolate (e.g. 2.75% sits between 2.5% and 3%)."],generate(e,t="intermediate",n="mixed"){const r=I(e,M.noi,t),s=I(e,M.growthRate,t),a=e.pickInt(M.projectionYears.min,M.projectionYears.max),i=Br(r,s,a);return{id:V("cg"),kind:"compoundGrowth",prompt:`A value of ${v(r)} grows at ${N(s,2)} per year for ${te(a)}. What's the end value?`,context:{startValue:r,growthRate:s,projectionYears:a},expected:i,unit:"usd",tolerance:{type:"pct",band:.03},solution:Xh(r,s,a)}}};function Zh(e,t){const n=cp(e,t);return{formula:"Max Loan = NOI / Debt Yield",steps:[{label:"Max loan",expression:`${v(e)} / ${N(t)}`,result:v(n)}],answerDisplay:v(n)}}const Jh={kind:"debtYield",label:"Debt Yield Loan Sizing",description:"Max loan given NOI and required debt yield.",category:"returns",pattern:"A / B   where A = NOI, B = required yield %",tips:["Debt yield is the lender-side cap rate: NOI / Loan. 9% DY = 11.1x NOI max loan; 10% DY = 10x NOI.","Inverse: Max Loan = NOI / required DY.","Lender check: if debt yield < 8%, most CMBS lenders pass — so 8% is a hard floor for stabilized deals.","Quick math: $800k NOI / 9% → think $800k × 11.11 = $8.89M. Or: $800 / 0.09 = ~$8,890 (shift decimals)."],generate(e,t="intermediate",n="mixed"){const r=I(e,M.noi,t),s=I(e,M.debtYieldTarget,t),a=cp(r,s);return{id:V("dy"),kind:"debtYield",prompt:`NOI is ${v(r)}. Lender requires a ${N(s)} debt yield. What's the max loan?`,context:{noi:r,debtYieldTarget:s},expected:a,unit:"usd",tolerance:{type:"pct",band:.05},solution:Zh(r,s)}}};function ex(e,t,n){const r=ya(e,t),s=rp(r,n);return{formula:"Development Spread = YoC − Market Cap Rate",steps:[{label:"YoC",expression:`${v(e)} / ${v(t)}`,result:N(r)},{label:"Spread",expression:`${N(r)} − ${N(n)}`,result:`${Fe(s)}`}],answerDisplay:Fe(s)}}const tx={kind:"devSpread",label:"Development Spread",description:"YoC minus market cap — the risk premium for developing vs buying.",category:"valuation",pattern:"(A / B) − C   [YoC minus market cap]",tips:['100–150 bps is thin, 200–300 bps is typical, 500+ bps is a "layup" development.',"If YoC ≈ market cap, you're taking development risk for no extra return — walk away.","Spread compensates for construction risk, lease-up risk, and time value of capital tied up during build.","Mental math: compute YoC first, then subtract market cap. Answer in bps."],generate(e,t="intermediate",n="mixed"){const r=I(e,H("capRate",n),t),s=I(e,M.yocDelta,t),a=r+s,i=I(e,M.projectCost,t),o=t==="beginner"?25e4:t==="advanced"?25e3:1e5,c=Math.round(i*a/o)*o,u=rp(ya(c,i),r),f=Math.round(u*1e4);return{id:V("devSp"),kind:"devSpread",prompt:`Developing to ${v(i)} in total cost with stabilized NOI of ${v(c)}. Market comps trade at a ${N(r)} cap. What's the development spread (in bps)?`,context:{totalProjectCost:i,stabilizedNoi:c,noi:c,marketCapRate:r},expected:f,unit:"bps",tolerance:{type:"abs",band:25},solution:ex(c,i,r)}}};function vp(e){return`${e.toFixed(2)}x`}function nx(e,t,n,r){const s=Wt(n,r),a=e/t,i=Zi({noi:e,dscrTarget:t,annualRate:n,years:r});return{formula:"Max Loan = NOI / (DSCR × Loan Constant)",steps:[{label:"Loan constant",expression:`${te(r)} amort @ ${N(n)}`,result:N(s,2)},{label:"Max annual debt service",expression:`${v(e)} / ${vp(t)}`,result:v(a)},{label:"Max loan",expression:`${v(a)} / ${N(s,2)}`,result:v(i)}],answerDisplay:v(i)}}const rx={kind:"dscrLoanSizing",label:"DSCR Loan Sizing",description:"Max loan given NOI, DSCR target, rate, and amort.",category:"returns",pattern:"A / (B × C)   where A = NOI, B = DSCR, C = loan constant",tips:["Loan constants to memorize — 30yr @ 6% ≈ 0.072; 25yr @ 6% ≈ 0.077; 30yr @ 5% ≈ 0.0644; 30yr @ 7% ≈ 0.0799.",'Formula: Max Loan = NOI / (DSCR × Loan Constant). DSCR × constant is the "effective rate" the loan must support.',"At 1.25x DSCR, every $1 of NOI supports $0.80 of debt service. Then divide by constant to get loan amount.","IO shortcut: for interest-only loans, constant = rate. $500k NOI / (1.25 × 0.06) = $6.67M."],generate(e,t="intermediate",n="mixed"){const r=I(e,M.noi,t),s=t==="beginner"?e.pickFromSet([1.2,1.25,1.3]):I(e,M.dscrTarget,t),a=I(e,M.interestRate,t),i=t==="beginner"?30:e.pickInt(M.amortYears.min,M.amortYears.max),o=Zi({noi:r,dscrTarget:s,annualRate:a,years:i});return{id:V("dscr"),kind:"dscrLoanSizing",prompt:`NOI of ${v(r)} needs to cover a ${vp(s)} DSCR on a ${te(i)} amortizing loan at ${N(a)}. What's the max loan?`,context:{noi:r,dscrTarget:s,interestRate:a,amortYears:i},expected:o,unit:"usd",tolerance:{type:"pct",band:.05},solution:nx(r,s,a,i)}}};function eo(e,t){return t/e}function to(e,t,n){return Math.pow(t/e,1/n)-1}function Ur(e,t){return Math.pow(1+e,t)}function sx(e,t,n){return e*Ur(t,n)}function ax(e,t){const n=eo(e,t);return{formula:"Equity Multiple = Equity Out / Equity In",steps:[{label:"Multiple",expression:`${v(t)} / ${v(e)}`,result:we(n)}],answerDisplay:we(n)}}const lx={kind:"equityMultiple",label:"Equity Multiple",description:"Equity in + equity out → EM.",category:"returns",pattern:"A / B   where A = out, B = in",tips:["EM = Out / In. Doesn't care about time — 2x in 1 year and 2x in 10 years both = 2.0x.","Divide by hundreds: $23M / $10M → 23/10 = 2.3x. $17.5M / $8M → 17.5/8 ≈ 2.19x.","Rule of thumb: institutional value-add deals target 1.7x–2.0x; opportunistic 2.0x+; core ~1.4x–1.6x.","Complement to IRR: EM shows absolute dollars back, IRR shows time-adjusted. Always look at both."],generate(e,t="intermediate",n="mixed"){const r=I(e,M.equityIn,t),s=I(e,M.irrExitMultiple,t),a=t==="beginner"?1e6:t==="advanced"?25e3:1e5,i=Math.round(r*s/a)*a,o=eo(r,i);return{id:V("em"),kind:"equityMultiple",prompt:`You invested ${v(r)} and received ${v(i)} at sale. What's the equity multiple?`,context:{equityIn:r,equityOut:i},expected:o,unit:"multiple",tolerance:{type:"pct",band:.05},solution:ax(r,i)}}};function ix(e,t){const n=xp(e,t);return{formula:"Going-in Cap = NOI / Purchase Price",steps:[{label:"Cap rate",expression:`${v(t)} / ${v(e)}`,result:`${N(n)}  (${Fe(n)})`}],answerDisplay:Fe(n)}}const ox={kind:"goingInCap",label:"Going-in Cap Rate",description:"Price + NOI → cap rate in bps.",category:"valuation",pattern:"A / B   where A = NOI, B = price",tips:["Cap = NOI / Price. Inverse is the NOI multiple: 5% = 20x, 6% = 16.67x, 7% = 14.29x.","Mental shortcut: NOI / Price, round both to 2 sig figs first. $623k / $12.4M ≈ $620 / $12,400 ≈ 5.0%.","Sanity check: if price looks like ~20× NOI you're at 5%, ~15× → ~6.7%, ~10× → 10%.","Round both up or both down together — keeps the error directionally small. Rounding one up and one down stacks errors.","Sandwich: find the nearest clean multiples (e.g. 15× = 6.67%, 16× = 6.25%) and interpolate toward the actual ratio.","Convert cap to bps: 5.25% = 525 bps. Just shift the decimal two places."],generate(e,t="intermediate",n="mixed"){const r=I(e,H("capRate",n),t),s=I(e,M.noi,t),a=t==="beginner"?5e5:t==="advanced"?25e3:1e5,i=Math.round(s/r/a)*a,o=xp(i,s),c=Math.round(o*1e4);return{id:V("giCap"),kind:"goingInCap",prompt:`Purchase price is ${v(i)} and NOI is ${v(s)}. What's the going-in cap rate (in bps)?`,context:{purchasePrice:i,noi:s},expected:c,unit:"bps",tolerance:{type:"abs",band:15},solution:ix(i,s)}}};function cx(e,t){const n=e/t;return{formula:"GRM = Purchase Price / Annual Gross Potential Rent",steps:[{label:"GRM",expression:`${v(e)} / ${v(t)}`,result:we(n,2)}],answerDisplay:we(n,2)}}const ux={kind:"grossRentMultiplier",label:"Gross Rent Multiplier",description:"Price / PGI — quick multifamily/retail benchmark.",category:"valuation",pattern:"A / B   where A = price, B = gross potential rent",tips:["GRM = Price / PGI. Multifamily typically trades 8–14× GRM; lower is cheaper.","Quick inversion: cap rate ≈ (1 − OpEx ratio) / GRM. 12× GRM with 40% OpEx ≈ 5% cap.","GRM ignores OpEx, so it's most useful when opex structure is consistent across comps.","Trap: high-OpEx assets look cheap by GRM but expensive by cap. Always cross-check."],generate(e,t="intermediate",n="mixed"){const r=I(e,M.gpr,t),s=I(e,{min:7,max:15,step:.5},t),a=t==="beginner"?5e5:t==="advanced"?25e3:1e5,i=Math.round(r*s/a)*a,o=i/r;return{id:V("grm"),kind:"grossRentMultiplier",prompt:`Purchase price ${v(i)}, gross potential rent ${v(r)}. What's the GRM?`,context:{purchasePrice:i,gpr:r,pgi:r},expected:o,unit:"multiple",tolerance:{type:"pct",band:.05},solution:cx(i,r)}}};function dx(e,t){const n=Wt(e,t);return{formula:"Loan Constant = annualized payment / loan (monthly amort)",steps:[{label:"Constant",expression:`${te(t)} amort @ ${N(e)}`,result:`${N(n,2)}  (${Fe(n)})`}],answerDisplay:Fe(n)}}const px={kind:"loanConstant",label:"Loan Constant",description:"Annualized payment as % of loan for monthly-amortizing debt.",category:"returns",pattern:"PMT(r/12, n×12, −1) × 12   [amortization formula]",tips:["Memorize: 30yr @ 5% ≈ 644 bps; 30yr @ 6% ≈ 720 bps; 30yr @ 7% ≈ 799 bps; 25yr @ 6% ≈ 773 bps.","IO shortcut: loan constant = interest rate exactly (no principal paydown).","Rule of thumb: each +100 bps of rate adds ~60–80 bps to the constant on 30yr amort.","Longer amort → lower constant (but diminishing returns: 30y vs 25y only saves ~40 bps)."],generate(e,t="intermediate",n="mixed"){const r=I(e,M.interestRate,t),s=t==="beginner"?e.pickFromSet([25,30]):e.pickInt(M.amortYears.min,M.amortYears.max),a=Wt(r,s),i=Math.round(a*1e4);return{id:V("lc"),kind:"loanConstant",prompt:`What's the loan constant for a ${te(s)} amortizing loan at ${N(r)} (in bps)?`,context:{interestRate:r,amortYears:s},expected:i,unit:"bps",tolerance:{type:"abs",band:15},solution:dx(r,s)}}};function mx(e,t){const n=e*t,r=hp(e,t);return{formula:"NOI = EGI × (1 − OpEx Ratio)",steps:[{label:"OpEx",expression:`${v(e)} × ${N(t)}`,result:v(n)},{label:"NOI",expression:`${v(e)} − ${v(n)}`,result:v(r)}],answerDisplay:v(r)}}const fx={kind:"noiFromOer",label:"NOI from OpEx Ratio",description:"Solve NOI given EGI and an OpEx ratio.",category:"valuation",pattern:"A × (1 − B)   where A = EGI, B = opex ratio",tips:["NOI = EGI × (1 − t to reach 95% occupancy before stabilization.",data:[{label:"Existing inventory",value:"4,000 units"},{label:"Existing occupancy",value:"85%"},{label:"New deliveries",value:"+300 units"},{label:"Absorption pace",value:"50 units/month"},{label:"Target occupancy",value:"95%"}],question:"Roughly how long until the submarket reaches 95% leased?",options:[{label:"About 16 months — you need to absorb the existing vacancy plus the new deliveries to hit 95% on a 4,300-unit base.",isBest:!0,explanation:"New base: 4,300 units. Target leased at 95%: 4,085. Currently leased: 4,000 × 0.85 = 3,400. Net to absorb: 685 units ÷ 50/mo ≈ 13.7 months — but that assumes flat absorption. With 300 units delivering, the math is closer to 16 months once you account for the deliveries lengthening the lease-up tail. Reasonable analyst answer: 14–18 months."},{label:"About 12 months — current vacancy is 600 units and absorption is 50/mo.",isBest:!1,explanation:"Misses the deliveries. If you treat the base as 4,000 and ignore +300 new units, you'd say (4,000 − 3,400) ÷ 50 = 12 months. But the new deliveries change the denominator and add to the supply you must absorb. Underwriting at 12 months would systematically overestimate stabilization speed."},{label:"About 6 months — 50 units/mo absorption easily clears the 300 new units.",isBest:!1,explanation:"Confuses absorbing the new supply with reaching 95% occupancy of the combined base. Even if absorption only had to clear the 300 new units (it doesn't), the calculation ignores existing vacancy. The full denominator and the target % both matter."},{label:"It depends entirely on rent growth, which drives absorption.",isBest:!1,explanation:"Rent growth and absorption are linked but not identical. Absorption is observable directly from leasing velocity; rent growth is a separate variable. Given the prompt holds rents stable and gives an absorption pace, you should compute, not deflect."}],takeaway:"Stabilization timing has a clean formula: (target leased − current leased) ÷ absorption pace. The trap is using the wrong denominator when new deliveries are coming. Always recompute the inventory base before applying the target occupancy %.",tips:["Inventory base must include all deliveries within the underwriting horizon.","Quarterly absorption ÷ 3 = monthly; check both for sanity.","If absorption has been declining quarter-over-quarter, don't use the trailing pace flat."]},n0={id:"mark-to-market-upside",title:"How much upside is in the rent roll?",category:"pricing",difficulty:"beginner",assetClass:"office",scenario:"You're underwriting an office acquisition. In-place rent is $24/SF on the major tenant; recent leasing in the building and submarket is signing at $32/SF. The major tenant's lease expires in 12 months and is widely expected to vacate (the broker has already begun marketing the space).",data:[{label:"In-place rent",value:"$24/SF"},{label:"Market rent",value:"$32/SF"},{label:"Lease expiry",value:"12 months"},{label:"Tenant retention probability",value:"Low"}],question:"What's the right way to price the upside?",options:[{label:"Roughly 33% rent uplift on rollover — but price the deal to trended NOI net of downtime, TIs, and concessions, not to the market-rent figure directly.",isBest:!0,explanation:"($32 − $24) / $24 = 33% uplift. That's the gross arithmetic. The economic answer reduces it: 6–9 months downtime, $50–75/SF in TIs, several months of free rent — call it $25–40/SF in re-leasing costs against the uplift. Sophisticated underwriting trends to a stabilized NOI that captures the uplift *and* the cost of getting there."},{label:"Price at $32/SF rent immediately on Day 1 — the lease is rolling and the market clears at $32.",isBest:!1,explanation:'Ignores downtime, TIs, and free rent. Even in a hot market, vacancy between leases plus ~6 months of free rent plus $50+/SF in TIs can erase 1–2 years of the uplift. "$32 from Day 1" overstates the value.'},{label:"There's no real upside — rent rollovers usually trade at a premium that the seller has already priced in.",isBest:!1,explanation:"This conflates pricing efficiency with the existence of upside. The upside exists; the question is who captures it. If the seller has priced perfectly, the buyer's IRR equals required return — but the underwriting still needs to model the rollover, not skip it."},{label:"Price at the in-place rent of $24/SF and treat the market rent as conservative downside.",isBest:!1,explanation:"Inverts the upside/downside framework. In-place rent is what the asset earns *today*; market rent is what it will earn after rollover. Pricing at in-place ignores the rollover entirely and would systematically overpay relative to other buyers who underwrite trended NOI."}],takeaway:'Mark-to-market upside is real but never "free". Always net out re-leasing costs (downtime + TI + free rent) before treating the rent uplift as cash flow. The right anchor is trended stabilized NOI, not in-place and not market-rent-from-day-one.',tips:["Rule of thumb: re-leasing costs are 6–18 months of the new gross rent.","Mark-to-market % = (market − in-place) / in-place.","Apply uplift only to the SF actually rolling — most rent rolls have staggered expirations."]},r0={id:"noi-growth-smell-test",title:"Does this NOI growth assumption hold up?",category:"diagnostic",difficulty:"intermediate",assetClass:"multifamily",scenario:"A broker's offering memorandum on a stabilized garden-style multifamily asset shows 8.0% annual NOI growth in years 1–5 of the proforma. The submarket has averaged 2.5–3.0% rent growth historically, with a recent peak of ~5% during the 2021 spike. Property is 95% occupied, leased to market, no value-add story, no upcoming reassessment.",data:[{label:"Proforma NOI growth",value:"8%/yr"},{label:"Historical rent growth",value:"2.5–3.0%"},{label:"Recent peak (2021)",value:"~5%"},{label:"Occupancy",value:"95% (stabilized)"},{label:"Value-add component",value:"None disclosed"}],question:"How should you respond to this NOI growth assumption?",options:[{label:"Reject it and re-underwrite at 3–4%/yr — 8% on a stabilized asset with no value-add lever is roughly 2× any defensible long-run pace.",isBest:!0,explanation:"NOI growth on a stabilized rent-roll equals roughly (rent growth × leased %) − opex growth. At 3% rent growth and 3–4% opex growth, real NOI growth is closer to 2–3%. 8% requires either rent growth at 2× historical norms, opex contraction (not a thing), or a value-add story the OM didn't disclose. Anchor at 3–4% and ask the broker what they're seeing that you're not."},{label:"Accept it but discount the exit cap to compensate.",isBest:!1,explanation:"Two wrongs don't cancel — using an inflated NOI ramp with a wider exit cap obscures the underwriting. The correct move is to fix the inputs, not to mask aggressive growth with a punitive cap. You'll lose to bidders who underwrite cleanly and price-in a tighter exit cap on real growth."},{label:"Trust the broker — they have submarket data you don't.",isBest:!1,explanation:`Brokers are advocates for the seller. Their job is to support the highest defensible price; "trust" is not an underwriting input. Verify with public REIS / CoStar / submarket reports and the property's own historical financials. If they have a real story, they'll show you the data.`},{label:"It's within range — 8% is achievable in inflationary environments.",isBest:!1,explanation:"Historical multifamily NOI growth has rarely sustained at 8% even in inflationary environments — and the 2021 spike was unique to severe supply imbalance. Treating it as a reasonable base case for a 5-year hold puts the proforma well outside historical experience."}],takeaway:"NOI growth assumptions on stabilized assets should anchor to long-run rent growth minus opex growth. Anything 2×+ historical norms requires a *specific*, *named*, *quantifiable* lever — value-add, mark-to-market, expense recovery — or it's aspirational. Your job is to find that lever or push back.",tips:["Real-NOI-growth ≈ rent-growth × leased% − opex-growth.","Multifamily long-run NOI growth: 2–3% in typical markets.","If the OM's growth ramp doesn't name the lever, ask. If they can't name it, fix the input."]},s0={id:"comp-set-vetting",title:"Which comps belong in this set?",category:"comp-selection",difficulty:"beginner",assetClass:"industrial",scenario:"You're pricing a 200,000 SF Class-B industrial asset in a major distribution submarket. The broker provides 5 trade comps to support pricing. You need to vet each before averaging the cap rates.",data:[{label:"Comp 1",value:"Same submarket, traded 4 mos ago, similar size — 6.0% cap"},{label:"Comp 2",value:"Different submarket (50 mi away), traded 6 mos ago — 5.25% cap"},{label:"Comp 3",value:"Same submarket, traded 18 mos ago (pre-rate-hike) — 4.5% cap"},{label:"Comp 4",value:"Same submarket, traded 2 mos ago, smaller (75k SF) — 6.25% cap"},{label:"Comp 5",value:"Same submarket, traded 8 mos ago, similar size — 5.85% cap"}],question:"How should you treat the comp set?",options:[{label:"Discard Comp 2 (different submarket) and Comp 3 (different rate environment); use Comps 1, 4, and 5 — average ~6.0% with a small adjustment for Comp 4's smaller size.",isBest:!0,explanation:"Comp 2 is a different geography, so the cap reflects a different supply/demand profile. Comp 3 traded under materially different cost-of-capital — 18 months ago Treasuries were 200+ bps lower, so the 4.5% cap is irrelevant to today's pricing. Comps 1, 4, 5 are recent, same submarket, comparable product. Comp 4's smaller size warrants a small upward cap adjustment (smaller = thinner buyer pool = wider cap)."},{label:"Average all 5 caps and use the result — that's why the broker provided 5.",isBest:!1,explanation:"Averaging unfiltered comps gives 5.6%, ~40 bps tighter than the defensible answer. The off-submarket and stale comps drag the average artificially low. A bid built on this number would lose discipline; a bid built on 6.0% would either win at fair value or lose to someone underwriting cleanly."},{label:'Discard everything except Comp 1 — only one comp is truly "same vintage, same submarket, recent".',isBest:!1,explanation:`A sample size of 1 is too thin to support pricing. Comps 4 and 5 are usable with minor adjustments (size, time). The principle isn't "perfect comps only" — it's "comps where you can defend the bridge from observed price to subject price". 3 reasonable comps beats 1 perfect comp.`},{label:"Trust the broker's sourcing — they would have filtered out bad comps already.",isBest:!1,explanation:"The broker's incentive is to support the highest defensible price. Comps that pull the cap tighter (like the 4.5% pre-rate-hike trade) are more likely to be included even when they shouldn't be. Vetting comps yourself is a core part of acquisition diligence, not a redundancy."}],takeaway:"Comp filtering protects the cap rate anchor. Any comp older than ~12 months in a moving rate environment, or any comp from a different submarket, deserves a discard or a documented adjustment. The remaining 3 should be enough; if not, you don't have enough data to support a tight pricing recommendation — which is itself a useful conclusion.",tips:["Discard rule of thumb: >12 mos in a moving rate environment, or different submarket.","Smaller assets generally trade at wider caps (thinner buyer pool).","If you have <3 defensible comps, widen the pricing range and say so."]},a0={id:"tax-reassessment-surprise",title:"What does the reassessment do to your bid?",category:"risk",difficulty:"advanced",assetClass:"multifamily",scenario:"You're bidding $50M for a stabilized multifamily asset in a jurisdiction that reassesses property tax on sale. The seller has owned for 12 years; current annual property tax is $200,000 (effectively ~0.4% of your bid price). The jurisdiction's post-sale assessment rate is 1.25% of sale price.",data:[{label:"Bid price",value:"$50M"},{label:"Current tax bill",value:"$200,000"},{label:"Reassessment rate",value:"1.25% of sale price"},{label:"Going-in cap (pre-reassessment)",value:"5.0%"}],question:"How should you handle the reassessment?",options:[{label:"Reduce NOI by ~$425k and price the deal off the post-reassessment NOI — at a 5% cap, that's ~$8.5M of value, so either bid $41–42M or accept a wider going-in cap on the same NOI.",isBest:!0,explanation:"Post-sale tax: $50M × 1.25% = $625k. NOI hit: $625k − $200k = $425k. Value impact at 5% cap: $425k / 0.05 = $8.5M. The seller's in-place NOI uses the legacy tax bill; your stabilized NOI must reflect the new bill. Either lower the bid to compensate or push the going-in cap from 5.0% to ~5.85% on the as-marketed NOI to back into the same value."},{label:"Use the seller's tax bill in your underwriting — that's what shows up in the financials.",isBest:!1,explanation:"Will systematically overpay by ~$8.5M. The legacy tax bill applies to the seller; the moment the deed transfers, the assessor re-prices and your tax bill jumps. Underwriting at the legacy figure is one of the most common mistakes in jurisdictions with sale-triggered reassessment."},{label:"Phase in the reassessment over 3 years to smooth the impact.",isBest:!1,explanation:"Most jurisdictions don't phase in reassessment — the new bill hits in the next tax year (sometimes the same year). Even where phasing exists, your IRR underwriting must include the full burden by the time you exit. Smoothing the input understates the cost."},{label:"Reassessment is a wash because the cap rate already reflects the tax environment.",isBest:!1,explanation:"The cap rate reflects the tax environment of *comparable trades*, not your specific reassessment trigger. Comp caps are inputs to pricing; the post-sale tax is a separate, additive cost you bear regardless of where the comp set traded. They don't cancel."}],takeaway:"In jurisdictions with sale-triggered reassessment, the post-sale tax bill is part of the bid price. Always compute (bid × reassessment rate) − (current tax) and run the value impact at your cap rate. Bidding off the seller's NOI is the single most expensive avoidable mistake in these markets.",tips:["Common reassessment-on-sale jurisdictions: California (Prop 13), Florida, Texas (varies).","Value impact ≈ (post-sale tax − current tax) / cap rate.","If the reassessment is uncertain, get a tax-consultant quote *before* bidding."]},l0=[e0,t0,n0,r0,s0,a0];function i0(e,t){return t==="mixed"||!e.assetClass?!0:e.assetClass===t}function o0(e,t){return t==="all"||e.difficulty===t}function Wp(e){return l0.filter(t=>!(e.category!=="all"&&t.category!==e.category||!o0(t,e.difficulty)||!i0(t,e.assetClass)))}function c0(e,t,n=Date.now()){const r=[...e];let s=n>>>0;for(let a=r.length-1;a>0;a--){s=s*1664525+1013904223>>>0;const i=s%(a+1);[r[a],r[i]]=[r[i],r[a]]}return r.slice(0,Math.min(t,r.length))}const u0=[5,10,20],d0=[{id:"all",label:"All"},{id:"beginner",label:"Beginner"},{id:"intermediate",label:"Intermediate"},{id:"advanced",label:"Advanced"}];function p0({onStart:e,onBack:t}){const[n,r]=b.useState("all"),[s,a]=b.useState("all"),[i,o]=b.useState("mixed"),[c,u]=b.useState(5),f=b.useMemo(()=>Wp({category:n,difficulty:s,assetClass:i}),[n,s,i]),d=f.length>0,m=()=>{d&&e({category:n,difficulty:s,assetClass:i,length:c})};return l.jsxs("div",{className:"mx-auto max-w-3xl space-y-6 py-10",children:[l.jsxs("header",{className:"flex items-start justify-between gap-6",children:[l.jsxs("div",{className:"space-y-2",children:[l.jsxs("h1",{className:"display text-4xl text-warm-black",children:["Situational",l.jsx("span",{className:"text-copper",children:"."})]}),l.jsx("p",{className:"editorial text-lg text-warm-stone",children:"Read a short scenario, pick the most-defensible answer. Less mental math, more reasoning — why a deal looks the way it does, and what to do about it."})]}),l.jsx(L,{variant:"secondary",onClick:t,className:"text-xs",children:"← Back"})]}),l.jsxs(W,{className:"space-y-5",children:[l.jsxs(ms,{labe
