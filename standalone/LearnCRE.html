 D) / E   [gross × (1−vac) − opex, /cap]",tips:["Order of operations: (GPR + Other) × (1 − vacancy) = EGI. EGI − OpEx = NOI. NOI / cap = Value.","Back-of-envelope: if OpEx is ~40% of EGI and vacancy is ~5%, NOI ≈ gross × 0.95 × 0.6 ≈ gross × 0.57.","Then × (1/cap). At 6% cap: gross × 0.57 × 16.67 ≈ gross × 9.5. Ballparks a full proforma in one step.","Sandwich: compute value at the two nearest clean caps (e.g. 5% and 6%) and interpolate to your actual cap. Handles ugly caps without a calculator.","Sanity check: compare implied value-per-SF or $/unit to market comps before trusting the number."],generate(e,t="intermediate",n="mixed"){const r=R(e,E.gpr,t),l=R(e,E.otherIncome,t),o=e.pickFromSet(Mt.vacancySetNonZero),a=e.pickFromSet(ws(n)),s=t==="beginner"?1e5:t==="advanced"?1e3:1e4,u=Math.round((r+l)*a*(1-o)/s)*s,c=R(e,Y("capRate",n),t),f=vr(Nd({gpr:r,otherIncome:l,vacancyRate:o,opex:u}),c);return{id:z("combo"),kind:"combinedScenario",prompt:`A ${dd(n)} has GPR ${v(r)}, other income ${v(l)}, vacancy ${k(o)}, OpEx ${v(u)}, cap ${k(c)}. What's the implied value?`,context:{gpr:r,otherIncome:l,vacancyRate:o,opex:u,capRate:c},expected:f,unit:"usd",tolerance:{type:"pct",band:.03},solution:Bm(r,l,o,u,c)}}};function Um(e,t,n){const r=Math.pow(1+t,n),l=Ql(e,t,n);return{formula:"End = Start × (1 + r)^n",steps:[{label:"Growth factor",expression:`(1 + ${k(t,2)})^${n}`,result:r.toFixed(4)},{label:"End value",expression:`${v(e)} × ${r.toFixed(4)}`,result:v(l)}],answerDisplay:v(l)}}const Ym={kind:"compoundGrowth",label:"Compound Growth (forward)",description:"Project a value forward at a fixed growth rate.",category:"returns",pattern:"A × (1 + B)^n   [start × growth factor]",tips:["Rule of 72: a value roughly doubles every 72/r% years. At 3% → 24 years; at 4% → 18; at 6% → 12.","Anchors: (1.03)^5 ≈ 1.159; (1.03)^10 ≈ 1.344; (1.05)^5 ≈ 1.276; (1.05)^10 ≈ 1.629.","Linear approx (floor): End ≥ Start × (1 + r × n). Actual is always higher due to compounding.","Sandwich: bracket with the two nearest round rates and interpolate (e.g. 2.75% sits between 2.5% and 3%)."],generate(e,t="intermediate",n="mixed"){const r=R(e,E.noi,t),l=R(e,E.growthRate,t),o=e.pickInt(E.projectionYears.min,E.projectionYears.max),a=Ql(r,l,o);return{id:z("cg"),kind:"compoundGrowth",prompt:`A value of ${v(r)} grows at ${k(l,2)} per year for ${se(o)}. What's the end value?`,context:{startValue:r,growthRate:l,projectionYears:o},expected:a,unit:"usd",tolerance:{type:"pct",band:.03},solution:Um(r,l,o)}}};function Wm(e,t){const n=fd(e,t);return{formula:"Max Loan = NOI / Debt Yield",steps:[{label:"Max loan",expression:`${v(e)} / ${k(t)}`,result:v(n)}],answerDisplay:v(n)}}const Hm={kind:"debtYield",label:"Debt Yield Loan Sizing",description:"Max loan given NOI and required debt yield.",category:"returns",pattern:"A / B   where A = NOI, B = required yield %",tips:["Debt yield is the lender-side cap rate: NOI / Loan. 9% DY = 11.1x NOI max loan; 10% DY = 10x NOI.","Inverse: Max Loan = NOI / required DY.","Lender check: if debt yield < 8%, most CMBS lenders pass — so 8% is a hard floor for stabilized deals.","Quick math: $800k NOI / 9% → think $800k × 11.11 = $8.89M. Or: $800 / 0.09 = ~$8,890 (shift decimals)."],generate(e,t="intermediate",n="mixed"){const r=R(e,E.noi,t),l=R(e,E.debtYieldTarget,t),o=fd(r,l);return{id:z("dy"),kind:"debtYield",prompt:`NOI is ${v(r)}. Lender requires a ${k(l)} debt yield. What's the max loan?`,context:{noi:r,debtYieldTarget:l},expected:o,unit:"usd",tolerance:{type:"pct",band:.05},solution:Wm(r,l)}}};function Qm(e,t,n){const r=Wl(e,t),l=sd(r,n);return{formula:"Development Spread = YoC − Market Cap Rate",steps:[{label:"YoC",expression:`${v(e)} / ${v(t)}`,result:k(r)},{label:"Spread",expression:`${k(r)} − ${k(n)}`,result:`${Ue(l)}`}],answerDisplay:Ue(l)}}const Gm={kind:"devSpread",label:"Development Spread",description:"YoC minus market cap — the risk premium for developing vs buying.",category:"valuation",pattern:"(A / B) − C   [YoC minus market cap]",tips:['100–150 bps is thin, 200–300 bps is typical, 500+ bps is a "layup" development.',"If YoC ≈ market cap, you're taking development risk for no extra return — walk away.","Spread compensates for construction risk, lease-up risk, and time value of capital tied up during build.","Mental math: compute YoC first, then subtract market cap. Answer in bps."],generate(e,t="intermediate",n="mixed"){const r=R(e,Y("capRate",n),t),l=R(e,E.yocDelta,t),o=r+l,a=R(e,E.projectCost,t),s=t==="beginner"?25e4:t==="advanced"?25e3:1e5,u=Math.round(a*o/s)*s,c=sd(Wl(u,a),r),f=Math.round(c*1e4);return{id:z("devSp"),kind:"devSpread",prompt:`Developing to ${v(a)} in total cost with stabilized NOI of ${v(u)}. Market comps trade at a ${k(r)} cap. What's the development spread (in bps)?`,context:{totalProjectCost:a,stabilizedNoi:u,noi:u,marketCapRate:r},expected:f,unit:"bps",tolerance:{type:"abs",band:25},solution:Qm(u,a,r)}}};function Cd(e){return`${e.toFixed(2)}x`}function qm(e,t,n,r){const l=Zt(n,r),o=e/t,a=md({noi:e,dscrTarget:t,annualRate:n,years:r});return{formula:"Max Loan = NOI / (DSCR × Loan Constant)",steps:[{label:"Loan constant",expression:`${se(r)} amort @ ${k(n)}`,result:k(l,2)},{label:"Max annual debt service",expression:`${v(e)} / ${Cd(t)}`,result:v(o)},{label:"Max loan",expression:`${v(o)} / ${k(l,2)}`,result:v(a)}],answerDisplay:v(a)}}const Km={kind:"dscrLoanSizing",label:"DSCR Loan Sizing",description:"Max loan given NOI, DSCR target, rate, and amort.",category:"returns",pattern:"A / (B × C)   where A = NOI, B = DSCR, C = loan constant",tips:["Loan constants to memorize — 30yr @ 6% ≈ 0.072; 25yr @ 6% ≈ 0.077; 30yr @ 5% ≈ 0.0644; 30yr @ 7% ≈ 0.0799.",'Formula: Max Loan = NOI / (DSCR × Loan Constant). DSCR × constant is the "effective rate" the loan must support.',"At 1.25x DSCR, every $1 of NOI supports $0.80 of debt service. Then divide by constant to get loan amount.","IO shortcut: for interest-only loans, constant = rate. $500k NOI / (1.25 × 0.06) = $6.67M."],generate(e,t="interm p",label:"Going-in Cap Rate",description:"Price + NOI → cap rate in bps.",category:"valuation",pattern:"A / B   where A = NOI, B = price",tips:["Cap = NOI / Price. Inverse is the NOI multiple: 5% = 20x, 6% = 16.67x, 7% = 14.29x.","Mental shortcut: NOI / Price, round both to 2 sig figs first. $623k / $12.4M ≈ $620 / $12,400 ≈ 5.0%.","Sanity check: if price looks like ~20× NOI you're at 5%, ~15× → ~6.7%, ~10× → 10%.","Round both up or both down together — keeps the error directionally small. Rounding one up and one down stacks errors.","Sandwich: find the nearest clean multiples (e.g. 15× = 6.67%, 16× = 6.25%) and interpolate toward the actual ratio.","Convert cap to bps: 5.25% = 525 bps. Just shift the decimal two places."],generate(e,t="intermediate",n="mixed"){const r=R(e,Y("capRate",n),t),l=R(e,E.noi,t),o=t==="beginner"?5e5:t==="advanced"?25e3:1e5,a=Math.round(l/r/o)*o,s=kd(a,l),u=Math.round(s*1e4);return{id:z("giCap"),kind:"goingInCap",prompt:`Purchase price is ${v(a)} and NOI is ${v(l)}. What's the going-in cap rate (in bps)?`,context:{purchasePrice:a,noi:l},expected:u,unit:"bps",tolerance:{type:"abs",band:15},solution:Jm(a,l)}}};function th(e,t){const n=e/t;return{formula:"GRM = Purchase Price / Annual Gross Potential Rent",steps:[{label:"GRM",expression:`${v(e)} / ${v(t)}`,result:ke(n,2)}],answerDisplay:ke(n,2)}}const nh={kind:"grossRentMultiplier",label:"Gross Rent Multiplier",description:"Price / PGI — quick multifamily/retail benchmark.",category:"valuation",pattern:"A / B   where A = price, B = gross potential rent",tips:["GRM = Price / PGI. Multifamily typically trades 8–14× GRM; lower is cheaper.","Quick inversion: cap rate ≈ (1 − OpEx ratio) / GRM. 12× GRM with 40% OpEx ≈ 5% cap.","GRM ignores OpEx, so it's most useful when opex structure is consistent across comps.","Trap: high-OpEx assets look cheap by GRM but expensive by cap. Always cross-check."],generate(e,t="intermediate",n="mixed"){const r=R(e,E.gpr,t),l=R(e,{min:7,max:15,step:.5},t),o=t==="begi
