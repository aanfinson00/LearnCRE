bracket with the two nearest round rates and interpolate (e.g. 2.75% sits between 2.5% and 3%)."],generate(e,t="intermediate",n="mixed"){const r=I(e,O.noi,t),a=I(e,O.growthRate,t),l=e.pickInt(O.projectionYears.min,O.projectionYears.max),s=Pr(r,a,l);return{id:V("cg"),kind:"compoundGrowth",prompt:`A value of ${g(r)} grows at ${k(a,2)} per year for ${ee(l)}. What's the end value?`,context:{startValue:r,growthRate:a,projectionYears:l},expected:s,unit:"usd",tolerance:{type:"pct",band:.03},solution:ih(r,a,l)}}};function ch(e,t){const n=Od(e,t);return{formula:"Max Loan = NOI / Debt Yield",steps:[{label:"Max loan",expression:`${g(e)} / ${k(t)}`,result:g(n)}],answerDisplay:g(n)}}const dh={kind:"debtYield",label:"Debt Yield Loan Sizing",description:"Max loan given NOI and required debt yield.",category:"returns",pattern:"A / B   where A = NOI, B = required yield %",tips:["Debt yield is the lender-side cap rate: NOI / Loan. 9% DY = 11.1x NOI max loan; 10% DY = 10x NOI.","Inverse: Max Loan = NOI / required DY.","Lender check: if debt yield < 8%, most CMBS lenders pass — so 8% is a hard floor for stabilized deals.","Quick math: $800k NOI / 9% → think $800k × 11.11 = $8.89M. Or: $800 / 0.09 = ~$8,890 (shift decimals)."],generate(e,t="intermediate",n="mixed"){const r=I(e,O.noi,t),a=I(e,O.debtYieldTarget,t),l=Od(r,a);return{id:V("dy"),kind:"debtYield",prompt:`NOI is ${g(r)}. Lender requires a ${k(a)} debt yield. What's the max loan?`,context:{noi:r,debtYieldTarget:a},expected:l,unit:"usd",tolerance:{type:"pct",band:.05},solution:ch(r,a)}}};function ph(e,t,n){const r=ll(e,t),a=$d(r,n);return{formula:"Development Spread = YoC − Market Cap Rate",steps:[{label:"YoC",expression:`${g(e)} / ${g(t)}`,result:k(r)},{label:"Spread",expression:`${k(r)} − ${k(n)}`,result:`${Oe(a)}`}],answerDisplay:Oe(a)}}const fh={kind:"devSpread",label:"Development Spread",description:"YoC minus market cap — the risk premium for developing vs buying.",category:"valuation",pattern:"(A / B) − C   [YoC minus market cap]",tips:['100–150 bps is thin, 200–300 bps is typical, 500+ bps is a "layup" development.',"If YoC ≈ market cap, you're taking development risk for no extra return — walk away.","Spread compensates for construction risk, lease-up risk, and time value of capital tied up during build.","Mental math: compute YoC first, then subtract market cap. Answer in bps."],generate(e,t="intermediate",n="mixed"){const r=I(e,G("capRate",n),t),a=I(e,O.yocDelta,t),l=r+a,s=I(e,O.projectCost,t),i=t==="beginner"?25e4:t==="advanced"?25e3:1e5,u=Math.round(s*l/i)*i,c=$d(ll(u,s),r),h=Math.round(c*1e4);return{id:V("devSp"),kind:"devSpread",prompt:`Developing to ${g(s)} in total cost with stabilized NOI of ${g(u)}. Market comps trade at a ${k(r)} cap. What's the development spread (in bps)?`,context:{totalProjectCost:s,stabilizedNoi:u,noi:u,marketCapRate:r},expected:h,unit:"bps",tolerance:{type:"abs",band:25},solution:ph(u,s,r)}}};function Bd(e){return`${e.toFixed(2)}x`}function mh(e,t,n,r){const a=_t(n,r),l=e/t,s=Mo({noi:e,dscrTarget:t,annualRate:n,years:r});return{formula:"Max Loan = NOI / (DSCR × Loan Constant)",steps:[{label:"Loan constant",expression:`${ee(r)} amort @ ${k(n)}`,result:k(a,2)},{label:"Max annual debt service",expression:`${g(e)} / ${Bd(t)}`,result:g(l)},{label:"Max loan",expression:`${g(l)} / ${k(a,2)}`,result:g(s)}],answerDisplay:g(s)}}const hh={kind:"dscrLoanSizing",label:"DSCR Loan Sizing",description:"Max loan given NOI, DSCR target, rate, and amort.",category:"returns",pattern:"A / (B × C)   where A = NOI, B = DSCR, C = loan constant",tips:["Loan constants to memorize — 30yr @ 6% ≈ 0.072; 25yr @ 6% ≈ 0.077; 30yr @ 5% ≈ 0.0644; 30yr @ 7% ≈ 0.0799.",'Formula: Max Loan = NOI / (DSCR × Loan Constant). DSCR × constant is the "effective rate" the loan must support.',"At 1.25x DSCR, every $1 of NOI supports $0.80 of debt service. Then divide by constant to get loan amount.","IO shortcut: for interest-only loans, constant = rate. $500k NOI / (1.25 × 0.06) = $6.67M."],generate(e,t="intermediate",n="mixed"){const r=I(e,O.noi,t),a=t==="beginner"?e.pickFromSet([1.2,1.25,1.3]):I(e,O.dscrTarget,t),l=I(e,O.interestRate,t),s=t==="beginner"?30:e.pickInt(O.amortYears.min,O.amortYears.max),i=Mo({noi:r,dscrTarget:a,annualRate:l,years:s});return{id:V("dscr"),kind:"dscrLoanSizing",prompt:`NOI of ${g(r)} needs to cover a ${Bd(a)} DSCR on a ${ee(s)} amortizing loan at ${k(l)}. What's the max loan?`,context:{noi:r,dscrTarget:a,interestRate:l,amortYears:s},expected:i,unit:"usd",tolerance:{type:"pct",band:.05},solution:mh(r,a,l,s)}}};function To(e,t){return t/e}function Ao(e,t,n){return Math.pow(t/e,1/n)-1}function Or(e,t){return Math.pow(1+e,t)}function xh(e,t,n){return e*Or(t,n)}function gh(e,t){const n=To(e,t);return{formula:"Equity Multiple = Equity Out / Equity In",steps:[{label:"Multiple",expression:`${g(t)} / ${g(e)}`,result:ve(n)}],answerDisplay:ve(n)}}const vh={kind:"equityMultiple",label:"Equity Multiple",description:"Equity in + equity out → EM.",category:"returns",pattern:"A / B   where A = out, B = in",tips:["EM = Out / In. Doesn't care about time — 2x in 1 year and 2x in 10 years both = 2.0x.","Divide by hundreds: $23M / $10M → 23/10 = 2.3x. $17.5M / $8M → 17.5/8 ≈ 2.19x.","Rule of thumb: institutional value-add deals target 1.7x–2.0x; opportunistic 2.0x+; core ~1.4x–1.6x.","Complement to IRR: EM shows absolute dollars back, IRR shows time-adjusted. Always look at both."],generate(e,t="intermediate",n="mixed"){const r=I(e,O.equityIn,t),a=I(e,O.irrExitMultiple,t),l=t==="beginner"?1e6:t==="advanced"?25e3:1e5,s=Math.round(r*a/l)*l,i=To(r,s);return{id:V("em"),kind:"equityMultiple",prompt:`You invested ${g(r)} and received ${g(s)} at sale. What's the equity multiple?`,context:{equityIn:r,equityOut:s},expected:i,unit:"multiple",tolerance:{type:"pct",band:.05},solution:gh(r,s)}}};function yh(e,t){const n=zd(e,t);return{formula:"Going-in Cap = NOI / Purchase Price",steps:[{label:"Cap rate",expression:`${g(t)} / ${g(e)}`,result:`${k(n)}  (${Oe(n)})`}],answerDisplay:Oe(n)}}const wh={kind:"goingInCap",label:"Going-in Cap Rate",description:"Price + NOI → cap rate in bps.",category:"valuation",pattern:"A / B   where A = NOI, B = price",tips:["Cap = NOI / Price. Inverse is the NOI multiple: 5% = 20x, 6% = 16.67x, 7% = 14.29x.","Mental shortcut: NOI / Price, round both to 2 sig figs first. $623k / $12.4M ≈ $620 / $12,400 ≈ 5.0%.","Sanity check: if price looks like ~20× NOI you're at 5%, ~15× → ~6.7%, ~10× → 10%.","Round both up or both down together — keeps the error directionally small. Rounding one up and one down stacks errors.","Sandwich: find the nearest clean multiples (e.g. 15× = 6.67%, 16× = 6.25%) and interpolate toward the actual ratio.","Convert cap to bps: 5.25% = 525 bps. Just shift the decimal two places."],generate(e,t="intermediate",n="mixed"){const r=I(e,G("capRate",n),t),a=I(e,O.noi,t),l=t==="beginner"?5e5:t==="advanced"?25e3:1e5,s=Math.round(a/r/l)*l,i=zd(s,a),u=Math.round(i*1e4);return{id:V("giCap"),kind:"goingInCap",prompt:`Purchase price is ${g(s)} and NOI is ${g(a)}. What's the going-in cap rate (in bps)?`,context:{purchasePrice:s,noi:a},expected:u,unit:"bps",tolerance:{type:"abs",band:15},solution:yh(s,a)}}};function kh(e,t){const n=e/t;return{formula:"GRM = Purchase Price / Annual Gross Potential Rent",steps:[{label:"GRM",expression:`${g(e)} / ${g(t)}`,result:ve(n,2)}],answerDisplay:ve(n,2)}}const Sh={kind:"grossRentMultiplier",label:"Gross Rent Multiplier",description:"Price / PGI — quick multifamily/retail benchmark.",category:"valuation",pattern:"A / B   where A = price, B = gross potential rent",tips:["GRM = Price / PGI. Multifamily typically trades 8–14× GRM; lower is cheaper.","Quick inversion: cap rate ≈ (1 − OpEx ratio) / GRM. 12× GRM with 40% OpEx ≈ 5% cap.","GRM ignores OpEx, so it's most useful when opex structure is consistent across comps.","Trap: high-OpEx assets look cheap by GRM but expensive by cap. Always cross-check."],generate(e,t="intermediate",n="mixed"){const r=I(e
