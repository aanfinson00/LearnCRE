 + B)(1 − C) − D) / E   [gross × (1−vac) − opex, /cap]",tips:["Order of operations: (GPR + Other) × (1 − vacancy) = EGI. EGI − OpEx = NOI. NOI / cap = Value.","Back-of-envelope: if OpEx is ~40% of EGI and vacancy is ~5%, NOI ≈ gross × 0.95 × 0.6 ≈ gross × 0.57.","Then × (1/cap). At 6% cap: gross × 0.57 × 16.67 ≈ gross × 9.5. Ballparks a full proforma in one step.","Sandwich: compute value at the two nearest clean caps (e.g. 5% and 6%) and interpolate to your actual cap. Handles ugly caps without a calculator.","Sanity check: compare implied value-per-SF or $/unit to market comps before trusting the number."],generate(e,t="intermediate",n="mixed"){const r=$(e,P.gpr,t),l=$(e,P.otherIncome,t),o=e.pickFromSet(Mt.vacancySetNonZero),a=e.pickFromSet(ws(n)),s=t==="beginner"?1e5:t==="advanced"?1e3:1e4,u=Math.round((r+l)*a*(1-o)/s)*s,c=$(e,W("capRate",n),t),f=vr(Rd({gpr:r,otherIncome:l,vacancyRate:o,opex:u}),c);return{id:B("combo"),kind:"combinedScenario",prompt:`A ${fd(n)} has GPR ${v(r)}, other income ${v(l)}, vacancy ${k(o)}, OpEx ${v(u)}, cap ${k(c)}. What's the implied value?`,context:{gpr:r,otherIncome:l,vacancyRate:o,opex:u,capRate:c},expected:f,unit:"usd",tolerance:{type:"pct",band:.03},solution:Um(r,l,o,u,c)}}};function Wm(e,t,n){const r=Math.pow(1+t,n),l=Ql(e,t,n);return{formula:"End = Start × (1 + r)^n",steps:[{label:"Growth factor",expression:`(1 + ${k(t,2)})^${n}`,result:r.toFixed(4)},{label:"End value",expression:`${v(e)} × ${r.toFixed(4)}`,result:v(l)}],answerDisplay:v(l)}}const Hm={kind:"compoundGrowth",label:"Compound Growth (forward)",description:"Project a value forward at a fixed growth rate.",category:"returns",pattern:"A × (1 + B)^n   [start × growth factor]",tips:["Rule of 72: a value roughly doubles every 72/r% years. At 3% → 24 years; at 4% → 18; at 6% → 12.","Anchors: (1.03)^5 ≈ 1.159; (1.03)^10 ≈ 1.344; (1.05)^5 ≈ 1.276; (1.05)^10 ≈ 1.629.","Linear approx (floor): End ≥ Start × (1 + r × n). Actual is always higher due to compounding.","Sandwich: bracket with the two nearest round rates and interpolate (e.g. 2.75% sits between 2.5% and 3%)."],generate(e,t="intermediate",n="mixed"){const r=$(e,P.noi,t),l=$(e,P.growthRate,t),o=e.pickInt(P.projectionYears.min,P.projectionYears.max),a=Ql(r,l,o);return{id:B("cg"),kind:"compoundGrowth",prompt:`A value of ${v(r)} grows at ${k(l,2)} per year for ${se(o)}. What's the end value?`,context:{startValue:r,growthRate:l,projectionYears:o},expected:a,unit:"usd",tolerance:{type:"pct",band:.03},solution:Wm(r,l,o)}}};function Qm(e,t){const n=hd(e,t);return{formula:"Max Loan = NOI / Debt Yield",steps:[{label:"Max loan",expression:`${v(e)} / ${k(t)}`,result:v(n)}],answerDisplay:v(n)}}const Gm={kind:"debtYield",label:"Debt Yield Loan Sizing",description:"Max loan given NOI and required debt yield.",category:"returns",pattern:"A / B   where A = NOI, B = required yield %",tips:["Debt yield is the lender-side cap rate: NOI / Loan. 9% DY = 11.1x NOI max loan; 10% DY = 10x NOI.","Inverse: Max Loan = NOI / required DY.","Lender check: if debt yield < 8%, most CMBS lenders pass — so 8% is a hard floor for stabilized deals.","Quick math: $800k NOI / 9% → think $800k × 11.11 = $8.89M. Or: $800 / 0.09 = ~$8,890 (shift decimals)."],generate(e,t="intermediate",n="mixed"){const r=$(e,P.noi,t),l=$(e,P.debtYieldTarget,t),o=hd(r,l);return{id:B("dy"),kind:"debtYield",prompt:`NOI is ${v(r)}. Lender requires a ${k(l)} debt yield. What's the max loan?`,context:{noi:r,debtYieldTarget:l},expected:o,unit:"usd",tolerance:{type:"pct",band:.05},solution:Qm(r,l)}}};function qm(e,t,n){const r=Wl(e,t),l=ud(r,n);return{formula:"Development Spread = YoC − Market Cap Rate",steps:[{label:"YoC",expression:`${v(e)} / ${v(t)}`,result:k(r)},{label:"Spread",expression:`${k(r)} − ${k(n)}`,result:`${Ue(l)}`}],answerDisplay:Ue(l)}}const Km={kind:"devSpread",label:"Development Spread",description:"YoC minus market cap — the risk premium for developing vs buying.",category:"valuation",pattern:"(A / B) − C   [YoC minus market
