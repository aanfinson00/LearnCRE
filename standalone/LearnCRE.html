t yield is the lender-side cap rate: NOI / Loan. 9% DY = 11.1x NOI max loan; 10% DY = 10x NOI.","Inverse: Max Loan = NOI / required DY.","Lender check: if debt yield < 8%, most CMBS lenders pass — so 8% is a hard floor for stabilized deals.","Quick math: $800k NOI / 9% → think $800k × 11.11 = $8.89M. Or: $800 / 0.09 = ~$8,890 (shift decimals)."],generate(e,t="intermediate"){const n=R(e,N.noi,t),r=R(e,N.debtYieldTarget,t),l=sd(n,r);return{id:z("dy"),kind:"debtYield",prompt:`NOI is ${x(n)}. Lender requires a ${k(r)} debt yield. What's the max loan?`,context:{noi:n,debtYieldTarget:r},expected:l,unit:"usd",tolerance:{type:"pct",band:.05},solution:Tm(n,r)}}};function Am(e,t,n){const r=Yl(e,t),l=rd(r,n);return{formula:"Development Spread = YoC − Market Cap Rate",steps:[{label:"YoC",expression:`${x(e)} / ${x(t)}`,result:k(r)},{label:"Spread",expression:`${k(r)} − ${k(n)}`,result:`${ze(l)}`}],answerDisplay:ze(l)}}const Dm={kind:"devSpread",label:"Development Spread",description:"YoC minus market cap — the risk premium for developing vs buying.",category:"valuation",pattern:"(A / B) − C   [YoC minus market cap]",tips:['100–150 bps is thin, 200–300 bps is typical, 500+ bps is a "layup" development.',"If YoC ≈ market cap, you're taking development risk for no extra return — walk away.","Spread compensates for construction risk, lease-up risk, and time value of capital tied up during build.","Mental math: compute YoC first, then subtract market cap. Answer in bps."],generate(e,t="intermediate"){const n=R(e,N.capRate,t),r=R(e,N.yocDelta,t),l=n+r,o=R(e,N.projectCost,t),a=t==="beginner"?25e4:t==="advanced"?25e3:1e5,s=Math.round(o*l/a)*a,u=rd(Yl(s,o),n),c=Math.round(u*1e4);return{id:z("devSp"),kind:"devSpread",prompt:`Developing to ${x(o)} in total cost with stabilized NOI of ${x(s)}. Market comps trade at a ${k(n)} cap. What's the development spread (in bps)?`,context:{totalProjectCost:o,stabilizedNoi:s,noi:s,marketCapRate:n},expected:c,unit:"bps",tolerance:{type:"abs",band:25},solution:Am(s,o,n)}}};function gd(e){return`${e.toFixed(2)}x`}function _m(e,t,n,r){const l=Kt(n,r),o=e/t,a=id({noi:e,dscrTarget:t,annualRate:n,years:r});return{formula:"Max Loan = NOI / (DSCR × Loan Constant)",steps:[{label:"Loan constant",expression:`${oe(r)} amort @ ${k(n)}`,result:k(l,2)},{label:"Max annual debt service",expression:`${x(e)} / ${gd(t)}`,result:x(o)},{label:"Max loan",expression:`${x(o)} / ${k(l,2)}`,result:x(a)}],answerDisplay:x(a)}}const Lm={kind:"dscrLoanSizing",label:"DSCR Loan Sizing",description:"Max loan given NOI, DSCR target, rate, and amort.",category:"returns",pattern:"A / (B × C)   where A = NOI, B = DSCR, C = loan constant",tips:["Loan constants to memorize — 30yr @ 6% ≈ 0.072; 25yr @ 6% ≈ 0.077; 30yr @ 5% ≈ 0.0644; 30yr @ 7% ≈ 0.0799.",'Formula: Max Loan = NOI / (DSCR × Loan Constant). DSCR × constant is the "effective rate" the loan must support.',"At 1.25x DSCR, every $1 of NOI supports $0.80 of debt service. Then divide by constant to get loan amount.","IO shortcut: for interest-only loans, constant = rate. $500k NOI / (1.25 × 0.06) = $6.67M."],generate(e,t="intermediate"){const n=R(e,N.noi,t),r=t==="beginner"?e.pickFromSet([1.2,1.25,1.3]):R(e,N.dscrTarget,t),l=R(e,N.interestRate,t),o=t==="beginner"?30:e.pickInt(N.amortYears.min,N.amortYears.max),a=id({noi:n,dscrTarget:r,annualRate:l,years:o});return{id:z("dscr"),kind:"dscrLoanSizing",prompt:`NOI of ${x(n)} needs to cover a ${gd(r)} DSCR on a ${oe(o)} amortizing loan at ${k(l)}. What's the max loan?`,context:{noi:n,dscrTarget:r,interestRate:l,amortYears:o},expected:a,unit:"usd",tolerance:{type:"pct",band:.05},solution:_m(n,r,l,o)}}};function ys(e,t){return t/e}function yd(e,t,n){return Math.pow(t/e,1/n)-1}function Gl(e,t){return Math.pow(1+e,t)}function Fm(e,t){const n=ys(e,t);return{formula:"Equity Multiple = Equity Out / Equity In",steps:[{label:"Multiple",expression:`${x(t)} / ${x(e)}`,result:ge(n)}],answerDisplay:ge(n)}}const zm={kind:"equityMultiple",label:"Equity Multiple",description:"Equity in + equity out → EM.",category:"returns",pattern:"A / B   where A = out, B = in",tips:["EM = Out / In. Doesn't care about time — 2x in 1 year and 2x in 10 years both = 2.0x.","Divide by hundreds: $23M / $10M → 23/10 = 2.3x. $17.5M / $8M → 17.5/8 ≈ 2.19x.","Rule of thumb: institutional value-add deals target 1.7x–2.0x; opportunistic 2.0x+; core ~1.4x–1.6x.","Complement to IRR: EM shows absolute dollars back, IRR shows time-adjusted. Always look at both."],generate(e,t="intermediate"){const n=R(e,N.equityIn,t),r=R(e,N.irrExitMultiple,t),l=t==="beginner"?1e6:t==="advanced"?25e3:1e5,o=Math.round(n*r/l)*l,a=ys(n,o);return{id:z("em"),kind:"equityMultiple",prompt:`You invested ${x(n)} and received ${x(o)} at sale. What's the equity multiple?`,context:{equityIn:n,equityOut:o},expected:a,unit:"multiple",tolerance:{type:"pct",band:.05},solution:Fm(n,o)}}};function Bm(e,t){const n=hd(e,t);return{formula:"Going-in Cap = NOI / Purchase Price",steps:[{label:"Cap rate",expression:`${x(t)} / ${x(e)}`,result:`${k(n)}  (${ze(n)})`}],answerDisplay:ze(n)}}const Vm={kind:"goingInCap",label:"Going-in Cap Rate",description:"Price + NOI → cap rate in bps.",category:"valuation",pattern:"A / B   where A = NOI, B = price",tips:["Cap = NOI / Price. Inverse is the NOI multiple: 5% = 20x, 6% = 16.67x, 7% = 14.29x.","Mental shortcut: NOI / Price, round both to 2 sig figs first. $623k / $12.4M ≈ $620 / $12,400 ≈ 5.0%.","Sanity check: if price looks like ~20× NOI you're at 5%, ~15× → ~6.7%, ~10× → 10%.","Round both up or both down together — keeps the error directionally small. Rounding one up and one down stacks errors.","Sandwich: find the nearest clean multiples (e.g. 15× = 6.67%, 16× = 6.25%) and interpolate toward the actual ratio.","Convert cap to bps: 5.25% = 525 bps. Just shift the decimal two places."],generate(e,t="intermediate"){const n=R(e,N.capRate,t),r=R(e,N.noi,t),l=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(r/n/l)*l,a=hd(o,r),s=Math.round(a*1e4);return{id:z("giCap"),kind:"goingInCap",prompt:`Purchase price is ${x(o)} and NOI is ${x(r)}. What's the going-in cap rate (in bps)?`,context:{purchasePrice:o,noi:r},expected:s,unit:"bps",tolerance:{type:"abs",band:15},solution:Bm(o,r)}}};function Um(e,t){const n=e/t;return{formula:"GRM = Purchase Price / Annual Gross Potential Rent",steps:[{label:"GRM",expression:`${x(e)} / ${x(t)}`,result:ge(n,2)}],answerDisplay:ge(n,2)}}const Ym={kind:"grossRentMultiplier",label:"Gross Rent Multiplier",description:"Price / PGI — quick multifamily/retail benchmark.",category:"valuation",pattern:"A / B   where A = price, B = gross potential rent",tips:["GRM = Price / PGI. Multifamily typically trades 8–14× GRM; lower is cheaper.","Quick inversion: cap rate ≈ (1 − OpEx ratio) / GRM. 12× GRM with 40% OpEx ≈ 5% cap.","GRM ignores OpEx, so it's most useful when opex structure is consistent across comps.","Trap: high-OpEx assets look cheap by GRM but expensive by cap. Always cross-check."],generate(e,t="intermediate"){const n=R(e,N.gpr,t),r=R(e,{min:7,max:15,step:.5},t),l=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(n*r/l)*l,a=o/n;return{id:z("grm"),kind:"grossRentMultiplier",prompt:`Purchase price ${x(o)}, gross potential rent ${x(n)}. What's the GRM?`,context:{purchasePrice:o,gpr:n,pgi:n},expected:a,unit:"multiple",tolerance:{type:"pct",band:.05},solution:Um(o,n)}}};function Wm(e,t){const n=Kt(e,t);return{formula:"Loan Constant = annualized payment / loan (monthly amort)",steps:[{label:"Constant",expression:`${oe(t)} amort @ ${k(e)}`,result:`${k(n,2)}  (${ze(n)})`}],answerDisplay:ze(n)}}const Hm={kind:"loanConstant",label:"Loan Constant",description:"Annualized payment as % of loan for monthly-amortizing debt.",category:"returns",pattern:"PMT(r/12, n×12, −1) × 12   [amortization formula]",tips:["Memorize: 30yr @ 5% ≈ 644 bps; 30yr @ 6% ≈ 720 bps; 30yr @ 7% ≈ 799 bps; 25yr @ 6% ≈ 773 bps.","IO shortcut: loan constant = interest rate exactly (no principal paydown).","Rule of thumb: each +100 bps of rate adds ~60–80 bps to the constant on 30yr amort.","Longer amort → lower constant (but diminishing returns: 30y vs 25y only saves ~40 bps)."],generate(e,t="intermediate"){const n=R(e,N.interestRate,t),r=t==="beginner"?e.pickFromSet([25,30]):e.pickInt(N.amortYears.min,N.amortYears.max),l=Kt(n,r),o=Math.round(l*1e4);return{id:z("lc"),kind:"loanConstant",prompt:`What's the loan constant for a ${oe(r)} amortizing loan at ${k(n)} (in bps)?`,context:{interestRate:n,amortYears:r},expected:o,unit:"bps",tolerance:{type:"abs",band:15},solution:Wm(n,r)}}};function Qm(e,t){const n=e*t,r=md(e,t);return{formula:"NOI = EGI × (1 − OpEx Ratio)",steps:[{label:"OpEx",expression:`${x(e)} × ${k(t)}`,result:x(n)},{label:"NOI",expression:`${x(e)} − ${x(n)}`,result:x(r)}],answerDisplay:x(r)}}const Gm={kind:"noiFromOer",label:"NOI from OpEx Ratio",description:"Solve NOI given EGI and an OpEx ratio.",category:"valuation",pattern:"A × (1 − B)   where A = EGI, B = opex ratio",tips:["NOI = EGI × (1 − opex ratio). 40% opex ratio → NOI = 60% of EGI.","Shortcut: skip the subtraction — just multiply by the margin. $1M EGI × 60% margin = $600k NOI.","Combine with cap math: Value = EGI × (1 − opex) / cap. $1M × 60% / 6% = $10M in one shot.","Back out: if comps show $10M at 6% cap, implied NOI is $600k, implied EGI is $1M at 40% opex."],generate(e,t="intermediate"){const n=R(e,N.egi,t),r=e.pickFromSet([.25,.3,.35,.4,.45,.5]),l=md(n,r);return{id:z("noiFromOer"),kind:"noiFromOer",prompt:`EGI is ${x(n)} with an OpEx ratio of ${k(r)}. What's the NOI?`,context:{egi:n,opexRatioValue:r},expected:l,unit:"usd",tolerance:{type:"pct",band:.03},solution:Qm(n,r)}}};function qm(e,t){const n=fd(e,t);return{formula:"OpEx Ratio = OpEx / EGI",steps:[{label:"Ratio",expression:`${x(e)} / ${x(t)}`,result:k(n,1)}],answerDisplay:k(n,1)}}const Km={kind:"operatingExpenseRatio",label:"OpEx Ratio",description:"OpEx / EGI — what % of income goes to operating expenses.",category:"valuation",pattern:"A / B   where A = opex, B = EGI",tips:["Typical ranges — multifamily 30–40%, office 35–45%, retail 25–35%, industrial 15–25%, hotels 60%+.","A rising OpEx ratio with flat income is a red flag — margin compression.","Inverse: NOI margin = 1 − OpEx ratio. A 60% OpEx ratio means 40% of EGI drops to NOI.","Shortcut: divide both to 2 sig figs first. $425k / $1.12M ≈ $430 / $1,120 ≈ 38%."],generate(e,t="intermediate"){const n=R(e,N.egi,t),r=e.pickFromSet([.25,.3,.35,.4,.45,.5]),l=t==="beginner"?5e4:t==="advanced"?5e3:25e3,o=Math.round(n*r/l)*l,a=fd(o,n);return{id:z("oer"),kind:"operatingExpenseRatio",prompt:`EGI is ${x(n)} and operating expenses are ${x(o)}. What's the OpEx ratio?`,context:{egi:n,opex:o},expected:a,unit:"pct",tolerance:{type:"abs",band:.015},solution:qm(o,n)}}};function Xm(e,t){const n=En(e,t);return{formula:"OpEx/Unit = Total OpEx / Units",steps:[{label:"OpEx per unit",expression:`${x(e)} / ${t} units`,result:`${x(n)}/yr`}],answerDisplay:`${x(n)}/yr`}}const Zm={kind:"opexPerUnit",label:"OpEx per Unit (annual)",description:"Operating expense per unit per year.",category:"valuation",pattern:"A / B   where A = opex, B = units",tips:["Typical multifamily range: $4,500–$8,500/unit/yr. Hotels 3–5× higher.","Outliers point to market deviation — high-tax states, sub-metered utilities, age of plant.","Fixed + variable split: ~60% fixed (taxes, insurance, admin) / ~40% variable (utilities, repairs).","Shortcut: $600k opex / 100 units = $6,000/unit. Scale linearly."],generate(e,t="intermediate"){const n=R(e,N.units,t),r=R(e,N.opexPerUnitYear,t),l=t==="beginner"?5e4:t==="advanced"?2500:1e4,o=Math.round(n*r/l)*l,a=En(o,n);return{id:z("opu"),kind:"opexPerUnit",prompt:`A ${n}-unit property has ${x(o)} in annual operating expenses. What's the OpEx per unit per year?`,context:{opex:o,units:n},expected:a,unit:"usd",tolerance:{type:"pct",band:.05},solution:Xm(o,n)}}};function Jm(e,t){const n=En(e,t);return{formula:"Price/Unit = Purchase Price / Units",steps:[{label:"Price per unit",expression:`${x(e)} / ${t} units`,result:x(n)}],answerDisplay:x(n)}}const eh={kind:"pricePerUnit",label:"Price per Unit ($/door)",description:"Purchase price per unit (for multifamily, hotels).",category:"valuation",pattern:"A / B   where A = price, B = units",tips:["Primary multifamily benchmark metric alongside cap rate. Typical B-class ranges $150k–$350k/unit.","Coastal gateway markets push $400k+/unit; tertiary Sun Belt can be $100k–$180k.","Compare to replacement cost/unit to gauge if you're buying below new-build economics.","Shortcut: round both to 2 sig figs. $45M / 180 units → $45M / $180 → $250k/unit."],generate(e,t="intermediate"){const n=R(e,N.units,t),r=R(e,N.pricePerUnitValue,t),l=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(n*r/l)*l,a=En(o,n);return{id:z("ppu"),kind:"pricePerUnit",prompt:`A ${n}-unit property is under contract for ${x(o)}. What's the price per unit?`,context:{purchasePrice:o,units:n},expected:a,unit:"usd",tolerance:{type:"pct",band:.05},solution:Jm(o,n)}}};function th(e,t){const n=En(e,t);return{formula:"Rent/Unit = GPR / Units",steps:[{label:"Annual rent/unit",expression:`${x(e)} / ${t} units`,result:`${x(n)}/yr`},{label:"Monthly rent/unit",expression:`${x(n)} / 12`,result:`${x(n/12)}/mo`}],answerDisplay:`${x(n)}/yr`}}const nh={kind:"rentPerUnit",label:"Rent per Unit (annual)",description:"Gross potential rent per unit per year.",category:"valuation",pattern:"A / B   where A = GPR, B = units",tips:["Divide by 12 for monthly. $24k/yr = $2,000/mo. $18k/yr = $1,500/mo.","Market benchmark: compare to local comps — $1,500–$2,500/mo typical for B-class multifamily.","If rent/unit looks way below comps, there's mark-to-market upside. Above comps, risk of tenant loss.","Shortcut: round units to nearest 10 and GPR to nearest $100k first."],generate(e,t="intermediate"){const n=R(e,N.units,t),r=R(e,N.rentPerUnitYear,t),l=t==="beginner"?1e5:t==="advanced"?5e3:25e3,o=Math.round(n*r/l)*l,a=En(o,n);return{id:z("rpu"),kind:"rentPerUnit",prompt:`A ${n}-unit property has ${x(o)} in annual gross potential rent. What's the rent per unit per year?`,context:{gpr:o,units:n},expected:a,unit:"usd",tolerance:{type:"pct",band:.05},solution:th(o,n)}}};function rh(e,t){const n=pd(e,t);return{formula:"Exit Value = Year-N NOI / Exit Cap",steps:[{label:"Exit value",expression:`${x(e)} / ${k(t)}`,result:x(n)}],answerDisplay:x(n)}}const lh={kind:"reversionValue",label:"Reversion / Exit Value",description:"Sale price at exit given year-N NOI and exit cap.",category:"valuation",pattern:"A / B   where A = exit NOI, B = exit cap",tips:["Same math as going-in cap, just for the exit. Use the cap → multiple table.","Exit cap usually expands 25–75 bps vs going-in to reflect aging/obsolescence.","If your buy cap is 5% and exit cap is 5.5%, you lose (5/5.5 − 1) = −9.1% of value on that alone.","Shortcut: $1M NOI at 6% exit cap = $16.67M. Scale linearly with NOI."],generate(e,t="intermediate"){const n=R(e,N.noi,t),r=R(e,N.exitCapRate,t),l=e.pickInt(5,10),o=pd(n,r);return{id:z("rev"),kind:"reversionValue",prompt:`Year-${l} NOI is ${x(n)} and you're underwriting a ${k(r)} exit cap. What's the exit sale price?`,context:{stabilizedNoi:n,noi:n,exitCap:r,holdYears:l},expected:o,unit:"usd",tolerance:{type:"pct",band:.03},solution:rh(n,r)}}};function oh(e,t,n){const r=ys(e,t),l=yd(e,t,n);return{formula:"IRR = (Out / In)^(1 / years) − 1",steps:[{label:"Equity multiple",expression:`${x(t)} / ${x(e)}`,result:ge(r)},{label:"IRR",expression:`${ge(r)}^(1/${n}) − 1`,result:k(l)}],answerDisplay:k(l)}}const ah={kind:"irrSimple",label:"IRR — Simple",description:"Single-period IRR: equity in, equity out, hold years.",category:"returns",pattern:"(A / B)^(1/n) − 1   [nth root of multiple]",tips:["Rule of 72: years-to-double ≈ 72 / IRR%. 2x in 7 yrs ≈ 10.3% IRR. 2x in 5 yrs ≈ 14.4%. 2x in 10 yrs ≈ 7.2%.","Key anchors: 2.0x over 5y ≈ 14.9%; 2.0x over 7y ≈ 10.4%; 2.0x over 10y ≈ 7.2%; 2.5x over 5y ≈ 20.1%.","Anchor for 10y holds: IRR% × 10 years → EM roughly: 10% → 2.59x, 12% → 3.11x, 15% → 4.05x, 8% → 2.16x.","Sandwich: if EM is 2.2x over 6 years, bracket it — 2.0x over 6y is ~12.2%, 2.5x over 6y is ~16.5%. Interpolate → ~13.6% (actual 14.0%).","Floor approximation: EM ≥ 1 + (IRR × years). 10% × 10y → floor 2.0x; actual 2.59x. Gap is the compounding."],generate(e,t="intermediate"){const n=R(e,N.equityIn,t),r=R(e,N.irrExitMultiple,t),l=t==="beginner"?1e6:t==="advanced"?1e5:5e5,o=Math.round(n*r/l)*l,a=t==="beginner"?e.pickFromSet([5,7,10]):e.pickInt(N.holdYears.min,N.holdYears.max),s=yd(n,o,a);return{id:z("irr"),kind:"irrSimple",prompt:`You invest ${x(n)} and get ${x(o)} back after ${oe(a)}. What's the IRR (as a %)?`,context:{equityIn:n,equityOut:o,holdYears:a},expected:s,unit:"pct",tolerance:{type:"abs",band:.005},solution:oh(n,o,a)}}};function sh(e,t,n){const r=e-t,l=dd({unleveredIrr:e,borrowRate:t,ltv:n});return{formula:"Levered IRR ≈ Unlevered + (LTV × (Unlev − Borrow)) / (1 − LTV)",steps:[{label:"Spread",expression:`${k(e)} − ${k(t)}`,result:k(r,2)},{label:"Leverage multiplier",expression:`${k(n)} / (1 − ${k(n)})`,result:(n/(1-n)).toFixed(2)},{label:"Levered IRR (approx)",expression:`${k(e)} + ${k(r)} × ${(n/(1-n)).toFixed(2)}`,result:k(l,2)}],answerDisplay:k(l,2)}}const ih={kind:"leveredIrr",label:"Levered IRR (Approx)",description:"Approximate levered IRR from unlevered IRR, LTV, and borrow rate.",category:"returns",pattern:"A + (B × (A − C)) / (1 − B)   [unlev + leverage × spread]",tips:["Formula: Levered IRR ≈ Unlevered + LTV × (Unlev − Borrow) / (1 − LTV). Assumes parallel cash flows.","Leverage multiplier: LTV / (1 − LTV). At 60% LTV = 1.5x; at 70% = 2.33x; at 75% = 3x.","If unlevered IRR > borrow rate, leverage is accretive. If unlevered < borrow, leverage destroys returns.","Example: unlev 8%, borrow 5%, 60% LTV → 8% + 3% × 1.5 = 12.5%. Actual levered is usually within 100 bps of this estimate."],generate(e,t="intermediate"){const n=R(e,N.unleveredIrr,t),r=R(e,N.interestRate,t),l=R(e,N.ltv,t),o=dd({unleveredIrr:n,borrowRate:r,ltv:l});return{id:z("levIrr"),kind:"leveredIrr",prompt:`Unlevered IRR is ${k(n)} and you can borrow at ${k(r)} with ${k(l)} LTV. Approximately what's the levered IRR?`,context:{unleveredIrr:n,borrowRate:r,ltv:l},expected:o,unit:"pct",tolerance:{type:"abs",band:.01},solution:sh(n,r,l)}}};function wd(e){const t=e.leaseTermYears*12,n=e.grossRentPerSf*e.leaseTermYears,r=e.grossRentPerSf/12*e.freeMonths;return(n-e.tiPerSf-r)/t*12}function jl(e){return(e.rentPerSf*e.leaseTermYears-e.tiPerSf)/e.leaseTermYears}function kd(e){const t=jl({rentPerSf:e.rentA,tiPerSf:e.tiA,leaseTermYears:e.leaseTermYears}),n=jl({rentPerSf:e.rentB,tiPerSf:e.tiB,leaseTermYears:e.leaseTermYears});return t-n}function Sd(e){return e.tiPerSf/e.paybackYears}function Nd(e){return(e.newRentPerSf-e.oldRentPerSf)*e.subjectSf*(1-e.vacancy)}function Cd(e){return Nd(e)/e.capRate}function $d(e){return-(e.purchasePrice*e.newTaxRate-e.oldAnnualTax)/e.capRate}function uh(e){const t=e.years*12,n=e.grossRent/12*e.freeMonths,r=wd({grossRentPerSf:e.grossRent,leaseTermYears:e.years,tiPerSf:e.tiPerSf,freeMonths:e.freeMonths});return{formula:"NER = (Gross × Term − TI − Free Rent) / Term",steps:[{label:"Gross over term",expression:`${D(e.grossRent)} × ${oe(e.years)}`,result:D(e.grossRent*e.years)},{label:"Free rent /SF",expression:`${D(e.grossRent/12)} × ${e.freeMonths} months`,result:D(n)},{label:"NER",expression:`(${D(e.grossRent*e.years)} − ${D(e.tiPerSf)} − ${D(n)}) / ${t}mo × 12`,result:D(r)}],answerDisplay:D(r)}}const ch={kind:"netEffectiveRent",label:"Net Effective Rent",description:"Rent after spreading TI + free rent across the lease term.",category:"valuation",pattern:"A − B/n − (f × A / 12) / n   [face − TI/yr − freeRent/yr]",tips:["Annualize every concession. $15/SF TI over 5 years = $3/SF/yr. 3 months free on a $20 rent = $5/SF total = $1/SF/yr over 5y.","Shortcut: NER ≈ face rent − (TI ÷ term years) − (free months × face rent ÷ 12 ÷ term years).","NER drives cap-rate math — always underwrite to NER, not face rent.","Quick check: $20 face, $15 TI over 5y, 3 free months → $20 − $3 − $1 = $16/SF NER."],generate(e,t="intermediate"){const n=R(e,N.rentPerSf,t),r=e.pickInt(N.leaseTermYears.min,N.leaseTermYears.max),l=Math.max(5,n*1.2),o=R(e,{min:0,max:l,step:1},t),a=e.pickInt(N.freeMonths.min,N.freeMonths.max),s=wd({grossRentPerSf:n,leaseTermYears:r,tiPerSf:o,freeMonths:a}),u=(o>0?`${D(o)} in TI`:"no TI")+(a>0?` and ${a} month${a>1?"s":""} of free rent`:"");return{id:z("ner"),kind:"netEffectiveRent",prompt:`${oe(r)} lease at ${D(n)} face rent, with ${u}. What's the NER?`,context:{rentPerSf:n,leaseTermYears:r,tiPerSf:o,freeMonths:a},expected:s,unit:"usdPerSf",tolerance:{type:"pct",band:.03},solution:uh({grossRent:n,years:r,tiPerSf:o,freeMonths:a})}}};function dh(e,t,n){return{formula:"ΔNOI = −ΔOpEx;  ΔValue = ΔNOI / Cap",steps:[{label:"NOI change",expression:`−${x(Math.abs(e))}`,result:V(-e)},{label:"Value change",expression:`${V(-e)} / ${k(t)}`,result:V(n)}],answerDisplay:V(n)}}const ph={kind:"opexChange",label:"OpEx Change Impact",description:"OpEx $ change → NOI and value impact at given cap.",category:"valuation",pattern:"− A / B   where A = opex change, B = cap",tips:["OpEx moves NOI 1-for-1 (with a flipped sign): $50k more OpEx = $50k less NOI.","ΔValue = −ΔOpEx / cap. $50k OpEx lift @ 6% cap = −$50k × 16.67 ≈ −$833k value.","Sandwich at ugly caps: at 5.75% cap, the $1 of OpEx is worth between 16.7x (6%) and 18.2x (5.5%) — pick the midpoint for a fast gut estimate.",'An OpEx cut is the cheapest "yield play" in a deal — a $1 cut is worth 1/cap dollars of value.',`Be careful with "one-time" OpEx: if it's truly one-off it shouldn't get capped at all.`],generate(e,t="intermediate"){const n=e.pickFromSet(dt.opexMoves),r=e.pickFromSet([-1,1]),l=n*r,o=R(e,N.capRate,t),a=Cm({opexDelta:l,capRate:o}),s=r>0?"increases":"decreases";return{id:z("opex"),kind:"opexChange",prompt:`OpEx ${s} by ${x(n)} at a ${k(o)} cap. What's the $ change in value?`,context:{op
