hly doubles every 72/r% years. At 3% → 24 years; at 4% → 18; at 6% → 12.","Anchors: (1.03)^5 ≈ 1.159; (1.03)^10 ≈ 1.344; (1.05)^5 ≈ 1.276; (1.05)^10 ≈ 1.629.","Linear approx (floor): End ≥ Start × (1 + r × n). Actual is always higher due to compounding.","Sandwich: bracket with the two nearest round rates and interpolate (e.g. 2.75% sits between 2.5% and 3%)."],generate(e,t="intermediate",n="mixed"){const r=$(e,T.noi,t),a=$(e,T.growthRate,t),i=e.pickInt(T.projectionYears.min,T.projectionYears.max),o=ia(r,a,i);return{id:L("cg"),kind:"compoundGrowth",prompt:`A value of ${h(r)} grows at ${w(a,2)} per year for ${_(i)}. What's the end value?`,context:{startValue:r,growthRate:a,projectionYears:i},expected:o,unit:"usd",tolerance:{type:"pct",band:.03},solution:ig(r,a,i)}}};function lg(e,t){const n=Zp(e,t);return{formula:"Max Loan = NOI / Debt Yield",steps:[{label:"Max loan",expression:`${h(e)} / ${w(t)}`,result:h(n)}],answerDisplay:h(n)}}const cg={kind:"debtYield",label:"Debt Yield Loan Sizing",description:"Max loan given NOI and required debt yield.",category:"returns",roles:["acquisitions","mortgageUw"],pattern:"A / B   where A = NOI, B = required yield %",tips:["Debt yield is the lender-side cap rate: NOI / Loan. 9% DY = 11.1x NOI max loan; 10% DY = 10x NOI.","Inverse: Max Loan = NOI / required DY.","Lender check: if debt yield < 8%, most CMBS lenders pass — so 8% is a hard floor for stabilized deals.","Quick math: $800k NOI / 9% → think $800k × 11.11 = $8.89M. Or: $800 / 0.09 = ~$8,890 (shift decimals)."],generate(e,t="intermediate",n="mixed"){const r=$(e,T.noi,t),a=$(e,T.debtYieldTarget,t),i=Zp(r,a);return{id:L("dy"),kind:"debtYield",prompt:`NOI is ${h(r)}. Lender requires a ${w(a)} debt yield. What's the max loan?`,context:{noi:r,debtYieldTarget:a},expected:i,unit:"usd",tolerance:{type:"pct",band:.05},solution:lg(r,a)}}};function ug(e,t,n){const r=qs(e,t),a=Gp(r,n);return{formula:"Development Spread = YoC − Market Cap Rate",steps:[{label:"YoC",expression:`${h(e)} / ${ ver DS — the deal is "underwater" on a cash-flow basis.`],generate(e,t="intermediate",n="mixed"){const r=$(e,T.noi,t),a=t==="beginner"?e.pickRange(1.15,1.55,{step:.025}):t==="intermediate"?e.pickRange(1.05,1.55,{step:.025}):e.pickRange(.9,1.7,{step:.025}),i=r/a,o=mn(r,i);return{id:L("dscr_from"),kind:"dscrFromNoiAndDs",prompt:`NOI of ${h(r)}, annual debt service of ${h(i)}. What's the DSCR?`,context:{noi:r,debtServiceAnnual:i},expected:o,unit:"multiple",tolerance:{type:"pct",band:.03},solution:pg(r,i)}}};function om(e){return`${e.toFixed(2)}x`}function hg(e,t,n,r){const a=jt(n,r),i=e/t,o=Cl({noi:e,dscrTarget:t,annualRate:n,years:r});return{formula:"Max Loan = NOI / (DSCR × Loan Constant)",steps:[{label:"Loan constant",expression:`${_(r)} amort @ ${w(n)}`,result:w(a,2)},{label:"Max annual debt service",expression:`${h(e)} / ${om(t)}`,result:h(i)},{label:"Max loan",expression:`${h(i)} / ${w(a,2)}`,result:h(o)}],answerDisplay:h(o)}}const fg={kind:"dscrLoanSizing",label:"DSCR Loan Sizing",description:"Max loan given NOI, DSCR target, rate, and amort.",category:"returns",roles:["acquisitions","mortgageUw"],pattern:"A / (B × C)   where A = NOI, B = DSCR, C = loan constant",tips:["Loan constants to memorize — 30yr @ 6% ≈ 0.072; 25yr @ 6% ≈ 0.077; 30yr @ 5% ≈ 0.0644; 30yr @ 7% ≈ 0.0799.",'Formula: Max Loan = NOI / (DSCR × Loan Constant). DSCR × constant is the "effective rate" the loan must support.',"At 1.25x DSCR, every $1 of NOI supports $0.80 of debt service. Then divide by constant to get loan amount.","IO shortcut: for interest-only loans, constant = rate. $500k NOI / (1.25 × 0.06) = $6.67M."],generate(e,t="intermediate",n="mixed"){const r=$(e,T.noi,t),a=$(e,T.dscrTarget,t),i=$(e,T.interestRate,t),o=t==="beginner"?30:e.pickInt(T.amortYears.min,T.amortYears.max),l=Cl({noi:r,dscrTarget:a,annualRate:i,years:o});return{id:L("dscr"),kind:"dscrLoanSizing",prompt:`NOI of ${h(r)} needs to cover a ${om(a)} DSCR on a ${_(o)} amortizing loan at ${w(i)}. What's the max loan?`,con lier",description:"Price / PGI — quick multifamily/retail benchmark.",category:"valuation",roles:["acquisitions"],pattern:"A / B   where A = price, B = gross potential rent",tips:["GRM = Price / PGI. Multifamily typically trades 8–14× GRM; lower is cheaper.","Quick inversion: cap rate ≈ (1 − OpEx ratio) / GRM. 12× GRM with 40% OpEx ≈ 5% cap.","GRM ignores OpEx, so it's most useful when opex structure is consistent across comps.","Trap: high-OpEx assets look cheap by GRM but expensive by cap. Always cross-check."],generate(e,t="intermediate",n="mixed"){const r=$(e,T.gpr,t),a=$(e,{min:7,max:15,step:.5},t),i=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(r*a/i)*i,l=o/r;return{id:L("grm"),kind:"grossRentMultiplier",prompt:`Purchase price ${h(o)}, gross potential rent ${h(r)}. What's the GRM?`,context:{purchasePrice:o,gpr:r,pgi:r},expected:l,unit:"multiple",tolerance:{type:"pct",band:.05},solution:Mg(o,r)}}};function Ag(e,t){const n=jt(e,t);return{formula:"Loan Constant = annualized payment / loan (monthly amort)",steps:[{label:"Constant",expression:`${_(t)} amort @ ${w(e)}`,result:`${w(n,2)}  (${Oe(n)})`}],answerDisplay:Oe(n)}}const Eg={kind:"loanConstant",label:"Loan Constant",description:"Annualized payment as % of loan for monthly-amortizing debt.",category:"returns",roles:["acquisitions","mortgageUw"],pattern:"PMT(r/12, n×12, −1) × 12   [amortization formula]",tips:["Memorize: 30yr @ 5% ≈ 644 bps; 30yr @ 6% ≈ 720 bps; 30yr @ 7% ≈ 799 bps; 25yr @ 6% ≈ 773 bps.","IO shortcut: loan constant = interest rate exactly (no principal paydown).","Rule of thumb: each +100 bps of rate adds ~60–80 bps to the constant on 30yr amort.","Longer amort → lower constant (but diminishing returns: 30y vs 25y only saves ~40 bps)."],generate(e,t="intermediate",n="mixed"){const r=$(e,T.interestRate,t),a=t==="beginner"?e.pickFromSet([25,30]):e.pickInt(T.amortYears.min,T.amortYears.max),i=jt(r,a),o=Math.round(i*1e4);return{id:L("lc"),kind:"loanConstant",prompt:`What's the loan consta ongside cap rate. Typical B-class ranges $150k–$350k/unit.","Coastal gateway markets push $400k+/unit; tertiary Sun Belt can be $100k–$180k.","Compare to replacement cost/unit to gauge if you're buying below new-build economics.","Shortcut: round both to 2 sig figs. $45M / 180 units → $45M / $180 → $250k/unit."],generate(e,t="intermediate",n="mixed"){const r=$(e,X("units",n),t),a=$(e,X("pricePerUnitValue",n),t),i=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(r*a/i)*i,l=nr(o,r);return{id:L("ppu"),kind:"pricePerUnit",prompt:`A ${r}-unit property is under contract for ${h(o)}. What's the price per unit?`,context:{purchasePrice:o,units:r},expected:l,unit:"usd",tolerance:{type:"pct",band:.05},solution:Vg(o,r)}}};function Yg(e,t){const n=nr(e,t);return{formula:"Rent/Unit = GPR / Units",steps:[{label:"Annual rent/unit",expression:`${h(e)} / ${t} units`,result:`${h(n)}/yr`},{label:"Monthly rent/unit",expression:`${h(n)} / 12`,result:`${h(n/12)}/mo`}],answerDisplay:`${h(n)}/yr`}}const Ug={kind:"rentPerUnit",label:"Rent per Unit (annual)",description:"Gross potential rent per unit per year.",category:"valuation",roles:["acquisitions"],pattern:"A / B   where A = GPR, B = units",tips:["Divide by 12 for monthly. $24k/yr = $2,000/mo. $18k/yr = $1,500/mo.","Market benchmark: compare to local comps — $1,500–$2,500/mo typical for B-class multifamily.","If rent/unit looks way below comps, there's mark-to-market upside. Above comps, risk of tenant loss.","Shortcut: round units to nearest 10 and GPR to nearest $100k first."],generate(e,t="intermediate",n="mixed"){const r=$(e,X("units",n),t),a=$(e,X("rentPerUnitYear",n),t),i=t==="beginner"?1e5:t==="advanced"?5e3:25e3,o=Math.round(r*a/i)*i,l=nr(o,r);return{id:L("rpu"),kind:"rentPerUnit",prompt:`A ${r}-unit property has ${h(o)} in annual gross potential rent. What's the rent per unit per year?`,context:{gpr:o,units:r},expected:l,unit:"usd",tolerance:{type:"pct",band:.05},solution:Yg(o,r)}}};function qg(e,t){const n=nm(e,t);return{formula:"Exit Value = Year-N NOI / Exit Cap",steps:[{label:"Exit value",expression:`${h(e)} / ${w(t)}`,result:h(n)}],answerDisplay:h(n)}}const Wg={kind:"reversionValue",label:"Reversion / Exit Value",description:"Sale price at exit given year-N NOI and exit cap.",category:"valuation",roles:["acquisitions"],pattern:"A / B   where A = exit NOI, B = exit cap",tips:["Same math as going-in cap, just for the exit. Use the cap → multiple table.","Exit cap usually expands 25–75 bps vs going-in to reflect aging/obsolescence.","If your buy cap is 5% and exit cap is 5.5%, you lose (5/5.5 − 1) = −9.1% of value on that alone.","Shortcut: $1M NOI at 6% exit cap = $16.67M. Scale linearly with NOI."],generate(e,t="intermediate",n="mixed"){const r=$(e,T.noi,t),a=$(e,X("exitCapRate",n),t),i=e.pickInt(5,10),o=nm(r,a);return{id:L("rev"),kind:"reversionValue",prompt:`Year-${i} NOI is ${h(r)} and you're underwriting a ${w(a)} exit cap. What's the exit sale price?`,context:{stabilizedNoi:r,noi:r,exitCap:a,holdYears:i},expected:o,unit:"usd",tolerance:{type:"pct",band:.03},solution:qg(r,a)}}};function Gg(e,t,n){const r=$l(e,t),a=Il(e,t,n);return{formula:"IRR = (Out / In)^(1 / years) − 1",steps:[{label:"Equity multiple",expression:`${h(t)} / ${h(e)}`,result:H(r)},{label:"IRR",expression:`${H(r)}^(1/${n}) − 1`,result:w(a)}],answerDisplay:w(a)}}const Hg={kind:"irrSimple",label:"IRR — Simple",description:"Single-period IRR: equity in, equity out, hold years.",category:"returns",roles:["acquisitions","portfolioMgmt"],pattern:"(A / B)^(1/n) − 1   [nth root of multiple]",tips:["Rule of 72: years-to-double ≈ 72 / IRR%. 2x in 7 yrs ≈ 10.3% IRR. 2x in 5 yrs ≈ 14.4%. 2x in 10 yrs ≈ 7.2%.","Key anchors: 2.0x over 5y ≈ 14.9%; 2.0x over 7y ≈ 10.4%; 2.0x over 10y ≈ 7.2%; 2.5x over 5y ≈ 20.1%.","Anchor for 10y holds: IRR% × 10 years → EM roughly: 10% → 2.59x, 12% → 3.11x, 15% → 4.05x, 8% → 2.16x.","Sandwich: if EM is 2.2x over 6 years, bracket it — 2.0x over 6y is ~12.2%, 2.5x over 6y is ~16.5%. Interpolate → ~13.6% (actual 14.0%).","Floor approximation: EM ≥ 1 + (IRR × years). 10% × 10y → floor 2.0x; actual 2.59x. Gap is the compounding."],generate(e,t="intermediate",n="mixed"){const r=$(e,T.equityIn,t),a=$(e,T.irrExitMultiple,t),i=t==="beginner"?1e6:t==="advanced"?1e5:5e5,o=Math.round(r*a/i)*i,l=e.pickInt(T.holdYears.min,T.holdYears.max),c=Il(r,o,l);return{id:L("irr"),kind:"irrSimple",prompt:`You invest ${h(r)} and get ${h(o)} back after ${_(l)}. What's the IRR (as a %)?`,context:{equityIn:r,equityOut:o,holdYears:l},expected:c,unit:"pct",tolerance:{type:"abs",band:.005},solution:Gg(r,o,l)}}};function Qg(e,t,n){const r=e-t,a=tm({unleveredIrr:e,borrowRate:t,ltv:n});return{formula:"Levered IRR ≈ Unlevered + (LTV × (Unlev − Borrow)) / (1 − LTV)",steps:[{label:"Spread",expression:`${w(e)} − ${w(t)}`,result:w(r,2)},{label:"Leverage multiplier",expression:`${w(n)} / (1 − ${w(n)})`,result:(n/(1-n)).toFixed(2)},{label:"Levered IRR (approx)",expression:`${w(e)} + ${w(r)} × ${(n/(1-n)).toFixed(2)}`,result:w(a,2)}],answerDisplay:w(a,2)}}const Xg={kind:"leveredIrr",label:"Levered IRR (Approx)",description:"Approximate levered IRR from unlevered IRR, LTV, and borrow rate.",category:"returns",roles:["acquisitions","portfolioMgmt"],pattern:"A + (B × (A − C)) / (1 − B)   [unlev + leverage × spread]",tips:["Formula: Levered IRR ≈ Unlevered + LTV × (Unlev − Borrow) / (1 − LTV). Assumes parallel cash flows.","Leverage multiplier: LTV / (1 − LTV). At 60% LTV = 1.5x; at 70% = 2.33x; at 75% = 3x.","If unlevered IRR > borrow rate, leverage is accretive. If unlevered < borrow, leverage destroys returns.","Example: unlev 8%, borrow 5%, 60% LTV → 8% + 3% × 1.5 = 12.5%. Actual levered is usually within 100 bps of this estimate."],generate(e,t="intermediate",n="mixed"){const r=$(e,T.unleveredIrr,t),a=$(e,T.interestRate,t),i=$(e,T.ltv,t),o=tm({unleveredIrr:r,borrowRate:a,ltv:i});return{id:L("levIrr"),kind:"leveredIrr",prompt:`Unlevered IRR is ${w(r)} and you can borrow at ${w(a)} with ${w(i)} LTV. Approximately what's the levered IRR?`,context:{unleveredIrr:r,borrowRate:a,ltv:i},expected:o,unit:"pct",tolerance:{type:"abs",band:.01},solution:Qg(r,a,i)}}};function um(e){const t=e.leaseTermYears*12,n=e.grossRentPerSf*e.leaseTermYears,r=e.grossRentPerSf/12*e.freeMonths;return(n-e.tiPerSf-r)/t*12}function Xn(e){return(e.rentPerSf*e.leaseTermYears-e.tiPerSf)/e.leaseTermYears}function dm(e){const t=Xn({rentPerSf:e.rentA,tiPerSf:e.tiA,leaseTermYears:e.leaseTermYears}),n=Xn({rentPerSf:e.rentB,tiPerSf:e.tiB,leaseTermYears:e.leaseTermYears});return t-n}function pm(e){return e.tiPerSf/e.paybackYears}function mm(e){return(e.newRentPerSf-e.oldRentPerSf)*e.subjectSf*(1-e.vacancy)}function hm(e){return mm(e)/e.capRate}function fm(e){return-(e.purchasePrice*e.newTaxRate-e.oldAnnualTax)/e.capRate}function Kg(e){const t=e.years*12,n=e.grossRent/12*e.freeMonths,r=um({grossRentPerSf:e.grossRent,leaseTermYears:e.years,tiPerSf:e.tiPerSf,freeMonths:e.freeMonths});return{formula:"NER = (Gross × Term − TI − Free Rent) / Term",steps:[{label:"Gross over term",expression:`${O(e.grossRent)} × ${_(e.years)}`,result:O(e.grossRent*e.years)},{label:"Free rent /SF",expression:`${O(e.grossRent/12)} × ${e.freeMonths} months`,result:O(n)},{label:"NER",expression:`(${O(e.grossRent*e.years)} − ${O(e.tiPerSf)} − ${O(n)}) / ${t}mo × 12`,result:O(r)}],answerDisplay:O(r)}}const Zg={kind:"netEffectiveRent",label:"Net Effective Rent",description:"Rent after spreading TI + free rent across the lease term.",category:"valuation",roles:["acquisitions","assetManagement"],pattern:"A − B/n − (f × A / 12) / n   [face − TI/yr − freeRent/yr]",tips:["Annualize every concession. $15/SF TI over 5 years = $3/SF/yr. 3 months free on a $20 rent = $5/SF total = $1/SF/yr over 5y.","Shortcut: NER ≈ face rent − (TI ÷ term years) − (free months × face rent ÷ 12 ÷ term years).","NER drives cap-rate math — always underwrite to NER, not face rent.","Quick check: $20 face, $15 TI over 5y, 3 free months → $20 − $3 − $1 = $16/SF NER."],generate(e,t="intermediate",n="mixed"){const r=$(e,X("rentPerSf",n),t),a=e.pickInt(T.leaseTermYears.min,T.leaseTermYears.max),i=Math.max(5,r*1.2),o=$(e,{min:0,max:i,step:1},t),l=e.pickInt(T.freeMonths.min,T.freeMonths.max),c=um({grossRentPerSf:r,leaseTermYears:a,tiPerSf:o,freeMonths:l}),u=(o>0?`${O(o)} in TI`:"no TI")+(l>0?` and ${l} month${l>1?"s":""} of free rent`:"");return{id:L("ner"),kind:"netEffectiveRent",prompt:`${_(a)} lease at ${O(r)} face rent, with ${u}. What's the NER?`,context:{rentPerSf:r,leaseTermYears:a,tiPerSf:o,freeMonths:l},expected:c,unit:"usdPerSf",tolerance:{type:"pct",band:.03},solution:Kg({grossRent:r,years:a,tiPerSf:o,freeMonths:l})}}};function Jg(e,t,n){return{formula:"ΔNOI = −ΔOpEx;  ΔValue = ΔNOI / Cap",steps:[{label:"NOI change",expression:`−${h(Math.abs(e))}`,result:q(-e)},{label:"Value change",expression:`${q(-e)} / ${w(t)}`,result:q(n)}],answerDisplay:q(n)}}const ey={kind:"opexChange",label:"OpEx Change Impact",description:"OpEx $ change → NOI and value impact at given cap.",category:"valuation",roles:["acquisitions"],pattern:"− A / B   where A = opex change, B = cap",tips:["OpEx moves NOI 1-for-1 (with a flipped sign): $50k more OpEx = $50k less NOI.","ΔValue = −ΔOpEx / cap. $50k OpEx lift @ 6% cap = −$50k × 16.67 ≈ −$833k value.","Sandwich at ugly caps: at 5.75% cap, the $1 of OpEx is worth between 16.7x (6%) and 18.2x (5.5%) — pick the midpoint for a fast gut estimate.",'An OpEx cut is the cheapest "yield play" in a deal — a $1 cut is worth 1/cap dollars of value.',`Be careful with "one-time" OpEx: if it's truly one-off it shouldn't get capped at all.`],generate(e,t="intermediate",n="mixed"){const r=e.pickFromSet(Ut.opexMoves),a=e.pickFromSet([-1,1]),i=r*a,o=$(e,X("capRate",n),t),l=Jx({opexDelta:i,capRate:o}),c=a>0?"increases":"decreases";return{id:L("opex"),kind:"opexChange",prompt:`OpEx ${c} by ${h(r)} at a ${w(o)} cap. What's the $ change in value?`,context:{opex:i,capRate:o},expected:l,unit:"usdChange",tolerance:{type:"pct",band:.05},solution:Jg(i,o,l)}}};function ty(e,t,n,r){const a=e*(1-t);return{formula:"ΔValue = (ΔOther × (1 − Vacancy)) / Cap",steps:[{label:"NOI uplift",expression:`${h(e)} × (1 − ${w(t)})`,result:q(a)},{label:"Value uplift",expression:`${q(a)} / ${w(n)}`,result:q(r)}],answerDisplay:q(r)}}const ny={kind:"otherIncomeImpact",label:"Other Income Impact",description:"Adding other income → value uplift at given cap.",category:"valuation",roles:["acquisitions"],pattern:"A × (1 − B) / C   where A = income, B = vacancy, C = cap",tips:["$100k of other income at common caps: 5% → $2.0M, 6% → $1.67M, 7% → $1.43M, 8% → $1.25M.","If vacancy > 0, trim the uplift by (1 − vacancy). 5% vacancy trims the answer ~5%.","Mental shortcut: divide $ amount by cap %, then move decimal 2 places. $150k / 6 = $25k, × 100 = $2.5M (ignoring vacancy).","Sandwich technique: at an ugly cap like 5.35%, solve at 5% and 6% then average toward the closer cap. $100k: $2.0M (5%) and $1.67M (6%) → mid ≈ $1.83M at 5.5%; nudge to ~$1.87M for 5.35%.","Other income is often reviewed skeptically by buyers — reversion/exit cap may treat it differently."],generate(e,t="intermediate",n="mixed"){const r=$(e,T.otherIncomeDelta,t),a=e.pickFromSet(Ut.vacancySet),i=$(e,X("capRate",n),t),o=Zx({otherIncomeDelta:r,vacancyRate:a,capRate:i}),l=a===0?"no vacancy":`${w(a)} vacancy`;return{id:L("otherInc"),kind:"otherIncomeImpact",prompt:`Underwriting ${h(r)} of new other income at a ${w(i)} cap (${l}). What's the $ change in value?`,context:{otherIncome:r,vacancyRate:a,capRate:i},expected:o,unit:"usdChange",tolerance:{type:"pct",band:.05},solution:ty(r,a,i,o)}}};function ry(e,t){const n=qp(e,t);return{formula:"Price / SF = Purchase Price ÷ Building SF",steps:[{label:"$/SF",expression:`${h(e)} / ${ze(t)}`,result:O(n)}],answerDisplay:O(n)}}const ay={kind:"pricePerSf",label:"Price per SF",description:"Back-of-envelope comp sanity check.",category:"valuation",roles:["acquisitions"],pattern:"A / B   where A = price, B = sxs(Y,{className:"bg-copper/10 border-copper/40",children:[s.jsx("div",{className:"text-xs font-medium uppercase tracking-widest text-copper-ink",children:"Takeaway"}),s.jsx("p",{className:"editorial mt-2 text-base leading-relaxed text-warm-ink",children:e.def.takeaway})]}),s.jsxs("div",{className:"flex justify-center gap-3",children:[s.jsx(B,{variant:"secondary",onClick:n,children:"Pick another walkthrough"}),s.jsx(B,{onClick:t,children:"Run again"})]})]})}const o0=[{id:"pricing",label:"Pricing"},{id:"absorption",label:"Absorption"},{id:"risk",label:"Risk"},{id:"investment-thesis",label:"Investment thesis"},{id:"diagnostic",label:"Diagnostic"},{id:"lease-econ",label:"Lease economics"},{id:"comp-selection",label:"Comp selection"},{id:"sensitivity",label:"Sensitivity"}],l0={id:"cap-rate-divergence",title:"Why is this trading off-market?",category:"pricing",difficulty:"intermediate",roles:["acquisitions"],assetClass:"office",scenario:"A suburban office asset is being marketed at an 8.0% going-in cap rate. Recent trades in the submarket for similar vintage and quality have printed at 5.75–6.25%. Tenancy is single-tenant, investment-grade credit, but the lease has 14 months of remaining term. In-place rent is $24/SF; market rent for the submarket is $32–34/SF.",data:[{label:"Subject going-in cap",value:"8.0%"},{label:"Comp set range",value:"5.75–6.25%"},{label:"Remaining lease term",value:"14 months"},{label:"In-place / market rent",value:"$24 / $32–34/SF"}],question:"What most likely explains the cap-rate gap?",options:[{label:"Buyers are pricing in re-leasing risk and below-market rents — the going-in cap is on a soon-to-roll income stream that markets re-set higher.",isBest:!0,explanation:'Going-in cap rate is on in-place NOI. With <2 years of remaining term and rents 25–40% below market, the in-place income is effectively temporary. Sophisticated buyers underwrite to a trended NOI assuming downtime, TIs, and a market re-set, so the cap on Year 1 NOI looks "wide" but the levered IRR pencils to the comp set.'},{label:"The submarket has structurally weakened and comps are stale; 8% is the new market for this vintage.",isBest:!1,explanation:"Possible but unlikely if comps are recent and broad. A 175–225 bps gap on otherwise comparable product almost always reflects asset-specific risk (lease term, tenant, condition) rather than a sudden submarket re-rate that hasn't yet shown up in comps."},{label:"Investment-grade credit on a short remaining term means buyers are demanding extra yield for credit risk.",isBest:!1,explanation:"Backwards — IG credit *compresses* cap rates, not expands them, and short remaining term reduces the relevance of credit quality (the income stops mattering at expiry). The cap gap is driven by the lease being effectively expired, not by credit deterioration."},{label:"Cap rate methodology differs — the broker is quoting trailing while comps are forward.",isBest:!1,explanation:"Methodology differences rarely produce 200+ bps gaps in normalized markets. They can produce 25–50 bps. The far more economic explanation here is the in-place vs market rent gap and the lease rolling within the underwriting window."}],takeaway:'A wide going-in cap on an asset with comparable comps is almost always a signal about the income stream, not the building. Short-dated leases at below-market rents create the appearance of a "high cap" because Year 1 NOI is the wrong denominator. Underwrite to trended NOI and a market re-set, not to in-place.',tips:["Going-in cap = NOI₁ / Price. If NOI₁ is temporary, the cap is misleading.","Mark-to-market upside is priced into going-in cap as a discount.","Always check WALT (weighted average lease term) before treating in-place income as durable."]},c0={id:"absorption-timing",title:"How long until the market hits 95%?",category:"absorption",difficulty:"intermediate",roles:["acquisitions","development"],assetClass:"multifamily",scenario:"A multifamily submarket has 4,000 units in inventory and is currently 85% leased. Two new deliveries are coming online this quarter, adding 300 units to the inventory. Quarterly absorption has been running at 150 units, or roughly 50 units per month. Rents are stable; you're evaluating a deal that needs the submarket to reach 95% occupancy before stabilization.",data:[{label:"Existing inventory",value:"4,000 units"},{label:"Existing occupancy",value:"85%"},{label:"New deliveries",value:"+300 units"},{label:"Absorption pace",value:"50 units/month"},{label:"Target occupancy",value:"95%"}],question:"Roughly how long until the submarket reaches 95% leased?",options:[{label:"About 16 months — you need to absorb the existing vacancy plus the new deliveries to hit 95% on a 4,300-unit base.",isBest:!0,explanation:"New base: 4,300 units. Target leased at 95%: 4,085. Currently leased: 4,000 × 0.85 = 3,400. Net to absorb: 685 units ÷ 50/mo ≈ 13.7 months — but that assumes flat absorption. With 300 units delivering, the math is closer to 16 months once you account for the deliveries lengthening the lease-up tail. Reasonable analyst answer: 14–18 months."},{label:"About 12 months — current vacancy is 600 units and absorption is 50/mo.",isBest:!1,explanation:"Misses the deliveries. If you treat the base as 4,000 and ignore +300 new units, you'd say (4,000 − 3,400) ÷ 50 = 12 months. But the new deliveries change the denominator and add to the supply you must absorb. Underwriting at 12 months would systematically overestimate stabilization speed."},{label:"About 6 months — 50 units/mo absorption easily clears the 300 new units.",isBest:!1,explanation:"Confuses absorbing the new supply with reaching 95% occupancy of the combined base. Even if absorption only had to clear the 300 new units (it doesn't), the calculation ignores existing vacancy. The full denominator and the target % both matter."},{label:"It depends entirely on rent growth, which drives absorption.",isBest:!1,explanation:"Rent growth and absorption are linked but not identical. Absorption is observable directly from leasing velocity; rent growth is a separate variable. Given the prompt holds rents stable and gives an absorption pace, you should compute, not deflect."}],takeaway:"Stabilization timing has a clean formula: (target leased − current leased) ÷ absorption pace. The trap is using the wrong denominator when new deliveries are coming. Always recompute the inventory base before applying the target occupancy %.",tips:["Inventory base must include all deliveries within the underwriting horizon.","Quarterly absorption ÷ 3 = monthly; check both for sanity.","If absorption has been declining quarter-over-quarter, don't use the trailing pace flat."]},u0={id:"mark-to-market-upside",title:"How much upside is in the rent roll?",category:"pricing",difficulty:"beginner",roles:["acquisitions","assetManagement"],assetClass:"office",scenario:"You're underwriting an office acquisition. In-place rent is $24/SF on the major tenant; recent leasing in the building and submarket is signing at $32/SF. The major tenant's lease expires in 12 months and is widely expected to vacate (the broker has already begun marketing the space).",data:[{label:"In-place rent",value:"$24/SF"},{label:"Market rent",value:"$32/SF"},{label:"Lease expiry",value:"12 months"},{label:"Tenant retention probability",value:"Low"}],question:"What's the right way to price the upside?",options:[{label:"Roughly 33% rent uplift on rollover — but price the deal to trended NOI net of downtime, TIs, and concessions, not to the market-rent figure directly.",isBest:!0,explanation:"($32 − $24) / $24 = 33% uplift. That's the gross arithmetic. The economic answer reduces it: 6–9 months downtime, $50–75/SF in TIs, several months of free rent — call it $25–40/SF in re-leasing costs against the uplift. Sophisticated underwriting trends to a stabilized NOI that captures the uplift *and* the cost of getting there."},{label:"Price at $32/SF rent immediately on Day 1 — the lease is rolling and the market clears at $32.",isBest:!1,explanation:'Ignores downtime, TIs, and free rent. Even in a hot market, vacancy between leases plus ~6 months of free rent plus $50+/SF in TIs can erase 1–2 years of the uplift. "$32 from Day 1" overstates the value.'},{label:"There's no real upside — rent rollovers usually trade at a premium that the seller has already priced in.",isBest:!1,explanation:"This conflates pricing efficiency with the existence of upside. The upside exists; the question is who captures it. If the seller has priced perfectly, the buyer's IRR equals required return — but the underwriting still needs to model the rollover, not skip it."},{label:"Price at the in-place rent of $24/SF and treat the market rent as conservative downside.",isBest:!1,explanation:"Inverts the upside/downside framework. In-place rent is what the asset earns *today*; market rent is what it will earn after rollover. Pricing at in-place ignores the rollover entirely and would systematically overpay relative to other buyers who underwrite trended NOI."}],takeaway:'Mark-to-market upside is real but never "free". Always net out re-leasing costs (downtime + TI + free rent) before treating the rent uplift as cash flow. The right anchor is trended stabilized NOI, not in-place and not market-rent-from-day-one.',tips:["Rule of thumb: re-leasing costs are 6–18 months of the new gross rent.","Mark-to-market % = (market − in-place) / in-place.","Apply uplift only to the SF actually rolling — most rent rolls have staggered expirations."]},d0={id:"noi-growth-smell-test",title:"Does this NOI growth assumption hold up?",category:"diagnostic",difficulty:"intermediate",roles:["assetManagement","mortgageUw"],assetClass:"multifamily",scenario:"A broker's offering memorandum on a stabilized garden-style multifamily asset shows 8.0% annual NOI growth in years 1–5 of the proforma. The submarket has averaged 2.5–3.0% rent growth historically, with a recent peak of ~5% during the 2021 spike. Property is 95% occupied, leased to market, no value-add story, no upcoming reassessment.",data:[{label:"Proforma NOI growth",value:"8%/yr"},{label:"Historical rent growth",value:"2.5–3.0%"},{label:"Recent peak (2021)",value:"~5%"},{label:"Occupancy",value:"95% (stabilized)"},{label:"Value-add component",value:"None disclosed"}],question:"How should you respond to this NOI growth assumption?",options:[{label:"Reject it and re-underwrite at 3–4%/yr — 8% on a stabilized asset with no value-add lever is roughly 2× any defensible long-run pace.",isBest:!0,explanation:"NOI growth on a stabilized rent-roll equals roughly (rent growth × leased %) − opex growth. At 3% rent growth and 3–4% opex growth, real NOI growth is closer to 2–3%. 8% requires either rent growth at 2× historical norms, opex contraction (not a thing), or a value-add story the OM didn't disclose. Anchor at 3–4% and ask the broker what they're seeing that you're not."},{label:"Accept it but discount the exit cap to compensate.",isBest:!1,explanation:"Two wrongs don't cancel — using an inflated NOI ramp with a wider exit cap obscures the underwriting. The correct move is to fix the inputs, not to mask aggressive growth with a punitive cap. You'll lose to bidders who underwrite cleanly and price-in a tighter exit cap on real growth."},{label:"Trust the broker — they have submarket data you don't.",isBest:!1,explanation:`Brokers are advocates for the seller. Their job is to support the highest defensible price; "trust" is not an underwriting input. Verify with public REIS / CoStar / submarket reports and the property's own historical financials. If they have a real story, they'll show you the data.`},{label:"It's within range — 8% is achievable in inflationary environments.",isBest:!1,explanation:"Historical multifamily NOI growth has rarely sustained at 8% even in inflationary environments — and the 2021 spike was unique to severe supply imbalance. Treating it as a reasonable base case for a 5-year hold puts the proforma well outside historical experience."}],takeaway:"NOI growth assumptions on stabilized assets should anchor to long-run rent growth minus opex growth. Anything 2×+ historical norms requires a *specific*, *named*, *quantifiable* lever — value-add, mark-to-market, expense recovery — or it's aspirational. Your job is to find that lever or push back.",tips:["Real-NOI-growth ≈ rent-growth × leased% − opex-growth.","Multifamily long-run NOI growth: 2–3% in typical markets.","If the OM's growth ramp doesn't name the lever, ask. If they can't name it, fix the input."]},p0={id:"comp-set-vetting",title:"Which comps belong in this set?",category:"comp-selection",difficulty:"beginner",roles:["acquisitions"],assetClass:"industrial",scenario:"You're pricing a 200,000 SF Class-B industrial asset in a major distribution submarket. The broker provides 5 trade comps to support pricing. You need to vet each before averaging the cap rates.",data:[{label:"Comp 1",value:"Same submarket, traded 4 mos ago, similar size — 6.0% cap"},{label:"Comp 2",value:"Different submarket (50 mi away), traded 6 mos ago — 5.25% cap"},{label:"Comp 3",value:"Same submarket, traded 18 mos ago (pre-rate-hike) — 4.5% cap"},{label:"Comp 4",value:"Same submarket, traded 2 mos ago, smaller (75k SF) — 6.25% cap"},{label:"Comp 5",value:"Same submarket, traded 8 mos ago, similar size — 5.85% cap"}],question:"How should you treat the comp set?",options:[{label:"Discard Comp 2 (different submarket) and Comp 3 (different rate environment); use Comps 1, 4, and 5 — average ~6.0% with a small adjustment for Comp 4's smaller size.",isBest:!0,explanation:"Comp 2 is a different geography, so the cap reflects a different supply/demand profile. Comp 3 traded under materially different cost-of-capital — 18 months ago Treasuries were 200+ bps lower, so the 4.5% cap is irrelevant to today's pricing. Comps 1, 4, 5 are recent, same submarket, comparable product. Comp 4's smaller size warrants a small upward cap adjustment (smaller = thinner buyer pool = wider cap)."},{label:"Average all 5 caps and use the result — that's why the broker provided 5.",isBest:!1,explanation:"Averaging unfiltered comps gives 5.6%, ~40 bps tighter than the defensible answer. The off-submarket and stale comps drag the average artificially low. A bid built on this number would lose discipline; a bid built on 6.0% would either win at fair value or lose to someone underwriting cleanly."},{label:'Discard everything except Comp 1 — only one comp is truly "same vintage, same submarket, recent".',isBest:!1,explanation:`A sample size of 1 is too thin to support pricing. Comps 4 and 5 are usable with minor adjustments (size, time). The principle isn't "perfect comps only" — it's "comps where you can defend the bridge from observed price to subject price". 3 reasonable comps beats 1 perfect comp.`},{label:"Trust the broker's sourcing — they would have filtered out bad comps already.",isBest:!1,explanation:"The broker's incentive is to support the highest defensible price. Comps that pull the cap tighter (like the 4.5% pre-rate-hike trade) are more likely to be included even when they shouldn't be. Vetting comps yourself is a core part of acquisition diligence, not a redundancy."}],takeaway:"Comp filtering protects the cap rate anchor. Any comp older than ~12 months in a moving rate environment, or any comp from a different submarket, deserves a discard or a documented adjustment. The remaining 3 should be enough; if not, you don't have enough data to support a tight pricing recommendation — which is itself a useful conclusion.",tips:["Discard rule of thumb: >12 mos in a moving rate environment, or different submarket.","Smaller assets generally trade at wider caps (thinner buyer pool).","If you have <3 defensible comps, widen the pricing range and say so."]},m0={id:"tax-reassessment-surprise",title:"What does the reassessment do to your bid?",category:"risk",difficulty:"advanced",roles:["acquisitions","mortgageUw"],assetClass:"multifamily",scenario:"You're bidding $50M for a stabilized multifamily asset in a jurisdiction that reassesses property tax on sale. The seller has owned for 12 years; current annual property tax is $200,000 (effectively ~0.4% of your bid price). The jurisdiction's post-sale assessment rate is 1.25% of sale price.",data:[{label:"Bid price",value:"$50M"},{label:"Current tax bill",value:"$200,000"},{label:"Reassessment rate",value:"1.25% of sale price"},{label:"Going-in cap (pre-reassessment)",value:"5.0%"}],question:"How should you handle the reassessment?",options:[{label:"Reduce NOI by ~$425k and price the deal off the post-reassessment NOI — at a 5% cap, that's ~$8.5M of value, so either bid $41–42M or accept a wider going-in cap on the same NOI.",isBest:!0,explanation:"Post-sale tax: $50M × 1.25% = $625k. NOI hit: $625k − $200k = $425k. Value impact at 5% cap: $425k / 0.05 = $8.5M. The seller's in-place NOI uses the legacy tax bill; your stabilized NOI must reflect the new bill. Either lower the bid to compensate or push the going-in cap from 5.0% to ~5.85% on the as-marketed NOI to back into the same value."},{label:"Use the seller's tax bill in your underwriting — that's what shows up in the financials.",isBest:!1,explanation:"Will systematically overpay by ~$8.5M. The legacy tax bill applies to the seller; the moment the deed transfers, the assessor re-prices and your tax bill jumps. Underwriting at the legacy figure is one of the most common mistakes in jurisdictions with sale-triggered reassessment."},{label:"Phase in the reassessment over 3 years to smooth the impact.",isBest:!1,explanation:"Most jurisdictions don't phase in reassessment — the new bill hits in the next tax year (sometimes the same year). Even where phasing exists, your IRR underwriting must include the full burden by the time you exit. Smoothing the input understates the cost."},{label:"Reassessment is a wash because the cap rate already reflects the tax environment.",isBest:!1,explanation:"The cap rate reflects the tax environment of *comparable trades*, not your specific reassessment trigger. Comp caps are inputs to pricing; the post-sale tax is a separate, additive cost you bear regardless of where the comp set traded. They don't cancel."}],takeaway:"In jurisdictions with sale-triggered reassessment, the post-sale tax bill is part of the bid price. Always compute (bid × reassessment rate) − (current tax) and run the value impact at your cap rate. Bidding off the seller's NOI is the single most expensive avoidable mistake in these markets.",tips:["Common reassessment-on-sale jurisdictions: California (Prop 13), Florida, Texas (varies).","Value impact ≈ (post-sale tax − current tax) / cap rate.","If the reassessment is uncertain, get a tax-consultant quote *before* bidding."]},h0={id:"rent-roll-undervalued",title:"Why does this rent roll look like a bargain?",category:"pricing",difficulty:"intermediate",roles:["acquisitions","assetManagement"],assetClass:"multifamily",scenario:"A multifamily portfolio has a weighted average remaining lease term of 7 years on its anchor leases (commercial ground-floor) with annual bumps of 1.0%. The submarket has been growing rents at ~4% per year for the past 5 years. Residential units (95% of NRSF) are on standard 12-month leases at market. The deal is being marketed at a 5.75% cap, in line with comps.",data:[{label:"Anchor lease remaining",value:"7 years"},{label:"Anchor annual bumps",value:"1.0%"},{label:"Submarket rent growth",value:"~4%/yr"},{label:"Residential leases",value:"12-month, at market"},{label:"Going-in cap",value:"5.75% (comp-line)"}],question:"What's the most defensible read on the upside?",options:[{label:"Real upside is the anchor leases — 1% vs 4% market growth compounds into a ~20%+ rent gap by year 7. Residential is at market and won't drive outsized growth.",isBest:!0,explanation:"Compounding: (1.04/1.01)^7 − 1 ≈ 22%. The anchor leases are systematically falling behind market by ~3% per year. By rollover, you can reset to a market that's 20%+ above the lease bump trajectory. Residential is mark-to-market on every renewal so the gap doesn't accumulate there."},{label:"Real upside is residential — a 12-month lease term means you can push rents quickly.",isBest:!1,explanation:"Residential is *already* at market. Pushing rents faster than market growth is fighting the comp set, not capturing latent value. The 12-month structure means you participate in market growth, which is roughly the cap rate spread to risk-free already priced into the deal."},{label:"There's no obvious upside — comps are at 5.75% and the deal is at 5.75%. Pricing is efficient.",isBest:!1,explanation:"Pricing parity at the cap level doesn't mean upside parity. The going-in cap reflects in-place income; the upside is in the *trajectory* of that income. Compare two assets at the same 5.75%: one has anchor leases below market, one doesn't — the first one has materially better trended NOI growth."},{label:"The 1% anchor bumps are a red flag — those tenants negotiated a below-market deal that signals weak demand.",isBest:!1,explanation:'Inverts the cause and effect. 1% bumps were negotiated when market rent growth was much lower; they reflect the original landlord accepting structural underwriting, not weak tenant credit or demand. The "below market" is now an artifact of growth running ahead of the bump schedule, which is the upside.'}],takeaway:"A bumps-vs-growth gap is one of the cleanest upside structures in CRE. (1 + market) / (1 + bumps) compounds — the longer the remaining term, the bigger the gap at rollover. The trick is to model trended NOI to lease expiry, not just to apply a flat 4% to all rent.",tips:["Cumulative gap ≈ (1 + market) / (1 + bumps) − 1, compounded over remaining term.",'Watch for "below-market" markers in OMs that mean opposite things in different markets.',"The longer the remaining term + the wider the bumps-vs-market gap, the larger the latent uplift."]},f0={id:"ti-vs-rent-giveback",title:"Should you give the TI or the rent break?",category:"lease-econ",difficulty:"intermediate",roles:["assetManagement","acquisitions"],assetClass:"office",scenario:"A prospective tenant wants to sign a 5-year lease at $20/SF face rent. Comparable space in the building has been signing at the same face rent with $20/SF in TIs. The new prospect is asking for $30/SF in TIs instead. They've indicated they'd also consider a rent reduction in lieu of the extra TI dollars.",data:[{label:"Face rent",value:"$20/SF"},{label:"Lease term",value:"5 years"},{label:"Comp TI",value:"$20/SF"},{label:"Requested TI",value:"$30/SF"},{label:"Annual discount rate",value:"7%"}],question:"How should you analyze the tenant's ask?",options:[{label:"Convert both to NER and compare. $30/SF TI on a 5-year deal is worth roughly $2/SF/yr of rent give-back — so the equivalent rent is ~$18/SF face, or NER ~$14/SF after the comp $20/SF TI baseline.",isBest:!0,explanation:"Total TI delta: $30 − $20 = $10/SF extra. Amortized over 5 yrs at 7%: ~$2.44/SF/yr. So the deal economics match a $20 face / $30 TI structure with NER ≈ $20 − ($30/5) = $14/SF, vs the comp $20 face / $20 TI at NER ≈ $20 − ($20/5) = $16/SF. The tenant is asking for a 200 bps NER reduction; that's the negotiation, framed correctly."},{label:"Refuse the extra TI — face rent must stay at comp level for valuation purposes.",isBest:!1,explanation:"Treating face rent as inviolate misses the economics. Buyers and appraisers underwrite NER; sophisticated counterparts will recognize $20/SF face on $30 TI as economically equivalent to a lower face rent. Holding the line on face while caving on TI gives you the worst of both — concession economics with the appearance of premium pricing."},{label:"Give the TI rather than reduce rent — TIs are capitalized, rent reductions hit NOI directly.",isBest:!1,explanation:"Plausible-sounding but wrong as a general rule. Both flow through to value: TIs reduce equity (or proceeds) at signing; rent reductions reduce NOI permanently. The economic equivalence is what the NER analysis is for. Picking one over the other on accounting grounds without comparing economics is sloppy."},{label:"Give the rent reduction instead — the tenant's spending the TI on something they'd build anyway, so a rent break is a real concession.",isBest:!1,explanation:"Conflates whether the tenant *values* the TI with whether the *landlord* should pay for it. From the landlord's perspective, $X of TI and $X/N of rent reduction (where N = lease term) are economically equivalent. Whether the tenant happens to like one form or another is part of the negotiation, but doesn't change the cost."}],takeaway:"TI vs rent reduction is the single most common landlord-side negotiation. Always reduce both forms of concession to a single comparable: net effective rent. NER = face rent − (TI + free rent + LCs) / lease term, optionally discounted. Anything else is anchoring on the wrong number.",tips:["NER ≈ face rent − total concessions / term (simple); discount for time value if precise.","$1/SF of TI ≈ $0.20/SF/yr of rent on a 5-yr deal, $0.12/SF/yr on 8-yr, $0.10/SF/yr on 10-yr.","Always quote NER in comp tables — face rent without concessions is misleading."]},x0={id:"refi-vs-sell",title:"Refinance or sell?",category:"investment-thesis",difficulty:"advanced",roles:["assetManagement","portfolioMgmt"],assetClass:"mixed",scenario:"You're three years into a five-year hold on a stabilized industrial asset. You've modeled two paths to year-5 close-out: (a) hold + refi at year 3 to a 60% LTV loan, distribute proceeds, and sell at year 5; (b) sell now and redeploy into a similar deal at current pricing. The IRR on both paths is materially identical (~14.5%) on the model.",data:[{label:"Hold remaining",value:"2 years"},{label:"Refi LTV",value:"60%"},{label:"Both-path IRR",value:"~14.5%"},{label:"Asset stability",value:"Stable, no value-add left"}],question:"How should you decide between the two paths?",options:[{label:`"It depends" — IRR equality leaves the decision to taxes, reinvestment risk on the proceeds, and LP preferences. Run the after-tax distributions and compare against your fund's required return on redeployed capital.`,isBest:!0,explanation:"When two paths have identical IRR, the IRR isn't the deciding factor. Sell-now triggers depreciation recapture and (depending on structure) capital gains; refi defers tax. The proceeds in path (b) need a place to land — if your reinvestment opportunity set requires a 14%+ deal at current pricing, redeployment risk is real. Refi extracts capital while keeping the underlying asset working. Path (a) tends to win for tax-sensitive LPs and uncertain redeployment markets."},{label:"Sell — same IRR, but liquidity is preferable to lock-in.",isBest:!1,explanation:"Treats liquidity as free. Selling generates a tax event you don't need to trigger and creates a redeployment problem. Liquidity is valuable when there's a use for it; without one, accelerated taxes + reinvestment risk + transaction costs make selling the worse choice."},{label:"Refinance — extracting capital while keeping the upside is always preferable when IRR matches.",isBest:!1,explanation:'Half-right but stated too strongly. Refi can be the right choice for the reasons given, but "always" ignores the cases where the asset is past its peak (cap rate expansion expected) or the loan-sizing markets are punishing (rates spiked, refi hurts cash-on-cash). Decision is conditional, not categorical.'},{label:"Run the analysis longer — 14.5% on both paths means you're missing something in the model.",isBest:!1,explanation:'IRR equality across well-built models is normal, not a flag. Time the cash flows carefully and you frequently get within 50 bps. The right question is what *non-IRR* factors should drive the decision, which is the "it depends" framing.'}],takeaway:"When IRR is a tie, the decision moves to tax treatment and reinvestment economics. Refis are typically more tax-efficient and remove redeployment risk; sales lock in returns and free up capital. Neither is universally right — the answer depends on the LP's tax position, the fund's remaining deployment capacity, and the market for re-up deals.",tips:["Always run after-tax IRR for refi-vs-sell decisions — pre-tax can mask big differences.","Refi proceeds keep the depreciation schedule running; sales reset it.",`If you can't name 2+ deals you'd redeploy into, "sell" is harder to justify.`]},g0={id:"going-in-vs-exit-cap-spread",title:"Is your exit cap conservative enough?",category:"sensitivity",difficulty:"intermediate",roles:["acquisitions"],assetClass:"mixed",scenario:`You're underwriting a 5-year hold at a 5.0% going-in cap rate. Your model uses a 6.0% exit cap — 100 bps of cap expansion. The deal otherwise pencils to a 14% IRR. A senior reviewer pushes back: "Why 100 bps? Why not 75 or 125?" The submarket has seen cap rates trade in a tight band over the past 10 years (4.75–5.50%) outside of brief stress periods.`,data:[{label:"Going-in cap",value:"5.0%"},{label:"Modeled exit cap",value:"6.0% (+100 bps)"},{label:"Hold period",value:"5 years"},{label:"Modeled IRR",value:"14%"},{label:"10-yr submarket cap range",value:"4.75–5.50%"}],question:"How do you defend the 100 bps spread?",options:[{label:"100 bps is a reasonable conservative anchor — it expands the cap by ~20% off the going-in level, which absorbs most realistic mean-reversion scenarios over a 5-7 year hold without being so punitive that the deal is impossible to win.",isBest:!0,explanation:`Industry convention for stable assets: 50–100 bps cap expansion over a 5-7 year hold. 100 bps is the upper end of "conservative-but-not-punitive". It puts the exit at 6%, which is outside the trailing 10-year range — so you're modeling an exit harder than anything observed in the past decade. If the deal pencils on that, you have margin. Sub-50 bps is aggressive for stabilized; >150 bps is recession underwriting.`},{label:"Use 0 bps spread — flat caps. The historical range supports it.",isBest:!1,explanation:"Aggressive. Using the going-in cap as the exit cap embeds an assumption that the cap rate environment 5 years from now matches today's. That happens, but it's not the conservative case. Bidders using 0 bps spread will always win deals — until the rate environment moves and they take the loss. The 10-year band tells you what *has been*; conservative underwriting models what *could be*."},{label:"Use 200 bps spread — always assume rate stress on exit.",isBest:!1,explanation:"Punitive. 200 bps cap expansion takes a 5% to a 7% — that's recession-grade pricing for a stabilized industrial asset. You'll never win a deal at that underwriting; if the model only pencils to 200 bps spread, the deal is in trouble already. Conservative ≠ pessimistic; conservative means absorbs realistic downside without modeling the worst case."},{label:"Match the spread to the going-in IRR — the higher the IRR, the more cap expansion you can absorb.",isBest:!1,explanation:'Inverts the discipline. The spread is an underwriting input that *protects* against an unfavorable exit; tying it to the IRR creates a feedback loop where aggressive deals get aggressive spreads. The spread should be set by hold period, asset stability, and the rate environment — not by how much "room" the deal has.'}],takeaway:'Exit cap spread is a stability test, not a knob to flex deal IRRs. Standard convention for stabilized 5-7 year holds is 50-100 bps; under that is aggressive, over 150 bps is recession underwriting. The right number is "the worst plausible cap environment" not "what makes the deal pencil".',tips:["Stabilized 5-7 yr holds: 50-100 bps spread is industry standard.","10+ year holds or value-add: 100-150 bps is more defensible.","If the deal only pencils at <50 bps spread, it's a thin underwrite."]},y0={id:"vacancy-spike",title:"A 15-point vacancy spike — what now?",category:"diagnostic",difficulty:"intermediate",roles:["assetManagement"],assetClass:"office",scenario:`A 200,000 SF Class-A office building has run at 95%+ occupancy for the past four years. In the most recent quarter, occupancy dropped from 95% to 80% — a 15-point swing. The seller's broker is marketing this as a "temporary leasing opportunity" at the same pricing as a year ago. You're being asked to bid this week.`,data:[{label:"Building size",value:"200,000 SF"},{label:"Prior occupancy",value:"95%+ (4 yrs)"},{label:"Current occupancy",value:"80%"},{label:"Time elapsed",value:"1 quarter"},{label:"Pricing pressure",value:"Same as 12 mos ago"}],question:"Before bidding, what's the single most important diagnostic question?",options:[{label:"Was this a single-tenant move-out or a market-wide deterioration? The price implications are completely different — single-tenant is a re-leasing problem; market-wide is a cap-rate problem.",isBest:!0,explanation:"15 points = 30,000 SF. If that's one large tenant rolling, you have a real but bounded re-leasing event: known TI cost, known downtime, similar future tenants likely available. If it's 4-5 smaller tenants leaving simultaneously, the diagnosis is fundamentally different — the building or submarket is losing demand and the cap rate environment for this asset has shifted. Same observed vacancy; entirely different underwriting."},{label:'How much of the vacancy is leased to LOI tenants? If 30%+, the spike is "paper" not real.',isBest:!1,explanation:"Useful but not the most important diagnostic. LOI conversion is the *next* question after you've established whether the underlying demand environment is healthy. An 80% leased / 10% LOI building is meaningfully different in a healthy market vs. a deteriorating one."},{label:"Are concessions running ahead of historical levels in the submarket?",isBest:!1,explanation:"Important context but secondary. Concession trends tell you about pricing discipline; the move-out vs market-wide question tells you about demand structure. You can re-lease at lower NER even in a healthy market; you can't re-lease at any price in a deteriorating one."},{label:"What's the WALT on the remaining 80% of the rent roll?",isBest:!1,explanation:"Always relevant but doesn't address the cause of the spike. WALT tells you about future risk; the diagnostic question is about the *current* spike — its cause determines whether the price should hold or move."}],takeaway:"Same observed vacancy can mean very different things depending on cause. Always trace a spike to the *who* — single tenant vs many — before underwriting. A single-tenant rollover is a TI / downtime / re-leasing problem with a known cost; a multi-tenant departure is a structural demand signal that should reset your cap rate, your trended NOI, and your hold thesis.",tips:["Pull the rent roll and trace each vacated suite to a tenant name.",'15-point swing in one quarter without a known driver is a "stop the line" signal — push the bid date.',"Submarket vacancy / absorption data tells you market-wide vs asset-specific."]},v0={id:"tenant-credit-pricing",title:"How much should credit compress the cap?",category:"pricing",difficulty:"advanced",roles:["acquisitions","mortgageUw"],assetClass:"industrial",scenario:"You're bidding on a single-tenant industrial distribution asset. The tenant is investment-grade rated (BBB+ from S&P), occupies 100% of the building, and has a 15-year remaining lease term with 2.5% annual escalations. Comparable trades for spec-grade or short-term-leased product are pricing at 6.0% caps in this submarket.",data:[{label:"Tenant rating",value:"BBB+ (IG)"},{label:"Occupancy",value:"100% single-tenant"},{label:"Lease term remaining",value:"15 years"},{label:"Annual escalations",value:"2.5%"},{label:"Spec-grade comp cap",value:"6.0%"}],question:"Where should this asset price?",options:[{label:"~50–100 bps tighter than spec-grade comps — the 15-year IG lease is essentially a corporate bond on real estate, so cap compression is real but bounded by the spread between IG corporate yields and CRE.",isBest:!0,explanation:"IG-tenant single-tenant deals trade tighter than spec-grade because the income is bond-like: long-dated, contractual, low default probability. The compression is typically 50-100 bps depending on rating, term, and the gap between corporate-bond yields and prevailing cap rates. So at a 6.0% spec-grade cap, this asset prices at 5.0-5.5%. Tighter than that is reaching; wider is overlooking the credit."},{label:"Same 6.0% as spec-grade — the lease economics already include the credit and cap rates capture the asset, not the tenant.",isBest:!1,explanation:"Misses how single-tenant pricing works in practice. Cap rates for single-tenant net-leased assets are heavily driven by tenant credit because the income stream IS the underwriting. Treating an IG-anchor 15-year lease the same as a 5-year spec-grade rollover materially underprices the certainty of the income."},{label:"200+ bps tighter — IG-tenant on a 15-year lease should price like a corporate bond, in the 4% range.",isBest:!1,explanation:"Overshoots. CRE doesn't trade fully to corporate-bond yields because there's residual risk: the building still needs to exist, be leasable, and retain land value at lease expiry. The compression is real but the floor is the underlying real estate value at exit, not the tenant credit. 200+ bps is more aggressive than what single-tenant net-lease specialists pay."},{label:"Wider than 6.0% — single-tenant deals carry binary risk (one departure = 100% vacant) that should *expand* the cap.",isBest:!1,explanation:"Inverts the analysis. Single-tenant credit risk concentration is real, but it's offset (and then some) by lease term: a 15-year IG lease has very low departure probability over the underwriting horizon. The binary risk concern dominates *short-dated* single-tenant deals; on long IG, the income certainty wins."}],takeaway:"Single-tenant net-lease pricing is heavily a function of tenant credit + lease term. IG-anchor + long term = bond-like cash flow + cap compression. The compression is 50-100 bps for a typical IG, more for AAA / sovereign, less for low-IG. The floor is set by underlying real estate value, not by corporate yields.",tips:["Single-tenant cap = base CRE cap − credit spread, bounded below by underlying RE value.","IG: 50-100 bps tighter. Sovereign / AAA: 100-200 bps tighter. Sub-IG: spec-grade pricing.",'Watch for "rent roll mark-to-market" plays masked as IG cap compression — those are different stories.']},w0={id:"dscr-refi-failing",title:"The refi DSCR test is failing — what now?",category:"risk",difficulty:"intermediate",roles:["mortgageUw","assetManagement"],assetClass:"office",scenario:"Your asset is approaching loan maturity. The current loan is $50M at 4.0% on a 30-year amort, IO. NOI is flat at $3.0M. Today's market rate is 7.0%. The refinance lender requires a 1.25x DSCR. At 7.0% on the same $50M loan amount, the DSCR test fails. The borrower wants to know what levers exist to make the refi pencil.",data:[{label:"Current loan",value:"$50M"},{label:"Current rate",value:"4.0% (IO)"},{label:"NOI",value:"$3.0M"},{label:"Market rate",value:"7.0%"},{label:"Lender DSCR threshold",value:"1.25x"},{label:"New DS @ $50M / 7.0% / 30yr amort",value:"~$3.99M"},{label:"New DSCR",value:"~0.75x — fails"}],question:"Which lever is most likely to make this loan re-pencil with the same lender?",options:[{label:"Lower the loan amount (paydown at refi) to ~$30M — at that loan size the DS at 7% / 30yr drops to ~$2.4M and DSCR clears 1.25x.",isBest:!0,explanation:"Paydown is the most reliable lever. Max DS at 1.25x = NOI / 1.25 = $2.4M. At 7% / 30yr loan constant ≈ 7.99%, max loan = $2.4M / 0.0799 ≈ $30M. The borrower brings $20M of equity at refi to pay down. Painful but mathematically clean and what every lender models first."},{label:"Push for a longer amortization (40 or 50 years) to lower the loan constant and make the same loan pencil.",isBest:!1,explanation:"Marginally helpful but not enough. 40-yr amort at 7% has a constant of ~7.46% vs 7.99% at 30-yr — DS only drops ~7%. DSCR moves from 0.75 to 0.81; still a fail. Amort extension alone almost never closes a 50%+ DSCR gap."},{label:"Argue for a DSCR exception based on the sponsor's strong balance sheet and recourse pledge.",isBest:!1,explanation:"Possible in some markets but unreliable at this size of shortfall. Recourse can soften an underwriting view but doesn't change the cash-flow math the lender models. Most institutional lenders won't waive a 50% DSCR shortfall regardless of the sponsor's name."},{label:"Refinance with a bridge / debt fund at a higher rate and a 1.05x DSCR to get past the trough.",isBest:!1,explanation:"Trades one problem for another. Bridge debt at 1.05x is a thin cushion that doesn't survive *any* NOI miss. The exit problem (a permanent take-out at higher DSCR) returns in 12–24 months, often worse if rates haven't come down. Bridge can buy time but it's not the *first* lever to pull."}],takeaway:'When the DSCR test fails on refi, the math is mostly about the loan amount, not the rate or the sponsor. Paydown is the highest-leverage move. Always recompute "max loan = NOI / DSCR / loan constant" first — it tells you exactly how much equity needs to come into the deal at refi to clear.',tips:["Refi math: max loan at threshold = NOI / DSCR / loanConstant(rate, amort).","Loan constant at 7%/30yr ≈ 7.99%; at 8%/30yr ≈ 8.81%; at 6%/30yr ≈ 7.20%.","A 25 bps move in market rate at refi can change the required paydown by 5–10%.","Recourse + sponsor strength soften terms but don't replace the cash-flow test."]},b0={id:"comp-vintage-adjustment",title:"Why does the comp set support a tighter cap?",category:"comp-selection",difficulty:"intermediate",roles:["acquisitions"],assetClass:"multifamily",scenario:"You're bidding on a Class-B 1985-vintage multifamily asset. Three recent comps in the same submarket support a 5.50–5.75% cap. The subject's broker is pushing for a 5.25% going-in cap, citing those exact comps. You need to pick the right adjustment.",data:[{label:"Subject vintage",value:"1985 (Class B)"},{label:"Comp 1",value:"2018-built · 5.50% cap"},{label:"Comp 2",value:"2015-built · 5.65% cap"},{label:"Comp 3",value:"1998-built · 5.75% cap"},{label:"Broker ask",value:"5.25% subject cap"}],question:"How should you adjust the comp set for the subject's vintage?",options:[{label:"Apply a vintage adjustment of +25–50 bps to the comp average — older product carries higher capex burden and shorter remaining economic life, so the right anchor is closer to 6.00%, not 5.25%.",isBest:!0,explanation:"Vintage matters for two reasons: (1) older buildings need more capex over the hold (roof, HVAC, systems) which the buyer prices in via a wider cap; (2) older product faces obsolescence risk that newer comps don't. A 1985 asset compared to 2015–2018 comps deserves a 25–50 bps cap widening to compensate. Bidding at 5.25% on a 1985 vintage when comps are 2015+ at 5.50% is overpaying twice."},{label:"Use the comp average (5.63%) directly — vintage adjustments are subjective and hard to defend.",isBest:!1,explanation:"Treats comps as homogeneous when they aren't. The seller's broker will always push you toward the unadjusted average; the buyer's job is to filter for relevance. Documented vintage spreads are well-understood by appraisers and lenders — defend the adjustment with capex reserves and remaining-life math."},{label:"Discard Comp 1 and Comp 2 (newer than the subject) and use only Comp 3 (1998).",isBest:!1,explanation:"Sample size of 1 is too thin to support pricing. The right move is to *adjust* the newer comps for vintage rather than discard them — keeps a defensible 3-comp set with a transparent adjustment."},{label:"Ask the broker for older comps; if none exist, drop the bid and move on.",isBest:!1,explanation:"Walking away over comp set composition is over-reaction. Vintage-adjusted pricing is core acquisition diligence. If the comps are otherwise relevant on submarket and size, bid at the adjusted cap with a written rationale."}],takeaway:'Comps are never apples-to-apples. The first questions you ask of any comp set are: (1) same submarket? (2) same vintage / quality tier? (3) similar size / unit count? (4) recent enough? Each "no" requires a documented adjustment, not a quiet pass-through.',tips:["Vintage spread rule of thumb: 20–50 bps per generation gap (Class A vs B vs C).","Newer assets justify tighter caps because residual capex burden is lower.",`Always run a "what's the implied capex reserve?" sanity check on age-adjusted bids.`]},k0={id:"exit-cap-conservatism",title:"Defend the 150 bps exit cap expansion",category:"sensitivity",difficulty:"advanced",roles:["acquisitions"],assetClass:"mixed",scenario:`You're underwriting a 5-year industrial hold at a 5.0% going-in cap, modeling a 6.5% exit cap (150 bps of expansion). The deal pencils to a 12% IRR at this exit. A senior partner challenges: "150 bps is overkill — comps in this submarket have traded in a tight 4.75–5.50% band for 8 years." You need to defend the 150 bps spread.`,data:[{label:"Going-in cap",value:"5.0%"},{label:"Modeled exit cap",value:"6.5% (+150 bps)"},{label:"Hold period",value:"5 years"},{label:"Modeled IRR",value:"12%"},{label:"8-year submarket cap range",value:"4.75–5.50%"}],question:"What's the strongest defense for 150 bps?",options:[{label:"150 bps reflects the macro rate environment — when the 10-year treasury is materially above the 5–10 year average, cap rates re-set wider on exit, even if the submarket band has been tight historically.",isBest:!0,explanation:`Cap rates aren't set by submarket comps in isolation — they're set by the spread between cap rates and the risk-free rate. When the 10-year treasury moves +150 bps from its hold-period average, cap rates broadly follow (with lag). The "tight 8-year band" reflects the era it covers, not a structural floor. Modeling +150 bps cap expansion on a 5-year hold in a rising-rate environment is conservative-but-realistic underwriting, not over-reaction.`},{label:"150 bps reflects asset-specific risks — vacancy, capex needs, tenant rollover.",isBest:!1,explanation:`Asset-specific risks should be reflected in the *NOI* (vacancy assumptions, capex reserves, lease-up risk) — not the exit cap. Doubling-up by also widening the cap to compensate creates "stacking conservatism" that can't be defended item-by-item.`},{label:"It's a buffer against being wrong — pad the underwriting to leave room for surprises.",isBest:!1,explanation:`Honest framing of "I'm not sure" but doesn't actually defend the number. Senior partners want to know which specific risk the buffer is sized to. "Just being conservative" loses to underwriters who can name the variable they're hedging.`},{label:"You're right — drop to 100 bps. The historical band supports it.",isBest:!1,explanation:"Capitulating to the senior's pressure without re-examining the rate environment. If the rate move is real, sticking with 150 bps is correct; if not, dropping is correct. The decision should be data-driven, not deference-driven."}],takeaway:`Exit cap expansion ≠ asset-quality discount. It's a macro rate adjustment. The defensible framing is: "where will cap rates likely be in 5 years given my view on the rate path?" Tying it to the treasury spread (vs the historical cap-to-treasury spread) is the cleanest defense.`,tips:["Cap-to-treasury spread is the durable relationship; cap rate alone moves with rates.","Stabilized 5-yr holds in a rising-rate environment: 100–150 bps spread is industry conservative.","Asset-specific risks belong in NOI assumptions; macro risks belong in the cap."]},N0={id:"trended-vs-inplace-leaseup",title:"Which NOI denominator do you use for the exit cap?",category:"pricing",difficulty:"advanced",roles:["acquisitions"],assetClass:"multifamily",scenario:"You're acquiring a brand-new multifamily lease-up. The property is 80% leased today; stabilization (95%+) is expected in Year 2. You're modeling a 5-year hold and need to choose what NOI to apply the exit cap to. The seller's pro forma shows a stabilized $2.1M NOI; current trailing NOI is $1.4M.",data:[{label:"Current occupancy",value:"80%"},{label:"Trailing NOI",value:"$1.4M"},{label:"Stabilized NOI (Year 2)",value:"$2.1M"},{label:"Modeled hold",value:"5 years"}],question:"What's the right NOI to use as the exit-cap denominator?",options:[{label:"Year-5 trended NOI — start from stabilized $2.1M, then apply your forward rent growth, expense inflation, and any rollover assumptions to get to a true Year-5 figure.",isBest:!0,explanation:"The exit cap is applied to the income at the moment of sale, not today's income or the stabilized number frozen at Year 2. Walk it forward: Year 2 stabilized $2.1M → Year 5 trended NOI reflecting market rent growth (offset by expense growth) over 3 additional years. Selling on the as-stabilized number under-states the exit value if rent growth is positive; selling on trailing $1.4M misses 100% of the lease-up."},{label:"Trailing $1.4M NOI — most conservative; matches what a buyer would underwrite as in-place.",isBest:!1,explanation:"Confuses going-in-cap math with exit-cap math. At Year 5 the lease-up is long-since complete; the buyer underwrites whatever is in-place at that moment, which is far above today's $1.4M. Using trailing produces an artificially low exit value and an over-conservative IRR."},{label:"Stabilized Year-2 $2.1M — that's the income the asset is ultimately designed to generate.",isBest:!1,explanation:"Better than trailing but still wrong. Year 2 stabilized NOI is *not* Year 5 NOI. Three years of rent growth (and expense growth) compound between them. Using a frozen Year-2 number under-states exit value by ~10% in a normal-growth market."},{label:"Average of trailing and stabilized — splits the lease-up risk.",isBest:!1,explanation:"Doesn't correspond to any actual cash flow. The exit value is what the *buyer at Year 5* will pay, based on what *they* see as in-place income. Averaging two numbers from different points in the holding period produces a misleading exit value."}],takeaway:"The exit cap goes on Year-N trended NOI — the buyer at exit underwrites in-place income at *their* Year 0. For a lease-up, that means you walk stabilized NOI forward to the exit year with rent growth and expense inflation, then apply the exit cap to *that* figure.",tips:["Going-in cap on Year-1 NOI; exit cap on Year-N trended NOI. Different denominators, same building.",'In a lease-up, "stabilized NOI" is a milestone, not an exit number — keep walking it forward.',"For a 5-yr hold with Year-2 stabilization: 3 years of trending separates stabilization from exit."]},S0={id:"noi-growth-missing",title:"Year-3 NOI is 8% below pro forma — where do you look first?",category:"diagnostic",difficulty:"intermediate",roles:["assetManagement"],assetClass:"multifamily",scenario:"You're three years into a five-year hold on a 200-unit multifamily asset. Year-3 actual NOI came in at $2.30M vs the underwritten $2.50M — an 8% miss. Rents look in line with market; the property has run at 94% occupancy (vs UW 95%). You're asked to diagnose the miss in your year-end memo to the LP.",data:[{label:"UW Year-3 NOI",value:"$2.50M"},{label:"Actual Year-3 NOI",value:"$2.30M "},{label:"Miss",value:"8%"},{label:"Rent vs market",value:"In line"},{label:"Occupancy",value:"94% (UW 95%)"}],question:"Where should you look first to explain the miss?",options:[{label:"OpEx growth — rent in line + occupancy roughly on plan means revenue is close to UW; an 8% NOI miss with revenue near plan implies expenses ran 6–8% above UW, which is the most common single driver of NOI shortfalls in stabilized multifamily.",isBest:!0,explanation:"Revenue ≈ rent × leased units. Both came in near UW, so revenue can't explain a meaningful miss. NOI = revenue − OpEx; if revenue is on plan and NOI is light, OpEx is the variable. Common culprits: insurance (frequently +20–40% YoY post-2020), property taxes (post-sale reassessment, mill rate increases), repairs/maintenance (deferred-maintenance catch-up), payroll (wage inflation). Pull the OpEx variance report by line item before doing anything else."},{label:"Vacancy — 1 point below UW (94% vs 95%) is meaningful and explains most of the gap.",isBest:!1,explanation:"A 1-point vacancy miss on a 200-unit property is roughly 2 units. At market rent, that's ~$30k of revenue. An $200k NOI miss isn't explained by 2 vacant units — the math doesn't work. Vacancy is rarely the single explanation when the gap is in the high single-digit %."},{label:`Rent growth — even though rents are "in line", maybe you're mis-measuring the comp set.`,isBest:!1,explanation:"Possible but secondary. The prompt says rents are at market, which is observable. Even if there's a small mis-measurement, it can't explain the full 8% gap. OpEx variance is far more likely to be the single biggest line."},{label:"It's probably noise — single-year NOI variance is normal; report the variance and move on.",isBest:!1,explanation:"Abdicates the asset-management responsibility. 8% is well outside normal variance for a stabilized asset. The LP wants to know *why*, not just *that*. Diagnose first, decide whether to act second."}],takeaway:"NOI = Revenue − OpEx. When NOI misses with revenue on plan, OpEx is the variable by definition. The asset-management diagnostic discipline is: (1) verify revenue is on plan; (2) pull the OpEx variance report by line; (3) attribute the miss to specific lines (insurance, taxes, repairs); (4) decide which are recoverable vs structural.",tips:["Rules of thumb: insurance variance is the most common 2020+ outlier; reassessment is the second.","1 point of vacancy ≈ 1% revenue impact. Easy to size before going further.","When NOI misses, always run the variance report before forming a hypothesis."]},j0={id:"rollover-concentration",title:"A single tenant rolling 40% of NRSF — hold or sell?",category:"risk",difficulty:"intermediate",roles:["assetManagement"],assetClass:"office",scenario:"You own a 250,000 SF Class-A office building. The largest tenant (100,000 SF, 40% of NRSF) has a lease expiring in 14 months. They've given mixed signals on renewal but historically have always renewed. The submarket vacancy is at a 10-year high (15%). You're deciding whether to sell *now* (with the lease in place) or hold and risk the rollover.",data:[{label:"Building size",value:"250,000 SF"},{label:"Anchor tenant",value:"100,000 SF (40%)"},{label:"Lease expires",value:"14 months"},{label:"Submarket vacancy",value:"15% (10-yr high)"},{label:"Renewal probability",value:"Mixed signals; historical ~80%"}],question:"How should the rollover concentration shape your hold/sell decision?",options:[{label:"Sell now — the lease in place is worth more to a buyer than the unknown 14 months from now. Selling at peak certainty captures the full value of the existing income; selling 6 months pre-rollover with no renewal commitment puts you at the buyer's mercy.",isBest:!0,explanation:'Buyers price uncertainty harshly. A building with 40% of NRSF rolling in 14 months sells at a meaningful discount to one with 5+ years of remaining term. Even with an "80% historical" renewal track record, a 20% vacate probability times 40% of NRSF in a 15%-vacancy market is a real downside scenario the buyer underwrites *to*. The asset is at peak salability today.'},{label:"Hold — the tenant always renews; just wait it out and refinance when they sign the renewal.",isBest:!1,explanation:`"Always renews" is comforting but not contractual. In a 15%-vacancy submarket, even if they renew they'll demand TI / free rent / a lower face rent. The asset value declines either way: harder math if they vacate, softer math if they renegotiate. Holding through the unknown means accepting both downside scenarios; selling now monetizes the current certainty.`},{label:"Pursue a renewal-and-extend now, then sell with a longer WALT in hand.",isBest:!1,explanation:"Theoretically ideal but creates a forced negotiation. Approaching a tenant for an early renewal in a soft market signals that you *need* the renewal — they'll demand below-market terms. The renewal you get won't be on landlord-friendly terms, and you'll have given up the optionality of selling now."},{label:"Recapitalize via a JV partner now — keep upside if they renew, share downside if they don't.",isBest:!1,explanation:"Possible structurally but doesn't solve the core problem (selling at uncertainty). Recap markets price the same risk the sale market does; you'll get a comparable haircut. And finding a partner willing to share concentrated rollover risk in a soft submarket is hard. Sale is cleaner."}],takeaway:"Concentration + uncertainty is a sell signal. The peak value of an asset is the moment its income is most certain — usually with a long lease in place and well before any major rollover. Holding through a single-tenant rollover in a soft submarket means accepting either renegotiation or downtime; both compress value vs selling now with the tenant in place.",tips:["Single-tenant > 30% NRSF + soft submarket + lease expiring within 18 mos = sell signal.","Buyers underwrite to the rollover scenario, not the historical renewal pattern.","Approaching a tenant for early renewal in a soft market = you negotiate weak."]},C0={id:"sponsor-proforma-aggressive",title:"Re-cut the sponsor's aggressive pro forma",category:"diagnostic",difficulty:"advanced",roles:["mortgageUw"],assetClass:"multifamily",scenario:"You're lending on a $50M acquisition. The sponsor's pro forma shows 8% NOI growth in years 1–5, no capex, occupancy ramping from 92% to 97% in Year 1, and a 5.5% exit cap (vs 5.25% going-in — only 25 bps of expansion). The submarket has averaged 3% rent growth and the asset is stabilized. You're writing your credit memo.",data:[{label:"Going-in cap",value:"5.25%"},{label:"Exit cap (sponsor)",value:"5.50% (+25 bps)"},{label:"NOI growth (sponsor)",value:"8%/yr"},{label:"Submarket avg rent growth",value:"3%"},{label:"Occupancy (sponsor)",value:"92% → 97%"},{label:"Capex reserve",value:"$0"}],question:"Where do you push back hardest as the lender?",options:[{label:"Re-cut the NOI growth to 3% (matching submarket rent growth less expense inflation), widen the exit cap to ≥75 bps, and require a meaningful capex reserve. The sponsor's deck triple-stacks aggressive assumptions; size the loan off your re-cut, not theirs.",isBest:!0,explanation:`A lender's job is to underwrite to the worse-case-not-disaster. The sponsor's pro forma is "everything goes right" — submarket rent growth is 3% historical but they've modeled 8%; capex is a real and recurring cost on stabilized assets but they've modeled zero; cap rates almost always widen on exit but they've modeled only 25 bps. Each item in isolation is debatable; together they compound to overstate value by 20%+. Re-cut every line to lender norms before sizing.`},{label:"Push back on the exit cap only — that's the variable that most drives DSCR at refinance.",isBest:!1,explanation:"Half-measure. Exit cap matters but it's a hold-period-end variable; a lender sized off Year-1 underwritten NOI also cares about the *path*. Letting through 8% NOI growth means the sponsor's mid-term DSCR shows healthy headroom that won't materialize. Push on growth, capex, AND exit cap."},{label:"Accept the pro forma; you're sized off Year-1 NOI anyway, and the rest is the sponsor's problem.",isBest:!1,explanation:"Misses the point of credit underwriting. Year-1 NOI is the sizing input but the sponsor's ability to service debt year over year matters too. If the proforma fails by Year 3, the sponsor is hunting for capital to keep the loan current. Lenders re-cut every line for the same reason equity does — they need to believe the deal pencils on realistic assumptions."},{label:"Demand recourse to the sponsor in lieu of underwriting changes.",isBest:!1,explanation:"Recourse is a fallback when underwriting is uncertain, not a substitute for it. A lender that takes recourse on bad underwriting still has a problem deal — the borrower's balance sheet has to be deep enough to cover the gap, and most CRE sponsors aren't. Re-cut first, then decide on recourse."}],takeaway:"Lenders re-cut the sponsor's pro forma to lender-defensible numbers — every line, every year. Common targets to challenge: NOI growth (vs submarket history), capex (zero is wrong), exit cap (≥75 bps for stabilized 5-yr holds), occupancy ramp (be skeptical of fast ramps without a clear catalyst). Stack-conservatism wins: each push is small but they compound.",tips:["Lender-defensible NOI growth: submarket rent growth less 50–100 bps for OpEx inflation.","Zero-capex pro formas are almost always wrong on stabilized assets — $250–500/unit/yr is typical multifamily.","Exit cap ≥ going-in + 75 bps is a defensible floor for 5-yr lender underwriting."]},R0={id:"debt-yield-vs-dscr",title:"Same loan passes DSCR but fails debt yield — which wins?",category:"risk",difficulty:"advanced",roles:["mortgageUw"],assetClass:"office",scenario:`You're sizing a permanent loan. NOI is $5.0M; the requested loan is $65M; 30-year amortization at 5.0%. The DSCR test (1.25x threshold) passes at 1.19x — wait, that fails. Let me re-state: the DSCR comes in at 1.31x (passes); the debt yield (NOI / loan = 7.7%) fails the 8.0% threshold. The sponsor argues "DSCR is what matters." How do you respond?`,data:[{label:"NOI",value:"$5.0M"},{label:"Requested loan",value:"$65M"},{label:"Rate / amort",value:"5.0% / 30 yr"},{label:"DSCR threshold",value:"1.25x — actual 1.31x ✓"},{label:"Debt yield threshold",value:"8.0% — actual 7.7% ✗"}],question:"Which test should govern, and why?",options:[{label:"Debt yield governs — DSCR is rate-sensitive and cap-rate-sensitive; debt yield is neither. In a rising-rate environment or a cap-expansion scenario, the loan you're sizing today via DSCR may not
