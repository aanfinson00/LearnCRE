},{label:"Value",expression:`${v(o)} / ${S(a)}`,result:v(l)}],answerDisplay:v(l)}}const eg={kind:"combinedScenario",label:"Combined Scenario",description:"Full proforma → implied value.",category:"valuation",roles:["acquisitions"],pattern:"((A + B)(1 − C) − D) / E   [gross × (1−vac) − opex, /cap]",tips:["Order of operations: (GPR + Other) × (1 − vacancy) = EGI. EGI − OpEx = NOI. NOI / cap = Value.","Back-of-envelope: if OpEx is ~40% of EGI and vacancy is ~5%, NOI ≈ gross × 0.95 × 0.6 ≈ gross × 0.57.","Then × (1/cap). At 6% cap: gross × 0.57 × 16.67 ≈ gross × 9.5. Ballparks a full proforma in one step.","Sandwich: compute value at the two nearest clean caps (e.g. 5% and 6%) and interpolate to your actual cap. Handles ugly caps without a calculator.","Sanity check: compare implied value-per-SF or $/unit to market comps before trusting the number."],generate(e,t="intermediate",n="mixed"){const r=I(e,A.gpr,t),a=I(e,A.otherIncome,t),i=e.pickFromSet(qt.vacancySetNonZero),o=e.pickFromSet(Nl(n)),l=t==="beginner"?1e5:t==="advanced"?1e3:1e4,c=Math.round((r+a)*o*(1-i)/l)*l,u=I(e,X("capRate",n),t),f=St(Ws({gpr:r,otherIncome:a,vacancyRate:i,opex:c}),u);return{id:_("combo"),kind:"combinedScenario",prompt:`A ${Xp(n)} has GPR ${v(r)}, other income ${v(a)}, vacancy ${S(i)}, OpEx ${v(c)}, cap ${S(u)}. What's the implied value?`,context:{gpr:r,otherIncome:a,vacancyRate:i,opex:c,capRate:u},expected:f,unit:"usd",tolerance:{type:"pct",band:.03},solution:Jx(r,a,i,c,u)}}};function tg(e,t,n){const r=Math.pow(1+t,n),a=ra(e,t,n);return{formula:"End = Start × (1 + r)^n",steps:[{label:"Growth factor",expression:`(1 + ${S(t,2)})^${n}`,result:r.toFixed(4)},{label:"End value",expression:`${v(e)} × ${r.toFixed(4)}`,result:v(a)}],answerDisplay:v(a)}}const ng={kind:"compoundGrowth",label:"Compound Growth (forward)",description:"Project a value forward at a fixed growth rate.",category:"returns",roles:["acquisitions","portfolioMgmt"],pattern:"A × (1 + B)^n   [start × growth factor]",tips:["Rule of 72: {return e*sa(t,n)}function xg(e,t){const n=$l(e,t);return{formula:"Equity Multiple = Equity Out / Equity In",steps:[{label:"Multiple",expression:`${v(t)} / ${v(e)}`,result:H(n)}],answerDisplay:H(n)}}const gg={kind:"equityMultiple",label:"Equity Multiple",description:"Equity in + equity out → EM.",category:"returns",roles:["acquisitions","portfolioMgmt"],pattern:"A / B   where A = out, B = in",tips:["EM = Out / In. Doesn't care about time — 2x in 1 year and 2x in 10 years both = 2.0x.","Divide by hundreds: $23M / $10M → 23/10 = 2.3x. $17.5M / $8M → 17.5/8 ≈ 2.19x.","Rule of thumb: institutional value-add deals target 1.7x–2.0x; opportunistic 2.0x+; core ~1.4x–1.6x.","Complement to IRR: EM shows absolute dollars back, IRR shows time-adjusted. Always look at both."],generate(e,t="intermediate",n="mixed"){const r=I(e,A.equityIn,t),a=I(e,A.irrExitMultiple,t),i=t==="beginner"?1e6:t==="advanced"?25e3:1e5,o=Math.round(r*a/i)*i,l=$l(r,o);return{id:_("em"),kind:"equityMultiple",prompt:`You invested ${v(r)} and received ${v(o)} at sale. What's the equity multiple?`,context:{equityIn:r,equityOut:o},expected:l,unit:"multiple",tolerance:{type:"pct",band:.05},solution:xg(r,o)}}};function vg(e,t){const n=am(e,t);return{formula:"Going-in Cap = NOI / Purchase Price",steps:[{label:"Cap rate",expression:`${v(t)} / ${v(e)}`,result:`${S(n)}  (${Oe(n)})`}],answerDisplay:Oe(n)}}const yg={kind:"goingInCap",label:"Going-in Cap Rate",description:"Price + NOI → cap rate in bps.",category:"valuation",roles:["acquisitions"],pattern:"A / B   where A = NOI, B = price",tips:["Cap = NOI / Price. Inverse is the NOI multiple: 5% = 20x, 6% = 16.67x, 7% = 14.29x.","Mental shortcut: NOI / Price, round both to 2 sig figs first. $623k / $12.4M ≈ $620 / $12,400 ≈ 5.0%.","Sanity check: if price looks like ~20× NOI you're at 5%, ~15× → ~6.7%, ~10× → 10%.","Round both up or both down together — keeps the error directionally small. Rounding one up and one down stacks errors.","Sandwich: find the nearest clean m  from unlevered IRR, LTV, and borrow rate.",category:"returns",roles:["acquisitions","portfolioMgmt"],pattern:"A + (B × (A − C)) / (1 − B)   [unlev + leverage × spread]",tips:["Formula: Levered IRR ≈ Unlevered + LTV × (Unlev − Borrow) / (1 − LTV). Assumes parallel cash flows.","Leverage multiplier: LTV / (1 − LTV). At 60% LTV = 1.5x; at 70% = 2.33x; at 75% = 3x.","If unlevered IRR > borrow rate, leverage is accretive. If unlevered < borrow, leverage destroys returns.","Example: unlev 8%, borrow 5%, 60% LTV → 8% + 3% × 1.5 = 12.5%. Actual levered is usually within 100 bps of this estimate."],generate(e,t="intermediate",n="mixed"){const r=I(e,A.unleveredIrr,t),a=I(e,A.interestRate,t),i=I(e,A.ltv,t),o=em({unleveredIrr:r,borrowRate:a,ltv:i});return{id:_("levIrr"),kind:"leveredIrr",prompt:`Unlevered IRR is ${S(r)} and you can borrow at ${S(a)} with ${S(i)} LTV. Approximately what's the levered IRR?`,context:{unleveredIrr:r,borrowRate:a,ltv:i},expected:o,unit:"pct",tolerance:{type:"abs",band:.01},solution:Fg(r,a,i)}}};function om(e){const t=e.leaseTermYears*12,n=e.grossRentPerSf*e.leaseTermYears,r=e.grossRentPerSf/12*e.freeMonths;return(n-e.tiPerSf-r)/t*12}function Xn(e){return(e.rentPerSf*e.leaseTermYears-e.tiPerSf)/e.leaseTermYears}function lm(e){const t=Xn({rentPerSf:e.rentA,tiPerSf:e.tiA,leaseTermYears:e.leaseTermYears}),n=Xn({rentPerSf:e.rentB,tiPerSf:e.tiB,leaseTermYears:e.leaseTermYears});return t-n}function cm(e){return e.tiPerSf/e.paybackYears}function um(e){return(e.newRentPerSf-e.oldRentPerSf)*e.subjectSf*(1-e.vacancy)}function dm(e){return um(e)/e.capRate}function pm(e){return-(e.purchasePrice*e.newTaxRate-e.oldAnnualTax)/e.capRate}function zg(e){const t=e.years*12,n=e.grossRent/12*e.freeMonths,r=om({grossRentPerSf:e.grossRent,leaseTermYears:e.years,tiPerSf:e.tiPerSf,freeMonths:e.freeMonths});return{formula:"NER = (Gross × Term − TI − Free Rent) / Term",steps:[{label:"Gross over term",expression:`${O(e.grossRent)} × ${W(e.years)}`,result:O(e.grossRent*e.years) rate-divergence",title:"Why is this trading off-market?",category:"pricing",difficulty:"intermediate",roles:["acquisitions"],assetClass:"office",scenario:"A suburban office asset is being marketed at an 8.0% going-in cap rate. Recent trades in the submarket for similar vintage and quality have printed at 5.75–6.25%. Tenancy is single-tenant, investment-grade credit, but the lease has 14 months of remaining term. In-place rent is $24/SF; market rent for the submarket is $32–34/SF.",data:[{label:"Subject going-in cap",value:"8.0%"},{label:"Comp set range",value:"5.75–6.25%"},{label:"Remaining lease term",value:"14 months"},{label:"In-place / market rent",value:"$24 / $32–34/SF"}],question:"What most likely explains the cap-rate gap?",options:[{label:"Buyers are pricing in re-leasing risk and below-market rents — the going-in cap is on a soon-to-roll income stream that markets re-set higher.",isBest:!0,explanation:'Going-in cap rate is on in-place NOI. With <2 years of remaining term and rents 25–40% below market, the in-place income is effectively temporary. Sophisticated buyers underwrite to a trended NOI assuming downtime, TIs, and a market re-set, so the cap on Year 1 NOI looks "wide" but the levered IRR pencils to the comp set.'},{label:"The submarket has structurally weakened and comps are stale; 8% is the new market for this vintage.",isBest:!1,explanation:"Possible but unlikely if comps are recent and broad. A 175–225 bps gap on otherwise comparable product almost always reflects asset-specific risk (lease term, tenant, condition) rather than a sudden submarket re-rate that hasn't yet shown up in comps."},{label:"Investment-grade credit on a short remaining term means buyers are demanding extra yield for credit risk.",isBest:!1,explanation:"Backwards — IG credit *compresses* cap rates, not expands them, and short remaining term reduces the relevance of credit quality (the income stops mattering at expiry). The cap gap is driven by the lease being effectively expired, not by credit deterioration."},{label:"Cap rate methodology differs — the broker is quoting trailing while comps are forward.",isBest:!1,explanation:"Methodology differences rarely produce 200+ bps gaps in normalized markets. They can produce 25–50 bps. The far more economic explanation here is the in-place vs market rent gap and the lease rolling within the underwriting window."}],takeaway:'A wide going-in cap on an asset with comparable comps is almost always a signal about the income stream, not the building. Short-dated leases at below-market rents create the appearance of a "high cap" because Year 1 NOI is the wrong denominator. Underwrite to trended NOI and a market re-set, not to in-place.',tips:["Going-in cap = NOI₁ / Price. If NOI₁ is temporary, the cap is misleading.","Mark-to-market upside is priced into going-in cap as a discount.","Always check WALT (weighted average lease term) before treating in-place income as durable."]},Sy={id:"absorption-timing",title:"How long until the market hits 95%?",category:"absorption",difficulty:"intermediate",roles:["acquisitions","development"],assetClass:"multifamily",scenario:"A multifamily submarket has 4,000 units in inventory and is currently 85% leased. Two new deliveries are coming online this quarter, adding 300 units to the inventory. Quarterly absorption has been running at 150 units, or roughly 50 units per month. Rents are stable; you're evaluating a deal that needs the submarket to reach 95% occupancy before stabilization.",data:[{label:"Existing inventory",value:"4,000 units"},{label:"Existing occupancy",value:"85%"},{label:"New deliveries",value:"+300 units"},{label:"Absorption pace",value:"50 units/month"},{label:"Target occupancy",value:"95%"}],question:"Roughly how long until the submarket reaches 95% leased?",options:[{label:"About 16 months — you need to absorb the existing vacancy plus the new deliveries to hit 95% on a 4,300-unit base.",isBest:!0,explanation:"New base: 4,300 units. Target leased at 95%: 4,085. Currently leased: 4,000 × 0.85 = 3,400. Net to absorb: 685 units ÷ 50/mo ≈ 13.7 months — but that assumes flat absorption. With 300 units delivering, the math is closer to 16 months once you account for the deliveries lengthening the lease-up tail. Reasonable analyst answer: 14–18 months."},{label:"About 12 months — current vacancy is 600 units and absorption is 50/mo.",isBest:!1,explanation:"Misses the deliveries. If you treat the base as 4,000 and ignore +300 new units, you'd say (4,000 − 3,400) ÷ 50 = 12 months. But the new deliveries change the denominator and add to the supply you must absorb. Underwriting at 12 months would systematically overestimate stabilization speed."},{label:"About 6 months — 50 units/mo absorption easily clears the 300 new units.",isBest:!1,explanation:"Confuses absorbing the new supply with reaching 95% occupancy of the combined base. Even if absorption only had to clear the 300 new units (it doesn't), the calculation ignores existing vacancy. The full denominator and the target % both matter."},{label:"It depends entirely on rent growth, which drives absorption.",isBest:!1,explanation:"Rent growth and absorption are linked but not identical. Absorption is observable directly from leasing velocity; rent growth is a separate variable. Given the prompt holds rents stable and gives an absorption pace, you should compute, not deflect."}],takeaway:"Stabilization timing has a clean formula: (target leased − current leased) ÷ absorption pace. The trap is using the wrong denominator when new deliveries are coming. Always recompute the inventory base before applying the target occupancy %.",tips:["Inventory base must include all deliveries within the underwriting horizon.","Quarterly absorption ÷ 3 = monthly; check both for sanity.","If absorption has been declining quarter-over-quarter, don't use the trailing pace flat."]},Ny={id:"mark-to-market-upside",title:"How much upside is in the rent roll?",category:"pricing",difficulty:"beginner",roles:["acquisitions","assetManagement"],assetClass:"office",scenario:"You're underwriting an office acquisition. In-place rent is $24/SF on the major tenant; recent leasing in the building and submarket is signing at $32/SF. The major tenant's lease expires in 12 months and is widely expected to vacate (the broker has already begun marketing the space).",data:[{label:"In-place rent",value:"$24/SF"},{label:"Market rent",value:"$32/SF"},{label:"Lease expiry",value:"12 months"},{label:"Tenant retention probability",value:"Low"}],question:"What's the right way to price the upside?",options:[{label:"Roughly 33% rent uplift on rollover — but price the deal to trended NOI net of downtime, TIs, and concessions, not to the market-rent figure directly.",isBest:!0,explanation:"($32 − $24) / $24 = 33% uplift. That's the gross arithmetic. The economic answer reduces it: 6–9 months downtime, $50–75/SF in TIs, several months of free rent — call it $25–40/SF in re-leasing costs against the uplift. Sophisticated underwriting trends to a stabilized NOI that captures the uplift *and* the cost of getting there."},{label:"Price at $32/SF rent immediately on Day 1 — the lease is rolling and the market clears at $32.",isBest:!1,explanation:'Ignores downtime, TIs, and free rent. Even in a hot market, vacancy between leases plus ~6 months of free rent plus $50+/SF in TIs can erase 1–2 years of the uplift. "$32 from Day 1" overstates the value.'},{label:"There's no real upside — rent rollovers usually trade at a premium that the seller has already priced in.",isBest:!1,explanation:"This conflates pricing efficiency with the existence of upside. The upside exists; the question is who captures it. If the seller has priced perfectly, the buyer's IRR equals required return — but the underwriting still needs to model the rollover, not skip it."},{label:"Price at the in-place rent of $24/SF and treat the market rent as conservative downside.",isBest:!1,explanation:"Inverts the upside/downside framework. In-place rent is what the asset earns *today*; market rent is what it will earn after rollover. Pricing at in-place ignores the rollover entirely and would systematically overpay relative to other buyers who underwrite trended NOI."}],takeaway:'Mark-to-market upside is real but never "free". Always net out re-leasing costs (downtime + TI + free rent) before treating the rent uplift as cash flow. The right anchor is trended stabilized NOI, not in-place and not market-rent-from-day-one.',tips:["Rule of thumb: re-leasing costs are 6–18 months of the new gross rent.","Mark-to-market % = (market − in-place) / in-place.","Apply uplift only to the SF actually rolling — most rent rolls have staggered expirations."]},jy={id:"noi-growth-smell-test",title:"Does this NOI growth assumption hold up?",category:"diagnostic",difficulty:"intermediate",roles:["assetManagement","mortgageUw"],assetClass:"multifamily",scenario:"A broker's offering memorandum on a stabilized garden-style multifamily asset shows 8.0% annual NOI growth in years 1–5 of the proforma. The submarket has averaged 2.5–3.0% rent growth historically, with a recent peak of ~5% during the 2021 spike. Property is 95% occupied, leased to market, no value-add story, no upcoming reassessment.",data:[{label:"Proforma NOI growth",value:"8%/yr"},{label:"Historical rent growth",value:"2.5–3.0%"},{label:"Recent peak (2021)",value:"~5%"},{label:"Occupancy",value:"95% (stabilized)"},{label:"Value-add component",value:"None disclosed"}],question:"How should you respond to this NOI growth assumption?",options:[{label:"Reject it and re-underwrite at 3–4%/yr — 8% on a stabilized asset with no value-add lever is roughly 2× any defensible long-run pace.",isBest:!0,explanation:"NOI growth on a stabilized rent-roll equals roughly (rent growth × leased %) − opex growth. At 3% rent growth and 3–4% opex growth, real NOI growth is closer to 2–3%. 8% requires either rent growth at 2× historical norms, opex contraction (not a thing), or a value-add story the OM didn't disclose. Anchor at 3–4% and ask the broker what they're seeing that you're not."},{label:"Accept it but discount the exit cap to compensate.",isBest:!1,explanation:"Two wrongs don't cancel — using an inflated NOI ramp with a wider exit cap obscures the underwriting. The correct move is to fix the inputs, not to mask aggressive growth with a punitive cap. You'll lose to bidders who underwrite cleanly and price-in a tighter exit cap on real growth."},{label:"Trust the broker — they have submarket data you don't.",isBest:!1,explanation:`Brokers are advocates for the seller. Their job is to support the highest defensible price; "trust" is not an underwriting input. Verify with public REIS / CoStar / submarket reports and the property's own historical financials. If they have a real story, they'll show you the data.`},{label:"It's within range — 8% is achievable in inflationary environments.",isBest:!1,explanation:"Historical multifamily NOI growth has rarely sustained at 8% even in inflationary environments — and the 2021 spike was unique to severe supply imbalance. Treating it as a reasonable base case for a 5-year hold puts the proforma well outside historical experience."}],takeaway:"NOI growth assumptions on stabilized assets should anchor to long-run rent growth minus opex growth. Anything 2×+ historical norms requires a *specific*, *named*, *quantifiable* lever — value-add, mark-to-market, expense recovery — or it's aspirational. Your job is to find that lever or push back.",tips:["Real-NOI-growth ≈ rent-growth × leased% − opex-growth.","Multifamily long-run NOI growth: 2–3% in typical markets.","If the OM's growth ramp doesn't name the lever, ask. If they can't name it, fix the input."]},Cy={id:"comp-set-vetting",title:"Which comps belong in this set?",category:"comp-selection",difficulty:"beginner",roles:["acquisitions"],assetClass:"industrial",scenario:"You're pricing a 200,000 SF Class-B industrial asset in a major distribution submarket. The broker provides 5 trade comps to support pricing. You need to vet each before averaging the cap rates.",data:[{label:"Comp 1",value:"Same submarket, traded 4 mos ago, similar size — 6.0% cap"},{label:"Comp 2",value:"Different submarket (50 mi away), traded 6 mos ago — 5.25% cap"},{label:"Comp 3",value:"Same submarket, traded 18 mos ago (pre-rate-hike) — 4.5% cap"},{label:"Comp 4",value:"Same submarket, traded 2 mos ago, smaller (75k SF) — 6.25% cap"},{label:"Comp 5",value:"Same submarket, traded 8 mos ago, similar size — 5.85% cap"}],question:"How should you treat the comp set?",options:[{label:"Discard Comp 2 (different submarket) and Comp 3 (different rate environment); use Comps 1, 4, and 5 — average ~6.0% with a small adjustment for Comp 4's smaller size.",isBest:!0,explanation:"Comp 2 is a different geography, so the cap reflects a different supply/demand profile. Comp 3 traded under materially different cost-of-capital — 18 months ago Treasuries were 200+ bps lower, so the 4.5% cap is irrelevant to today's pricing. Comps 1, 4, 5 are recent, same submarket, comparable product. Comp 4's smaller size warrants a small upward cap adjustment (smaller = thinner buyer pool = wider cap)."},{label:"Average all 5 caps and use the result — that's why the broker provided 5.",isBest:!1,explanation:"Averaging unfiltered comps gives 5.6%, ~40 bps tighter than the defensible answer. The off-submarket and stale comps drag the average artificially low. A bid built on this number would lose discipline; a bid built on 6.0% would either win at fair value or lose to someone underwriting cleanly."},{label:'Discard everything except Comp 1 — only one comp is truly "same vintage, same submarket, recent".',isBest:!1,explanation:`A sample size of 1 is too thin to support pricing. Comps 4 and 5 are usable with minor adjustments (size, time). The principle isn't "perfect comps only" — it's "comps where you can defend the bridge from observed price to subject price". 3 reasonable comps beats 1 perfect comp.`},{label:"Trust the broker's sourcing — they would have filtered out bad comps already.",isBest:!1,explanation:"The broker's incentive is to support the highest defensible price. Comps that pull the cap tighter (like the 4.5% pre-rate-hike trade) are more likely to be included even when they shouldn't be. Vetting comps yourself is a core part of acquisition diligence, not a redundancy."}],takeaway:"Comp filtering protects the cap rate anchor. Any comp older than ~12 months in a moving rate environment, or any comp from a different submarket, deserves a discard or a documented adjustment. The remaining 3 should be enough; if not, you don't have enough data to support a tight pricing recommendation — which is itself a useful conclusion.",tips:["Discard rule of thumb: >12 mos in a moving rate environment, or different submarket.","Smaller assets generally trade at wider caps (thinner buyer pool).","If you have <3 defensible comps, widen the pricing range and say so."]},$y={id:"tax-reassessment-surprise",title:"What does the reassessment do to your bid?",category:"risk",difficulty:"advanced",roles:["acquisitions","mortgageUw"],assetClass:"multifamily",scenario:"You're bidding $50M for a stabilized multifamily asset in a jurisdiction that reassesses property tax on sale. The seller has owned for 12 years; current annual property tax is $200,000 (effectively ~0.4% of your bid price). The jurisdiction's post-sale assessment rate is 1.25% of sale price.",data:[{label:"Bid price",value:"$50M"},{label:"Current tax bill",value:"$200,000"},{label:"Reassessment rate",value:"1.25% of sale price"},{label:"Going-in cap (pre-reassessment)",value:"5.0%"}],question:"How should you handle the reassessment?",options:[{label:"Reduce NOI by ~$425k and price the deal off the post-reassessment NOI — at a 5% cap, that's ~$8.5M of value, so either bid $41–42M or accept a wider going-in cap on the same NOI.",isBest:!0,explanation:"Post-sale tax: $50M × 1.25% = $625k. NOI hit: $625k − $200k = $425k. Value impact at 5% cap: $425k / 0.05 = $8.5M. The seller's in-place NOI uses the legacy tax bill; your stabilized NOI must reflect the new bill. Either lower the bid to compensate or push the going-in cap from 5.0% to ~5.85% on the as-marketed NOI to back into the same value."},{label:"Use the seller's tax bill in your underwriting — that's what shows up in the financials.",isBest:!1,explanation:"Will systematically overpay by ~$8.5M. The legacy tax bill applies to the seller; the moment the deed transfers, the assessor re-prices and your tax bill jumps. Underwriting at the legacy figure is one of the most common mistakes in jurisdictions with sale-triggered reassessment."},{label:"Phase in the reassessment over 3 years to smooth the impact.",isBest:!1,explanation:"Most jurisdictions don't phase in reassessment — the new bill hits in the next tax year (sometimes the same year). Even where phasing exists, your IRR underwriting must include the full burden by the time you exit. Smoothing the input understates the cost."},{label:"Reassessment is a wash because the cap rate already reflects the tax environment.",isBest:!1,explanation:"The cap rate reflects the tax environment of *comparable trades*, not your specific reassessment trigger. Comp caps are inputs to pricing; the post-sale tax is a separate, additive cost you bear regardless of where the comp set traded. They don't cancel."}],takeaway:"In jurisdictions with sale-triggered reassessment, the post-sale tax bill is part of the bid price. Always compute (bid × reassessment rate) − (current tax) and run the value impact at your cap rate. Bidding off the seller's NOI is the single most expensive avoidable mistake in these markets.",tips:["Common reassessment-on-sale jurisdictions: California (Prop 13), Florida, Texas (varies).","Value impact ≈ (post-sale tax − current tax) / cap rate.","If the reassessment is uncertain, get a tax-consultant quote *before* bidding."]},Ry={id:"rent-roll-undervalued",title:"Why does this rent roll look like a bargain?",category:"pricing",difficulty:"intermediate",roles:["acquisitions","assetManagement"],assetClass:"multifamily",scenario:"A multifamily portfolio has a weighted average remaining lease term of 7 years on its anchor leases (commercial ground-floor) with annual bumps of 1.0%. The submarket has been growing rents at ~4% per year for the past 5 years. Residential units (95% of NRSF) are on standard 12-month leases at market. The deal is being marketed at a 5.75% cap, in line with comps.",data:[{label:"Anchor lease remaining",value:"7 years"},{label:"Anchor annual bumps",value:"1.0%"},{label:"Submarket rent growth",value:"~4%/yr"},{label:"Residential leases",value:"12-month, at market"},{label:"Going-in cap",value:"5.75% (comp-line)"}],question:"What's the most defensible read on the upside?",options:[{label:"Real upside is the anchor leases — 1% vs 4% market growth compounds into a ~20%+ rent gap by year 7. Residential is at market and won't drive outsized growth.",isBest:!0,explanation:"Compounding: (1.04/1.01)^7 − 1 ≈ 22%. The anchor leases are systematically falling behind market by ~3% per year. By rollover, you can reset to a market that's 20%+ above the lease bump trajectory. Residential is mark-to-market on every renewal so the gap doesn't accumulate there."},{label:"Real upside is residential — a 12-month lease term means you can push rents quickly.",isBest:!1,explanation:"Residential is *already* at market. Pushing rents faster than market growth is fighting the comp set, not capturing latent value. The 12-month structure means you participate in market growth, which is roughly the cap rate spread to risk-free already priced into the deal."},{label:"There's no obvious upside — comps are at 5.75% and the deal is at 5.75%. Pricing is efficient.",isBest:!1,explanation:"Pricing parity at the cap level doesn't mean upside parity. The going-in cap reflects in-place income; the upside is in the *trajectory* of that income. Compare two assets at the same 5.75%: one has anchor leases below market, one doesn't — the first one has materially better trended NOI growth."},{label:"The 1% anchor bumps are a red flag — those tenants negotiated a below-market deal that signals weak demand.",isBest:!1,explanation:'Inverts the cause and effect. 1% bumps were negotiated when market rent growth was much lower; they reflect the original landlord accepting structural underwriting, not weak tenant credit or demand. The "below market" is now an artifact of growth running ahead of the bump schedule, which is the upside.'}],takeaway:"A bumps-vs-growth gap is one of the cleanest upside structures in CRE. (1 + market) / (1 + bumps) compounds — the longer the remaining term, the bigger the gap at rollover. The trick is to model trended NOI to lease expiry, not just to apply a flat 4% to all rent.",tips:["Cumulative gap ≈ (1 + market) / (1 + bumps) − 1, compounded over remaining term.",'Watch for "below-market" markers in OMs that mean opposite things in different markets.',"The longer the remaining term + the wider the bumps-vs-market gap, the larger the latent uplift."]},Iy={id:"ti-vs-rent-giveback",title:"Should you give the TI or the rent break?",category:"lease-econ",difficulty:"intermediate",roles:["assetManagement","acquisitions"],assetClass:"office",scenario:"A prospective tenant wants to sign a 5-year lease at $20/SF face rent. Comparable space in the building has been signing at the same face rent with $20/SF in TIs. The new prospect is asking for $30/SF in TIs instead. They've indicated they'd also consider a rent reduction in lieu of the extra TI dollars.",data:[{label:"Face rent",value:"$20/SF"},{label:"Lease term",value:"5 years"},{label:"Comp TI",value:"$20/SF"},{label:"Requested TI",value:"$30/SF"},{label:"Annual discount rate",value:"7%"}],question:"How should you analyze the tenant's ask?",options:[{label:"Convert both to NER and compare. $30/SF TI on a 5-year deal is worth roughly $2/SF/yr of rent give-back — so the equivalent rent is ~$18/SF face, or NER ~$14/SF after the comp $20/SF TI baseline.",isBest:!0,explanation:"Total TI delta: $30 − $20 = $10/SF extra. Amortized over 5 yrs at 7%: ~$2.44/SF/yr. So the deal economics match a $20 face / $30 TI structure with NER ≈ $20 − ($30/5) = $14/SF, vs the comp $20 face / $20 TI at NER ≈ $20 − ($20/5) = $16/SF. The tenant is asking for a 200 bps NER reduction; that's the negotiation, framed correctly."},{label:"Refuse the extra TI — face rent must stay at comp level for valuation purposes.",isBest:!1,explanation:"Treating face rent as inviolate misses the economics. Buyers and appraisers underwrite NER; sophisticated counterparts will recognize $20/SF face on $30 TI as economically equivalent to a lower face rent. Holding the line on face while caving on TI gives you the worst of both — concession economics with the appearance of premium pricing."},{label:"Give the TI rather than reduce rent — TIs are capitalized, rent reductions hit NOI directly.",isBest:!1,explanation:"Plausible-sounding but wrong as a general rule. Both flow through to value: TIs reduce equity (or proceeds) at signing; rent reductions reduce NOI permanently. The economic equivalence is what the NER analysis is for. Picking one over the other on accounting grounds without comparing economics is sloppy."},{label:"Give the rent reduction instead — the tenant's spending the TI on something they'd build anyway, so a rent break is a real concession.",isBest:!1,explanation:"Conflates whether the tenant *values* the TI with whether the *landlord* should pay for it. From the landlord's perspective, $X of TI and $X/N of rent reduction (where N = lease term) are economically equivalent. Whether the tenant happens to like one form or another is part of the negotiation, but doesn't change the cost."}],takeaway:"TI vs rent reduction is the single most common landlord-side negotiation. Always reduce both forms of concession to a single comparable: net effective rent. NER = face rent − (TI + free rent + LCs) / lease term, optionally discounted. Anything else is anchoring on the wrong number.",tips:["NER ≈ face rent − total concessions / term (simple); discount for time value if precise.","$1/SF of TI ≈ $0.20/SF/yr of rent on a 5-yr deal, $0.12/SF/yr on 8-yr, $0.10/SF/yr on 10-yr.","Always quote NER in comp tables — face rent without concessions is misleading."]},Ey={id:"refi-vs-sell",title:"Refinance or sell?",category:"investment-thesis",difficulty:"advanced",roles:["assetManagement","portfolioMgmt"],assetClass:"mixed",scenario:"You're three years into a five-year hold on a stabilized industrial asset. You've modeled two paths to year-5 close-out: (a) hold + refi at year 3 to a 60% LTV loan, distribute proceeds, and sell at year 5; (b) sell now and redeploy into a similar deal at current pricing. The IRR on both paths is materially identical (~14.5%) on the model.",data:[{label:"Hold remaining",value:"2 years"},{label:"Refi LTV",value:"60%"},{label:"Both-path IRR",value:"~14.5%"},{label:"Asset stability",value:"Stable, no value-add left"}],question:"How should you decide between the two paths?",options:[{label:`"It depends" — IRR equality leaves the decision to taxes, reinvestment risk on the proceeds, and LP preferences. Run the after-tax distributions and compare against your fund's required return on redeployed capital.`,isBest:!0,explanation:"When two paths have identical IRR, the IRR isn't the deciding factor. Sell-now triggers depreciation recapture and (depending on structure) capital gains; refi defers tax. The proceeds in path (b) need a place to land — if your reinvestment opportunity set requires a 14%+ deal at current pricing, redeployment risk is real. Refi extracts capital while keeping the underlying asset working. Path (a) tends to win for tax-sensitive LPs and uncertain redeployment markets."},{label:"Sell — same IRR, but liquidity is preferable to lock-in.",isBest:!1,explanation:"Treats liquidity as free. Selling generates a tax event you don't need to trigger and creates a redeployment problem. Liquidity is valuable when there's a use for it; without one, accelerated taxes + reinvestment risk + transaction costs make selling the worse choice."},{label:"Refinance — extracting capital while keeping the upside is always preferable when IRR matches.",isBest:!1,explanation:'Half-right but stated too strongly. Refi can be the right choice for the reasons given, but "always" ignores the cases where the asset is past its peak (cap rate expansion expected) or the loan-sizing markets are punishing (rates spiked, refi hurts cash-on-cash). Decision is conditional, not categorical.'},{label:"Run the analysis longer — 14.5% on both paths means you're missing something in the model.",isBest:!1,explanation:'IRR equality across well-built models is normal, not a flag. Time the cash flows carefully and you frequently get within 50 bps. The right question is what *non-IRR* factors should drive the decision, which is the "it depends" framing.'}],takeaway:"When IRR is a tie, the decision moves to tax treatment and reinvestment economics. Refis are typically more tax-efficient and remove redeployment risk; sales lock in returns and free up capital. Neither is universally right — the answer depends on the LP's tax position, the fund's remaining deployment capacity, and the market for re-up deals.",tips:["Always run after-tax IRR for refi-vs-sell decisions — pre-tax can mask big differences.","Refi proceeds keep the depreciation schedule running; sales reset it.",`If you can't name 2+ deals you'd redeploy into, "sell" is harder to justify.`]},Py={id:"going-in-vs-exit-cap-spread",title:"Is your exit cap conservative enough?",category:"sensitivity",difficulty:"intermediate",roles:["acquisitions"],assetClass:"mixed",scenario:`You're underwriting a 5-year hold at a 5.0% going-in cap rate. Your model uses a 6.0% exit cap — 100 bps of cap expansion. The deal otherwise pencils to a 14% IRR. A senior reviewer pushes back: "Why 100 bps? Why not 75 or 125?" The submarket has seen cap rates trade in a tight band over the past 10 years (4.75–5.50%) outside of brief stress periods.`,data:[{label:"Going-in cap",value:"5.0%"},{label:"Modeled exit cap",value:"6.0% (+100 bps)"},{label:"Hold period",value:"5 years"},{label:"Modeled IRR",value:"14%"},{label:"10-yr submarket cap range",value:"4.75–5.50%"}],question:"How do you defend the 100 bps spread?",options:[{label:"100 bps is a reasonable conservative anchor — it expands the cap by ~20% off the going-in level, which absorbs most realistic mean-reversion scenarios over a 5-7 year hold without being so punitive that the deal is impossible to win.",isBest:!0,explanation:`Industry convention for stable assets: 50–100 bps cap expansion over a 5-7 year hold. 100 bps is the upper end of "conservative-but-not-punitive". It puts the exit at 6%, which is outside the trailing 10-year range — so you're modeling an exit harder than anything observed in the past decade. If the deal pencils on that, you have margin. Sub-50 bps is aggressive for stabilized; >150 bps is recession underwriting.`},{label:"Use 0 bps spread — flat caps. The historical range supports it.",isBest:!1,explanation:"Aggressive. Using the going-in cap as the exit cap embeds an assumption that the cap rate environment 5 years from now matches today's. That happens, but it's not the conservative case. Bidders using 0 bps spread will always win deals — until the rate environment moves and they take the loss. The 10-year band tells you what *has been*; conservative underwriting models what *could be*."},{label:"Use 200 bps spread — always assume rate stress on exit.",isBest:!1,explanation:"Punitive. 200 bps cap expansion takes a 5% to a 7% — that's recession-grade pricing for a stabilized industrial asset. You'll never win a deal at that underwriting; if the model only pencils to 200 bps spread, the deal is in trouble already. Conservative ≠ pessimistic; conservative means absorbs realistic downside without modeling the worst case."},{label:"Match the spread to the going-in IRR — the higher the IRR, the more cap expansion you can absorb.",isBest:!1,explanation:'Inverts the discipline. The spread is an underwriting input that *protects* against an unfavorable exit; tying it to the IRR creates a feedback loop where aggressive deals get aggressive spreads. The spread should be set by hold period, asset stability, and the rate environment — not by how much "room" the deal has.'}],takeaway:'Exit cap spread is a stability test, not a knob to flex deal IRRs. Standard convention for stabilized 5-7 year holds is 50-100 bps; under that is aggressive, over 150 bps is recession underwriting. The right number is "the worst plausible cap environment" not "what makes the deal pencil".',tips:["Stabilized 5-7 yr holds: 50-100 bps spread is industry standard.","10+ year holds or value-add: 100-150 bps is more defensible.","If the deal only pencils at <50 bps spread, it's a thin underwrite."]},Ay={id:"vacancy-spike",title:"A 15-point vacancy spike — what now?",category:"diagnostic",difficulty:"intermediate",roles:["assetManagement"],assetClass:"office",scenario:`A 200,000 SF Class-A office building has run at 95%+ occupancy for the past four years. In the most recent quarter, occupancy dropped from 95% to 80% — a 15-point swing. The seller's broker is marketing this as a "temporary leasing opportunity" at the same pricing as a year ago. You're being asked to bid this week.`,data:[{label:"Building size",value:"200,000 SF"},{label:"Prior occupancy",value:"95%+ (4 yrs)"},{label:"Current occupancy",value:"80%"},{label:"Time elapsed",value:"1 quarter"},{label:"Pricing pressure",value:"Same as 12 mos ago"}],question:"Before bidding, what's the single most important diagnostic question?",options:[{label:"Was this a single-tenant move-out or a market-wide deterioration? The price implications are completely different — single-tenant is a re-leasing problem; market-wide is a cap-rate problem.",isBest:!0,explanation:"15 points = 30,000 SF. If that's one large tenant rolling, you have a real but bounded re-leasing event: known TI cost, known downtime, similar future tenants likely available. If it's 4-5 smaller tenants leaving simultaneously, the diagnosis is fundamentally different — the building or submarket is losing demand and the cap rate environment for this asset has shifted. Same observed vacancy; entirely different underwriting."},{label:'How much of the vacancy is leased to LOI tenants? If 30%+, the spike is "paper" not real.',isBest:!1,explanation:"Useful but not the most important diagnostic. LOI conversion is the *next* question after you've established whether the underlying demand environment is healthy. An 80% leased / 10% LOI building is meaningfully different in a healthy market vs. a deteriorating one."},{label:"Are concessions running ahead of historical levels in the submarket?",isBest:!1,explanation:"Important context but secondary. Concession trends tell you about pricing discipline; the move-out vs market-wide question tells you about demand structure. You can re-lease at lower NER even in a healthy market; you can't re-lease at any price in a deteriorating one."},{label:"What's the WALT on the remaining 80% of the rent roll?",isBest:!1,explanation:"Always relevant but doesn't address the cause of the spike. WALT tells you about future risk; the diagnostic question is about the *current* spike — its cause determines whether the price should hold or move."}],takeaway:"Same observed vacancy can mean very different things depending on cause. Always trace a spike to the *who* — single tenant vs many — before underwriting. A single-tenant rollover is a TI / downtime / re-leasing problem with a known cost; a multi-tenant departure is a structural demand signal that should reset your cap rate, your trended NOI, and your hold thesis.",tips:["Pull the rent roll and trace each vacated suite to a tenant name.",'15-point swing in one quarter without a known driver is a "stop the line" signal — push the bid date.',"Submarket vacancy / absorption data tells you market-wide vs asset-specific."]},My={id:"tenant-credit-pricing",title:"How much should credit compress the cap?",category:"pricing",difficulty:"advanced",roles:["acquisitions","mortgageUw"],assetClass:"industrial",scenario:"You're bidding on a single-tenant industrial distribution asset. The tenant is investment-grade rated (BBB+ from S&P), occupies 100% of the building, and has a 15-year remaining lease term with 2.5% annual escalations. Comparable trades for spec-grade or short-term-leased product are pricing at 6.0% caps in this submarket.",data:[{label:"Tenant rating",value:"BBB+ (IG)"},{label:"Occupancy",value:"100% single-tenant"},{label:"Lease term remaining",value:"15 years"},{label:"Annual escalations",value:"2.5%"},{label:"Spec-grade comp cap",value:"6.0%"}],question:"Where should this asset price?",options:[{label:"~50–100 bps tighter than spec-grade comps — the 15-year IG lease is essentially a corporate bond on real estate, so cap compression is real but bounded by the spread between IG corporate yields and CRE.",isBest:!0,explanation:"IG-tenant single-tenant deals trade tighter than spec-grade because the income is bond-like: long-dated, contractual, low default probability. The compression is typically 50-100 bps depending on rating, term, and the gap between corporate-bond yields and prevailing cap rates. So at a 6.0% spec-grade cap, this asset prices at 5.0-5.5%. Tighter than that is reaching; wider is overlooking the credit."},{label:"Same 6.0% as spec-grade — the lease economics already include the credit and cap rates capture the asset, not the tenant.",isBest:!1,explanation:"Misses how single-tenant pricing works in practice. Cap rates for single-tenant net-leased assets are heavily driven by tenant credit because the income stream IS the underwriting. Treating an IG-anchor 15-year lease the same as a 5-year spec-grade rollover materially underprices the certainty of the income."},{label:"200+ bps tighter — IG-tenant on a 15-year lease should price like a corporate bond, in the 4% range.",isBest:!1,explanation:"Overshoots. CRE doesn't trade fully to corporate-bond yields because there's residual risk: the building still needs to exist, be leasable, and retain land value at lease expiry. The compression is real but the floor is the underlying real estate value at exit, not the tenant credit. 200+ bps is more aggressive than what single-tenant net-lease specialists pay."},{label:"Wider than 6.0% — single-tenant deals carry binary risk (one departure = 100% vacant) that should *expand* the cap.",isBest:!1,explanation:"Inverts the analysis. Single-tenant credit risk concentration is real, but it's offset (and then some) by lease term: a 15-year IG lease has very low departure probability over the underwriting horizon. The binary risk concern dominates *short-dated* single-tenant deals; on long IG, the income certainty wins."}],takeaway:"Single-tenant net-lease pricing is heavily a function of tenant credit + lease term. IG-anchor + long term = bond-like cash flow + cap compression. The compression is 50-100 bps for a typical IG, more for AAA / sovereign, less for low-IG. The floor is set by underlying real estate value, not by corporate yields.",tips:["Single-tenant cap = base CRE cap − credit spread, bounded below by underlying RE value.","IG: 50-100 bps tighter. Sovereign / AAA: 100-200 bps tighter. Sub-IG: spec-grade pricing.",'Watch for "rent roll mark-to-market" plays masked as IG cap compression — those are different stories.']},Ty={id:"dscr-refi-failing",title:"The refi DSCR test is failing — what now?",category:"risk",difficulty:"intermediate",roles:["mortgageUw","assetManagement"],assetClass:"office",scenario:"Your asset is approaching loan maturity. The current loan is $50M at 4.0% on a 30-year amort, IO. NOI is flat at $3.0M. Today's market rate is 7.0%. The refinance lender requires a 1.25x DSCR. At 7.0% on the same $50M loan amount, the DSCR test fails. The borrower wants to know what levers exist to make the refi pencil.",data:[{label:"Current loan",value:"$50M"},{label:"Current rate",value:"4.0% (IO)"},{label:"NOI",value:"$3.0M"},{label:"Market rate",value:"7.0%"},{label:"Lender DSCR threshold",value:"1.25x"},{label:"New DS @ $50M / 7.0% / 30yr amort",value:"~$3.99M"},{label:"New DSCR",value:"~0.75x — fails"}],question:"Which lever is most likely to make this loan re-pencil with the same lender?",options:[{label:"Lower the loan amount (paydown at refi) to ~$30M — at that loan size the DS at 7% / 30yr drops to ~$2.4M and DSCR clears 1.25x.",isBest:!0,explanation:"Paydown is the most reliable lever. Max DS at 1.25x = NOI / 1.25 = $2.4M. At 7% / 30yr loan constant ≈ 7.99%, max loan = $2.4M / 0.0799 ≈ $30M. The borrower brings $20M of equity at refi to pay down. Painful but mathematically clean and what every lender models first."},{label:"Push for a longer amortization (40 or 50 years) to lower the loan constant and make the same loan pencil.",isBest:!1,explanation:"Marginally helpful but not enough. 40-yr amort at 7% has a constant of ~7.46% vs 7.99% at 30-yr — DS only drops ~7%. DSCR moves from 0.75 to 0.81; still a fail. Amort extension alone almost never closes a 50%+ DSCR gap."},{label:"Argue for a DSCR exception based on the sponsor's strong balance sheet and recourse pledge.",isBest:!1,explanation:"Possible in some markets but unreliable at this size of shortfall. Recourse can soften an underwriting view but doesn't change the cash-flow math the lender models. Most institutional lenders won't waive a 50% DSCR shortfall regardless of the sponsor's name."},{label:"Refinance with a bridge / debt fund at a higher rate and a 1.05x DSCR to get past the trough.",isBest:!1,explanation:"Trades one problem for another. Bridge debt at 1.05x is a thin cushion that doesn't survive *any* NOI miss. The exit problem (a permanent take-out at higher DSCR) returns in 12–24 months, often worse if rates haven't come down. Bridge can buy time but it's not the *first* lever to pull."}],takeaway:'When the DSCR test fails on refi, the math is mostly about the loan amount, not the rate or the sponsor. Paydown is the highest-leverage move. Always recompute "max loan = NOI / DSCR / loan constant" first — it tells you exactly how much equity needs to come into the deal at refi to clear.',tips:["Refi math: max loan at threshold = NOI / DSCR / loanConstant(rate, amort).","Loan constant at 7%/30yr ≈ 7.99%; at 8%/30yr ≈ 8.81%; at 6%/30yr ≈ 7.20%.","A 25 bps move in market rate at refi can change the required paydown by 5–10%.","Recourse + sponsor strength soften terms but don't replace the cash-flow test."]},Mm=[ky,Sy,Ny,jy,Cy,$y,Ry,Iy,Ey,Py,Ay,My,Ty];function Oy(e){return Mm.find(t=>t.id===e)}function Dy(e,t){return t==="mixed"||!e.assetClass?!0:e.assetClass===t}function By(e,t){return t==="all"||e.difficulty===t}function Tm(e){return Mm.filter(t=>!(e.category!=="all"&&t.category!==e.category||!By(t,e.difficulty)||!Dy(t,e.assetClass)||!Qs(t.roles,e.role)))}function gu(e,t){let n=t>>>0;n===0&&(n=2654435769);for(let r=e.length-1;r>0;r--){n=n*1664525+1013904223>>>0;const a=n%(r+1);[e[r],e[a]]=[e[a],e[r]]}}function Fy(e,t,n=Date.now()){const r=[...e];return gu(r,n),r.slice(0,Math.min(t,r.length)).map((i,o)=>{const l=[...i.options];return gu(l,(n^(o+1)*2654435769)>>>0),{...i,options:l}})}const Ly=[5,10,20],zy=[{id:"all",label:"All"},{id:"beginner",label:"Beginner"},{id:"intermediate",label:"Intermediate"},{id:"advanced",label:"Advanced"}];function _y({onStart:e,onBack:t}){const[n,r]=b.useState("all"),[a,i]=b.useState("all"),[o,l]=b.useState("mixed"),[c,u]=b.useState("all"),[f,d]=b.useState(5),p=b.useMemo(()=>Tm({category:n,difficulty:a,assetClass:o,role:c}),[n,a,o,c]),g=p.length>0,y=()=>{g&&e({category:n,difficulty:a,assetClass:
