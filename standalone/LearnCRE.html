bracket with the two nearest round rates and interpolate (e.g. 2.75% sits between 2.5% and 3%)."],generate(e,t="intermediate",n="mixed"){const r=I(e,O.noi,t),l=I(e,O.growthRate,t),a=e.pickInt(O.projectionYears.min,O.projectionYears.max),s=$r(r,l,a);return{id:V("cg"),kind:"compoundGrowth",prompt:`A value of ${g(r)} grows at ${w(l,2)} per year for ${ee(a)}. What's the end value?`,context:{startValue:r,growthRate:l,projectionYears:a},expected:s,unit:"usd",tolerance:{type:"pct",band:.03},solution:Jm(r,l,a)}}};function th(e,t){const n=jd(e,t);return{formula:"Max Loan = NOI / Debt Yield",steps:[{label:"Max loan",expression:`${g(e)} / ${w(t)}`,result:g(n)}],answerDisplay:g(n)}}const nh={kind:"debtYield",label:"Debt Yield Loan Sizing",description:"Max loan given NOI and required debt yield.",category:"returns",pattern:"A / B   where A = NOI, B = required yield %",tips:["Debt yield is the lender-side cap rate: NOI / Loan. 9% DY = 11.1x NOI max loan; 10% DY = 10x NOI.","Inverse: Max Loan = NOI / required DY.","Lender check: if debt yield < 8%, most CMBS lenders pass — so 8% is a hard floor for stabilized deals.","Quick math: $800k NOI / 9% → think $800k × 11.11 = $8.89M. Or: $800 / 0.09 = ~$8,890 (shift decimals)."],generate(e,t="intermediate",n="mixed"){const r=I(e,O.noi,t),l=I(e,O.debtYieldTarget,t),a=jd(r,l);return{id:V("dy"),kind:"debtYield",prompt:`NOI is ${g(r)}. Lender requires a ${w(l)} debt yield. What's the max loan?`,context:{noi:r,debtYieldTarget:l},expected:a,unit:"usd",tolerance:{type:"pct",band:.05},solution:th(r,l)}}};function rh(e,t,n){const r=ea(e,t),l=yd(r,n);return{formula:"Development Spread = YoC − Market Cap Rate",steps:[{label:"YoC",expression:`${g(e)} / ${g(t)}`,result:w(r)},{label:"Spread",expression:`${w(r)} − ${w(n)}`,result:`${Oe(l)}`}],answerDisplay:Oe(l)}}const lh={kind:"devSpread",label:"Development Spread",description:"YoC minus market cap — the risk premium for developing vs buying.",category:"valuation",pattern:"(A / B) − C   [YoC minus mark )})`}],answerDisplay:Oe(n)}}const dh={kind:"goingInCap",label:"Going-in Cap Rate",description:"Price + NOI → cap rate in bps.",category:"valuation",pattern:"A / B   where A = NOI, B = price",tips:["Cap = NOI / Price. Inverse is the NOI multiple: 5% = 20x, 6% = 16.67x, 7% = 14.29x.","Mental shortcut: NOI / Price, round both to 2 sig figs first. $623k / $12.4M ≈ $620 / $12,400 ≈ 5.0%.","Sanity check: if price looks like ~20× NOI you're at 5%, ~15× → ~6.7%, ~10× → 10%.","Round both up or both down together — keeps the error directionally small. Rounding one up and one down stacks errors.","Sandwich: find the nearest clean multiples (e.g. 15× = 6.67%, 16× = 6.25%) and interpolate toward the actual ratio.","Convert cap to bps: 5.25% = 525 bps. Just shift the decimal two places."],generate(e,t="intermediate",n="mixed"){const r=I(e,H("capRate",n),t),l=I(e,O.noi,t),a=t==="beginner"?5e5:t==="advanced"?25e3:1e5,s=Math.round(l/r/a)*a,i=Md(s,l),u=Math.round(i*1e4);return{id:V("giCap"),kind:"goingInCap",prompt:`Purchase price is ${g(s)} and NOI is ${g(l)}. What's the going-in cap rate (in bps)?`,context:{purchasePrice:s,noi:l},expected:u,unit:"bps",tolerance:{type:"abs",band:15},solution:ch(s,l)}}};function ph(e,t){const n=e/t;return{formula:"GRM = Purchase Price / Annual Gross Potential Rent",steps:[{label:"GRM",expression:`${g(e)} / ${g(t)}`,result:ve(n,2)}],answerDisplay:ve(n,2)}}const fh={kind:"grossRentMultiplier",label:"Gross Rent Multiplier",description:"Price / PGI — quick multifamily/retail benchmark.",category:"valuation",pattern:"A / B   where A = price, B = gross potential rent",tips:["GRM = Price / PGI. Multifamily typically trades 8–14× GRM; lower is cheaper.","Quick inversion: cap rate ≈ (1 − OpEx ratio) / GRM. 12× GRM with 40% OpEx ≈ 5% cap.","GRM ignores OpEx, so it's most useful when opex structure is consistent across comps.","Trap: high-OpEx assets look cheap by GRM but expensive by cap. Always cross-check."],generate(e,t="intermediate",n="mixed"){const r=I(e
