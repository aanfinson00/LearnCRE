ex has two layers: recurring (steady-state, sized per unit per year) and one-time (specific known replacements, sized as scheduled events). Conflating them produces under- or over-funded reserves and misleading NOI lines. Class-B MF recurring norms run $300-500/unit/yr; pad it for older / heavier-capex product. One-time events live as their own line items in the equity check or a draw schedule.",tips:["Recurring capex norms by asset class: Class-A MF $250-350/unit · Class-B/C MF $400-600/unit · office $1.50-3.00/SF · industrial $0.50-1.00/SF · retail $1-2/SF.","Roof, HVAC, parking lots, boilers — schedule them. They're not recurring.","Deferred maintenance from the tour goes into Day-1 capex, not into year-1 recurring."]},Hb={id:"refi-cap-stress",title:"Stress-testing a permanent loan for refi at maturity",category:"risk",difficulty:"advanced",roles:["mortgageUw"],assetClass:"office",scenario:"You're underwriting a 5-year permanent loan on a stabilized office asset. Going-in cap is 6.5%; the loan sizes to 65% LTV at a 1.30x DSCR + 9% debt yield. Today's market is steady, but you need to confirm the loan will refi cleanly at maturity — even if cap rates widen and rates rise.",data:[{label:"Going-in cap",value:"6.5%"},{label:"LTV at close",value:"65%"},{label:"DSCR / debt yield",value:"1.30x / 9.0%"},{label:"Hold period",value:"5 years"},{label:"Today's 5-yr Treasury",value:"~4.5%"}],question:"What's the tightest refi-stress test you should run?",options:[{label:"Cap-stress to +100 bps (exit 7.5%), rate-stress to +150 bps, and confirm the same loan amount still passes 1.20x DSCR + 8% debt yield against trended NOI. If it doesn't, size lower today.",isBest:!0,explanation:"Refi-stress is a 5-years-from-now exercise. Three variables move: NOI (uncertain — trend or hold flat), cap rate (typically widens 75-150 bps for stabilized office in a stress scenario), and rate (varies, but +100-200 bps is the conservative band). Test the *same loan amount* against degraded numbers. If you size today at 65% LTV / 1.30x and it fails 1.20x at refi-stress, you're over-leveraged for a 5-year hold. Drop LTV at close until refi pencils."},{label:"Test only the rate move — cap rates have been stable for 8 years and shouldn't materially shift in 5.",isBest:!1,explanation:"Cap rates are the dominant refi-stress variable for stabilized assets. Even if rates stay flat, a 100 bps cap widening drops the implied value 13-15% and pushes LTV well above 65%. Ignoring the cap-stress side of the test is the most common refi-modeling mistake."},{label:"Run the stress test with NOI growth at 0% (flat) and call that conservative enough — every other variable should be modeled at today's levels.",isBest:!1,explanation:"Flat NOI is the WRONG conservative — flat-NOI scenarios actually flatter the deal because at the same cap rate, you're refi'ing against the same value (no decline). The downside scenarios are NOI-flat-PLUS-cap-widening, which pushes LTV up. Always pair the assumptions: NOI movement + cap movement + rate movement."},{label:"Stress only the debt yield test — DSCR is already conservative because rates would have to triple to fail it.",isBest:!1,explanation:"False on DSCR being safe. If rates move +200 bps, the loan constant rises and DSCR drops materially. And the debt-yield-only test misses the cap-stress side of the equation. Comprehensive refi-stress tests all three (NOI, cap, rate) simultaneously, not one in isolation."}],takeaway:"Refi-stress is the most under-rated test in lender underwriting. Run it against the *same loan amount* with a triple-degraded forward picture: flat or modestly down NOI, +75-150 bps cap widening, +100-200 bps rate move. If DSCR or debt yield fails the lender's refi threshold (typically 1.20x and 8%), size lower today. Banks that skip this test get burned in the second half of every cycle.",tips:["Office cap-stress: +100-150 bps; industrial/MF: +50-100 bps; retail: +75-150 bps depending on tenant credit mix.","Refi DSCR threshold is typically lower than origination (1.20x vs 1.30x) — the loan has been seasoned.","If the deal only refis at zero stress, you're depending on every variable cooperating for 5 years. Lenders don't."]},Qb={id:"fund-vs-deal-irr-gap",title:"Why is fund-level IRR 14% when deal-level is 16%?",category:"diagnostic",difficulty:"advanced",roles:["portfolioMgmt"],assetClass:"mixed",scenario:"You're reviewing an LP report. Deal-level IRRs across the fund's 8 acquisitions average 16%. The fund-level IRR (net to LPs) is 14%. The 200 bps gap is a recurring question from your investor base.",data:[{label:"Deal-level IRR (avg)",value:"16%"},{label:"Fund-level net IRR",value:"14%"},{label:"Gap",value:"200 bps"},{label:"Fund vintage",value:"Year 4 of 7"},{label:"Mgmt fee",value:"1.5% of committed"},{label:"Carry",value:"20% over 8% pref"}],question:"What's the dominant explanation for the 200 bps gap?",options:[{label:"A combination: management fees on committed capital (~75 bps drag), the J-curve from undeployed capital (~50-75 bps), and carry on outperformance (~25-50 bps). All three compound; no single one explains it.",isBest:!0,explanation:`Fund-level vs deal-level IRR gaps come from three structural sources: (1) **fees** — mgmt fee is on committed capital, so undeployed dollars still pay; that's a steady drag of 50-100 bps depending on deployment pace; (2) **J-curve** — capital is called over years 1-3 but doesn't produce returns until invested, so early-year IRRs are negative even on great deals; (3) **carry/promote** — when the fund crosses the pref hurdle, the GP takes a slice of incremental returns, dropping LP-net IRR. Sophisticated LPs expect 200-300 bps of gap and look for *consistent* gap, not "no gap" (which would suggest no deals are clearing pref or the fees aren't being charged).`},{label:"Cash drag from undeployed capital sitting in the fund account earning low interest.",isBest:!1,explanation:"Real but small (typically 25-50 bps, not 200). Most of the gap is fees + J-curve + carry, not idle cash. Capital is usually called close to deployment, so cash-drag is a minor component."},{label:"Bad deals dragging down the average — IRR-weighted means a few losses pull the fund-level number below the average.",isBest:!1,explanation:`Misreads the math. Deal-level IRR *is* an IRR average; if it shows 16%, the bad deals are already baked in. The gap to fund-level isn't about hidden losses — it's about fees + structure. Looking for "bad deals" to explain the gap is a category error.`},{label:"Tax leakage between the deal entity and the fund vehicle.",isBest:!1,explanation:"Tax structures *can* introduce friction in some unusual setups, but for most US-based real estate funds the tax pass-through is clean (LPs report deal-level allocations on their K-1s). Tax leakage isn't a 200 bps systematic source. Fees + J-curve + carry are."}],takeaway:"Fund-level vs deal-level IRR always diverges by 200-300 bps for fully-functioning vehicles. The breakdown is roughly fees (50-100 bps), J-curve (50-75 bps), carry (25-100 bps depending on outperformance). No-gap is a red flag, not a positive — it means either fees aren't being charged or no deals have crossed pref. LPs who understand this don't panic at 200 bps; they panic at 0 bps or 500+ bps.",tips:["Mgmt fee on committed = a constant drag for the first 3-4 years until deployment catches up.","J-curve is sharpest in years 1-2 and self-corrects as distributions begin.","No carry being earned typically means the deals haven't cleared the 8% pref — could be performance or could be timing."]},Xb={id:"dev-ltc-vs-ltv",title:"Construction loan: when does LTC bind vs LTV?",category:"risk",difficulty:"advanced",roles:["development","mortgageUw"],assetClass:"mixed",scenario:"You're sizing a construction loan on a $50M total project cost (TPC). The lender quotes 65% LTC and 60% LTV-on-stabilized-value. Stabilized NOI is projected at $4M; market cap is 5.5%. The construction loan converts to permanent at certificate of occupancy.",data:[{label:"TPC",value:"$50M"},{label:"Stabilized NOI",value:"$4M"},{label:"Market cap (stabilized)",value:"5.5%"},{label:"LTC limit",value:"65%"},{label:"LTV-on-stabilized limit",value:"60%"}],question:"Which test binds the loan size, and what does the lender lend?",options:[{label:"LTV binds at $43.6M (60% × $72.7M stabilized value), but LTC binds tighter at $32.5M (65% × $50M TPC). Lender lends $32.5M because both tests must pass and LTC is more restrictive.",isBest:!0,explanation:"Two-constraint sizing — calculate both, the more restrictive wins. LTC = 65% × $50M = $32.5M. Stabilized value = $4M / 5.5% = $72.7M; LTV = 60% × $72.7M = $43.6M. LTC is tighter, so it binds. The lender will lend $32.5M, not $43.6M. This is the typical pattern for *value-creating* developments: the asset is worth more once stabilized than the cost to build it (that's the whole point), so LTC binds. If TPC > stabilized value (a deal that destroys value), LTV would bind instead — which is also a signal not to build."},{label:"LTV binds because $43.6M > $32.5M — the lender lends the larger amount, $43.6M.",isBest:!1,explanation:"Inverts the rule. Two-constraint loan sizing always picks the *smaller* of the two — both tests must pass for the loan to underwrite. The borrower wants the larger amount; the lender, the smaller. Lender protection wins."},{label:"LTV binds at $43.6M; the LTC limit is just a guideline and lenders will exceed it for strong sponsors.",isBest:!1,explanation:'LTC is a hard constraint on most construction loans, not a guideline. Lenders use it as a "skin in the game" test — the borrower must put real equity into the deal proportional to total cost. Sponsor strength can shift terms (rate, recourse) but rarely the LTC floor.'},{label:"Lender lends the average of the two limits ($38M) to balance LTC and LTV concerns.",isBest:!1,explanation:"Not how dual-constraint sizing works. The two limits aren't averaged; the deal must satisfy BOTH simultaneously. Treating them as independent and averaging would routinely produce loans that fail one or both constraints at refi."}],takeaway:"Construction debt sizes to MIN(LTC, LTV-on-stabilized). LTC almost always binds for value-creating developments because TPC < stabilized value (that's the dev spread). When LTV binds instead, your stabilized value isn't materially above your cost — re-examine the deal. The borrower brings (1 − binding%) × TPC of equity to fund the gap.",tips:["LTC limits: 60-65% institutional core dev; 55-60% value-add / repositioning; 50-55% spec / less-stabilized markets.","LTV-on-stabilized: 55-65% range; tighter the riskier the lease-up.","When LTV binds in your model, the deal's economics are weak — investigate before pushing for more leverage."]},Kb={id:"distressed-loan-workout",title:"Buying a distressed CRE loan — when does it pencil?",category:"investment-thesis",difficulty:"advanced",roles:["acquisitions","portfolioMgmt"],assetClass:"office",scenario:"A regional bank is offering a non-performing $40M senior loan on a Class-B office building. Original loan: $40M at 4.5%, 4 years remaining. Borrower hasn't paid in 2 quarters. The asset's estimated current value is $30M (loan is 33% under-water). The bank wants to clear it. They're asking $24M (a 40% discount to face).",data:[{label:"Loan face",value:"$40M (senior)"},{label:"Asset current value",value:"~$30M"},{label:"Asking price",value:"$24M (60¢ on the dollar)"},{label:"Borrower status",value:"Non-performing (2 missed quarters)"},{label:"Lien position",value:"1st mortgage"}],question:"How do you frame whether $24M is a buy?",options:[{label:`The buy thesis is "loan-to-own" or "loan-to-collect": at $24M your basis is 80% of asset value ($24M / $30M), so even in a foreclosure scenario you're likely whole. Price the deal off two paths — workout (collect interest at improved terms) or foreclosure (own the asset at $24M / $30M = 80% basis). If the foreclosure path produces an acceptable IRR, the loan workout is upside.`,isBest:!0,explanation:"Distressed loan buying is dual-path math: (1) the *collect* path — borrower works through, pays modified interest, you earn yield; (2) the *own* path — you foreclose and own the asset at your basis. The buy thesis works when the *own* path alone produces an acceptable return. At $24M basis on a $30M asset, you're acquiring at 80% of value with optionality on a workout. If you can't accept the foreclosure outcome, don't buy the loan. Sophisticated debt-fund underwriting always shows both paths in the IC memo."},{label:"Pass — the asset is worth $30M and the loan is $40M. There's no recovery on the $10M shortfall.",isBest:!1,explanation:"Misreads the buy. You're not paying $40M; you're paying $24M. Your basis is $24M against a $30M asset, which is the relevant comparison. The $40M face is what the original lender lost; the buyer's basis is what determines the buyer's outcome."},{label:"Buy at $24M — the bank wouldn't sell at a 40% discount unless they had to. Asymmetric upside.",isBest:!1,explanation:`Right answer for the wrong reason. "Bank wouldn't sell unless they had to" is a heuristic, not a financial test. The buy needs to pencil on the foreclosure path *as the conservative case*, not as a worst-case. Distressed funds get burned when they buy on the seller's motivation rather than on basis math.`},{label:"Negotiate down to $20M; at $30M asset value, $20M basis is the right entry for foreclosure protection.",isBest:!1,explanation:'A negotiation tactic, not a buy/no-buy decision framework. Whether $24M or $20M is the right basis depends on the foreclosure timeline, legal costs, and your IRR hurdle. Going in with "lower is always better" without sizing the workout / own paths is generic; the actual analysis is path-by-path return at varying basis.'}],takeaway:"Distressed CRE loan investing = own-path-or-collect-path math. Compute the IRR at your basis assuming foreclosure (asset becomes yours at the basis price); compute the IRR assuming a workout (modified terms, asset stays with the borrower). Buy when the *worse* of the two paths still hits your hurdle. Basis discipline matters more than face-discount headlines.",tips:['Senior loan + asset value > basis = "loan to own" upside. Junior position changes the math entirely.',"Foreclosure timeline + legal costs eat 5-15% of asset value depending on jurisdiction.","Always model the workout path with explicit interest-rate concessions and a longer maturity."]},Jb={id:"lease-structure-nnn-vs-gross",title:"NNN vs Gross — who actually bears the OpEx risk?",category:"lease-econ",difficulty:"intermediate",roles:["assetManagement","acquisitions"],assetClass:"retail",scenario:'You own a single-tenant retail asset on a 10-year NNN lease at $25/SF base rent. Property taxes have risen 8%/yr for the past 3 years (vs 3% expected). The tenant is now pushing to renew on a *gross* basis at a higher face rent ($32/SF) to "make their costs predictable." The new gross rent is, on paper, higher than the NNN base.',data:[{label:"Current lease",value:"NNN, $25/SF base"},{label:"Renewal proposal",value:"Gross, $32/SF"},{label:"Recent tax growth",value:"8%/yr (vs 3% expected)"},{label:"Term",value:"10-yr renewal"},{label:"Asset",value:"Single-tenant retail"}],question:"How do you analyze the NNN-to-gross conversion?",options:[{label:"Gross at $32/SF means YOU bear the OpEx growth risk (taxes, insurance, repairs) for 10 years. The 7%-rent-bump only covers today's OpEx ratio; if costs keep growing 8%/yr, your NER erodes year over year. Counter-propose a gross-with-expense-stop or NNN-with-cap.",isBest:!0,explanation:`NNN vs gross is fundamentally a risk-allocation question, not a rent-level question. Under NNN, the tenant pays OpEx; rising costs hit them. Under gross, the landlord eats OpEx growth above whatever's baked into the rent. The tenant's ask "make our costs predictable" = "make YOUR costs UN-predictable." On a 10-year term with 8%/yr OpEx growth, the gap compounds dramatically. Counter-structures: (a) gross with an expense stop (landlord pays first $X of OpEx; tenant pays the rest) or (b) NNN with a cap on the tenant's annual reimbursement growth (limits the tenant's downside while preserving most of the landlord's protection).`},{label:"Take the gross deal — $32 > $25, so face rent is higher and the lease is more valuable in the cap-rate math.",isBest:!1,explanation:'Cap rates apply to NOI, not face rent, and NOI under gross is `face rent − all OpEx`. The $7/SF "uplift" gets eaten by the OpEx the landlord now bears. If you\'re running 30% OpEx ratio, the effective NOI per SF on gross at $32 is $22.40, vs NNN at $25 = $25 NOI per SF. The gross deal is *worse* by $2.60/SF.'},{label:"Stay NNN and refuse the conversion — the tenant should manage their own OpEx.",isBest:!1,explanation:'Doctrinal but not pragmatic. The tenant is signaling cost stress; if they walk because of it you have a vacant building. Counter-structures (expense stop, NNN cap) keep the lease attractive to the tenant while preserving most of your landlord protection. "Refuse" is an option of last resort, not an opening position.'},{label:"Convert to gross at the proposed $32/SF — the rent uplift makes up for OpEx growth, and the predictability for the tenant reduces re-leasing risk.",isBest:!1,explanation:"Misjudges the math. The $7/SF rent uplift is a *one-time* increase; OpEx grows EVERY year. By year 5, OpEx has compounded ~47% above today's level, eating well past the rent bump. Gross conversions need to price in OpEx growth across the full term, not a one-time uplift."}],takeaway:"Lease structure (NNN, gross, modified gross) is a risk-allocation tool. NNN puts OpEx growth risk on the tenant; gross puts it on the landlord. The face-rent comparison is misleading because it ignores who bears 10 years of cost inflation. When a tenant requests a structure change, run the full-term math at *expected* OpEx growth, not today's OpEx ratio. Hybrid structures (expense stops, recovery caps) are the usual landing zone.",tips:["Quick check: under NNN at NER X, equivalent gross is X + (current OpEx/SF) × inflation factor.","Tenants ask for gross when their costs are rising and they want to push the risk over. Always negotiate.","Expense stops set a floor on the landlord's OpEx burden; recovery caps set a ceiling on the tenant's."]},Zb={id:"sponsor-recourse-vs-covenants",title:"Recourse vs covenants — which structures protect the lender?",category:"risk",difficulty:"advanced",roles:["mortgageUw"],assetClass:"multifamily",scenario:"You're structuring a $40M permanent loan on a stabilized MF asset. Sponsor is mid-tier (good track record, modest balance sheet, no public credit rating). Sponsor is asking for non-recourse. The credit committee wants protection beyond just the asset itself.",data:[{label:"Loan size",value:"$40M"},{label:"LTV / DSCR",value:"70% / 1.25x"},{label:"Sponsor",value:"Mid-tier, decent track record"},{label:"Sponsor balance sheet",value:"~$25M net worth (estimated)"},{label:"Term",value:"10-yr / 30-yr amort"}],question:"What's the right protection structure?",options:[{label:'Non-recourse with carve-outs (a "bad-boy" guaranty) PLUS strong financial covenants — DSCR maintenance, minimum debt yield, cash sweep on covenant breach. The carve-outs become full recourse on specific bad acts (fraud, voluntary bankruptcy, environmental). The covenants protect against deterioration without requiring sponsor recourse.',isBest:!0,explanation:'Modern CRE lending almost always uses non-recourse-with-carve-outs (the "bad-boy" guaranty) plus tight covenants. The carve-outs convert non-recourse to full recourse for specific bad acts — fraud, misrepresentation, voluntary bankruptcy filings, environmental contamination, transfer of title without lender consent. They protect the lender against the borrower acting in bad faith without forcing the sponsor to put their personal balance sheet on a perfectly-managed loan. Covenants (DSCR maintenance test at 1.10x, debt yield floor at 7%, cash sweep when triggered) protect against operating decline without requiring the sponsor to backstop. Together, they cover the realistic risk surface without making the loan unattractive to a typical mid-tier sponsor.'},{label:"Demand full recourse — the sponsor's $25M net worth covers the LTV gap and gives the lender a deep-pocket backstop.",isBest:!1,explanation:"Full recourse on $40M against a $25M sponsor balance sheet doesn't actually cover the gap (if the asset goes to $20M and recourse is needed for $20M, the sponsor can't pay). It also makes the loan unattractive — most institutional borrowers won't pledge personal balance sheets on a clean stabilized deal. You'll lose the deal to a competitor who structures non-recourse with covenants."},{label:"Non-recourse with no carve-outs — covenants alone are enough on a stabilized asset with strong DSCR.",isBest:!1,explanation:"Skips the carve-out layer that protects against bad acts. Covenants protect against *performance* decline; carve-outs protect against *behavior* (fraud, transfer without consent, etc.). Lenders need both. Non-recourse without carve-outs is rare and only at very large institutional scale."},{label:"Tight covenants only — DSCR maintenance plus a low LTV floor — and skip both recourse and carve-outs to win the deal.",isBest:!1,explanation:"Loses the bad-act protection (fraud, environmental) which has nothing to do with covenants. Covenants trigger on operating metrics; they don't trigger when the sponsor commits fraud or transfers title. Bad-boy carve-outs are nearly universal in CRE non-recourse lending — skipping them is genuinely uncommon."}],takeaway:"Lender protection is a layered stack: (1) the asset itself (the primary collateral), (2) covenants that catch operating deterioration before default, (3) bad-boy carve-outs that convert to recourse on specific bad acts, (4) full recourse only when the asset/sponsor combination justifies it. Most stabilized CRE permanent loans land at layers 1-3 (non-recourse + carve-outs + covenants), with layer 4 reserved for higher-risk transactions.",tips:["Bad-boy triggers: fraud, misrepresentation, voluntary bankruptcy, environmental, transfer without consent.","Springing-recourse covenants: DSCR maintenance, debt yield floor, cash sweep activation.","Springing recourse triggers full recourse if the borrower breaches a covenant — a middle ground when full recourse is too aggressive."]},e0={id:"ground-lease-vs-fee",title:"Ground lease vs fee simple — what changes in your underwriting?",category:"investment-thesis",difficulty:"advanced",roles:["development","acquisitions"],assetClass:"mixed",scenario:"You're evaluating two land deals for a 200-unit MF development. Site A: $10M fee-simple purchase. Site B: 99-year ground lease at $400k/yr (fixed for 10 years, then 10% bumps every 10 years thereafter). Construction cost is identical at $40M for both sites.",data:[{label:"Site A — fee simple",value:"$10M land cost"},{label:"Site B — ground lease",value:"$0 upfront, $400k/yr"},{label:"Bumps",value:"10%/decade after year 10"},{label:"Term",value:"99 years"},{label:"Construction cost (both)",value:"$40M"}],question:"What's the most important underwriting shift for the ground-lease deal?",options:[{label:"Treat the ground rent as a senior obligation that subordinates everything else — including your debt and equity — so your effective NOI is `building NOI − ground rent`. Your exit cap on the leasehold should be 75-150 bps wider than fee-simple to compensate the next buyer for the same subordination risk plus the eroding remaining term.",isBest:!0,explanation:`A ground lease is a permanent payment that sits ahead of your debt and equity. Your "NOI" is building NOI minus ground rent; that's what your DSCR test and cap rate apply to. Beyond that, leasehold value erodes as the remaining term shortens — a 99-year lease today is great; a 49-year leasehold to a future buyer is worse, and a 19-year leasehold is essentially worthless. Sophisticated leasehold underwriting widens the exit cap by 75-150 bps to price in (a) the subordination, (b) the term-erosion effect, and (c) the harder financing market for leaseholds (most permanent lenders haircut LTV on leasehold collateral). The reduced upfront cost is offset by all of the above.`},{label:"Treat ground rent as an OpEx line — it's an annual cost like property tax, just folded into your expense ratio.",isBest:!1,explanation:"Materially under-prices the structural difference. OpEx is variable and partially controllable; ground rent is fixed (or pre-set escalating) and senior. Lumping them together produces a wrong DSCR and a wrong exit cap on the leasehold. Lenders treat ground rent as senior debt-like for analysis; you should too."},{label:"The $10M upfront savings is the dominant factor — use it as Day-1 IRR juice and treat the rest of the deal as similar to fee-simple.",isBest:!1,explanation:"Reads only the upfront-cost line. The recurring rent + the leasehold-vs-fee exit cap haircut typically eat all of the upfront savings over the hold period. Sophisticated underwriting models the full lifecycle and usually finds fee-simple wins for development deals because of the leasehold exit-cap penalty."},{label:"Use a discount-rate comparison: the present value of ground rents at 7% discount vs the $10M upfront cost — pick whichever is lower.",isBest:!1,explanation:"Misses the exit-cap effect entirely. PV-of-rents vs upfront-cost is one piece of the comparison, but the leasehold haircut at exit is often the dominant difference and isn't captured by simple PV math. Full underwriting compares leasehold IRR to fee IRR with all the structural differences priced in."}],takeaway:"Ground leases trade upfront cost for a permanent senior obligation plus a structural exit penalty. The leasehold-fee gap shows up at three points: (1) ongoing NOI (subtract ground rent), (2) exit cap (75-150 bps wider for leaseholds), (3) financing terms (lower LTV from most lenders). Sometimes ground leases pencil — institutional ground-leased product in tier-1 markets — but for typical MF development, fee simple usually beats leasehold once all three effects are priced.",tips:["Effective NOI on leasehold = building NOI − ground rent. Apply your cap rate to that, not to building NOI.","Leasehold financing: most lenders haircut LTV by 5-15% vs the same fee-simple deal.","Remaining lease term at exit: at least 30-40 years remaining is the typical financeability floor for institutional product."]},t0={id:"capital-call-mechanics",title:"Funding the close: how does the capital call flow?",category:"deal-process",difficulty:"beginner",roles:["acquisitions","assetManagement","portfolioMgmt"],scenario:"Your fund is closing on a $50M acquisition Friday. Equity check is $20M (after $30M of debt). Fund has $40M of unfunded LP commitments. The closing schedule needs cash wired Thursday by 2pm to the title company.",data:[{label:"Purchase price",value:"$50M"},{label:"Senior debt",value:"$30M"},{label:"Equity needed",value:"$20M"},{label:"LP commitments unfunded",value:"$40M"},{label:"Wire deadline",value:"Thursday 2pm"}],question:"What's the capital-call sequence to fund this close?",options:[{label:"Issue a capital call notice to LPs ~10 business days before close (per the LPA), wire the called amount from each LP into the fund's capital account, then wire from the fund account to title on the closing date.",isBest:!0,explanation:"Capital calls are notice-driven. Standard LPAs require 10 business days notice; some allow 5. The notice triggers each LP to wire their pro-rata share into the fund's capital account. Once funds clear, the GP wires from the fund's capital account to title. Skipping the notice period is a breach; trying to call last-minute creates funding risk if any LP misses the wire window."},{label:"Wire directly from the LP's account to the title company on closing day to skip the intermediate step.",isBest:!1,explanation:"LPs almost never wire directly to the title company. Funds flow through the fund vehicle so the LP's capital account is debited correctly, partnership accounting tracks contributions, and the GP retains control over the deal closing. Direct LP-to-title wires bypass the partnership structure and create accounting reconciliation problems."},{label:"Use a subscription line of credit to bridge — call capital from LPs after close to repay the line.",isBest:!1,explanation:"Plausible (and common at larger funds), but not the *default* for a single $20M call. Sub lines have their own costs (commitment fee + draw rate) and add complexity. They're used to (a) smooth IRR by delaying capital calls, (b) handle close timing emergencies, (c) bridge between deals. For a clean closing schedule with 10 days of runway, the standard capital call works fine."},{label:"Wait for the equity to be funded after closing — title companies will accept a closing-day promise to fund within 30 days.",isBest:!1,explanation:`Title companies wire funds at closing; nothing closes until they hold the cash. "Promise to fund" is not how real estate closings work — the seller doesn't transfer the deed without good funds. Misunderstanding this gets the deal blown up.`}],takeaway:"Capital calls are LPA-governed: notice (typically 10 business days), wire deadline, fund account intermediary. Sequence is LP → fund capital account → title at closing. Defaults exist for slow-payers (default interest, dilution, forfeiture) but the discipline is to call early enough to give every LP time to fund.",tips:["Standard call notice: 10 business days. Always check the LPA for the specific number.","Sub lines bridge timing or smooth IRR; they're not a substitute for capital calls.","Default mechanics in the LPA matter when an LP misses a wire — know them before they're needed."]},n0={id:"closing-prorations",title:"Prorations at closing — who pays what?",category:"deal-process",difficulty:"intermediate",roles:["acquisitions","assetManagement"],scenario:"You're closing a $30M MF acquisition on the 15th of the month. Property tax for the year is $360k (annualized; bills land in Q4). Tenant rents totaling $250k were collected by the seller for the full month on the 1st. Insurance prepaid for the next 6 months is $90k.",data:[{label:"Closing date",value:"15th of month"},{label:"Annual property tax",value:"$360k ($30k/mo)"},{label:"Rent collected (full month)",value:"$250k"},{label:"Insurance prepaid (6 mo)",value:"$90k"}],question:"How are these three items prorated at closing?",options:[{label:"Tax: seller credits buyer for tax accrued through close (~$345k for ~11.5 mos); rent: seller credits buyer for the second-half-of-month portion (~$125k); insurance: buyer credits seller for the 5.5 mos remaining unused (~$82.5k). Net effect on the closing statement: a wash-or-near-wash.",isBest:!0,explanation:"Standard CRE proration rules: (1) **Tax** accrues daily but is paid in arrears or annually — at close, seller owes the buyer for the time period seller owned but hasn't yet paid. With a full-year tax of $360k closing on the 15th, seller has ~9.5 months of accrued unpaid tax = ~$285k credit to buyer. (2) **Rent** collected covers the full month — seller keeps half, credits buyer for the remaining ~half (~$125k). (3) **Prepaid insurance** is the seller's asset — buyer reimburses seller for the unused portion (~$82.5k credit to seller). Each line gets explicitly stated on the closing statement."},{label:"No prorations needed — everything resets on closing day; seller owes no credits and buyer owes no reimbursements.",isBest:!1,explanation:'Wrong on every line. Each of these items has accrued or been paid during a period that spans the closing date, so each must be allocated. "No prorations" only works if everything was paid on the exact closing date, which never happens.'},{label:"Buyer pays for everything from closing forward; seller keeps everything they've already received. No money changes hands at closing for these items.",isBest:!1,explanation:"Misunderstands the principle. Seller may have *received* rent for July but they didn't *earn* the second half — they owe the buyer for the part of July they didn't own the building. Same for prepaid insurance and accrued tax. Each item gets specifically prorated."},{label:'Apply a flat 1% reduction to the purchase price as a "proration adjustment" and skip the line-item math.',isBest:!1,explanation:`Closing statements never use a flat reduction; every prorated item is a separate line. Buyers and sellers want to see exactly what they're paying for or being credited. "Just round it" loses real money on each line.`}],takeaway:"Prorations are the closing-statement plumbing that allocates partial-period costs and revenues between buyer and seller. The principle: each side bears the cost — and keeps the income — for the time *they own the property*. Tax (accrued, paid later → seller credits buyer), rent (collected ahead, partially earned → seller credits buyer for unearned portion), prepaid expenses (already paid, partially used → buyer credits seller for unused portion).",tips:["Tax proration: most common closing item; verify the tax year and payment schedule (calendar vs fiscal).","Rent proration: typically per-day or per-half-month depending on the contract.","Prepaid: insurance, service contracts, HOA — anything paid forward gets reimbursed for unused portion."]},a0={id:"construction-cost-overrun",title:"A $2M cost overrun on a development — where does the money come from?",category:"deal-process",difficulty:"intermediate",roles:["development","assetManagement","mortgageUw"],scenario:"You're developing a 200-unit MF building. Original TPC was $50M with a 5% ($2.5M) hard-cost contingency. You're 80% through construction; the GC has identified $2M of additional costs (foundation issues + steel price spike). Your construction loan is at the 65% LTC ceiling. You've already drawn 70% of the loan.",data:[{label:"Original TPC",value:"$50M"},{label:"Hard cost contingency",value:"$2.5M (5%)"},{label:"Cost overrun identified",value:"$2M"},{label:"Construction completion",value:"80%"},{label:"Loan LTC ceiling",value:"65%"},{label:"Loan drawn to date",value:"70% (of approved)"}],question:"Where does the $2M come from?",options:[{label:"Tap the contingency reserve first ($2.5M available > $2M overrun, so contingency covers it). Document the draw with the lender; bank may want to see the cause + a revised forecast for remaining costs. No additional capital call needed.",isBest:!0,explanation:"Contingency reserves exist exactly for this. $2M of overrun against $2.5M of available contingency is fully absorbed; you'd still have $500k of remaining cushion for the last 20% of the build. Lender will want documentation (cause of overrun, revised cost-to-complete) before releasing the next draw, but no equity top-up is needed. Contingency is the first place you go for cost overruns; the second place is more equity; the third place (rare) is increased loan size if LTC has room."},{label:"Skip the contingency (save it for the unknown unknowns later) and call additional equity from the LPs to fund the $2M.",isBest:!1,explanation:`Leaves contingency unused while burning equity. The contingency was budgeted for exactly these scenarios — it's "spent budget" not "saved budget." Calling extra equity when contingency is sitting unused doesn't protect the LPs; it just front-loads their capital. Use contingency first, then assess whether residual cushion is enough for the remaining build.`},{label:"Negotiate a loan modification to raise LTC from 65% to 70% and use the additional debt capacity to fund the $2M.",isBest:!1,explanation:"Possible but expensive and slow. Loan mods require committee approval, appraisal updates, fee payments, and time you don't have during active construction. Lender will also re-test debt yield and DSCR at the new loan amount. Tap contingency first; mods are a last resort if both contingency and equity top-up fail."},{label:"Have the GC absorb the overrun under their guaranteed maximum price (GMP) contract — that's what the GMP is for.",isBest:!1,explanation:"Half-right depending on the contract structure. GMP contracts shift cost-overrun risk to the GC for items within scope. But foundation issues + commodity price spikes are typically *outside* GMP (foundation = unknown subsurface; steel = price escalation clause). The GC will likely have a valid claim for both. Read the contract before assuming GMP absorbs the cost."}],takeaway:"Cost overruns drain through a defined waterfall: (1) contingency reserve, (2) additional equity capital call, (3) loan modification (if LTC has room), (4) GMP claim if scope-eligible. Always burn contingency first because that's what it's budgeted for. Document each draw cause for the lender so the next draw isn't held up.",tips:["Contingency norms: 5% of hard cost (institutional MF / office), 7-10% (heavy reno / older buildings), 10-15% (ground-up complex sites).","GMP shifts overrun risk to GC for IN-SCOPE items; subsurface, force-majeure, and price-escalation typically excluded.","Lender wants explanation + revised forecast before next draw release; have it ready."]},r0={id:"lender-draw-mechanics",title:"Construction loan draw — what does the bank actually require?",category:"deal-process",difficulty:"intermediate",roles:["development","mortgageUw"],scenario:"You're submitting a $4M construction draw for the next 30 days of work on a ground-up MF project. The lender has 5 business days to approve. The GC says they need the funds wired by the 28th to pay subs on time.",data:[{label:"Draw amount",value:"$4M"},{label:"Lender approval window",value:"5 business days"},{label:"Sub payment deadline",value:"28th"},{label:"Draw frequency (per loan docs)",value:"Monthly"}],question:"What does a typical construction-loan draw package require?",options:[{label:"Standard package: G702/G703 (AIA pay app showing % complete by line item), GC + sub lien waivers (conditional for the requested period, unconditional for the prior period), updated cost-to-complete, third-party inspector's report verifying work in place, title bring-down endorsement. Banks often add: sworn statements, evidence of insurance, signed lien-waiver releases.",isBest:!0,explanation:"Construction draws are documentation-heavy because the bank is funding work claimed but not yet paid. The standard package: (1) AIA G702/G703 — itemized pay-app showing % complete per cost code, (2) lien waivers — protect the bank against mechanic's liens (subs whose work was funded but not paid can lien the property; waivers prove they've been paid), (3) inspector's report — independent verification that work is actually in place at claimed %, (4) cost-to-complete update — confirms no overruns are hiding, (5) title bring-down — confirms no new liens since prior draw. Skipping any one of these is a deal-stopper for most lenders."},{label:"A simple invoice from the GC showing the $4M owed; lender wires within 24 hrs once approved.",isBest:!1,explanation:"Hugely under-stated. The bank isn't buying a service from a vendor; they're funding interim construction at risk. They need verification that the work has been done, that subcontractors won't lien the property, and that the project is on track for completion. A bare invoice doesn't come close to satisfying that."},{label:"GC certification of % complete + photos. The bank trusts the GC since they're bonded.",isBest:!1,explanation:"GC bonding protects the borrower (and lender) from GC default — it's not a substitute for draw verification. Banks always require independent inspection (a third-party inspector or the bank's own construction loan officer) plus formal AIA paperwork. Photos and self-certification aren't enough."},{label:"A written request from the borrower; lender will release funds based on the loan agreement schedule without further docs.",isBest:!1,explanation:"Misreads how construction loans work. Construction loans don't have a fixed draw schedule — they release funds based on completed work, verified per draw. Permanent loans (after CO) have fixed payment schedules; construction loans are draw-by-draw, work-verified."}],takeaway:"Construction draws = documented evidence of work in place + protected lien position + verified cost-to-complete. The five-piece package (AIA pay app, lien waivers, inspector report, cost-to-complete, title bring-down) is universal across institutional construction lenders. Plan 5-10 business days from package submission to wire; build that into the GC payment schedule.",tips:["AIA G702 = summary; G703 = line-item detail. Both are typically required.","Conditional lien waivers cover the requested-but-not-yet-paid period; unconditional cover prior periods.","Title bring-down catches any new liens or encumbrances since the last draw."]},s0={id:"bank-account-structure",title:"What are all these different bank accounts for?",category:"deal-process",difficulty:"beginner",roles:["assetManagement","portfolioMgmt"],scenario:"You've just stepped into asset management on a stabilized MF property. The financials show four different bank accounts: an operating account, a security deposit account, a replacement reserve, and a tax & insurance escrow. The lender requires monthly reporting from each.",data:[{label:"Operating account",value:"Day-to-day in/out"},{label:"Security deposit account",value:"Tenant deposits"},{label:"Replacement reserve",value:"Lender-required capex reserve"},{label:"Tax & insurance escrow",value:"Lender-controlled"}],question:"How does money flow between these four accounts on a normal month?",options:[{label:"Rent revenue lands in operating; OpEx and debt service paid from operating; lender sweeps a fixed monthly amount from operating into the T&I escrow (to fund the next tax/insurance bill); a separate monthly amount sweeps into the replacement reserve. Security deposits stay in their own account (statutorily required separation in most states) — never commingled with operating.",isBest:!0,explanation:"Operating is the hub: rent comes in, OpEx + debt service go out. Two automatic monthly sweeps fund the lender-controlled escrows: (1) T&I escrow accumulates the property tax + insurance premiums so the lender knows those obligations get paid (typically at $X/mo such that there's enough by the bill due date); (2) replacement reserve accumulates capex contribution at $Y/unit/yr / 12 per month. Security deposits are statutorily separate in most states (commingling is illegal) and tracked tenant-by-tenant. The T&I and reserve accounts may be controlled by the lender (they hold the keys) or borrower-controlled with monthly statements provided to the lender."},{label:"All four accounts are functionally the same — money moves freely between them based on whatever's needed that month.",isBest:!1,explanation:"Each account has a specific purpose enforced by either statute (security deposits) or the loan documents (reserves, escrows). Treating them as fungible is both a covenant breach and a legal risk. The whole point of segregation is that each pool of money is *purpose-restricted*."},{label:"Security deposits go into operating; T&I + replacement are the only two separate accounts.",isBest:!1,explanation:"Most US states *require* security deposits to be held in a separate account, often interest-bearing, often with annual interest payments to tenants. Commingling security deposits with operating is illegal in CA, NY, MA, NJ, and many other states."},{label:"Money flows from reserves into operating monthly to smooth NOI; reserves are just a pre-paid expense pool.",isBest:!1,explanation:"Reserves don't flow back into operating monthly; they're drawn down only when the qualifying expense occurs (replace a roof = draw from replacement reserve; pay tax bill = draw from T&I escrow). They're the *funding source* for those specific costs, not an income smoother."}],takeaway:"A typical CRE asset has 3-5 bank accounts, each with a specific purpose: operating (day-to-day), security deposits (statutorily separate), T&I escrow (lender-controlled funding for next tax/insurance bill), replacement reserve (lender-controlled funding for capex). Some deals add capex draw account (during reno), construction draw account (during build), debt service reserve (lender holds N months of DS in a sub-trust). Each account's flow is rule-governed; commingling violates either statute or covenants.",tips:["Operating: rent in, OpEx + DS out. Hub of activity.","Reserves: in via monthly sweep; out only on qualifying expense + lender consent.","Security deposits: statutorily separate in most states. Track tenant-by-tenant."]},i0={id:"balance-sheet-refi-impact",title:"How does a cash-out refi flow through the balance sheet?",category:"deal-process",difficulty:"intermediate",roles:["assetManagement","portfolioMgmt"],scenario:"You're refinancing a stabilized asset. Before refi: book value of asset = $40M, debt = $20M, equity = $20M. The new loan is $32M (60% LTV against current value of $53M). Net cash to the LPs after refi closing costs is $11M. Walk through the balance sheet impact.",data:[{label:"Pre-refi book value",value:"$40M"},{label:"Pre-refi debt",value:"$20M"},{label:"Pre-refi equity",value:"$20M"},{label:"New loan",value:"$32M"},{label:"Net cash distributable to LPs",value:"$11M"}],question:"What does the balance sheet show post-refi?",options:[{label:"Asset value unchanged at book ($40M; book accounting doesn't mark to market). Debt jumps from $20M to $32M (+$12M loan). $20M of the new loan repays the old loan; the remaining $12M minus $1M of refi costs = $11M distributed to LPs as a return-of-capital. Equity drops from $20M to $9M ($20M − $11M distribution). Identity holds: $40M asset = $32M debt + $9M equity − $1M closing-cost expense.",isBest:!0,explanation:"Refi mechanics on the balance sheet: (1) **Asset** doesn't change — book value stays at $40M (no mark-to-market in standard CRE accounting; market value of $53M only matters to the lender for sizing). (2) **Debt** jumps from $20M to $32M — old loan retired, new loan booked. (3) **Cash distributed** = (New loan − Old loan) − refi closing costs = $12M − $1M = $11M. (4) **Equity** drops by $11M (the distribution) to $9M. The remaining $1M of refi costs is expensed (or amortized as deferred financing costs in some treatments). The accounting identity holds throughout."},{label:"Asset value steps up to current value ($53M); debt $32M; equity $21M (the $12M refi proceeds add to equity).",isBest:!1,explanation:"No mark-to-market in the regular CRE balance sheet. Book value stays at historical cost less depreciation. Stepping up to current market value is an unusual treatment (only applies in specific fair-value reporting frameworks). And refi proceeds don't add to equity — they're distributed to LPs (return-of-capital), reducing equity."},{label:"Asset $40M, debt $32M, equity $20M unchanged — the $11M distribution comes from operating cash, not equity.",isBest:!1,explanation:"Distribution-of-refi-proceeds reduces equity. Operating cash distributions also reduce equity (or run through retained earnings, depending on entity type). Either way, you can't take $11M out of the partnership without reducing the equity line."},{label:"The refi is balance-sheet-neutral until the next operating period — debt and equity stay the same, only cash moves.",isBest:!1,explanation:"Materially wrong. Debt clearly changes (old loan off, new loan on). Equity changes via the distribution. Cash also changes (the difference flows out to LPs). The refi is one of the most balance-sheet-active events in a deal's lifecycle."}],takeaway:"A cash-out refi on the balance sheet: asset unchanged (book), debt up by the new-old delta, equity down by the cash distributed to LPs (net of closing costs). The market-value-to-book gap doesn't enter the accounting; it only sized the loan. Refi proceeds are return-of-capital to LPs, not a P&L item — but the closing costs are expensed (or amortized).",tips:["Book accounting: historical cost less accumulated depreciation. No mark-to-market on regular financials.","Refi proceeds = (new loan − old loan) − closing costs. The cash-out is what flows to LPs.","Closing costs (~1-2% of loan) are typically deferred financing costs, amortized over loan life."]},o0={id:"budget-vs-actual-variance",title:"Q3 expenses ran 12% over budget — how do you investigate?",category:"deal-process",difficulty:"intermediate",roles:["assetManagement","portfolioMgmt"],scenario:`You're presenting Q3 results to the LPs. Total OpEx came in 12% above plan ($1.34M actual vs $1.20M budget on a $4M revenue base). Revenue and occupancy were on plan. The LP IC asks "where did the variance come from?" Your initial PnL summary just shows "OpEx $1.34M (Budget $1.20M)" with no further breakdown.`,data:[{label:"Revenue",value:"$4M (on plan)"},{label:"Occupancy",value:"95% (on plan)"},{label:"OpEx budget",value:"$1.20M"},{label:"OpEx actual",value:"$1.34M"},{label:"Variance",value:"+$140k (+12%)"}],question:"How do you structure the variance investigation for the LP IC?",options:[{label:'Pull the OpEx ledger by line item; classify each variance into one of four buckets: (1) controllable vs uncontrollable, (2) recurring vs one-time, (3) volume-driven (occupancy-related) vs fixed, (4) timing (Q3 paid early/late). Identify the top 3 variance drivers by dollar magnitude and explain each. Aggregate variance commentary, not "OpEx was 12% over."',isBest:!0,explanation:'Variance analysis discipline: never report at the aggregate level when LPs ask "where did it come from?" The four-bucket framework drives the right narrative: (1) **controllable** vs uncontrollable (Insurance premium reset = uncontrollable; landscaping over-spend = controllable); (2) **recurring** vs one-time (HVAC service contract increase = recurring; one-time legal fee for a tenant dispute = one-time); (3) **volume** vs fixed (utilities scale with vacancy; property management is fixed); (4) **timing** (an annual maintenance bill paid in Q3 instead of Q4). Top 3 drivers by dollar amount usually explain 80% of variance. The narrative is what the LP needs, not the line-item dump.'},{label:`Compare to prior year same quarter — if last year's Q3 ran 10% over budget too, the variance is "normal seasonality" and not concerning.`,isBest:!1,explanation:`Prior-year comparison is useful as one input but not as the explanation. Two consecutive years of Q3 overrun could mean either (a) the budget systematically under-budgets Q3 (fixable in next year's budget) or (b) a recurring real cost bucket the LPs should know about. Either way, attributing variance to "seasonality" without naming the specific drivers is hand-waving.`},{label:"Show the variance as a % of revenue — 12% of OpEx vs $4M revenue = 3.5% revenue impact. That's within typical operating tolerance.",isBest:!1,explanation:`Quantifies but doesn't explain. The LP's question is "what happened?" not "is it big?" The 3.5% revenue framing is useful as context once you've identified the drivers; it's not a substitute for the variance investigation.`},{label:'Add a "$140k OpEx variance — under investigation" line to the report and follow up next quarter when more data is available.',isBest:!1,explanation:'Punting variance to the next quarter erodes LP trust. The variance is identifiable from the GL today; the work is line-item analysis + categorization, not waiting. "Under investigation" is acceptable on Day 1 of the variance hitting the books, not in the LP report 3 weeks after quarter-close.'}],takeaway:`Variance analysis is about narrative, not just numbers. Classify each variance into controllable/uncontrollable, recurring/one-time, volume/fixed, timing — then surface the top 3 dollar drivers with explanations. LPs don't want the GL; they want the answer to "what happened, what does it mean, and what are you doing about it?"`,tips:["Top 3 dollar drivers usually explain 70-90% of total variance — focus there.","Insurance + property tax = the two biggest line items at most assets and the most common variance sources.","Recurring + uncontrollable variances should update the next year's budget; one-time should not."]},l0={id:"distribution-waterfall-1tier",title:"A 1-tier waterfall: in what order does cash get distributed?",category:"deal-process",difficulty:"intermediate",roles:["portfolioMgmt","assetManagement","acquisitions"],scenario:"You're modeling distributions on a deal sale. Joint venture: LP contributed $20M (90%), GP contributed $2.2M (10%). Waterfall is 1-tier: 8% pref to LP, then return of capital pro-rata, then 80/20 split (LP/GP) on residual. Sale net proceeds + accumulated cash flow = $35M total distributable. Hold was 4 years.",data:[{label:"LP capital",value:"$20M (90%)"},{label:"GP capital",value:"$2.2M (10%)"},{label:"Pref hurdle",value:"8% on LP capital"},{label:"Promote",value:"20% above pref"},{label:"Hold",value:"4 years"},{label:"Total distributable",value:"$35M"}],question:"In what order does the $35M get split, and what does each side end up with?",options:[{label:`Tier 1: pay LP 8% pref accrued = $20M × ((1.08)^4 − 1) = $7.2M. Tier 2: return capital pro-rata = $20M LP + $2.2M GP = $22.2M. Subtotal $29.4M paid; residual = $5.6M. Tier 3: split 80/20 = LP $4.48M + GP $1.12M (the GP's "promote" beyond their 10% capital share). Final: LP gets $20M cap + $7.2M pref + $4.48M = $31.68M. GP gets $2.2M cap + $1.12M = $3.32M.`,isBest:!0,explanation:`Standard 1-tier waterfall sequence: (1) **pref** to LP only — accrues at the stated rate compounded annually (or simple, per LPA); on $20M @ 8% over 4 years, compound pref = $7.2M; (2) **return of capital** pro-rata to LP and GP based on their original contributions ($20M + $2.2M = $22.2M); (3) **promote split** on the residual ($35M − $7.2M − $22.2M = $5.6M) at 80/20 (LP/GP). LP's total = $31.68M; GP's total = $3.32M. The GP's $3.32M includes their $2.2M of capital back + $1.12M of "carry" or "promote" — money they earn for outperforming the pref hurdle, despite only having put in 10% of the capital.`},{label:"Split everything 90/10 based on the contribution percentages: LP $31.5M, GP $3.5M.",isBest:!1,explanation:`Ignores the pref + promote structure entirely. The whole point of a waterfall is that the GP earns more than their capital share when the deal performs above the pref — that's the incentive structure. Just splitting pro-rata is a "no waterfall" arrangement.`},{label:"Pay GP first to make them whole, then pay LP a fixed 12% IRR, then split anything left 50/50.",isBest:!1,explanation:"Inverts the LP-GP relationship. LPs are senior in distributions; they get pref + return of capital before any promote flows to the GP. The GP earns from the residual after the LP has been made whole on capital + pref, not before."},{label:"Pay the LP $20M back, then split the remaining $15M 80/20.",isBest:!1,explanation:"Skips the pref tier. Pref is the LP's preferred return — they get paid 8% (or whatever the LPA states) on their capital before the promote split kicks in. Skipping pref over-pays the GP and under-pays the LP."}],takeaway:"A 1-tier waterfall has three sequential steps: pay pref to LP (typically 8% on capital, accrued for the hold period), return capital pro-rata to all partners, then split the residual at the promote split (80/20 is most common). The promote is the GP's incentive — earning more than capital share when the deal beats the hurdle. Multi-tier waterfalls (with catch-up + multiple hurdles) layer additional steps but the pref + return + promote skeleton is consistent.",tips:["Pref accrues — it's 8% per year compounded (or simple, per LPA), not 8% one-time.","Return of capital is pro-rata based on contributions, not 50/50 between LP and GP.","80/20 is the most common promote; 70/30 (steeper GP take) and 75/25
