have deal-level dispersion, and the dispersion is the whole point of European: in funds where some deals win and others lose, American + clawback may leave residual GP overpayment that can't be recovered (e.g. GP paid out funds on deal 1 that went into the GP's own pocket and is no longer recoverable when deal 5 underperforms)."},{label:"European favors GP — they get the certainty of seeing fund-level performance before promote crystallizes.",isBest:!1,explanation:'GPs prefer American because they get paid sooner and clawback is messy to enforce in practice. Saying European favors GP because they "see fund-level performance first" misreads the incentive — GPs want money in hand, not certainty.'}],takeaway:"European waterfalls (fund-level lookback) protect LPs from GP over-distribution on early winners; American waterfalls (deal-by-deal) accelerate GP's economics but require clawback to keep things fair. Most institutional vehicles require European; American with clawback is more common in smaller / sponsor-led funds where the LPs trust the GP and want faster cash on early wins.",tips:["European = fund-level. American = deal-by-deal. The slang refers to the lookback structure.","Clawback fixes only the LPs' rights, not the recoverability of GP cash that's been spent. Pay attention to clawback security (escrow, GP guarantee).","The bigger the dispersion expected across deals, the more European matters."]},B1={id:"waterfall-catchup-mechanics",title:"Full catch-up vs 50/50 catch-up — which is more sponsor-friendly?",category:"deal-process",difficulty:"intermediate",roles:["portfolioMgmt","acquisitions"],scenario:"Two LPAs propose different catch-up structures, both targeting a 20% promote tier above 8% pref. Structure A: 100% catch-up to GP — every dollar above pref flows to GP until GP has 20% of (pref + cat-up). Structure B: 50/50 catch-up — every dollar above pref splits 50/50 (LP/GP) until GP has 20% of (pref + cat-up). Both then split 80/20 above the catch-up tier. The deal earns $4M of pref, $5M of cash above pref before hitting the catch-up target.",data:[{label:"Pref earned",value:"$4M"},{label:"Cash above pref before split tier",value:"$5M"},{label:"Promote target",value:"20% of (pref + cat-up)"},{label:"Above split",value:"80/20 (LP/GP)"}],question:"Which catch-up structure pays GP more *during the catch-up tier itself*, and roughly by how much?",options:[{label:"Full catch-up pays GP ~$1M during the tier; 50/50 pays GP ~$0.5M during the tier. Full catch-up is more sponsor-friendly because GP captures every catch-up dollar 1:1.",isBest:!0,explanation:"Full catch-up: GP gets 100% of cash flowing through the catch-up tier until the 20% target is hit. With $4M pref earned, target catch-up = $4M × 0.20/0.80 = $1M; that $1M flows entirely to GP. 50/50 catch-up: GP only gets half of each dollar in the tier, so GP needs *twice* as much cash to flow through ($2M total) before the target is hit, and during that tier GP collects $1M while LP also collects $1M. Both eventually deliver GP the same target dollars *if* there's enough cash; the difference is **timing** — full catch-up gets GP to the promote target faster, meaning sooner exposure to above-tier upside. Full catch-up is more sponsor-friendly; 50/50 is more LP-friendly."},{label:"They're identical because the target promote percentage is the same (20%) — the catch-up rate just changes the path, not the destination.",isBest:!1,explanation:"True only in deals with infinite distributable cash. In a real deal where the cash above pref is finite, full catch-up gets GP to the 20% target with less cash needing to flow; 50/50 needs twice the cash to hit the same target. If the deal stops short of fully clearing the catch-up, the structures produce *different* total GP dollars."},{label:"50/50 pays GP more because both LP and GP collect during the tier.",isBest:!1,explanation:"GP's share *per dollar in the tier* is half (50¢ vs $1), so GP collects less per dollar. Total GP dollars at full catch-up of the tier are equal; the difference is how quickly GP gets there."},{label:"Full catch-up pays GP ~$0.5M; 50/50 pays GP ~$1M.",isBest:!1,explanation:"Inverts the math. Full catch-up = 100% to GP at tier = $1M to GP. 50/50 = half to GP at tier × $2M-tier = $1M to GP, but with twice as much LP cash flow during the tier."}],takeaway:"Catch-up rate controls the *speed* at which GP reaches the promote target, not the long-run target itself. Full catch-up is sponsor-friendly: GP rapidly accelerates to promote-tier economics on every dollar above pref. 50/50 catch-up is LP-friendly: GP only gets half of each dollar in the tier, so the catch-up takes twice as long to crystallize. In deals that don't fully clear the catch-up, structure dictates the actual GP take.",tips:["100% catch-up: GP gets every dollar in the tier. 50/50 catch-up: GP gets half.","Catch-up multiplier with X% target and full catch-up: pref × X / (1 − X). With 50/50: pref × 2X / (1 − X).","Many institutional LPAs have 50/50 catch-up + lower target (e.g. 50/50 to 15%) to soften GP economics."]},F1={id:"waterfall-irr-vs-moic-hurdle",title:"IRR hurdle vs MOIC hurdle — which does the sponsor prefer?",category:"deal-process",difficulty:"advanced",roles:["portfolioMgmt","acquisitions"],scenario:"You're negotiating an LPA. Two structures on the table: Structure X — pref hurdle is 8% IRR; promote starts at 8% and steepens at 14% IRR. Structure Y — pref hurdle is 1.5× MOIC (multiple of capital); promote starts at 1.5× and steepens at 1.8×. The deal is a value-add multifamily with a planned 5-year hold. The sponsor expects to outperform on time (push IRR by exiting in year 3 or 4 if pricing allows) but expects a modest MOIC because the cap-rate environment is volatile.",data:[{label:"Asset",value:"Value-add MF, 5-yr hold"},{label:"Sponsor's edge",value:"Time (early exit at peak)"},{label:"Risk",value:"Cap rate widens before exit"},{label:"Hurdle X",value:"8% IRR"},{label:"Hurdle Y",value:"1.5× MOIC"}],question:"Which hurdle does the sponsor prefer in this deal, and why?",options:[{label:"Sponsor prefers the IRR hurdle (Structure X). IRR is sensitive to time — early exit at modest MOIC can clear an 8% IRR easily. A 1.5× MOIC is harder to clear in a cap-rate-widening environment because absolute dollars depend on stabilized value, not on time.",isBest:!0,explanation:"IRR rewards *speed* — getting paid earlier increases IRR even at modest absolute dollars. A 1.4× MOIC realized in 2.5 years = ~14.7% IRR; that clears an 8% IRR hurdle but fails a 1.5× MOIC hurdle. MOIC rewards *absolute dollars* and is insensitive to time — the only way to clear it is to actually deliver more capital back. In a deal where the sponsor's edge is exiting at peak pricing (time-sensitive) and the risk is cap-rate widening (absolute-dollar-sensitive), the sponsor wants the time-sensitive hurdle to clear easily. So IRR. Sophisticated LPs negotiate dual hurdles (must clear *both* an IRR and MOIC threshold) to protect against this asymmetry."},{label:"MOIC hurdle (Structure Y). It's simpler to compute and harder for LP to manipulate.",isBest:!1,explanation:"Sponsor preference is driven by which hurdle is easier to clear in *this* deal's expected outcome, not by computational simplicity. MOIC is harder to clear when the sponsor expects modest absolute dollars but wants to exit on time."},{label:"They're equivalent — sponsors and LPs both prefer the hurdle that aligns interests, regardless of which.",isBest:!1,explanation:"IRR and MOIC are mathematically distinct under different exit scenarios. A 1.5× in 2 years (≈22.5% IRR) clears an 8% IRR easily; a 1.4× in 5 years (≈7% IRR) fails an 8% IRR but still doesn't clear 1.5× MOIC. The hurdles diverge whenever timing or magnitude differs, which is always."},{label:"Sponsor prefers MOIC because it pays absolute dollars and the deal is value-add.",isBest:!1,explanation:"Value-add deals can deliver high IRR at modest MOIC if exited quickly at peak. MOIC is harder to clear in this profile, so sponsors avoid it."}],takeaway:"IRR hurdles reward *time-to-realization*; MOIC hurdles reward *absolute capital multiplied*. They diverge whenever the deal's exit timing is asymmetric. Sponsors push for the hurdle that's easier to clear given their expected outcome — usually IRR for fast-exit value-add, MOIC for long-hold core. Sophisticated LPs negotiate dual hurdles to protect against this asymmetry.",tips:["IRR and MOIC ≠ the same. A 1.4× in 2.5 years clears most IRR hurdles; a 1.4× in 5 years rarely does.",'Dual hurdles ("must clear 8% IRR AND 1.5× MOIC") are the LP-friendly version.',"Sponsors typically win this negotiation when LPs accept a single hurdle. Push for dual."]},q1={id:"waterfall-clawback-mechanics",title:"When does the GP have to give promote dollars back?",category:"deal-process",difficulty:"advanced",roles:["portfolioMgmt","mortgageUw"],scenario:"Mid-life check on a $400M PE real estate fund using an American (deal-by-deal) waterfall. Year-3 status: Deals 1-3 closed and exited at outsized returns; GP collected $12M in promote across them. Deals 4-7 are still active, with two of them (Deals 5 and 6) trending toward losses. If those losses materialize at exit, the fund-level lookback would have shown LP failed to clear pref. The LPA includes a clawback provision triggered at fund liquidation.",data:[{label:"Promote distributed (Years 1-3)",value:"$12M"},{label:"Active deals trending negative",value:"2 of 4 remaining"},{label:"Fund vehicle remaining",value:"~3 years"},{label:"Clawback security",value:"50% GP escrow + GP guarantee"}],question:"Under typical LPA clawback mechanics, which of these is true?",options:[{label:"At fund liquidation, GP must return promote dollars *only to the extent* aggregate fund-level performance failed to clear LP's pref + capital. The clawback is calculated as the *minimum of (a) promote distributed and (b) the LP's pref + capital shortfall, on an after-tax basis.* Recovery depends on the security: 50% escrow protects half; the GP guarantee covers the rest, subject to GP solvency.",isBest:!0,explanation:"Standard clawback math: at fund liquidation (or other LPA-defined trigger), the trustee calculates what the LP *would have received* under a fund-level waterfall and what the LP *actually received*. The shortfall, capped at the promote already distributed, is the clawback amount. After-tax basis matters because the GP paid tax on the original promote — the LPA usually credits that tax amount against the clawback. Security mechanisms vary: an escrow holds promote in reserve until fund-end; a personal GP guarantee promises additional dollars but is only as good as the GP's solvency. Practical recovery rate on uncovered clawbacks is often <50% in real failure scenarios."},{label:"Clawback is automatic and immediate — as soon as Deal 5 marks below cost, the GP must return $12M to LP escrow.",isBest:!1,explanation:"Clawback is triggered at *fund liquidation* (or sometimes at LPA-defined interim points), not on individual deal markdowns. The fund-level shortfall must actually crystallize via realized exits, not just unrealized markdowns. Mid-life mark-to-market doesn't trigger return of promote."},{label:"Once GP has been paid promote, it's permanent — that's the whole point of an American waterfall.",isBest:!1,explanation:"American waterfalls accelerate promote distribution but do NOT eliminate clawback. The clawback obligation is the LP's protection in exchange for accepting deal-by-deal economics. Without clawback, the structure would be untenable for institutional LPs."},{label:"GP must return all $12M of promote dollars regardless of fund-level outcome — clawbacks always equal the full distributed promote.",isBest:!1,explanation:"Clawback returns *only the shortfall*, not the full promote. If the fund clears LP pref + capital at liquidation, no clawback is owed even if individual deals lost money."}],takeaway:"Clawback is the LP's rear-guard protection in American waterfalls: triggered at fund liquidation (not at individual deal markdowns), capped at distributed promote, calculated against the LP's actual received vs. fund-level-pref shortfall, and net of GP's tax on the original promote. The *security* mechanism (escrow, GP guarantee, key-person continuity) determines practical recoverability — a clawback obligation against an insolvent GP is worth less than the paper it's printed on.",tips:["Clawback math: min(promote distributed, fund-level LP shortfall, after-tax basis).","Practical recovery depends on security: escrow > escrow + guarantee > guarantee alone > unsecured.","Clawback only triggers at fund liquidation (or LPA-defined interim measurement dates), not on mid-life markdowns.","Always model promote *net of probable clawback exposure* on funds with negative-trending deals."]},z1={id:"waterfall-pref-compound-vs-simple",title:"Compound vs simple pref — how much does the language actually move?",category:"deal-process",difficulty:"intermediate",roles:["portfolioMgmt","acquisitions"],scenario:`You're reading two LPAs back-to-back. Both stipulate an 8% preferred return on $20M of LP capital over a 5-year hold. LPA #1 says "8% annual preferred return, *compounded*". LPA #2 says "8% annual preferred return, *simple*". The deal generates exactly enough cash above ROC to clear pref + a modest catch-up + about $3M of above-pref residual.`,data:[{label:"LP capital",value:"$20M"},{label:"Pref rate",value:"8% annual"},{label:"Hold",value:"5 years"},{label:"Compound pref due",value:"~$9.39M"},{label:"Simple pref due",value:"$8.00M"}],question:"How much does the compound vs simple language move LP's pref dollars, and what's the second-order impact?",options:[{label:"Compound pref pays LP ~$1.39M more in pref ($9.39M vs $8.00M). Bigger second-order effect: the GP's catch-up is calculated against the *paid* pref, so GP's catch-up scales up too. With 100% catch-up to 20%, compound pref → ~$2.35M GP catch-up vs simple → $2.00M. Net to LP: ~$1.39M more in pref *plus* same dollars in above-split. So the language is worth ~$1.4M to LP.",isBest:!0,explanation:`Compound pref math: $20M × ((1.08)^5 − 1) ≈ $9.39M. Simple: $20M × 0.08 × 5 = $8.00M. The compound advantage is real and grows with hold length: at 7 years it's ~$2.5M, at 10 years ~$5M. The second-order effect on GP catch-up is also real: GP's catch-up = pref × target/(1−target), so if pref is $1.39M higher, catch-up is also $1.39M × 0.25 = $0.35M higher. Net net: LP's gross pref gain ($1.39M) is partially offset by higher catch-up to GP (-$0.35M), so LP's net pickup ≈ $1.04M. The takeaway: this single word ("compounded" vs "simple") in the LPA is worth high-six- to low-seven-figures to LP on a $20M position.`},{label:"They're essentially identical — 8% is 8%. The compound vs simple language is convention.",isBest:!1,explanation:"Compound and simple diverge by ~$1.4M on this $20M / 5-year deal. At larger LP positions or longer holds, the divergence is millions. This is one of the most commonly missed LPA terms."},{label:"Simple pref pays LP more because pref doesn't accrue on prior unpaid pref.",isBest:!1,explanation:"Inverts the math. Compound pays *more* because pref accrues on prior accrued pref (compound interest); simple just adds rate × years."},{label:"Compound pref pays LP ~$1.4M more, but it doesn't affect GP's catch-up because catch-up is calculated against ROC, not pref.",isBest:!1,explanation:"Catch-up is calculated against pref *paid*, not ROC. The compound language scales the catch-up too, which changes the second-order GP economics."}],takeaway:"Compound vs simple pref in an LPA is not boilerplate — it's a load-bearing term. On an 8% pref over 5 years, compound delivers ~$1.4M more on $20M of LP capital than simple. The second-order effect on GP catch-up partially offsets, but the LP's net pickup is still 5-6% of capital over the hold. Always read the pref language carefully and confirm whether the GP's catch-up is calculated against gross pref or after-tax pref.",tips:["Compound at 8% for N years: ((1.08)^N − 1). Simple: 8% × N. Memorize both for 3 / 5 / 7 / 10 year holds.","On long holds (>7 years) the compound advantage exceeds 20% of capital — material for LP modeling.","GP catch-up scales with pref paid; compound pref + 100% catch-up to 20% means GP catches up to ~25% of compound pref dollars."]},G1={id:"waterfall-key-person-event",title:"Key-person event — what happens to the GP's promote?",category:"deal-process",difficulty:"advanced",roles:["portfolioMgmt","acquisitions"],scenario:'A $500M closed-end fund is in year 4 of a 7-year vehicle. The LPA names two key persons (the founder + the head of acquisitions). The head of acquisitions has just resigned to join a competitor. Per the LPA, this triggers a "key-person event" with a 60-day cure period. The fund has 5 active deals, 3 of which are in the catch-up tier or above. Mid-fund GP promote distributions year-to-date are $8M. The LP advisory committee meets in 14 days.',data:[{label:"Fund",value:"$500M closed-end, year 4 of 7"},{label:"Trigger",value:"Head of acquisitions resigned"},{label:"Cure period",value:"60 days (LPA standard)"},{label:"Promote YTD",value:"$8M"},{label:"Active deals",value:"5 (3 above pref)"}],question:"What's the typical LPA mechanism that activates during a key-person event, and what does it mean for GP economics?",options:[{label:"Investment period is suspended (no new deals; existing deals + dispositions continue), GP carry distributions are paused or escrowed, and LPs get accelerated rights (e.g. removal vote, reduction of management fee). Existing promote distributions stay distributed (not clawed back unilaterally), but new promote on undistributed exits is held back pending LP advisory committee resolution. The 60-day cure period gives GP time to replace the key person; if cured, normal mechanics resume.",isBest:!0,explanation:"Standard key-person event consequences: (1) **investment period suspends** — GP can't deploy fresh capital into new deals, but existing deals + planned dispositions continue. (2) **Carry pauses** — promote distributions to GP on new exits are held in escrow or paused entirely until LP advisory resolution. (3) **LP rights accelerate** — most LPAs grant LPs a no-fault GP removal vote (typically 75% supermajority) and/or a reduced management fee during the suspension. (4) **Cure period** — LPA usually gives GP 30-90 days to find a qualified replacement; if cured, the suspension is lifted. Existing promote already distributed isn't clawed back unilaterally — that requires a separate clawback mechanism. The reasoning: key-person provisions protect LPs against losing the people they invested with; the cure period balances LP protection against premature fund disruption."},{label:"GP automatically loses all promote — past, present, and future — until a replacement is found.",isBest:!1,explanation:"Past distributed promote isn't clawed back by a key-person event alone. Clawback is a separate mechanism tied to fund liquidation. Key-person events suspend *future* GP economics (new deals, new carry) but don't reach back to take already-distributed dollars."},{label:"The fund automatically dissolves and proceeds to wind-down — LP gets 100% of remaining cash flows pro-rata.",isBest:!1,explanation:"Dissolution would be the most severe LP remedy and is rare. Typical LPAs have a graduated response: investment period suspension, carry pause, and only after LP supermajority vote does the fund dissolve. Most key-person events are cured within the cure period."},{label:"Nothing happens immediately — the LPA only requires GP to disclose the resignation; LPs have no formal rights.",isBest:!1,explanation:"Underestimates LP protections. Key-person provisions are one of the strongest LP rights in modern LPAs — they're written specifically to give LPs leverage when key people leave. Disclosure alone wouldn't justify the term in the document."}],takeaway:"Key-person events trigger a graduated LP response: suspension of new investment, pause/escrow of GP carry on new exits, accelerated LP rights (removal vote, fee reduction), and a cure period for GP. Past distributed promote isn't clawed back by this mechanism — that's separate. The interplay matters: a GP with significant unpaid promote on undistributed deals has real exposure to a key-person event; a GP that's already taken most promote has less.",tips:["Key-person ≠ for-cause removal. Different triggers, different LP voting thresholds.",'LPs negotiate harder for key-person provisions when the fund is "first-time" or sponsor-driven (vs platform).',"Always read the cure period — 30 days for some LPAs, 90+ for others. Bigger funds tend to have longer cures.","Key-person provisions don't reach distributed promote, but they often pair with clawback that does at fund-end."]},V1={id:"dscr-test-timing-mechanics",title:"DSCR test timing — when does the lender actually measure?",category:"document-literacy",difficulty:"advanced",roles:["mortgageUw","assetManagement"],documentExcerpt:{docType:"loan",label:"Section 6.04 — Financial Covenants",text:`(a) Minimum Debt Service Coverage Ratio. As of the last day of each
    fiscal quarter (each, a "Test Date"), Borrower shall maintain a
    Debt Service Coverage Ratio of not less than 1.20:1.00, calculated
    on a trailing-twelve-month basis using Net Operating Income as
    defined in Section 1.01.

(b) Cure Rights. If the DSCR as of any Test Date is below the required
    level, Borrower may, within thirty (30) days following Lender's
    written notice of such failure, deposit cash with Lender as
    additional collateral in an amount sufficient, when treated as a
    notional reduction of the outstanding principal balance, to cause
    the DSCR (recalculated giving effect to such notional reduction)
    to equal or exceed the required level.

(c) Failure to Cure. If Borrower fails to deliver such cure within
    thirty (30) days, an Event of Default shall be deemed to have
    occurred, and Lender may exercise all rights under Section 8.`},scenario:"You're reviewing a loan agreement's DSCR covenant for a mid-size MF refi. The lender's clause is above. The asset is currently running 1.15× DSCR on T-12 NOI; the next quarterly Test Date is 45 days away. Your sponsor is debating whether to hold cash for a possible cure or pay it out as a Q3 distribution.",question:"Given the timing mechanics in the clause above, what's the most accurate read of the sponsor's exposure window?",options:[{label:"The sponsor has at least 45 days until measurement, then 30 more days from Lender's notice to cure with cash collateral. Total exposure window before EOD ≈ 75 days. The cure isn't a permanent fix — the cash is held as additional collateral and the underlying NOI problem still needs to be solved before the next Test Date.",isBest:!0,explanation:"Read it tier by tier: (a) the test happens at quarter-end; (b) cure period runs 30 days from *Lender's written notice* of the failure (notice typically follows the quarter close by 1-2 weeks once Lender receives the operating reports); (c) failure to cure within that 30-day window crystallizes the EOD. So the practical timeline is: ~45 days to Test Date, ~10-14 days for Lender to issue notice, then 30 days to cure — ~75-90 days of total runway. The cure itself is a *cash-collateral pledge*, not a permanent waiver — sponsor has to keep curing every quarter unless NOI recovers. Holding cash for the cure is far safer than distributing it."},{label:"The sponsor has 30 days to cure from the Test Date itself; missing the Test Date by even a day triggers an immediate EOD.",isBest:!1,explanation:`Misreads the trigger language. Cure runs from "Lender's written notice" of failure, not from the Test Date itself. There's typically a 7-14 day gap between quarter-end and Lender's receipt of operating reports + issuance of notice.`},{label:"The cash deposit cures the covenant permanently — once posted, the DSCR test no longer applies until refinancing.",isBest:!1,explanation:"A cash deposit cures *the failed Test Date*, not future ones. The sponsor must re-test next quarter; if NOI hasn't recovered, they'll need additional cure cash at the next Test Date too. Many loans cap how many cures Sponsor can deliver in a row before the lender can declare EOD regardless."},{label:"The 1.20× test is measured on spot NOI at Test Date, so seasonal fluctuations alone could trigger it.",isBest:!1,explanation:'Misreads the calculation method. Clause specifies "trailing-twelve-month basis," which smooths out seasonality. Spot-quarter measurement would be far more punitive.'}],takeaway:"DSCR covenants have three time gates: Test Date (when measured), Notice Date (when Lender flags the failure), and Cure Deadline (typically 30 days from Notice). The compounding window is usually 60-90 days from quarter-end, not 30. Cures are typically cash-collateral pledges that fix one Test Date at a time — the underlying NOI problem still needs to be solved.",tips:["T-12 vs spot NOI: most institutional loans use T-12 to smooth seasonality. Spot measurement is rare and far more punitive.","Cure cash is held as additional collateral — it doesn't reduce the loan balance, just notionally for DSCR math.","Some loans cap consecutive cures (e.g. 4 cures over the loan term). After the cap, lender can EOD regardless of cure.","Always model the cure cost: at 1.20× DSCR target on $5M of debt service, ~$1M of NOI shortfall = ~$8.3M of cure-cash needed (cure cash × required-DSCR / DSCR achieved)."]},Y1={id:"dscr-cash-trap-trigger",title:"Cash trap activation — what does this lender clause actually do?",category:"document-literacy",difficulty:"advanced",roles:["mortgageUw","assetManagement","portfolioMgmt"],documentExcerpt:{docType:"loan",label:"Section 4.03 — Cash Management",text:`(a) Lockbox Activation Event. Upon the earlier to occur of (i) any
    Event of Default, or (ii) the DSCR being less than 1.10:1.00 as
    of any Test Date (a "Trigger Event"), all Operating Revenues
    shall be deposited directly into the Lockbox Account, and Lender
    shall control all disbursements therefrom in accordance with the
    Cash Management Waterfall set forth in subsection (c).

(b) Springing Recourse. The occurrence of a Trigger Event shall not,
    in and of itself, render the Loan recourse to the Guarantor, but
    any failure to deposit Operating Revenues into the Lockbox
    following a Trigger Event shall constitute a "Bad Boy Event,"
    rendering the Loan fully recourse to the Guarantor.

(c) Cash Management Waterfall. So long as a Trigger Event is
    continuing, available funds in the Lockbox Account shall be
    applied in the following order: (1) Taxes and Insurance reserves;
    (2) Debt Service; (3) Operating Expense Reserve (capped at 110%
    of T-3 monthly OpEx); (4) Capital Reserve (in accordance with
    Approved Budget); (5) Excess Cash Sweep to a Lender-controlled
    reserve until DSCR exceeds 1.20:1.00 for two consecutive Test
    Dates ("Trigger Cure").`},scenario:`Your borrower's DSCR just printed at 1.08× on the most recent Test Date — below the 1.10× cash-trap trigger but still above the EOD-triggering 1.20× covenant minimum. The lender just sent activation notice. Sponsor is asking: "What does this actually mean for distributions?"`,question:"What's the practical impact on the sponsor over the next 2-4 quarters?",options:[{label:"All operating cash flows go to the lockbox; sponsor gets nothing distributable until DSCR clears 1.20× for *two consecutive* Test Dates. Approved budget OpEx + capex still gets paid, but excess cash gets swept to a lender-controlled reserve. Until cure, sponsor has zero distributions but no recourse exposure — *unless* sponsor diverts operating cash to a non-lockbox account, which would trigger full springing recourse.",isBest:!0,explanation:'Cash-trap mechanics in detail: (a) once trigger fires, all revenue goes through lockbox — sponsor loses cash control; (b) springing recourse is *not* automatic, but sponsor failure to comply (e.g. depositing rents to a non-lockbox account) is a "bad boy" carve-out that activates full personal recourse; (c) the waterfall pays operating necessities (taxes, insurance, debt service, operating + capex reserves) but sweeps the rest to a lender-controlled cash reserve; (d) cure requires *two consecutive* Test Dates above 1.20× — so even if next quarter prints 1.25×, sponsor is still locked. The two-quarter lookback is asymmetric: easy to enter, hard to exit. Sponsor should plan for at least 6 months of zero distributions and prepare a cure-cash reserve for the EOD-trigger covenant of 1.20×.'},{label:"Cash trap cures automatically as soon as one Test Date prints back above 1.10×.",isBest:!1,explanation:"Misreads the cure trigger. Trap activates at <1.10× but cures at >1.20× for *two consecutive* Test Dates. The asymmetric thresholds + multi-quarter cure are deliberate — they make it easy for the lender to lock cash and hard for the borrower to unlock it."},{label:"The lockbox fires immediately into full recourse to the guarantor — sponsor's personal assets are now at risk.",isBest:!1,explanation:"Trigger Event alone does NOT trigger springing recourse. The springing-recourse carve-out only fires if sponsor *misbehaves* (e.g. diverts rents from the lockbox). A clean trigger event = sponsor loses cash control but keeps non-recourse status."},{label:"Sponsor can negotiate to keep distributions during the trap period — these clauses are typically waivable.",isBest:!1,explanation:"Cash-trap clauses are very rarely waived during the trap period — that's the whole point of the structure for the lender. Sponsor may negotiate for a one-time waiver pre-emptively (in exchange for a fee or rate bump), but post-trigger, the trap typically just runs."}],takeaway:"Cash-trap (lockbox) clauses are an asymmetric squeeze: they activate at one DSCR level but cure at a higher level, often requiring multi-quarter consistency. Sponsor exposure isn't recourse — it's cash-flow starvation. Springing recourse only fires on bad-actor behavior (diverting cash, fraud, voluntary bankruptcy). Always model the trap window into base-case underwriting on near-the-line deals.",tips:["Activation < cure threshold. Read both numbers, not just the first one.","Cure is usually multi-quarter: one good quarter doesn't escape; need consistency.","Springing recourse ≠ trigger event. Recourse fires on *misbehavior during* the trigger, not on the trigger itself.","Operating + capex reserves typically stay funded during a trap; only true excess cash gets swept."]},_1={id:"dscr-cure-rights",title:"DSCR cure rights — how much cash does the sponsor actually need?",category:"document-literacy",difficulty:"advanced",roles:["mortgageUw","assetManagement"],documentExcerpt:{docType:"loan",label:"Section 6.04(b) — DSCR Cure Mechanics",text:`Borrower may cure any failure of the DSCR covenant by depositing
cash with Lender (the "Cure Cash") to be held in the DSCR Cure
Reserve. For purposes of recalculating the DSCR, the outstanding
principal balance shall be deemed reduced by the amount of Cure
Cash on deposit, and Debt Service shall be recalculated using such
notionally reduced principal balance, the contract interest rate,
and the original amortization schedule. Cure Cash shall be released
to Borrower at the earlier to occur of (i) the DSCR (calculated
without giving effect to the Cure Cash) exceeding 1.25:1.00 for two
consecutive Test Dates, or (ii) repayment in full of the Loan.

Maximum Cures. Borrower may not exercise the cure right more than
four (4) times in the aggregate during the term of the Loan, and
no more than two (2) times in any rolling four-quarter period.`},scenario:"NOI is running $2.4M annualized; debt service is $2.2M ($25M loan @ 7%, 30-year amort). Required DSCR is 1.20×. The sponsor has $1M of cash available. The next Test Date is in 3 weeks.",data:[{label:"Annualized NOI",value:"$2.4M"},{label:"Annual debt service",value:"$2.2M"},{label:"Current DSCR",value:"~1.09×"},{label:"Required DSCR",value:"1.20×"},{label:"Cure cap",value:"4 total / 2 per rolling 4Q"},{label:"Cash on hand",value:"$1M"}],question:"How much cure cash does the sponsor need to clear the test, and is the $1M they have enough?",options:[{label:"They need ~$3.6M of cure cash. NOI of $2.4M ÷ 1.20 target = $2.0M of allowable debt service. They're running $2.2M, so they need to notionally cut DS by ~$0.2M. At a 7% / 30y constant of ~7.98%, that requires reducing principal by $0.2M / 0.0798 ≈ $2.5M. But the cure also needs to leave the DSCR *just at* the threshold, so practical cure includes a buffer (~$3.6M). The $1M is not enough; sponsor needs to find the rest or face EOD.",isBest:!0,explanation:"Cure math step-by-step: (1) target debt service = NOI / DSCR target = $2.4M / 1.20 = $2.0M. (2) need to cut current DS of $2.2M by $0.2M. (3) reducing principal by X cuts DS by X × loan-constant. At 7% / 30y, constant ≈ 7.98%. So X = $0.2M / 0.0798 ≈ $2.5M of notional principal reduction = $2.5M of cure cash. In practice, lenders calculate to the *exact* DSCR threshold, and prudent sponsors over-collateralize by 15-20% to buffer next quarter — call it ~$3.0-3.6M. The $1M is well short. Sponsor either finds another $2-3M (capital call to LP, refi, equity raise) or accepts EOD with all its consequences (cross-default, accelerated maturity, control loss)."},{label:"They need $200k of cure cash — exactly the NOI shortfall.",isBest:!1,explanation:"Confuses NOI shortfall with cure cash. Cure cash is *principal reduction* (loan-balance proxy), not NOI substitute. To cut $200k of DS via principal reduction at 7.98% loan constant, sponsor needs $200k / 7.98% ≈ $2.5M of cure cash, not $200k."},{label:"Cure cash is a 1:1 substitution for debt service; sponsor needs the full $2.2M.",isBest:!1,explanation:"Misreads the mechanic. Cure cash *notionally reduces principal*, which reduces calculated DS via the loan constant — not a direct DS substitute. Direct DS substitution would require ~$2.2M; principal-proxy substitution requires ~$2.5M for full cover, which is close but not by coincidence."},{label:"They can simply keep curing repeatedly until NOI recovers — there's no limit.",isBest:!1,explanation:"The clause specifies a 4-cure aggregate cap and 2-per-rolling-4Q cap. Sponsor cannot cure indefinitely; if NOI doesn't recover, eventually they hit the cap and Lender can declare EOD."}],takeaway:`DSCR cure cash isn't a 1:1 NOI substitute — it's a *principal-reduction proxy*. The math: Cure $ = (current DS − target DS) / loan constant. At ~8% loan constants, $1 of NOI shortfall typically requires ~$12-13 of cure cash. Most sponsors are surprised by how much capital a "small" DSCR miss requires. Plan ahead or you'll be capital-calling LPs at the worst possible moment.`,tips:["Cure cash math: (current DS − target DS) / loan constant ≈ $X. Memorize the inverse of common loan constants.","Always include a buffer (~15-20%) so the next quarter doesn't need a fresh cure.","Cure caps are real. 4 total + 2 per rolling 4Q is standard; some lenders are tighter.","EOD consequences cross all loans (cross-default), so missing a small DSCR test on one asset can blow up the whole portfolio. Cure aggressively when the math is feasible."]},U1={id:"dscr-springing-recourse",title:"Springing recourse — what triggers personal liability?",category:"document-literacy",difficulty:"advanced",roles:["mortgageUw","acquisitions"],documentExcerpt:{docType:"loan",label:"Section 9 — Recourse Carve-Outs",text:`Notwithstanding anything to the contrary in this Agreement, the
Loan shall be fully recourse to Guarantor (the "Springing Recourse
Events") upon the occurrence of any of the following:

(a) any voluntary filing of bankruptcy by Borrower;

(b) any transfer of the Property or controlling interests in
    Borrower without Lender's prior written consent;

(c) the commission of waste, fraud, or any willful misappropriation
    of Operating Revenues, Insurance Proceeds, or Condemnation
    Awards;

(d) the failure of Borrower to deposit Operating Revenues into the
    Lockbox Account following any Trigger Event under Section 4.03;

(e) the failure to maintain the Property in compliance with all
    Environmental Laws, except to the extent such non-compliance
    arises after Lender takes possession.

Recourse under this Section 9 is in addition to, and not in lieu
of, Lender's other remedies under this Agreement.`},scenario:`You're advising a sponsor whose Class B office asset has been hit hard by a tenant departure. NOI dropped 18% YoY, putting the deal in cash trap (DSCR < 1.10×). The sponsor is exploring "what if" scenarios: filing for bankruptcy to push the lender to the table, transferring 49% of Borrower interests to a third-party investor for fresh capital, or just stopping payment on a non-essential vendor while operating cash is short.`,question:"Which of the sponsor's contemplated actions actually trips the springing-recourse clause?",options:[{label:`Voluntary bankruptcy filing trips full recourse immediately under (a). Transferring controlling interests likely trips (b) — even 49% may count if it constitutes a "controlling interest" via voting or board control. Stopping payment on a vendor doesn't trip recourse but compounds the financial problem. The cash-trap activation alone (NOI drop) does not trip recourse.`,isBest:!0,explanation:`Recourse-trigger analysis: (a) voluntary BK is a hard trigger — sponsor often *thinks* this gives them leverage but it converts a non-recourse loan into a personal liability. Lenders draft this carve-out specifically to deter strategic BK. (b) "Controlling interests" is a defined term, not a flat 50% threshold — voting control, board appointment rights, or operational control can all constitute "control" even at <50%. So a 49% transfer with retained voting control might not trip; a 49% transfer with board reshuffling could. Read the definition carefully. (c)(d)(e) require active misbehavior. Stopping vendor payments isn't in the list (it might trigger an Operating Default but not personal recourse). The cash-trap mechanic itself is not on the list — recourse-trigger requires sponsor *misbehavior*, not just bad performance.`},{label:"All three actions trip springing recourse — the lender holds all the cards once cash trap activates.",isBest:!1,explanation:"Overstates recourse exposure. Cash trap alone doesn't trip recourse. Stopping a vendor payment is an operating issue, not a recourse trigger. Only BK and unauthorized transfer hit the list cleanly."},{label:`Voluntary BK doesn't trip recourse — that's a "bad-boy carve-out" that's been struck down by courts as unenforceable.`,isBest:!1,explanation:"Voluntary BK as a recourse trigger has been litigated extensively but generally upheld. Sponsors *cannot* assume BK is a free option — it's the one carve-out lenders most reliably enforce."},{label:"Transferring 49% can't trigger (b) because it's less than 50% — controlling interest = majority by definition.",isBest:!1,explanation:'"Controlling interest" is defined in the loan documents and almost never equals "50%+" mechanically. Voting agreements, side letters, and board-control provisions all factor in. A 49% transfer with management control can absolutely qualify.'}],takeaway:`Springing recourse is the lender's big stick on a non-recourse loan. The carve-outs are typically: (1) voluntary BK; (2) unauthorized transfer of "controlling interests" (defined broadly); (3) waste / fraud / cash misappropriation; (4) lockbox circumvention; (5) environmental non-compliance. Cash trap and DSCR misses by themselves don't trip recourse. Sponsors who think strategically about BK are usually one read of Section 9 away from realizing why "non-recourse" loans aren't actually free options.`,tips:['"Controlling interest" ≠ "majority interest." Read the defined term carefully — 25-49% can qualify with voting control.',"Voluntary BK is the most-enforced carve-out. Lenders draft these deliberately broad and courts uphold them.","Misappropriation of *insurance proceeds* and condemnation awards are the dirty trick — sponsors sometimes try to grab these and find personal liability waiting.","Springing recourse is *separate* from Lender's other remedies. Triggering recourse doesn't wipe foreclosure; it adds personal liability on top."]},W1={id:"lpa-initial-vs-additional-capital",title:"Initial vs Additional Capital — what's a partner actually obligated to fund?",category:"document-literacy",difficulty:"advanced",roles:["portfolioMgmt","acquisitions"],documentExcerpt:{docType:"lpa",label:"Article IV — Capital Contributions",text:`4.1 Initial Capital Contributions. Each Member's "Initial Capital
    Contribution" is set forth on Schedule A and shall be funded in
    full at Closing. Failure to fund the Initial Capital Contribution
    when due shall be a Member Default subject to Section 4.5.

4.2 Additional Capital Contributions. The Manager may, from time to
    time and in its sole discretion, request Additional Capital
    Contributions from the Members in proportion to their Percentage
    Interests for: (a) operating shortfalls; (b) capital improvements
    contemplated by the Approved Business Plan; (c) protective
    advances to preserve the Property's value. Members shall not be
    obligated to fund Additional Capital Contributions exceeding, in
    the aggregate, fifty percent (50%) of the Initial Capital
    Contribution amount, unless approved by Supermajority Consent.

4.3 Cost Overrun Contributions. To the extent actual project costs
    exceed the Approved Budget by more than the Contingency Reserve,
    the resulting "Cost Overrun" shall be funded as follows: (i) the
    first $1,000,000 by the Managing Member only; (ii) thereafter,
    pro rata by all Members in accordance with Percentage Interests;
    provided that no Member shall be obligated to fund Cost Overrun
    Contributions exceeding 25% of the Initial Capital Contribution
    of such Member.`},scenario:"You're an LP at a JV that funded $20M of Initial Capital ($18M LP, $2M GP). The deal has a $20M budget and $1M contingency. Construction is now 30% over budget — $6M of total overruns. The Manager is asking you to fund your share of the next capital request. The request mixes operating shortfall ($1M), value-preserving capex ($1.5M), and your share of cost overruns.",question:"Under the clauses above, what's your maximum mandatory funding obligation right now?",options:[{label:"You're obligated for ~$1M of overrun + ~$2.25M of additional capital. Cost overrun: GP funds the first $1M alone (4.3(i)); the remaining $5M is pro-rata, so your 90% share = $4.5M but capped at 25% of your Initial = $4.5M cap (90% × $5M / 25% × $18M = $4.5M cap). Additional capital is $2.5M total and pro-rata 90/10, so your share = $2.25M, but capped at 50% of your Initial = $9M cap. Combined: ~$6.75M obligation. Above that, the Manager needs Supermajority Consent for any further calls.",isBest:!0,explanation:"The clauses create three separate funding buckets, each with its own cap: (1) **Initial Capital**: already funded, no further obligation. (2) **Additional Capital** (4.2): pro-rata, capped at 50% of Initial = $9M for LP, $1M for GP. Manager's ask of $2.5M total → LP's share is 90% × $2.5M = $2.25M, well within the 50% cap. (3) **Cost Overrun** (4.3): GP funds first $1M alone; remaining $5M pro-rata, capped at 25% of each Member's Initial = $4.5M LP / $0.5M GP. LP's pro-rata share of the remaining $5M = $4.5M, equal to the cap. Total LP obligation = $2.25M (additional) + $4.5M (overrun) = $6.75M. The 25% cost-overrun cap is the binding constraint; if overruns continue, GP will need Supermajority Consent for additional calls — and may face a default if the Property requires more capital than Members will fund."},{label:"You owe your full pro-rata share of all $6M overrun + $2.5M additional capital = $7.65M. The clauses obligate you to fund whatever the Manager calls.",isBest:!1,explanation:"Misses the 50%/25% caps entirely. The clauses are explicit that Members' obligations are *capped* — Manager calls can be in larger amounts but Members can decline above the caps without default consequences."},{label:"Nothing. The 50% / 25% caps mean you can refuse all capital calls if you want.",isBest:!1,explanation:"Confuses cap with optionality. Members are *obligated* up to the cap and *optional* above. Refusing a properly-noticed call within the cap triggers Member Default + Section 4.5 remedies (typically dilution + interest penalty)."},{label:"GP must fund the entire $6M cost overrun alone — that's the point of putting the GP first in 4.3(i).",isBest:!1,explanation:'Misreads 4.3. GP funds the *first* $1M alone; thereafter pro-rata. The "first $1M from GP" is a sponsor-skin-in-game tier, not unlimited GP exposure.'}],takeaway:"Three funding tiers with three caps: Initial (mandatory at close); Additional Capital (capped at 50% of Initial, for ops + planned capex + protective advances); Cost Overrun (first slug on GP, then pro-rata, capped at 25% of Initial per Member). When overruns approach the cap, Manager faces a constrained menu: Supermajority Consent for more calls, refi/mezz to fill the gap, or sell the asset. Defaults trigger Member Default remedies — typically punitive dilution.",tips:["LPA capital-call language has *separate* caps per bucket. Read each one.","Cost-overrun caps are usually 25% of Initial; additional-capital caps are usually 50% of Initial. These are sponsor-friendly defaults; LPs negotiate higher cost-overrun caps when they have leverage.",'GP-first overrun tier is "skin in the game." Common sizes: first $1M, first $2M, or first 5-10% of budget.',"When members refuse capital calls beyond the cap, the deal usually goes to refi/mezz/sale — not failure. Plan exits before hitting the cap.","Default remedies (Section 4.5) typically include forced dilution at a punitive valuation (e.g. 50% of book), interest accrual on unfunded amounts, and loss of voting rights. Read carefully."]},H1={id:"lpa-capital-call-default",title:"Capital call default — what does the LPA actually do to a non-funder?",category:"document-literacy",difficulty:"advanced",roles:["portfolioMgmt","acquisitions"],documentExcerpt:{docType:"lpa",label:"Section 4.5 — Member Default Remedies",text:`If a Member fails to fund any required Capital Contribution within
ten (10) Business Days following the date specified in the Capital
Call Notice (a "Defaulting Member"), the non-defaulting Members may
elect, by majority of Percentage Interests held by non-defaulting
Members, to exercise one or more of the following remedies:

(a) Funding by Other Members. Non-defaulting Members may fund the
    Defaulting Member's shortfall (the "Default Loan"). The Default
    Loan shall accrue interest at the Default Rate (the lesser of
    18% per annum or the maximum rate permitted by law) and be
    repaid out of distributions otherwise payable to the Defaulting
    Member.

(b) Forced Dilution. The Defaulting Member's Percentage Interest
    shall be diluted using a "Dilution Multiplier" of 1.5x: the
    Defaulting Member's Percentage Interest shall be reduced, and
    the funding Member(s)' Percentage Interest shall be increased,
    based on a contribution-to-Default-Loan calculation as if the
    Default Loan had been a Capital Contribution at 1.5x face value.

(c) Loss of Voting Rights. The Defaulting Member shall forfeit all
    voting and consent rights for so long as any Default Loan
    remains outstanding.

(d) Forced Buyout. The non-defaulting Members may, by Supermajority
    Consent, force a buyout of the Defaulting Member's remaining
    Interest at 75% of the Capital Account balance.`},scenario:"A capital call has been issued for $3M (LP's pro-rata share). LP cannot fund — their internal allocation has been frozen pending a fund-raise. The 10-business-day cure period passes. LP is now a Defaulting Member. The non-defaulting Members are evaluating their remedies.",question:"Among the four remedies, which is typically the *most punitive* in dollar terms, and why do non-defaulting Members usually pick a combination of remedies rather than one?",options:[{label:"Forced Dilution (b) is most punitive: the 1.5x multiplier means LP loses ~50% more economic interest than the dollars contributed by funding Members. Combined remedies — usually Default Loan (a) + Forced Dilution (b) + Loss of Voting (c) — let non-defaulting Members extract economic value (dilution) while preserving capital recovery (Default Loan with 18% interest) and operational control (vote forfeiture). Forced Buyout (d) is the nuclear option, rarely used except to clear out a chronically defaulting partner.",isBest:!0,explanation:"Remedy economics: (a) Default Loan at 18% / max-legal recovers principal + steep interest, but doesn't shift economic interest. (b) Dilution multiplier of 1.5x means each $1 of funded shortfall translates to $1.50 of effective contribution for the dilution math — so LP's defaulted $3M becomes $4.5M of equivalent contribution by funders, and LP's ownership shrinks accordingly. (c) Vote forfeiture eliminates LP's ability to block decisions — material on supermajority items like sale/refi/budget approval. (d) Forced buyout at 75% of Capital Account is the worst economically *if used*, but requires Supermajority consent and is rare. The combination (a)+(b)+(c) is the standard playbook: lend the money at penalty rate, take economic upside via dilution, and lock the defaulter out of governance. Funders get rewarded for stepping up; defaulter pays multiple ways."},{label:"Default Loan (a) is most punitive — 18% interest compounds aggressively and recovers more than the original obligation.",isBest:!1,explanation:"18% on $3M over a typical 2-3 year recovery is $1-1.5M of interest. Forced Dilution at 1.5x on a $3M shortfall costs LP economic interest worth typically $5-8M+ over the life of the deal — far more punitive in dollar terms."},{label:"Loss of Voting Rights (c) is most punitive because it makes the LP irrelevant to governance.",isBest:!1,explanation:"Vote loss is operationally painful but not directly economic. The LP still owns their (now-diluted) economic share. Dilution + Default Loan strip more dollar value than vote loss."},{label:"Non-defaulting Members would always pick Forced Buyout (d) because it ends the relationship cleanly.",isBest:!1,explanation:"Forced Buyout requires Supermajority Consent, ties up capital to fund the buyout, and crystallizes the LP's exit at a fixed (low) price. Most JVs prefer ongoing dilution + vote forfeiture as the punitive lever, reserving buyout for partners who chronically default."}],takeaway:"Capital-call defaults trigger a menu of remedies — non-defaulting Members typically combine Default Loan (recovers cash + interest), Forced Dilution (extracts economic value at a multiplier), and Vote Forfeiture (control). Forced Buyout is the nuclear option. Dilution is usually the most punitive in dollar terms because of the multiplier. LPs should structure their LPA participation only after stress-testing what a 1.5-2.0x dilution multiplier on their pro-rata share would do to their effective ownership.",tips:["Dilution multipliers are the LP's biggest exposure on capital-call defaults. 1.5x is sponsor-friendly default; 2.0x is aggressive; 1.0x (no penalty) is rare.",'Default rates of 12-18% are typical. Capped at "max permitted by law" (usury cap) to stay enforceable.',"Negotiation lever: LPs with leverage push for lower dilution multipliers and longer cure periods (e.g. 30 days vs 10).","Always ask: what does my model look like at 0.7× ownership, 0.5× ownership? If you can't survive that, negotiate harder upfront."]},Q1={id:"lpa-cost-overrun-sharing",title:"Cost overrun sharing — who eats what when the budget blows up?",category:"document-literacy",difficulty:"advanced",roles:["portfolioMgmt","acquisitions"],documentExcerpt:{docType:"lpa",label:"Section 4.3 — Cost Overrun Allocation",text:`Cost Overruns shall be allocated and funded as follows:

Tier 1: Contingency Reserve. The first $2,500,000 (the "Contingency
    Reserve") shall be drawn from project funds and shall not require
    additional Member capital.

Tier 2: Sponsor Skin. The next $1,500,000 (the "Sponsor Skin")
    shall be funded by the Managing Member only, in addition to the
    Managing Member's Initial Capital Contribution.

Tier 3: Pro Rata. Cost Overruns in excess of Tier 1 + Tier 2 shall
    be funded by all Members in accordance with their Percentage
    Interests; provided, however, that no Member shall be required
    to fund Tier 3 contributions in excess of fifteen percent (15%)
    of such Member's Initial Capital Contribution.

Tier 4: Construction Completion Guaranty. To the extent Cost
    Overruns exceed amounts funded under Tiers 1 through 3, the
    Managing Member shall fund such excess pursuant to its
    Construction Completion Guaranty under the Loan Documents.`},scenario:"A development project has a $50M budget with a $2.5M Contingency Reserve. Initial capital: $25M total ($22.5M LP at 90%, $2.5M GP at 10%). Construction is now $7M over budget and counting. The GP is asking how the overruns get allocated. You're calculating each tier.",question:"How does the $7M overrun flow through the four tiers?",options:[{label:"Tier 1 absorbs the first $2.5M (no member capital). Tier 2: GP funds $1.5M alone (Sponsor Skin). Tier 3: remaining $3M is pro-rata 90/10 — LP's share = $2.7M, capped at 15% of $22.5M = $3.375M (within cap). GP's share = $0.3M, also within their $375k cap. So full $3M flows through Tier 3. Total funding: $0 from project + $1.5M from GP (Tier 2) + $2.7M LP / $0.3M GP (Tier 3). LP exposure so far: $2.7M. GP exposure: $1.8M. Tier 4 would only fire if overruns exceed total Tier 1-3 capacity — currently $7M is within capacity.",isBest:!0,explanation:"Tier-by-tier walkthrough: Tier 1 ($2.5M) is project funds — no member capital required. Tier 2 ($1.5M) is GP-only Sponsor Skin — locked-in pro-sponsor exposure. Tier 3 starts at $4.0M of cumulative overrun and goes pro-rata. Capacity in Tier 3 is capped: LP's 15% cap = 15% × $22.5M = $3.375M; GP's = 15% × $2.5M = $375k. Total Tier 3 capacity = $3.75M, so the structure can absorb up to $4.0M (Tier 1) + $1.5M (Tier 2) + $3.75M (Tier 3) = $9.25M in total. After that, Tier 4 (GP's Construction Completion Guaranty) kicks in — *unlimited* personal exposure to the GP. The current $7M overrun is well within Tier 3 capacity. Critical sponsor takeaway: Tier 4 is real — it converts a non-recourse construction loan into personal liability for the GP if overruns blow through the prior tiers."},{label:"GP eats the entire $7M because they signed the Completion Guaranty.",isBest:!1,explanation:"Misorders the tiers. Tier 4 (Completion Guaranty) only fires after Tiers 1-3 are exhausted. GP's personal exposure starts at the project's capacity threshold, not at dollar one of overrun."},{label:"All $7M is shared 90/10 because Members fund pro-rata to ownership.",isBest:!1,explanation:"Skips Tiers 1 and 2 entirely. Only Tier 3 is pro-rata; Tier 1 is project-funded and Tier 2 is sponsor-only."},{label:"LP funds all $7M because GP's Sponsor Skin is its only obligation.",isBest:!1,explanation:"Ignores the Tier 1 contingency reserve and the pro-rata sharing in Tier 3. GP funds Tier 2 plus their pro-rata share of Tier 3 plus all of Tier 4 — typically *more* exposure than LP, especially with the unlimited Completion Guaranty."}],takeaway:"Cost overrun structures in LPAs typically have 4 tiers: (1) Contingency Reserve from project funds, (2) Sponsor Skin from GP only, (3) pro-rata up to a capped percentage of Initial Capital, (4) GP's Completion Guaranty (often personal recourse). The structure pushes the first dollar of overrun pain onto the project, the next onto the GP's skin, the middle to all Members pro-rata, and the long tail back onto the GP's personal balance sheet. The GP's Completion Guaranty is the real horror story: unlimited exposure on a deal where the budget went off the rails.",tips:["Always model overruns at multiple severity levels — what does 5% / 10% / 20% do? The structure typically holds at 5%, breaks at 15-20%.",`Sponsor Skin is GP's reputational cushion. Lenders sometimes require a stated minimum (e.g. "first 5% of budget").`,"LP cap on Tier 3 (typically 10-25% of Initial) is the binding constraint LPs negotiate hardest. Lower cap = more sponsor-friendly.","Tier 4 Completion Guaranty is the GP's biggest exposure on a development deal. Sometimes capped at a percentage of GP capital; sometimes uncapped.","Cross-reference the loan docs: lender Completion Guaranty *triggers* and *cures* should align with the LPA Tier 4 mechanic."]},K1={id:"lpa-contribution-ratios",title:"Contribution ratios — when do Percentage Interests actually shift?",category:"document-literacy",difficulty:"advanced",roles:["portfolioMgmt","acquisitions"],documentExcerpt:{docType:"lpa",label:"Section 4.6 — Adjustment of Percentage Interests",text:`(a) Default Position. Members' Percentage Interests shall be
    determined as the ratio of each Member's aggregate Capital
    Contributions (Initial + Additional) to the aggregate Capital
    Contributions of all Members.

(b) Adjustment Events. Percentage Interests shall be recalculated
    upon: (i) any Capital Contribution required pursuant to Section
    4.2 (Additional Capital) or 4.3 (Cost Overruns); (ii) any
    Default Loan made pursuant to Section 4.5; (iii) any Buyout
    pursuant to Section 4.7.

(c) Sponsor Promote Carve-Out. Notwithstanding subsection (a), the
    Managing Member's Promote Interest (the right to receive
    distributions in excess of pro-rata in accordance with the
    Distribution Waterfall) shall not be diluted by any non-default
    Capital Contributions of other Members; provided, however, that
    in the event of a Member Default funded by Default Loan, the
    Defaulting Member's Promote Interest, if any, shall be subject
    to forfeiture in proportion to the Default Loan amount.

(d) Capital Account vs Percentage Interest. Capital Accounts track
    each Member's contributions and allocations of profit/loss for
    tax purposes; Percentage Interests govern voting and pro-rata
    distributions. Members acknowledge these may diverge over time.`},scenario:"JV started 90/10 LP/GP at Initial Capital of $20M LP + $2M GP = $22M total. Mid-life, a $4M cost overrun was funded pro-rata; LP added $3.6M, GP added $0.4M. Six months later, an Additional Capital call of $3M was funded *only* by LP (GP couldn't fund). The non-defaulting LP made a Default Loan covering GP's $300k shortfall.",question:"After all three contribution events, what are the Members' new Percentage Interests, and how does GP's Promote Interest change?",options:[{label:"Cumulative funded contributions: LP = $20M + $3.6M + $3M = $26.6M; GP = $2M + $0.4M = $2.4M. Percentage Interests post-non-default events = LP 91.7%, GP 8.3%. GP's Default Loan ($300k from LP) doesn't change the Percentage Interest immediately (since LP recovers via Default Loan repayment), but per (c), GP's Promote Interest is forfeited in proportion to the default. If the $300k Default Loan represents X% of GP's total contribution capacity, GP's Promote Interest is reduced by ~X%. Net: LP's economic interest is up modestly via Percentage Interest dilution; GP's is hit harder because the Promote Interest erodes faster than the Percentage Interest.",isBest:!0,explanation:"Three things to track: (1) **Percentage Interests** shift via the contribution-ratio formula in (a), recalculated on each Adjustment Event. New ratios: LP = 26.6/29 = 91.7%; GP = 2.4/29 = 8.3% (down from 90/10). (2) **Promote Interest** under (c) is *separate* from Percentage Interest and is *not* automatically diluted by non-default contributions — that's the sponsor-friendly carve-out. So GP keeps their full Promote on the up-side waterfall *unless* there's a default. (3) The Default Loan triggers forfeiture per (c) proportional to the default. GP's missed $300k vs full GP capital of $2.4M is ~12.5%; GP's Promote Interest gets reduced ~12.5%. Critical insight: Promote Interest erosion via default forfeiture is often the *biggest* economic consequence of capital-call default — much more than the Percentage Interest dilution."},{label:"Percentage Interests stay 90/10 because the Promote Interest carve-out in (c) protects GP from any dilution.",isBest:!1,explanation:"Misreads (c). The carve-out only protects the Promote Interest from non-default dilution. Percentage Interests still recalculate via (a) on every Capital Contribution event."},{label:"LP's Default Loan converts immediately to Capital Contribution and gives LP full Percentage Interest credit for the $300k.",isBest:!1,explanation:"Default Loans are *loans*, not contributions. They earn interest at the Default Rate and get repaid out of the defaulting Member's distributions. They affect the Percentage Interest only if the LPA elects Forced Dilution as a remedy *separately* — Default Loan and Dilution are different remedies under the typical Section 4.5 menu."},{label:"Capital Accounts and Percentage Interests are the same thing — both track contributions for distributions.",isBest:!1,explanation:"Per (d), Capital Accounts track contributions + tax allocations (profits/losses); Percentage Interests govern voting + pro-rata distributions. They start aligned but diverge over time as profit/loss allocations and special tax adjustments happen. Don't conflate them."}],takeaway:`Three different "ratios" coexist in an LPA: (1) **Percentage Interests** track funding ratios for voting + pro-rata distributions; (2) **Capital Accounts** track contributions + tax allocations and diverge from Percentage Interests over time; (3) **Promote Interest** is the GP's incentive carve-out, separate from both, and protected from non-default dilution. Capital-call defaults hit Promote Interest harder than Percentage Interest because the LPA typically has explicit forfeiture mechanics for the Promote on default. Sponsors who default lose more than dilution suggests.`,tips:["Always track three numbers: Percentage Interest (governance + pro-rata), Capital Account (tax basis), Promote Interest (sponsor incentive). Don't conflate.",'Promote Interest carve-outs are sponsor-friendly defaults — they stop LPs from "stealing" the promote by funding a non-essential additional capital call.',"Default forfeiture on the Promote is the LP's strongest economic remedy. Cost-of-default for sponsors is often 5-10x the missed dollar amount when measured in lost Promote dollars over the deal life.","Cross-check Percentage Interest against the operating agreement *and* the loan docs (some loans require notice on Member changes >X%)."]},X1={id:"lease-billback-allowance",title:"Bill-back allowance — what can the landlord actually pass through?",category:"document-literacy",difficulty:"advanced",roles:["assetManagement","acquisitions"],documentExcerpt:{docType:"lease",label:"Article 5 — Operating Expense Pass-Through",text:`5.1 Tenant's Share. Tenant shall pay Tenant's Pro Rata Share of
    Operating Expenses (defined below) in excess of the Base Year
    Stop. "Tenant's Pro Rata Share" means 12,500 RSF / 425,000 RSF =
    2.94% (or as adjusted upon a re-measurement by Landlord pursuant
    to Section 1.5).

5.2 Operating Expenses. "Operating Expenses" shall include all
    reasonable costs and expenses of operating, maintaining, and
    repairing the Building, including: real estate taxes; insurance
    premiums; utilities (excluding utilities separately metered to
    Tenant); janitorial, security, and elevator service; HVAC;
    grounds and parking; management fees not to exceed three percent
    (3%) of gross rents; provided, however, that Operating Expenses
    shall NOT include: capital expenditures (except as expressly set
    forth in Section 5.3); leasing commissions; depreciation;
    interest or principal on any indebtedness; expenses incurred for
    other tenants' improvements; or any expense reimbursed by
    insurance.

5.3 Capital Expenditures. Notwithstanding the foregoing, the
    amortized cost of capital improvements that (a) are required by
    law first enacted after the Lease Commencement Date, or (b)
    Landlord reasonably determines will reduce Operating Expenses,
    may be included in Operating Expenses; provided that such cost
    shall be amortized over the useful life of such improvement
    pursuant to GAAP and the annual amortization shall be limited to
    the actual savings realized in the case of clause (b).

5.4 Audit Rights. Tenant may, no more than once per calendar year
    and at Tenant's expense, audit Landlord's books for the prior
    twelve months. If the audit reveals overcharges of more than
    five percent (5%) of Tenant's Pro Rata Share, Landlord shall
    refund the overcharge plus reimburse Tenant's reasonable audit
    costs.`},scenario:"You're reviewing year-end CAM reconciliation for an office tenant. The landlord billed $185k for the tenant's 2.94% share. Items in the bill: real estate taxes ($90k pro-rated to tenant), insurance ($15k), utilities/janitorial/HVAC ($45k), management fees ($18k = 4.2% of gross rents — slightly above the 3% cap), a new ADA-required ramp installation amortized over 15 years ($8k pro-rata for year 1 of amortization), and $9k for the buildout of an adjacent vacant suite that never got leased to anyone.",question:"Which line items can the tenant push back on, and what's the dollar exposure?",options:[{label:`Two items violate the lease: (1) management fees of 4.2% exceed the 3% cap — overcharge ≈ 1.2/4.2 × $18k ≈ $5.1k. (2) The $9k buildout for an adjacent vacant suite is *expressly excluded* under "expenses incurred for other tenants' improvements" — full $9k overcharge. Total overcharge = $14.1k on a $185k bill = 7.6%, which exceeds the 5% audit-trigger threshold, so the landlord must also reimburse audit costs. The ADA ramp amortization is *legitimate* under 5.3(a) — required by law enacted after Commencement.`,isBest:!0,explanation:`Line-by-line analysis: (1) Management fee cap is 3% of gross rents, written explicitly. The 4.2% exceeds; overcharge = the excess portion = (4.2% − 3.0%) / 4.2% × $18k = $5.1k. (2) "Buildout of vacant suite" is excluded under 5.2 — clear pass-through violation, full $9k. (3) ADA ramp passes through cleanly: the lease language at 5.3(a) explicitly permits amortized cost of capex required by law enacted *after* Lease Commencement; only the *amortized* portion (year 1 share) flows through, and that's how the landlord billed it. (4) Real estate taxes / insurance / utilities are standard pass-throughs. Total push-back = $5.1k + $9k = $14.1k. The 7.6% overcharge crosses the 5% audit threshold under 5.4, so the landlord must refund AND pay tenant's audit costs.`},{label:"The ADA ramp amortization is the biggest issue — capex is excluded from pass-through, period.",isBest:!1,explanation:"Misreads 5.3. Capex is *generally* excluded but Section 5.3 has explicit carve-outs for (a) law-required capex enacted after Commencement and (b) operating-expense-reducing capex. The ADA ramp falls cleanly under (a)."},{label:"Tenant has no recourse on the management fee — 3% caps are aspirational; landlords routinely bill higher.",isBest:!1,explanation:`Caps in lease language are enforceable. The lease says "not to exceed 3%" — that's a hard ceiling. Tenant has explicit audit rights to recover overcharges.`},{label:"The 2.94% pro-rata share is wrong; tenants should always re-measure and reduce their share.",isBest:!1,explanation:"The lease grants the *Landlord* the re-measurement right, not the Tenant. And re-measurement isn't the operative issue here — the issue is what costs are includable under 5.2. Don't pick fights you can't win."}],takeaway:"Lease pass-through clauses are dense and tenants should audit annually. The big four exclusions to memorize: (1) capital expenditures (with narrow carve-outs); (2) leasing commissions; (3) interest/depreciation; (4) other-tenant improvement costs. Management fee caps (typically 3-4%) are real and enforceable. Audit-trigger thresholds (typically 3-5% overcharge) can trigger landlord reimbursement of audit costs. Tenants should run the math themselves — landlords routinely bill items that violate the lease, and most tenants never check.",tips:["Memorize the four big exclusions: capex (with carve-outs), leasing commissions, interest/depreciation, other-tenant work.","Management fees are usually capped at 3-5% of gross rents. Read the cap; calculate the overage; bill back the landlord.",'Pro-rata share definitions matter — sometimes based on RSF, sometimes USF; "or as adjusted upon re-measurement" is a sneaky landlord-friendly clause.',"Audit rights typically run *one year* and are *at tenant's expense* — but with a refund + cost-reimbursement trigger if overcharges exceed a threshold (3-5%).","Keep the prior-year reconciliation — landlords re-bill items that should have been captured in year 1, and audit rights typically only look back 12 months."]},J1={id:"lease-base-year-vs-stop",title:"Base year vs expense stop — which one are you actually reading?",category:"document-literacy",difficulty:"intermediate",roles:["assetManagement","acquisitions"],documentExcerpt:{docType:"lease",label:"Article 5.1 — Operating Expense Pass-Through",text:`5.1(a) Operating Expenses. Tenant shall pay, as Additional Rent,
    Tenant's Pro Rata Share of Operating Expenses for each calendar
    year during the Lease Term in excess of the "Base Year Expenses"
    (the actual Operating Expenses incurred during calendar year
    2024). For the avoidance of doubt, the Base Year Expenses shall
    be calculated using the same methodology as subsequent years and
    shall be "grossed up" to reflect 95% occupancy if actual building
    occupancy was less.

5.1(b) Calculation Method. For the period commencing January 1,
    2025, the increase shall be calculated as: (Operating Expenses
    for the applicable year — Base Year Expenses) × Tenant's Pro
    Rata Share. There shall be no "expense stop" or fixed cap on
    Operating Expenses; Tenant pays the full year-over-year increase.

5.1(c) "Gross Up" Methodology. For purposes of calculating both
    Base Year Expenses and any subsequent year's Operating Expenses,
    variable expenses shall be grossed up to reflect 95% occupancy
    if actual occupancy was less than 95%. Fixed expenses (such as
    real estate taxes and insurance) shall not be grossed up.`},scenario:`You're reviewing a 5-year lease in an office building you're acquiring. The building is currently 80% occupied. Base Year is 2024 with $5.50/SF in operating expenses (across the whole building). The seller's OM is touting "tenant pays 100% of OpEx growth" but the lease says "Base Year" — which is structurally different from a "stop." The tenant occupies 12,500 SF in a 425,000 SF building.`,question:"Under the Base Year structure (5.1(a)) plus the gross-up clause (5.1(c)), what's the tenant's exposure on year-over-year OpEx growth, and how does this differ from a true expense stop?",options:[{label:"Base Year + gross-up = tenant pays growth in OpEx above the *grossed-up* 2024 baseline. Grossing the 2024 expenses up to 95% occupancy means the baseline is *higher* than actual 2024 expenses, which *reduces* the tenant's exposure to growth (because the bar is set higher). Expense Stop, by contrast, is a fixed dollar cap that doesn't adjust for occupancy. Practical impact here: at 80% actual occupancy, ~$5.50/SF actual OpEx grosses up to ~$5.85/SF baseline (variable expenses scale with occupancy). The tenant pays growth above $5.85/SF, not $5.50/SF. Better for tenant; worse for landlord acquisition math.",isBest:!0,explanation:"Critical distinction: **Base Year** = the baseline against which growth is measured, recalculated each year for occupancy via the gross-up clause. **Expense Stop** = a fixed dollar amount per SF that the tenant pays nothing under, regardless of occupancy or year. Base Year is more common in modern Class A office; Expense Stop is older / more common in retail and some Class B office. The gross-up math here: 2024 OpEx had ~70% variable / 30% fixed (typical ratio). At 80% occupancy, variable expenses are ~80%/95% × what they would be at 95%. To gross up to a 95%-occupancy baseline: variable portion × 95%/80%, fixed portion unchanged. So $5.50/SF actual = ~$3.85 variable + $1.65 fixed → grossed-up = $3.85 × 95/80 + $1.65 = $4.57 + $1.65 = $6.22/SF baseline. (Wait — if variable expenses scale with occupancy, then at 80% the actual variable was lower than at 95%; grossing up makes it higher.) The point: gross-up *raises* the baseline, which *lowers* tenant's growth exposure compared to a non-grossed-up calc. Landlord-friendly buyers prefer Expense Stop (no occupancy adjustment); tenants prefer Base Year + gross-up."},{label:"Base Year and Expense Stop are functionally the same — both protect tenant from inflationary increases.",isBest:!1,explanation:"They're not equivalent. Base Year is a *moving* baseline that recalculates each year (for occupancy via gross-up); Expense Stop is a *fixed* dollar number that doesn't adjust. The gross-up alone is a multi-cents-per-SF differentiator."},{label:"Tenant pays the full $5.50/SF, then $5.50/SF + 100% of growth — Base Year just means there's a starting point.",isBest:!1,explanation:"Misreads the structure. Tenant pays *only the growth above* the Base Year. They don't pay the Base Year itself unless the Base Rent is structured to include OpEx (which is a different lease type — full-service gross or modified gross)."},{label:"The gross-up clause works against the tenant — it inflates expenses on the landlord side and increases tenant's share.",isBest:!1,explanation:"Inverts the math. Gross-up *of the Base Year* raises the baseline, which *reduces* the growth exposure for tenant. Gross-up of subsequent years raises those years too, but the *delta* between baseline and current year shrinks. Net effect is tenant-friendly."}],takeaway:'Base Year vs Expense Stop is one of the most-misread lease structural distinctions. **Base Year** = Year 1 actual expenses (often grossed up for occupancy); tenant pays growth above that. **Expense Stop** = fixed $/SF cap; tenant pays nothing below; landlord pays nothing above. Modified gross / Full-service gross leases use Base Year; older / triple-net leases sometimes use Expense Stop. The gross-up clause is sneaky — landlord-friendly text says "if occupancy is below 95%, gross up actual expenses to 95% to compute the Base Year"; this raises the baseline and reduces tenant exposure (good for tenant, bad for landlord).',tips:["Base Year ≠ Expense Stop. Read carefully — they look similar in passing but produce very different cash flows.","Gross-up to 95% (sometimes 100%) is standard in Base Year leases. It's a tenant protection.","When buying an asset with Base Year leases, model OpEx growth carefully — under-stated growth = inflated NOI projection.",'"Modified Gross" + Base Year + gross-up is the most tenant-friendly mainstream structure. NNN + Expense Stop is the most landlord-friendly.',"Always run the math: at 80% occupancy, gross-up moves the baseline by 5-10% of variable expenses — material to NOI growth modeling."]},Z1={id:"lease-cam-reconciliation",title:"CAM reconciliation — what does the year-end true-up actually do?",category:"document-literacy",difficulty:"intermediate",roles:["assetManagement"],documentExcerpt:{docType:"lease",label:"Article 7 — CAM Reconciliation",text:`7.1 Estimated Monthly Payments. Tenant shall pay, in advance and
    along with each monthly Base Rent payment, an estimate of
    Tenant's share of Common Area Maintenance ("CAM") for the
    upcoming month, as reasonably determined by Landlord based on
    the prior calendar year's actuals plus a reasonable estimate of
    increases.

7.2 Annual Reconciliation. Within ninety (90) days following the
    end of each calendar year, Landlord shall deliver to Tenant a
    statement (the "CAM Statement") setting forth: (i) Total CAM
    Expenses for such calendar year; (ii) Tenant's Pro Rata Share;
    (iii) the amounts paid by Tenant during such year on account of
    CAM; (iv) any amount due from Tenant or to Tenant.

7.3 Payment of Reconciliation. If Tenant's actual share exceeds
    Tenant's estimated payments, Tenant shall pay the difference
    within thirty (30) days of receipt of the CAM Statement. If
    Tenant's estimated payments exceed Tenant's actual share,
    Landlord shall credit the overpayment against the next month's
    Base Rent.

7.4 Subsequent Adjustments. Landlord may, but shall not be required
    to, make adjustments to Tenant's estimated monthly CAM payments
    during the calendar year if circumstances warrant.

7.5 Limitation. Nothing in this Article 7 shall obligate Landlord
    to deliver a CAM Statement, or any portion thereof, more than
    twelve (12) months after the end of the applicable calendar year;
    any claim for additional CAM not so delivered shall be waived.`},scenario:`You're a tenant on a NNN lease. You paid $250/month CAM estimates throughout 2024 ($3,000 total). The 2024 CAM Statement arrived on April 15, 2025 (~3.5 months after year-end), showing actual annual CAM of $4,200 — so $1,200 due. Then in November 2025, the landlord sends a "Supplemental CAM Reconciliation" claiming $800 of additional 2024 expenses they "missed" in the original statement. You challenge.`,question:"Under the lease language, what's your strongest argument and likely outcome?",options:[{label:`Section 7.5 limits Landlord's ability to deliver "any portion" of the CAM Statement more than 12 months after year-end. The original statement was timely (April 2025, well within 12 months). The November 2025 supplemental, however, claims additional CAM for 2024 — and 2024 ended December 31. November 2025 is 11 months after year-end, so just inside the 12-month window. Your strongest argument is *good faith*: Landlord delivered a "CAM Statement" in April purporting to be complete and is now adding to it 7 months later. The lease says "any claim... not so delivered shall be waived" — courts often read this to mean Landlord can't serially supplement after delivering a "final" statement. But if pure clock matters, the 11-month timing is technically within bounds.`,isBest:!0,explanation:"Two doctrines fight here: (1) **strict construction** of the 12-month deadline — the November statement is technically within 12 months of year-end, so Landlord wins on the clock. (2) **estoppel / accord and satisfaction** — Landlord delivered an April statement that did not flag itself as preliminary or subject to amendment; Tenant paid $1,200 against that final-looking statement; equity says Landlord can't now add $800. Modern courts often read 7.5 to mean *serial supplements* are barred once a Statement is delivered, but the language is ambiguous. Best play: refuse to pay until Landlord shows the calenda
