ars:o},expected:i,unit:"usd",tolerance:{type:"pct",band:.05},solution:um(n,r,l,o)}}};function rs(e,t){return t/e}function Xc(e,t,n){return Math.pow(t/e,1/n)-1}function Zc(e,t){return Math.pow(1+e,t)}function dm(e,t){const n=rs(e,t);return{formula:"Equity Multiple = Equity Out / Equity In",steps:[{label:"Multiple",expression:`${g(t)} / ${g(e)}`,result:it(n)}],answerDisplay:it(n)}}const fm={kind:"equityMultiple",label:"Equity Multiple",description:"Equity in + equity out → EM.",category:"returns",tips:["EM = Out / In. Doesn't care about time — 2x in 1 year and 2x in 10 years both = 2.0x.","Divide by hundreds: $23M / $10M → 23/10 = 2.3x. $17.5M / $8M → 17.5/8 ≈ 2.19x.","Rule of thumb: institutional value-add deals target 1.7x–2.0x; opportunistic 2.0x+; core ~1.4x–1.6x.","Complement to IRR: EM shows absolute dollars back, IRR shows time-adjusted. Always look at both."],generate(e,t="intermediate"){const n=T(e,$.equityIn,t),r=T(e,$.irrExitMultiple,t),l=t==="beginner"?1e6:t==="advanced"?25e3:1e5,o=Math.round(n*r/l)*l,i=rs(n,o);return{id:W("em"),kind:"equityMultiple",prompt:`You invested ${g(n)} and received ${g(o)} at sale. What's the equity multiple?`,context:{equityIn:n,equityOut:o},expected:i,unit:"multiple",tolerance:{type:"pct",band:.05},solution:dm(n,o)}}};function pm(e,t){const n=Hc(e,t);return{formula:"Going-in Cap = NOI / Purchase Price",steps:[{label:"Cap rate",expression:`${g(t)} / ${g(e)}`,result:`${C(n)}  (${ot(n)})`}],answerDisplay:ot(n)}}const mm={kind:"goingInCap",label:"Going-in Cap Rate",description:"Price + NOI → cap rate in bps.",category:"valuation",tips:["Cap = NOI / Price. Inverse is the NOI multiple: 5% = 20x, 6% = 16.67x, 7% = 14.29x.","Mental shortcut: NOI / Price, round both to 2 sig figs first. $623k / $12.4M ≈ $620 / $12,400 ≈ 5.0%.","Sanity check: if price looks like ~20× NOI you're at 5%, ~15× → ~6.7%, ~10× → 10%.","Round both up or both down together — keeps the error directionally small. Rounding one up and one down stacks errors.","Sandwich: find the nearest clean multiples (e.g. 15× = 6.67%, 16× = 6.25%) and interpolate toward the actual ratio.","Convert cap to bps: 5.25% = 525 bps. Just shift the decimal two places."],generate(e,t="intermediate"){const n=T(e,$.capRate,t),r=T(e,$.noi,t),l=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(r/n/l)*l,i=Hc(o,r),s=Math.round(i*1e4);return{id:W("giCap"),kind:"goingInCap",prompt:`Purchase price is ${g(o)} and NOI is ${g(r)}. What's the going-in cap rate (in bps)?`,context:{purchasePrice:o,noi:r},expected:s,unit:"bps",tolerance:{type:"abs",band:15},solution:pm(o,r)}}};function hm(e,t,n){const r=rs(e,t),l=Xc(e,t,n);return{formula:"IRR = (Out / In)^(1 / years) − 1",steps:[{label:"Equity multiple",expression:`${g(t)} / ${g(e)}`,result:it(r)},{label:"IRR",expression:`${it(r)}^(1/${n}) − 1`,result:C(l)}],answerDisplay:C(l)}}const vm={kind:"irrSimple",label:"IRR — Simple",description:"Single-period IRR: equity in, equity out, hold years.",category:"returns",tips:["Rule of 72: years-to-double ≈ 72 / IRR%. 2x in 7 yrs ≈ 10.3% IRR. 2x in 5 yrs ≈ 14.4%. 2x in 10 yrs ≈ 7.2%.","Key anchors: 2.0x over 5y ≈ 14.9%; 2.0x over 7y ≈ 10.4%; 2.0x over 10y ≈ 7.2%; 2.5x over 5y ≈ 20.1%.","Anchor for 10y holds: IRR% × 10 years → EM roughly: 10% → 2.59x, 12% → 3.11x, 15% → 4.05x, 8% → 2.16x.","Sandwich: if EM is 2.2x over 6 years, bracket it — 2.0x over 6y is ~12.2%, 2.5x over 6y is ~16.5%. Interpolate → ~13.6% (actual 14.0%).","Floor approximation: EM ≥ 1 + (IRR × years). 10% × 10y → floor 2.0x; actual 2.59x. Gap is the compounding."],generate(e,t="intermediate"){const n=T(e,$.equityIn,t),r=T(e,$.irrExitMultiple,t),l=t==="beginner"?1e6:t==="advanced"?1e5:5e5,o=Math.round(n*r/l)*l,i=t==="beginner"?e.pickFromSet([5,7,10]):e.pickInt($.holdYears.min,$.holdYears.max),s=Xc(n,o,i);return{id:W("irr"),kind:"irrSimple",prompt:`You invest ${g(n)} and get ${g(o)} back after ${ut(i)}. What's the IRR (as a %)?`,context:{equityIn:n,equityOut:o,holdYears:i},expected:s,unit:"pct",tolerance:{type:"abs",band:.005},solution:hm(n,o,i)}}};function ym(e,t,n){const r=e-t,l=Qc({unleveredIrr:e,borrowRate:t,ltv:n});return{formula:"Levered IRR ≈ Unlevered + (LTV × (Unlev − Borrow)) / (1 − LTV)",steps:[{label:"Spread",expression:`${C(e)} − ${C(t)}`,result:C(r,2)},{label:"Leverage multiplier",expression:`${C(n)} / (1 − ${C(n)})`,result:(n/(1-n)).toFixed(2)},{label:"Levered IRR (approx)",expression:`${C(e)} + ${C(r)} × ${(n/(1-n)).toFixed(2)}`,result:C(l,2)}],answerDisplay:C(l,2)}}const gm={kind:"leveredIrr",label:"Levered IRR (Approx)",description:"Approximate levered IRR from unlevered IRR, LTV, and borrow rate.",category:"returns",tips:["Formula: Levered IRR ≈ Unlevered + LTV × (Unlev − Borrow) / (1 − LTV). Assumes parallel cash flows.","Leverage multiplier: LTV / (1 − LTV). At 60% LTV = 1.5x; at 70% = 2.33x; at 75% = 3x.","If unlevered IRR > borrow rate, leverage is accretive. If unlevered < borrow, leverage destroys returns.","Example: unlev 8%, borrow 5%, 60% LTV → 8% + 3% × 1.5 = 12.5%. Actual levered is usually within 100 bps of this estimate."],generate(e,t="intermediate"){const n=T(e,$.unleveredIrr,t),r=T(e,$.interestRate,t),l=T(e,$.ltv,t),o=Qc({unleveredIrr:n,borrowRate:r,ltv:l});return{id:W("levIrr"),kind:"leveredIrr",prompt:`Unlevered IRR is ${C(n)} and you can borrow at ${C(r)} with ${C(l)} LTV. Approximately what's the levered IRR?`,context:{unleveredIrr:n,borrowRate:r,ltv:l},expected:o,unit:"pct",tolerance:{type:"abs",band:.01},solution:ym(n,r,l)}}};function Jc(e){const t=e.leaseTermYears*12,n=e.grossRentPerSf*e.leaseTermYears,r=e.grossRentPerSf/12*e.freeMonths;return(n-e.tiPerSf-r)/t*12}function xl(e){return(e.rentPerSf*e.leaseTermYears-e.tiPerSf)/e.leaseTermYears}function ed(e){const t=xl({rentPerSf:e.rentA,tiPerSf:e.tiA,leaseTermYears:e.leaseTermYears}),n=xl({rentPerSf:e.rentB,tiPerSf:e.tiB,leaseTermYears:e.leaseTermYears});return t-n}function td(e){return e.tiPerSf/e.paybackYears}function nd(e){return(e.newRentPerSf-e.oldRentPerSf)*e.subjectSf*( g(Math.abs(e))}`,result:U(-e)},{label:"Value change",expression:`${U(-e)} / ${C(t)}`,result:U(n)}],answerDisplay:U(n)}}const km={kind:"opexChange",label:"OpEx Change Impact",description:"OpEx $ change → NOI and value impact at given cap.",category:"valuation",tips:["OpEx moves NOI 1-for-1 (with a flipped sign): $50k more OpEx = $50k less NOI.","ΔValue = −ΔOpEx / cap. $50k OpEx lift @ 6% cap = −$50k × 16.67 ≈ −$833k value.","Sandwich at ugly caps: at 5.75% cap, the $1 of OpEx is worth between 16.7x (6%) and 18.2x (5.5%) — pick the midpoint for a fast gut estimate.",'An OpEx cut is the cheapest "yield play" in a deal — a $1 cut is worth 1/cap dollars of value.',`Be careful with "one-time" OpEx: if it's truly one-off it shouldn't get capped at all.`],generate(e,t="intermediate"){const n=e.pickFromSet(st.opexMoves),r=e.pickFromSet([-1,1]),l=n*r,o=T(e,$.capRate,t),i=Zp({opexDelta:l,capRate:o}),s=r>0?"increases":"decreases";return{id:W("opex"),kind:"opexChange",prompt:`OpEx ${s} by ${g(n)} at a ${C(o)} cap. What's the $ change in value?`,context:{opex:l,capRate:o},expected:i,unit:"usdChange",tolerance:{type:"pct",band:.05},solution:wm(l,o,i)}}};function Cm(e,t,n,r){const l=e*(1-t);return{formula:"ΔValue = (ΔOther × (1 − Vacancy)) / Cap",steps:[{label:"NOI uplift",expression:`${g(e)} × (1 − ${C(t)})`,result:U(l)},{label:"Value uplift",expression:`${U(l)} / ${C(n)}`,result:U(r)}],answerDisplay:U(r)}}const Nm={kind:"otherIncomeImpact",label:"Other Income Impact",description:"Adding other income → value uplift at given cap.",category:"valuation",tips:["$100k of other income at common caps: 5% → $2.0M, 6% → $1.67M, 7% → $1.43M, 8% → $1.25M.","If vacancy > 0, trim the uplift by (1 − vacancy). 5% vacancy trims the answer ~5%.","Mental shortcut: divide $ amount by cap %, then move decimal 2 places. $150k / 6 = $25k, × 100 = $2.5M (ignoring vacancy).","Sandwich technique: at an ugly cap like 5.35%, solve at 5% and 6% then average toward the closer cap. $100k: $2.0M (5%) and $1.67M (6%) → mid ≈ $1.83M at 5.5%; nudge to ~$1.87M for 5.35%.","Other income is often reviewed skeptically by buyers — reversion/exit cap may treat it differently."],generate(e,t="intermediate"){const n=T(e,$.otherIncomeDelta,t),r=e.pickFromSet(st.vacancySet),l=T(e,$.capRate,t),o=Xp({otherIncomeDelta:n,vacancyRate:r,capRate:l}),i=r===0?"no vacancy":`${C(r)} vacancy`;return{id:W("otherInc"),kind:"otherIncomeImpact",prompt:`Underwriting ${g(n)} of new other income at a ${C(l)} cap (${i}). What's the $ change in value?`,context:{otherIncome:n,vacancyRate:r,capRate:l},expected:o,unit:"usdChange",tolerance:{type:"pct",band:.05},solution:Cm(n,r,l,o)}}};function Em(e,t){const n=Lc(e,t);return{formula:"Price / SF = Purchase Price ÷ Building SF",steps:[{label:"$/SF",expression:`${g(e)} / ${Oe(t)}`,result:M(n)}],answerDisplay:M(n)}}const $m={kind:"pricePerSf",label:"Price per SF",description:"Back-of-envelope comp sanity check.",category:"valuation",tips:["Comp ranges: multifamily $150–350/SF, office $200–500/SF, industrial $100–200/SF, retail $200–500/SF.","Replacement cost is your sanity floor — if $/SF is well below it, you're buying below construction cost.","Round numerator and denominator the same direction (both up, both down) to keep error small.","Quick check: $60M / 300k SF → $60M / $300M ≈ 1/5 → $200/SF."],generate(e,t="intermediate"){const n=T(e,$.sf,t),r=T(e,{min:120,max:450,step:5},t),l=t==="beginner"?1e6:t==="advanced"?5e4:25e4,o=Math.round(n*r/l)*l,i=Lc(o,n);return{id:W("psf"),kind:"pricePerSf",prompt:`A ${Oe(n)} building is under contract for ${g(o)}. What's the price per SF?`,context:{purchasePrice:o,buildingSf:n},expected:i,unit:"usdPerSf",tolerance:{type:"pct",band:.05},solution:Em(o,n)}}};function Rm(e,t,n,r,l){return{formula:"ΔNOI = ΔRent × (1 − Vacancy);  ΔValue = ΔNOI / Cap",steps:[{label:"NOI change",expression:`${U(e)} × (1 − ${C(t)})`,result:U(r)},{label:"Value change",expression:`${U(r)} / ${C(n)}`,result:U(l)}],answerDisplay:U(l)}}const Pm={kind:"rent
