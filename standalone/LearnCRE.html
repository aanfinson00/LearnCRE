ermediate"){const n=M(e,j.noi,t),r=M(e,j.capRate,t),l=e.pickFromSet(it.capMoves),o=Fc(r,l,j.capRate,t),i=Kc(r,o);return{id:Z("cap"),kind:"capCompression",prompt:`NOI is ${x(n)}. Cap rate moves from ${E(r)} to ${E(o)}. What % change in value?`,context:{noi:n,capRate:r,newCapRate:o},expected:i,unit:"pctChange",tolerance:{type:"pct",band:.05},solution:Yp(n,r,o)}}};function Kp(e){const t=e.price*e.ltv,n=e.price-t,r=Ac(t,e.rate,e.years),l=e.noi-r,o=Bc({noi:e.noi,debtServiceAnnual:r,equity:n});return{formula:"CoC = (NOI − Annual Debt Service) / Equity Invested",steps:[{label:"Loan",expression:`${x(e.price)} × ${E(e.ltv)}`,result:x(t)},{label:"Equity",expression:`${x(e.price)} − ${x(t)}`,result:x(n)},{label:"Annual debt service",expression:`${x(t)} × constant(${e.years}yr @ ${E(e.rate)})`,result:x(r)},{label:"Cash flow to equity",expression:`${x(e.noi)} − ${x(r)}`,result:x(l)},{label:"Cash-on-cash",expression:`${x(l)} / ${x(n)}`,result:E(o,2)}],answerDisplay:E(o,2)}}const qp={kind:"cashOnCash",label:"Cash-on-Cash Return",description:"Year-1 cash yield on equity invested.",category:"returns",tips:["CoC = (NOI − Debt Service) / Equity. Unlevered = cap rate; levered adds or subtracts the spread on debt.","IO shortcut: CoC = (cap − rate × LTV) / (1 − LTV). At 6% cap, 60% LTV, 5% rate → (6 − 3) / 40 = 7.5%.","When cap > borrow rate, leverage lifts CoC. When cap < borrow, leverage drags it down (even negative).","Quick check: at 1.25× DSCR, Year-1 CoC is usually 200–400 bps above cap rate for value-add."],generate(e,t="intermediate"){const n=M(e,j.capRate,t),r=M(e,j.noi,t),l=t==="beginner"?1e6:t==="advanced"?5e4:25e4,o=Math.round(r/n/l)*l,i=t==="beginner"?e.pickFromSet([.5,.6,.7]):M(e,j.ltv,t),s=M(e,j.interestRate,t),u=t==="beginner"?30:e.pickInt(j.amortYears.min,j.amortYears.max),a=o*i,m=Ac(a,s,u),v=o-a,h=Bc({noi:r,debtServiceAnnual:m,equity:v});return{id:Z("coc"),kind:"cashOnCash",prompt:`${x(o)} property, ${x(r)} NOI, ${E(i)} LTV, ${E(s)} interest, ${u}-yr amort. What's the year-1 cash-on-cash return?`,context:{purchasePrice:o,noi:r,capRate:n,ltv:i,interestRate:s,amortYears:u,loanAmount:a,debtServiceAnnual:m,equityIn:v},expected:h,unit:"pct",tolerance:{type:"abs",band:.005},solution:Kp({noi:r,price:o,ltv:i,rate:s,years:u})}}};function Xp(e,t,n,r,l){const o=Yc({gpr:e,otherIncome:t,vacancyRate:n}),i=Gc({gpr:e,otherIncome:t,vacancyRate:n,opex:r}),s=yl(i,l);return{formula:"Value = ((GPR + Other) × (1 − Vacancy) − OpEx) / Cap",steps:[{label:"EGI",expression:`(${x(e)} + ${x(t)}) × (1 − ${E(n)})`,result:x(o)},{label:"NOI",expression:`${x(o)} − ${x(r)}`,result:x(i)},{label:"Value",expression:`${x(i)} / ${E(l)}`,result:x(s)}],answerDisplay:x(s)}}const Zp={kind:"combinedScenario",label:"Combined Scenario",description:"Full proforma → implied value.",category:"valuation",tips:["Order of operations: (GPR + Other) × (1 − vacancy) = EGI. EGI − OpEx = NOI. NOI / cap = Value.","Back-of-envelope: if OpEx is ~40% of EGI and vacancy is ~5%, NOI ≈ gross × 0.95 × 0.6 ≈ gross × 0.57.","Then × (1/cap). At 6% cap: gross × 0.57 × 16.67 ≈ gross × 9.5. Ballparks a full proforma in one step.","Sandwich: compute value at the two nearest clean caps (e.g. 5% and 6%) and interpolate to your actual cap. Handles ugly caps without a calculator.","Sanity check: compare implied value-per-SF or $/unit to market comps before trusting the number."],generate(e,t="intermediate"){const n=M(e,j.gpr,t),r=M(e,j.otherIncome,t),l=e.pickFromSet(it.vacancySetNonZero),o=e.pickFromSet(it.opexRatios),i=t==="beginner"?1e5:t==="advanced"?1e3:1e4,s=Math.round((n+r)*o*(1-l)/i)*i,u=M(e,j.capRate,t),a=yl(Gc({gpr:n,otherIncome:r,vacancyRate:l,opex:s}),u);return{id:Z("combo"),kind:"combinedScenario",prompt:`GPR ${x(n)}, other income ${x(r)}, vacancy ${E(l)}, OpEx ${x(s)}, cap ${E(u)}. What's the implied value?`,context:{gpr:n,otherIncome:r,vacancyRate:l,opex:s,capRate:u},expected:a,unit:"usd",tolerance:{type:"pct",band:.03},solution:Xp(n,r,l,s,u)}}};function bp(e,t){const n=Vc(e,t);return{formula:"Max Loan = NOI / Debt Yield",steps:[{label:"Max loan",expression:`${x(e)} / ${E(t)}`,result:x(n)}],answerDisplay:x(n)}}const Jp={kind:"debtYield",label:"Debt Yield Loan Sizing",description:"Max loan given NOI and required debt yield.",category:"returns",tips:["Debt yield is the lender-side cap rate: NOI / Loan. 9% DY = 11.1x NOI max loan; 10% DY = 10x NOI.","Inverse: Max Loan = NOI / required DY.","Lender check: if debt yield < 8%, most CMBS lenders pass — so 8% is a hard floor for stabilized deals.","Quick math: $800k NOI / 9% → think $800k × 11.11 = $8.89M. Or: $800 / 0.09 = ~$8,890 (shift decimals)."],generate(e,t="intermediate"){const n=M(e,j.noi,t),r=M(e,j.debtYieldTarget,t),l=Vc(n,r);return{id:Z("dy"),kind:"debtYield",prompt:`NOI is ${x(n)}. Lender requires a ${E(r)} debt yield. What's the max loan?`,context:{noi:n,debtYieldTarget:r},expected:l,unit:"usd",tolerance:{type:"pct",band:.05},solution:bp(n,r)}}};function em(e,t,n){const r=Tl(e,t),l=zc(r,n);return{formula:"Development Spread = YoC − Market Cap Rate",steps:[{label:"YoC",expression:`${x(e)} / ${x(t)}`,result:E(r)},{label:"Spread",expression:`${E(r)} − ${E(n)}`,result:`${lt(l)}`}],answerDisplay:lt(l)}}const tm={kind:"devSpread",label:"Development Spread",description:"YoC minus market cap — the risk premium for developing vs buying.",category:"valuation",tips:['100–150 bps is thin, 200–300 bps is typical, 500+ bps is a "layup" development.',"If YoC ≈ market cap, you're taking development risk for no extra return — walk away.","Spread compensates for construction risk, lease-up risk, and time value of capital tied up during build.","Mental math: compute YoC first, then subtract market cap. Answer in bps."],generate(e,t="intermediate"){const n=M(e,j.capRate,t),r=M(e,j.yocDelta,t),l=n+r,o=M(e,j.projectCost,t),i=t==="beginner"?25e4:t==="advanced"?25e3:1e5,s=Math.round(o*l/i)*i,u=zc(Tl(s,o),n),a=Math.round(u*1e4);return{id:Z("devSp"),kind:"devSpread",prompt:`Developing to ${x(o)} in total cost with stabilized NOI of ${x(s)}. Market comps trade at a ${E(n)} cap. What's the development spread (in bps)?`,context:{totalProjectCost:o,stabilizedNoi:s,noi:s,marketCapRate:n},expected:a,unit:"bps",tolerance:{type:"abs",band:25},solution:em(s,o,n)}}};function qc(e){return`${e.toFixed(2)}x`}function nm(e,t,n,r){const l=ts(n,r),o=e/t,i=Uc({noi:e,dscrTarget:t,annualRate:n,years:r});return{formula:"Max Loan = NOI / (DSCR × Loan Constant)",steps:[{label:"Loan constant",expression:`${Ll(r)} amort @ ${E(n)}`,result:E(l,2)},{label:"Max annual debt service",expression:`${x(e)} / ${qc(t)}`,result:x(o)},{label:"Max loan",expression:`${x(o)} / ${E(l,2)}`,result:x(i)}],answerDisplay:x(i)}}const rm={kind:"dscrLoanSizing",label:"DSCR Loan Sizing",description:"Max loan given NOI, DSCR target, rate, and amort.",category:"returns",tips:["Loan constants to memorize — 30yr @ 6% ≈ 0.072; 25yr @ 6% ≈ 0.077; 30yr @ 5% ≈ 0.0644; 30yr @ 7% ≈ 0.0799.",'Formula: Max Loan = NOI / (DSCR × Loan Constant). DSCR × constant is the "effective rate" the loan must support.',"At 1.25x DSCR, every $1 of NOI supports $0.80 of debt service. Then divide by constant to get loan amount.","IO shortcut: for interest-only loans, constant = rate. $500k NOI / (1.25 × 0.06) = $6.67M."],generate(e,t="intermediate"){const n=M(e,j.noi,t),r=t==="beginner"?e.pickFromSet([1.2,1.25,1.3]):M(e,j.dscrTarget,t),l=M(e,j.interestRate,t),o=t==="beginner"?30:e.pickInt(j.amortYears.min,j.amortYears.max),i=Uc({noi:n,dscrTarget:r,annualRate:l,years:o});return{id:Z("dscr"),kind:"dscrLoanSizing",prompt:`NOI of ${x(n)} needs to cover a ${qc(r)} DSCR on a ${Ll(o)} amortizing loan at ${E(l)}. What's the max loan?`,context:{noi:n,dscrTarget:r,interestRate:l,amortYears:o},expected:i,unit:"usd",tolerance:{type:"pct",band:.05},solution:nm(n,r,l,o)}}};function ns(e,t){return t/e}function Xc(e,t,n){return Math.pow(t/e,1/n)-1}function Zc(e,t){return Math.pow(1+e,t)}function lm(e,t){const n=ns(e,t);return{formula:"Equity Multiple = Equity Out / Equity In",steps:[{label:"Multiple",expression:`${x(t)} / ${x(e)}`,result:ot(n)}],answerDisplay:ot(n)}}const om={kind:"equityMultiple",label:"Equity Multiple",description:"Equity in + equity out → EM.",category:"returns",tips:["EM = Out / In. Doesn't care about time — 2x in 1 year and 2x in 10 years both = 2.0x.","Divide by hundreds: $23M / $10M → 23/10 = 2.3x. $17.5M / $8M → 17.5/8 ≈ 2.19x.","Rule of thumb: institutional value-add deals target 1.7x–2.0x; opportunistic 2.0x+; core ~1.4x–1.6x.","Complement to IRR: EM shows absolute dollars back, IRR shows time-adjusted. Always look at both."],generate(e,t="intermediate"){const n=M(e,j.equityIn,t),r=M(e,j.irrExitMultiple,t),l=t==="beginner"?1e6:t==="advanced"?25e3:1e5,o=Math.round(n*r/l)*l,i=ns(n,o);return{id:Z("em"),kind:"equityMultiple",prompt:`You invested ${x(n)} and received ${x(o)} at sale. What's the equity multiple?`,context:{equityIn:n,equityOut:o},expected:i,unit:"multiple",tolerance:{type:"pct",band:.05},solution:lm(n,o)}}};function im(e,t){const n=Hc(e,t);return{formula:"Going-in Cap = NOI / Purchase Price",steps:[{label:"Cap rate",expression:`${x(t)} / ${x(e)}`,result:`${E(n)}  (${lt(n)})`}],answerDisplay:lt(n)}}const sm={kind:"goingInCap",label:"Going-in Cap Rate",description:"Price + NOI → cap rate in bps.",category:"valuation",tips:["Cap = NOI / Price. Inverse is the NOI multiple: 5% = 20x, 6% = 16.67x, 7% = 14.29x.","Mental shortcut: NOI / Price, round both to 2 sig figs first. $623k / $12.4M ≈ $620 / $12,400 ≈ 5.0%.","Sanity check: if price looks like ~20× NOI you're at 5%, ~15× → ~6.7%, ~10× → 10%.","Round both up or both down together — keeps the error directionally small. Rounding one up and one down stacks errors.","Sandwich: find the nearest clean multiples (e.g. 15× = 6.67%, 16× = 6.25%) and interpolate toward the actual ratio.","Convert cap to bps: 5.25% = 525 bps. Just shift the decimal two places."],generate(e,t="intermediate"){const n=M(e,j.capRate,t),r=M(e,j.noi,t),l=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(r/n/l)*l,i=Hc(o,r),s=Math.round(i*1e4);return{id:Z("giCap"),kind:"goingInCap",prompt:`Purchase price is ${x(o)} and NOI is ${x(r)}. What's the going-in cap rate (in bps)?`,context:{purchasePrice:o,noi:r},expected:s,unit:"bps",tolerance:{type:"abs",band:15},solution:im(o,r)}}};function um(e,t,n){const r=ns(e,t),l=Xc(e,t,n);return{formula:"IRR = (Out / In)^(1 / years) − 1",steps:[{label:"Equity multiple",expression:`${x(t)} / ${x(e)}`,result:ot(r)},{label:"IRR",expression:`${ot(r)}^(1/${n}) − 1`,result:E(l)}],answerDisplay:E(l)}}const am={kind:"irrSimple",label:"IRR — Simple",description:"Single-period IRR: equity in, equity out, hold years.",category:"returns",tips:["Rule of 72: years-to-double ≈ 72 / IRR%. 2x in 7 yrs ≈ 10.3% IRR. 2x in 5 yrs ≈ 14.4%. 2x in 10 yrs ≈ 7.2%.","Key anchors: 2.0x over 5y ≈ 14.9%; 2.0x over 7y ≈ 10.4%; 2.0x over 10y ≈ 7.2%; 2.5x over 5y ≈ 20.1%.","Anchor for 10y holds: IRR% × 10 years → EM roughly: 10% → 2.59x, 12% → 3.11x, 15% → 4.05x, 8% → 2.16x.","Sandwich: if EM is 2.2x over 6 years, bracket it — 2.0x over 6y is ~12.2%, 2.5x over 6y is ~16.5%. Interpolate → ~13.6% (actual 14.0%).","Floor approximation: EM ≥ 1 + (IRR × years). 10% × 10y → floor 2.0x; actual 2.59x. Gap is the compounding."],generate(e,t="intermediate"){const n=M(e,j.equityIn,t),r=M(e,j.irrExitMultiple,t),l=t==="beginner"?1e6:t==="advanced"?1e5:5e5,o=Math.round(n*r/l)*l,i=t==="beginner"?e.pickFromSet([5,7,10]):e.pickInt(j.holdYears.min,j.holdYears.max),s=Xc(n,o,i);return{id:Z("irr"),kind:"irrSimple",prompt:`You invest ${x(n)} and get ${x(o)} back after ${Ll(i)}. What's the IRR (as a %)?`,context:{equityIn:n,equityOut:o,holdYears:i},expected:s,unit:"pct",tolerance:{type:"abs",band:.005},solution:um(n,o,i)}}};function cm(e,t,n){const r=e-t,l=Qc({unleveredIrr:e,borrowRate:t,ltv:n});return{formula:"Levered IRR ≈ Unlevered + (LTV × (Unlev − Borrow)) / (1 − LTV)",steps:[{label:"Spread",expression:`${E(e)} − ${E(t)}`,result:E(r,2)},{label:"Leverage multip
