 D) / E   [gross × (1−vac) − opex, /cap]",tips:["Order of operations: (GPR + Other) × (1 − vacancy) = EGI. EGI − OpEx = NOI. NOI / cap = Value.","Back-of-envelope: if OpEx is ~40% of EGI and vacancy is ~5%, NOI ≈ gross × 0.95 × 0.6 ≈ gross × 0.57.","Then × (1/cap). At 6% cap: gross × 0.57 × 16.67 ≈ gross × 9.5. Ballparks a full proforma in one step.","Sandwich: compute value at the two nearest clean caps (e.g. 5% and 6%) and interpolate to your actual cap. Handles ugly caps without a calculator.","Sanity check: compare implied value-per-SF or $/unit to market comps before trusting the number."],generate(e,t="intermediate",n="mixed"){const r=R(e,j.gpr,t),l=R(e,j.otherIncome,t),o=e.pickFromSet(Tt.vacancySetNonZero),a=e.pickFromSet(ws(n)),s=t==="beginner"?1e5:t==="advanced"?1e3:1e4,u=Math.round((r+l)*a*(1-o)/s)*s,c=R(e,Y("capRate",n),t),f=yr(Nd({gpr:r,otherIncome:l,vacancyRate:o,opex:u}),c);return{id:z("combo"),kind:"combinedScenario",prompt:`A ${dd(n)} has GPR ${v(r)}, other income ${v(l)}, vacancy ${k(o)}, OpEx ${v(u)}, cap ${k(c)}. What's the implied value?`,context:{gpr:r,otherIncome:l,vacancyRate:o,opex:u,capRate:c},expected:f,unit:"usd",tolerance:{type:"pct",band:.03},solution:Bm(r,l,o,u,c)}}};function Um(e,t,n){const r=Math.pow(1+t,n),l=ql(e,t,n);return{formula:"End = Start × (1 + r)^n",steps:[{label:"Growth factor",expression:`(1 + ${k(t,2)})^${n}`,result:r.toFixed(4)},{label:"End value",expression:`${v(e)} × ${r.toFixed(4)}`,result:v(l)}],answerDisplay:v(l)}}const Ym={kind:"compoundGrowth",label:"Compound Growth (forward)",description:"Project a value forward at a fixed growth rate.",category:"returns",pattern:"A × (1 + B)^n   [start × growth factor]",tips:["Rule of 72: a value roughly doubles every 72/r% years. At 3% → 24 years; at 4% → 18; at 6% → 12.","Anchors: (1.03)^5 ≈ 1.159; (1.03)^10 ≈ 1.344; (1.05)^5 ≈ 1.276; (1.05)^10 ≈ 1.629.","Linear approx (floor): End ≥ Start × (1 + r × n). Actual is always higher due to compounding.","Sandwich: bracket with the 00–150 bps is thin, 200–300 bps is typical, 500+ bps is a "layup" development.',"If YoC ≈ market cap, you're taking development risk for no extra return — walk away.","Spread compensates for construction risk, lease-up risk, and time value of capital tied up during build.","Mental math: compute YoC first, then subtract market cap. Answer in bps."],generate(e,t="intermediate",n="mixed"){const r=R(e,Y("capRate",n),t),l=R(e,j.yocDelta,t),o=r+l,a=R(e,j.projectCost,t),s=t==="beginner"?25e4:t==="advanced"?25e3:1e5,u=Math.round(a*o/s)*s,c=sd(Gl(u,a),r),f=Math.round(c*1e4);return{id:z("devSp"),kind:"devSpread",prompt:`Developing to ${v(a)} in total cost with stabilized NOI of ${v(u)}. Market comps trade at a ${k(r)} cap. What's the development spread (in bps)?`,context:{totalProjectCost:a,stabilizedNoi:u,noi:u,marketCapRate:r},expected:f,unit:"bps",tolerance:{type:"abs",band:25},solution:Gm(u,a,r)}}};function Cd(e){return`${e.toFixed(2)}x`}function qm(e,t,n,r){const l=Jt(n,r),o=e/t,a=md({noi:e,dscrTarget:t,annualRate:n,years:r});return{formula:"Max Loan = NOI / (DSCR × Loan Constant)",steps:[{label:"Loan constant",expression:`${ae(r)} amort @ ${k(n)}`,result:k(l,2)},{label:"Max annual debt service",expression:`${v(e)} / ${Cd(t)}`,result:v(o)},{label:"Max loan",expression:`${v(o)} / ${k(l,2)}`,result:v(a)}],answerDisplay:v(a)}}const Km={kind:"dscrLoanSizing",label:"DSCR Loan Sizing",description:"Max loan given NOI, DSCR target, rate, and amort.",category:"returns",pattern:"A / (B × C)   where A = NOI, B = DSCR, C = loan constant",tips:["Loan constants to memorize — 30yr @ 6% ≈ 0.072; 25yr @ 6% ≈ 0.077; 30yr @ 5% ≈ 0.0644; 30yr @ 7% ≈ 0.0799.",'Formula: Max Loan = NOI / (DSCR × Loan Constant). DSCR × constant is the "effective rate" the loan must support.',"At 1.25x DSCR, every $1 of NOI supports $0.80 of debt service. Then divide by constant to get loan amount.","IO shortcut: for interest-only loans, constant = rate. $500k NOI / (1.25 × 0.06) = $6.67M."],generate(e,t="interm
