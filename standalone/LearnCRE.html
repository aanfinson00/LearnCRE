) / n gives the continuously compounded rate — close to discrete CAGR for short horizons."],generate(e,t="intermediate"){const n=E(e,N.noi,t),r=E(e,N.growthRate,t),l=e.pickInt(N.projectionYears.min,N.projectionYears.max),o=t==="beginner"?1e5:t==="advanced"?5e3:25e3,s=Math.round(ci(n,r,l)/o)*o,i=od(n,s,l);return{id:F("cagr"),kind:"cagr",prompt:`A value grew from ${g(n)} to ${g(s)} over ${he(l)}. What's the CAGR?`,context:{startValue:n,endValue:s,projectionYears:l},expected:i,unit:"pct",tolerance:{type:"abs",band:.005},solution:fm(n,s,l)}}};function mr(e,t){return e/t}function ud(e,t){return t/e}function cd(e){const t=e.otherIncome??0;return(e.gpr+t)*(1-e.vacancyRate)}function dd(e){return cd(e)-e.opex}function di(e,t){return e/t-1}function Ul(e,t){return e/t}function hm(e){const t=e.otherIncome??0;return(e.gpr+t)*(e.oldVacancy-e.newVacancy)}function vm(e){return(e.newRent-e.oldRent)*(1-e.vacancyRate)}function gm(e){return Ul(e.otherIncomeDelta*(1-e.vacancyRate),e.capRate)}function ym(e){return Ul(-e.opexDelta,e.capRate)}function xm(e,t,n){const r=mr(e,t),l=mr(e,n),o=di(t,n);return{formula:"Value = NOI / Cap Rate  →  %Δ Value = (OldCap / NewCap) − 1",steps:[{label:"Old value",expression:`${g(e)} / ${k(t)}`,result:g(r)},{label:"New value",expression:`${g(e)} / ${k(n)}`,result:g(l)},{label:"% change",expression:`${g(l)} / ${g(r)} − 1`,result:ut(o)}],answerDisplay:ut(o)}}const wm={kind:"capCompression",label:"Cap Rate Compression",description:"How does value change when cap rate tightens or widens?",category:"valuation",pattern:"(A / B) − 1   where A = old cap, B = new cap",tips:["Cap → value multiple: 4% = 25x, 4.5% = 22.2x, 5% = 20x, 5.5% = 18.2x, 6% = 16.7x, 6.5% = 15.4x, 7% = 14.3x, 8% = 12.5x, 10% = 10x.","Small moves: %Δ value ≈ Δbps / new cap (bps). 25 bps compression from 5.00% → 4.75%: 25 / 475 ≈ 5.3% uplift. True = 5.26%.","Rule of thumb: every 25 bps of compression is ~5% of value at a 5% cap, ~4% at a 6% cap, ~3.5% at a 7% cap.","Sandwich technique: if the cap is ugly (e.g. 5.35%), compute the answer at the two nearest clean caps (5.25% and 5.5%), then split the difference. Great for mental math.","Expansion uses the same formula, just negative. Cap widening hurts a bit less than compression helps (convexity)."],generate(e,t="intermediate"){const n=E(e,N.noi,t),r=E(e,N.capRate,t),l=e.pickFromSet(ct.capMoves),o=Zc(r,l,N.capRate,t),s=di(r,o);return{id:F("cap"),kind:"capCompression",prompt:`NOI is ${g(n)}. Cap rate moves from ${k(r)} to ${k(o)}. What % change in value?`,context:{noi:n,capRate:r,newCapRate:o},expected:s,unit:"pctChange",tolerance:{type:"pct",band:.05},solution:xm(n,r,o)}}};function Sm(e){const t=e.price*e.ltv,n=e.price-t,r=Jc(t,e.rate,e.years),l=e.noi-r,o=nd({noi:e.noi,debtServiceAnnual:r,equity:n});return{formula:"CoC = (NOI − Annual Debt Service) / Equity Invested",steps:[{label:"Loan",expression:`${g(e.price)} × ${k(e.ltv)}`,result:g(t)},{label:"Equity",expression:`${g(e.price)} − ${g(t)}`,result:g(n)},{label:"Annual debt service",expression:`${g(t)} × constant(${e.years}yr @ ${k(e.rate)})`,result:g(r)},{label:"Cash flow to equity",expression:`${g(e.noi)} − ${g(r)}`,result:g(l)},{label:"Cash-on-cash",expression:`${g(l)} / ${g(n)}`,result:k(o,2)}],answerDisplay:k(o,2)}}const km={kind:"cashOnCash",label:"Cash-on-Cash Return",description:"Year-1 cash yield on equity invested.",category:"returns",pattern:"(A − B) / C   where A = NOI, B = debt service, C = equity",tips:["CoC = (NOI − Debt Service) / Equity. Unlevered = cap rate; levered adds or subtracts the spread on debt.","IO shortcut: CoC = (cap − rate × LTV) / (1 − LTV). At 6% cap, 60% LTV, 5% rate → (6 − 3) / 40 = 7.5%.","When cap > borrow rate, leverage lifts CoC. When cap < borrow, leverage drags it down (even negative).","Quick check: at 1.25× DSCR, Year-1 CoC is usually 200–400 bps above cap rate for value-add."],generate(e,t="intermediate"){const n=E(e,N.capRate,t),r=E(e,N.noi,t),l=t==="beginner"?1e6:t==="advanced"?5e4:25e4,o=Math.round(r/n/l)*l,s=t==="beginner"?e.pickFromSet([.5,.6,.7]):E(e,N.ltv,t),i=E(e,N.interestRate,t),a=t==="beginner"?30:e.pickInt(N.amortYears.min,N.amortYears.max),c=o*s,f=Jc(c,i,a),v=o-c,h=nd({noi:r,debtServiceAnnual:f,equity:v});return{id:F("coc"),kind:"cashOnCash",prompt:`${g(o)} property, ${g(r)} NOI, ${k(s)} LTV, ${k(i)} interest, ${a}-yr amort. What's the year-1 cash-on-cash return?`,context:{purchasePrice:o,noi:r,capRate:n,ltv:s,interestRate:i,amortYears:a,loanAmount:c,debtServiceAnnual:f,equityIn:v},expected:h,unit:"pct",tolerance:{type:"abs",band:.005},solution:Sm({noi:r,price:o,ltv:s,rate:i,years:a})}}};function Cm(e,t,n,r,l){const o=cd({gpr:e,otherIncome:t,vacancyRate:n}),s=dd({gpr:e,otherIncome:t,vacancyRate:n,opex:r}),i=mr(s,l);return{formula:"Value = ((GPR + Other) × (1 − Vacancy) − OpEx) / Cap",steps:[{label:"EGI",expression:`(${g(e)} + ${g(t)}) × (1 − ${k(n)})`,result:g(o)},{label:"NOI",expression:`${g(o)} − ${g(r)}`,result:g(s)},{label:"Value",expression:`${g(s)} / ${k(l)}`,result:g(i)}],answerDisplay:g(i)}}const Nm={kind:"combinedScenario",label:"Combined Scenario",description:"Full proforma → implied value.",category:"valuation",pattern:"((A + B)(1 − C) − D) / E   [gross × (1−vac) − opex, /cap]",tips:["Order of operations: (GPR + Other) × (1 − vacancy) = EGI. EGI − OpEx = NOI. NOI / cap = Value.","Back-of-envelope: if OpEx is ~40% of EGI and vacancy is ~5%, NOI ≈ gross × 0.95 × 0.6 ≈ gross × 0.57.","Then × (1/cap). At 6% cap: gross × 0.57 × 16.67 ≈ gross × 9.5. Ballparks a full proforma in one step.","Sandwich: compute value at the two nearest clean caps (e.g. 5% and 6%) and interpolate to your actual cap. Handles ugly caps without a calculator.","Sanity check: compare implied value-per-SF or $/unit to market comps before trusting the number."],generate(e,t="intermediate"){const n=E(e,N.gpr,t),r=E(e,N.otherIncome,t),l=e.pickFromSet(ct.vacancySetNonZero),o=e.pickFromSet(ct.opexRatios),s=t==="beginner"?1e5:t==="advanced"?1e3:1e4,i=Math.round((n+r)*o*(1-l)/s)*s,a=E(e,N.capRate,t),c=mr(dd({gpr:n,otherIncome:r,vacancyRate:l,opex:i}),a);return{id:F("combo"),kind:"combinedScenario",prompt:`GPR ${g(n)}, other income ${g(r)}, vacancy ${k(l)}, OpEx ${g(i)}, cap ${k(a)}. What's the implied value?`,context:{gpr:n,otherIncome:r,vacancyRate:l,opex:i,capRate:a},expected:c,unit:"usd",tolerance:{type:"pct",band:.03},solution:Cm(n,r,l,i,a)}}};function $m(e,t,n){const r=Math.pow(1+t,n),l=ci(e,t,n);return{formula:"End = Start × (1 + r)^n",steps:[{label:"Growth factor",expression:`(1 + ${k(t,2)})^${n}`,result:r.toFixed(4)},{label:"End value",expression:`${g(e)} × ${r.toFixed(4)}`,result:g(l)}],answerDisplay:g(l)}}const Rm={kind:"compoundGrowth",label:"Compound Growth (forward)",description:"Project a value forward at a fixed growth rate.",category:"returns",pattern:"A × (1 + B)^n   [start × growth factor]",tips:["Rule of 72: a value roughly doubles every 72/r% years. At 3% → 24 years; at 4% → 18; at 6% → 12.","Anchors: (1.03)^5 ≈ 1.159; (1.03)^10 ≈ 1.344; (1.05)^5 ≈ 1.276; (1.05)^10 ≈ 1.629.","Linear approx (floor): End ≥ Start × (1 + r × n). Actual is always higher due to compounding.","Sandwich: bracket with the two nearest round rates and interpolate (e.g. 2.75% sits between 2.5% and 3%)."],generate(e,t="intermediate"){const n=E(e,N.noi,t),r=E(e,N.growthRate,t),l=e.pickInt(N.projectionYears.min,N.projectionYears.max),o=ci(n,r,l);return{id:F("cg"),kind:"compoundGrowth",prompt:`A value of ${g(n)} grows at ${k(r,2)} per year for ${he(l)}. What's the end value?`,context:{startValue:n,growthRate:r,projectionYears:l},expected:o,unit:"usd",tolerance:{type:"pct",band:.03},solution:$m(n,r,l)}}};function Em(e,t){const n=ed(e,t);return{formula:"Max Loan = NOI / Debt Yield",steps:[{label:"Max loan",expression:`${g(e)} / ${k(t)}`,result:g(n)}],answerDisplay:g(n)}}const jm={kind:"debtYield",label:"Debt Yield Loan Sizing",description:"Max loan given NOI and required debt yield.",category:"returns",pattern:"A / B   where A = NOI, B = required yield %",tips:["Debt yield is the lender-side cap rate: NOI / Loan. 9% DY = 11.1x NOI max loan; 10% DY = 10x NOI.","Inverse: Max Loan = NOI / required DY.","Lender check: if debt yield < 8%, most CMBS lenders pass — so 8% is a hard floor for stabilized deals.","Quick math: $800k NOI / 9% → think $800k × 11.11 = $8.89M. Or: $800 / 0.09 = ~$8,890 (shift decimals)."],generate(e,t="intermediate"){const n=E(e,N.noi,t),r=E(e,N.debtYieldTarget,t),l=ed(n,r);return{id:F("dy"),kind:"debtYield",prompt:`NOI is ${g(n)}. Lender requires a ${k(r)} debt yield. What's the max loan?`,context:{noi:n,debtYieldTarget:r},expected:l,unit:"usd",tolerance:{type:"pct",band:.05},solution:Em(n,r)}}};function Im(e,t,n){const r=Vl(e,t),l=Kc(r,n);return{formula:"Development Spread = YoC − Market Cap Rate",steps:[{label:"YoC",expression:`${g(e)} / ${g(t)}`,result:k(r)},{label:"Spread",expression:`${k(r)} − ${k(n)}`,result:`${Qe(l)}`}],answerDisplay:Qe(l)}}const Pm={kind:"devSpread",label:"Development Spread",description:"YoC minus market cap — the risk premium for developing vs buying.",category:"valuation",pattern:"(A / B) − C   [YoC minus market cap]",tips:['100–150 bps is thin, 200–300 bps is typical, 500+ bps is a "layup" development.',"If YoC ≈ market cap, you're taking development risk for no extra return — walk away.","Spread compensates for construction risk, lease-up risk, and time value of capital tied up during build.","Mental math: compute YoC first, then subtract market cap. Answer in bps."],generate(e,t="intermediate"){const n=E(e,N.capRate,t),r=E(e,N.yocDelta,t),l=n+r,o=E(e,N.projectCost,t),s=t==="beginner"?25e4:t==="advanced"?25e3:1e5,i=Math.round(o*l/s)*s,a=Kc(Vl(i,o),n),c=Math.round(a*1e4);return{id:F("devSp"),kind:"devSpread",prompt:`Developing to ${g(o)} in total cost with stabilized NOI of ${g(i)}. Market comps trade at a ${k(n)} cap. What's the development spread (in bps)?`,context:{totalProjectCost:o,stabilizedNoi:i,noi:i,marketCapRate:n},expected:c,unit:"bps",tolerance:{type:"abs",band:25},solution:Im(i,o,n)}}};function pd(e){return`${e.toFixed(2)}x`}function Mm(e,t,n,r){const l=Rn(n,r),o=e/t,s=td({noi:e,dscrTarget:t,annualRate:n,years:r});return{formula:"Max Loan = NOI / (DSCR × Loan Constant)",steps:[{label:"Loan constant",expression:`${he(r)} amort @ ${k(n)}`,result:k(l,2)},{label:"Max annual debt service",expression:`${g(e)} / ${pd(t)}`,result:g(o)},{label:"Max loan",expression:`${g(o)} / ${k(l,2)}`,result:g(s)}],answerDisplay:g(s)}}const bm={kind:"dscrLoanSizing",label:"DSCR Loan Sizing",description:"Max loan given NOI, DSCR target, rate, and amort.",category:"returns",pattern:"A / (B × C)   where A = NOI, B = DSCR, C = loan constant",tips:["Loan constants to memorize — 30yr @ 6% ≈ 0.072; 25yr @ 6% ≈ 0.077; 30yr @ 5% ≈ 0.0644; 30yr @ 7% ≈ 0.0799.",'Formula: Max Loan = NOI / (DSCR × Loan Constant). DSCR × constant is the "effective rate" the loan must support.',"At 1.25x DSCR, every $1 of NOI supports $0.80 of debt service. Then divide by constant to get loan amount.","IO shortcut: for interest-only loans, constant = rate. $500k NOI / (1.25 × 0.06) = $6.67M."],generate(e,t="intermediate"){const n=E(e,N.noi,t),r=t==="beginner"?e.pickFromSet([1.2,1.25,1.3]):E(e,N.dscrTarget,t),l=E(e,N.interestRate,t),o=t==="beginner"?30:e.pickInt(N.amortYears.min,N.amortYears.max),s=td({noi:n,dscrTarget:r,annualRate:l,years:o});return{id:F("dscr"),kind:"dscrLoanSizing",prompt:`NOI of ${g(n)} needs to cover a ${pd(r)} DSCR on a ${he(o)} amortizing loan at ${k(l)}. What's the max loan?`,context:{noi:n,dscrTarget:r,interestRate:l,amortYears:o},expected:s,unit:"usd",tolerance:{type:"pct",band:.05},solution:Mm(n,r,l,o)}}};function pi(e,t){return t/e}function fd(e,t,n){return Math.pow(t/e,1/n)-1}function fi(e,t){return Math.pow(1+e,t)}function Tm(e,t){const n=pi(e,t);return{formula:"Equity Multiple = Equity Out / Equity In",steps:[{label:"Multiple",expression:`${g(t)} / ${g(e)}`,result:Ie(n)}],answerDisplay:Ie(n)}}const Om={kind:"equityMultiple",label:"Equity Multiple",description:"Equity in + equity out → EM.",category:"returns",pattern:"A / B   where A = out, B = in",tips:["EM = Out / In. Doesn't care about time — 2x in 1 year and 2x in 10 years both = 2.0x.","Divide by hundreds: $23M / $10M → 23/10 = 2.3x. $17.5M / $8M → 17.5/8 ≈ 2.19x.","Rule of thumb: institutional value-add deals target 1.7x–2.0x; opportunistic 2.0x+; core ~1.4x–1.6x.","Complement to IRR: EM shows absolute dollars back, IRR shows time-adjusted. Always look at both."],generate(e,t="intermediate"){const n=E(e,N.equityIn,t),r=E(e,N.irrExitMultiple,t),l=t==="beginner"?1e6:t==="advanced"?25e3:1e5,o=Math.round(n*r/l)*l,s=pi(n,o);return{id:F("em"),kind:"equityMultiple",prompt:`You invested ${g(n)} and received ${g(o)} at sale. What's the equity multiple?`,context:{equityIn:n,equityOut:o},expected:s,unit:"multiple",tolerance:{type:"pct",band:.05},solution:Tm(n,o)}}};function Am(e,t){const n=ud(e,t);return{formula:"Going-in Cap = NOI / Purchase Price",steps:[{label:"Cap rate",expression:`${g(t)} / ${g(e)}`,result:`${k(n)}  (${Qe(n)})`}],answerDisplay:Qe(n)}}const Dm={kind:"goingInCap",label:"Going-in Cap Rate",description:"Price + NOI → cap rate in bps.",category:"valuation",pattern:"A / B   where A = NOI, B = price",tips:["Cap = NOI / Price. Inverse is the NOI multiple: 5% = 20x, 6% = 16.67x, 7% = 14.29x.","Mental shortcut: NOI / Price, round both to 2 sig figs first. $623k / $12.4M ≈ $620 / $12,400 ≈ 5.0%.","Sanity check: if price looks like ~20× NOI you're at 5%, ~15× → ~6.7%, ~10× → 10%.","Round both up or both down together — keeps the error directionally small. Rounding one up and one down stacks errors.","Sandwich: find the nearest clean multiples (e.g. 15× = 6.67%, 16× = 6.25%) and interpolate toward the actual ratio.","Convert cap to bps: 5.25% = 525 bps. Just shift the decimal two places."],generate(e,t="intermediate"){const n=E(e,N.capRate,t),r=E(e,N.noi,t),l=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(r/n/l)*l,s=ud(o,r),i=Math.round(s*1e4);return{id:F("giCap"),kind:"goingInCap",prompt:`Purchase price is ${g(o)} and NOI is ${g(r)}. What's the going-in cap rate (in bps)?`,context:{purchasePrice:o,noi:r},expected:i,unit:"bps",tolerance:{type:"abs",band:15},solution:Am(o,r)}}};function _m(e,t){const n=e/t;return{formula:"GRM = Purchase Price / Annual Gross Potential Rent",steps:[{label:"GRM",expression:`${g(e)} / ${g(t)}`,result:Ie(n,2)}],answerDisplay:Ie(n,2)}}const Lm={kind:"grossRentMultiplier",label:"Gross Rent Multiplier",description:"Price / PGI — quick multifamily/retail benchmark.",category:"valuation",pattern:"A / B   where A = price, B = gross potential rent",tips:["GRM = Price / PGI. Multifamily typically trades 8–14× GRM; lower is cheaper.","Quick inversion: cap rate ≈ (1 − OpEx ratio) / GRM. 12× GRM with 40% OpEx ≈ 5% cap.","GRM ignores OpEx, so it's most useful when opex structure is consistent across comps.","Trap: high-OpEx assets look cheap by GRM but expensive by cap. Always cross-check."],generate(e,t="intermediate"){const n=E(e,N.gpr,t),r=E(e,{min:7,max:15,step:.5},t),l=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(n*r/l)*l,s=o/n;return{id:F("grm"),kind:"grossRentMultiplier",prompt:`Purchase price ${g(o)}, gross potential rent ${g(n)}. What's the GRM?`,context:{purchasePrice:o,gpr:n,pgi:n},expected:s,unit:"multiple",tolerance:{type:"pct",band:.05},solution:_m(o,n)}}};function Fm(e,t){const n=Rn(e,t);return{formula:"Loan Constant = annualized payment / loan (monthly amort)",steps:[{label:"Constant",expression:`${he(t)} amort @ ${k(e)}`,result:`${k(n,2)}  (${Qe(n)})`}],answerDisplay:Qe(n)}}const zm={kind:"loanConstant",label:"Loan Constant",description:"Annualized payment as % of loan for monthly-amortizing debt.",category:"returns",pattern:"PMT(r/12, n×12, −1) × 12   [amortization formula]",tips:["Memorize: 30yr @ 5% ≈ 644 bps; 30yr @ 6% ≈ 720 bps; 30yr @ 7% ≈ 799 bps; 25yr @ 6% ≈ 773 bps.","IO shortcut: loan constant = interest rate exactly (no principal paydown).","Rule of thumb: each +100 bps of rate adds ~60–80 bps to the constant on 30yr amort.","Longer amort → lower constant (but diminishing returns: 30y vs 25y only saves ~40 bps)."],generate(e,t="intermediate"){const n=E(e,N.interestRate,t),r=t==="beginner"?e.pickFromSet([25,30]):e.pickInt(N.amortYears.min,N.amortYears.max),l=Rn(n,r),o=Math.round(l*1e4);return{id:F("lc"),kind:"loanConstant",prompt:`What's the loan constant for a ${he(r)} amortizing loan at ${k(n)} (in bps)?`,context:{interestRate:n,amortYears:r},expected:o,unit:"bps",tolerance:{type:"abs",band:15},solution:Fm(n,r)}}};function Bm(e,t){const n=e*t,r=ad(e,t);return{formula:"NOI = EGI × (1 − OpEx Ratio)",steps:[{label:"OpEx",expression:`${g(e)} × ${k(t)}`,result:g(n)},{label:"NOI",expression:`${g(e)} − ${g(n)}`,result:g(r)}],answerDisplay:g(r)}}const Vm={kind:"noiFromOer",label:"NOI from OpEx Ratio",description:"Solve NOI given EGI and an OpEx ratio.",category:"valuation",pattern:"A × (1 − B)   where A = EGI, B = opex ratio",tips:["NOI = EGI × (1 − opex ratio). 40% opex ratio → NOI = 60% of EGI.","Shortcut: skip the subtraction — just multiply by the margin. $1M EGI × 60% margin = $600k NOI.","Combine with cap math: Value = EGI × (1 − opex) / cap. $1M × 60% / 6% = $10M in one shot.","Back out: if comps show $10M at 6% cap, implied NOI is $600k, implied EGI is $1M at 40% opex."],generate(e,t="intermediate"){const n=E(e,N.egi,t),r=e.pickFromSet([.25,.3,.35,.4,.45,.5]),l=ad(n,r);return{id:F("noiFromOer"),kind:"noiFromOer",prompt:`EGI is ${g(n)} with an OpEx ratio of ${k(r)}. What's the NOI?`,context:{egi:n,opexRatioValue:r},expected:l,unit:"usd",tolerance:{type:"pct",band:.03},solution:Bm(n,r)}}};function Um(e,t){const n=id(e,t);return{formula:"OpEx Ratio = OpEx / EGI",steps:[{label:"Ratio",expression:`${g(e)} / ${g(t)}`,result:k(n,1)}],answerDisplay:k(n,1)}}const Ym={kind:"operatingExpenseRatio",label:"OpEx Ratio",description:"OpEx / EGI — what % of income goes to operating expenses.",category:"valuation",pattern:"A / B   where A = opex, B = EGI",tips:["Typical ranges — multifamily 30–40%, office 35–45%, retail 25–35%, industrial 15–25%, hotels 60%+.","A rising OpEx ratio with flat income is a red flag — margin compression.","Inverse: NOI margin = 1 − OpEx ratio. A 60% OpEx ratio means 40% of EGI drops to NOI.","Shortcut: divide both to 2 sig figs first. $425k / $1.12M ≈ $430 / $1,120 ≈ 38%."],generate(e,t="intermediate"){const n=E(e,N.egi,t),r=e.pickFromSet([.25,.3,.35,.4,.45,.5]),l=t==="beginner"?5e4:t==="advanced"?5e3:25e3,o=Math.round(n*r/l)*l,s=id(o,n);return{id:F("oer"),kind:"operatingExpenseRatio",prompt:`EGI is ${g(n)} and operating expenses are ${g(o)}. What's the OpEx ratio?`,context:{egi:n,opex:o},expected:s,unit:"pct",tolerance:{type:"abs",band:.015},solution:Um(o,n)}}};function Wm(e,t){const n=En(e,t);return{formula:"OpEx/Unit = Total OpEx / Units",steps:[{label:"OpEx per unit",expression:`${g(e)} / ${t} units`,result:`${g(n)}/yr`}],answerDisplay:`${g(n)}/yr`}}const Qm={kind:"opexPerUnit",label:"OpEx per Unit (annual)",description:"Operating expense per unit per year.",category:"valuation",pattern:"A / B   where A = opex, B = units",tips:["Typical multifamily range: $4,500–$8,500/unit/yr. Hotels 3–5× higher.","Outliers point to market deviation — high-tax states, sub-metered utilities, age of plant.","Fixed + variable split: ~60% fixed (taxes, insurance, admin) / ~40% variable (utilities, repairs).","Shortcut: $600k opex / 100 units = $6,000/unit. Scale linearly."],generate(e,t="intermediate"){const n=E(e,N.units,t),r=E(e,N.opexPerUnitYear,t),l=t==="beginner"?5e4:t==="advanced"?2500:1e4,o=Math.round(n*r/l)*l,s=En(o,n);return{id:F("opu"),kind:"opexPerUnit",prompt:`A ${n}-unit property has ${g(o)} in annual operating expenses. What's the OpEx per unit per year?`,context:{opex:o,units:n},expected:s,unit:"usd",tolerance:{type:"pct",band:.05},solution:Wm(o,n)}}};function Hm(e,t){const n=En(e,t);return{formula:"Price/Unit = Purchase Price / Units",steps:[{label:"Price per unit",expression:`${g(e)} / ${t} units`,result:g(n)}],answerDisplay:g(n)}}const Gm={kind:"pricePerUnit",label:"Price per Unit ($/door)",description:"Purchase price per unit (for multifamily, hotels).",category:"valuation",pattern:"A / B   where A = price, B = units",tips:["Primary multifamily benchmark metric alongside cap rate. Typical B-class ranges $150k–$350k/unit.","Coastal gateway markets push $400k+/unit; tertiary Sun Belt can be $100k–$180k.","Compare to replacement cost/unit to gauge if you're buying below new-build economics.","Shortcut: round both to 2 sig figs. $45M / 180 units → $45M / $180 → $250k/unit."],generate(e,t="intermediate"){const n=E(e,N.units,t),r=E(e,N.pricePerUnitValue,t),l=t==="beginner"?5e5:t==="advanced"?25e3:1e5,o=Math.round(n*r/l)*l,s=En(o,n);return{id:F("ppu"),kind:"pricePerUnit",prompt:`A ${n}-unit property is under contract for ${g(o)}. What's the price per unit?`,context:{purchasePrice:o,units:n},expected:s,unit:"usd",tolerance:{type:"pct",band:.05},solution:Hm(o,n)}}};function qm(e,t){const n=En(e,t);return{formula:"Rent/Unit = GPR / Units",steps:[{label:"Annual rent/unit",expression:`${g(e)} / ${t} units`,result:`${g(n)}/yr`},{label:"Monthly rent/unit",expression:`${g(n)} / 12`,result:`${g(n/12)}/mo`}],answerDisplay:`${g(n)}/yr`}}const Km={kind:"rentPerUnit",label:"Rent per Unit (annual)",description:"Gross potential rent per unit per year.",category:"valuation",pattern:"A / B   where A = GPR, B = units",tips:["Divide by 12 for monthly. $24k/yr = $2,000/mo. $18k/yr = $1,500/mo.","Market benchmark: compare to local comps — $1,500–$2,500/mo typical for B-class multifamily.","If rent/unit looks way below comps, there's mark-to-market upside. Above comps, risk of tenant loss.","Shortcut: round units to nearest 10 and GPR to nearest $100k first."],generate(e,t="intermediate"){const n=E(e,N.units,t),r=E(e,N.rentPerUnitYear,t),l=t==="beginner"?1e5:t==="advanced"?5e3:25e3,o=Math.round(n*r/l)*l,s=En(o,n);return{id:F("rpu"),kind:"rentPerUnit",prompt:`A ${n}-unit property has ${g(o)} in annual gross potential rent. What's the rent per unit per year?`,context:{gpr:o,units:n},expected:s,unit:"usd",tolerance:{type:"pct",band:.05},solution:qm(o,n)}}};function Xm(e,t){const n=sd(e,t);return{formula:"Exit Value = Year-N NOI / Exit Cap",steps:[{label:"Exit value",expression:`${g(e)} / ${k(t)}`,result:g(n)}],answerDisplay:g(n)}}const Zm={kind:"reversionValue",label:"Reversion / Exit Value",description:"Sale price at exit given year-N NOI and exit cap.",category:"valuation",pattern:"A / B   where A = exit NOI, B = exit cap",tips:["Same math as going-in cap, just for the exit. Use the cap → multiple table.","Exit cap usually expands 25–75 bps vs going-in to reflect aging/obsolescence.","If your buy cap is 5% and exit cap is 5.5%, you lose (5/5.5 − 1) = −9.1% of value on that alone.","Shortcut: $1M NOI at 6% exit cap = $16.67M. Scale linearly with NOI."],generate(e,t="intermediate"){const n=E(e,N.noi,t),r=E(e,N.exitCapRate,t),l=e.pickInt(5,10),o=sd(n,r);return{id:F("rev"),kind:"reversionValue",prompt:`Year-${l} NOI is ${g(n)} and you're underwriting a ${k(r)} exit cap. What's the exit sale price?`,context:{stabilizedNoi:n,noi:n,exitCap:r,holdYears:l},expected:o,unit:"usd",tolerance:{type:"pct",band:.03},solution:Xm(n,r)}}};function Jm(e,t,n){const r=pi(e,t),l=fd(e,t,n);return{formula:"IRR = (Out / In)^(1 / years) − 1",steps:[{label:"Equity multiple",expression:`${g(t)} / ${g(e)}`,result:Ie(r)},{label:"IRR",expression:`${Ie(r)}^(1/${n}) − 1`,result:k(l)}],answerDisplay:k(l)}}const e0={kind:"irrSimple",label:"IRR — Simple",description:"Single-period IRR: equity in, equity out, hold years.",category:"returns",pattern:"(A / B)^(1/n) − 1   [nth root of multiple]",tips:["Rule of 72: years-to-double ≈ 72 / IRR%. 2x in 7 yrs ≈ 10.3% IRR. 2x in 5 yrs ≈ 14.4%. 2x in 10 yrs ≈ 7.2%.","Key anchors: 2.0x over 5y ≈ 14.9%; 2.0x over 7y ≈ 10.4%; 2.0x over 10y ≈ 7.2%; 2.5x over 5y ≈ 20.1%.","Anchor for 10y holds: IRR% × 10 years → EM roughly: 10% → 2.59x, 12% → 3.11x, 15% → 4.05x, 8% → 2.16x.","Sandwich: if EM is 2.2x over 6 years, bracket it — 2.0x over 6y is ~12.2%, 2.5x over 6y is ~16.5%. Interpolate → ~13.6% (actual 14.0%).","Floor approximation: EM ≥ 1 + (IRR × years). 10% × 10y → floor 2.0x; actual 2.59x. Gap is the compounding."],generate(e,t="intermediate"){const n=E(e,N.equityIn,t),r=E(e,N.irrExitMultiple,t),l=t==="beginner"?1e6:t==="advanced"?1e5:5e5,o=Math.round(n*r/l)*l,s=t==="beginner"?e.pickFromSet([5,7,10]):e.pickInt(N.holdYears.min,N.holdYears.max),i=fd(n,o,s);return{id:F("irr"),kind:"irrSimple",prompt:`You invest ${g(n)} and get ${g(o)} back after ${he(s)}. What's the IRR (as a %)?`,context:{equityIn:n,equityOut:o,holdYears:s},expected:i,unit:"pct",tolerance:{type:"abs",band:.005},solution:Jm(n,o,s)}}};function t0(e,t,n){const r=e-t,l=ld({unleveredIrr:e,borrowRate:t,ltv:n});return{formula:"Levered IRR ≈ Unlevered + (LTV × (Unlev − Borrow)) / (1 − LTV)",steps:[{label:"Spread",expression:`${k(e)} − ${k(t)}`,result:k(r,2)},{label:"Leverage multiplier",expression:`${k(n)} / (1 − ${k(n)})`,result:(n/(1-n)).toFixed(2)},{label:"Levered IRR (approx)",expression:`${k(e)} + ${k(r)} × ${(n/(1-n)).toFixed(2)}`,result:k(l,2)}],answerDisplay:k(l,2)}}const n0={kind:"leveredIrr",label:"Levered IRR (Approx)",description:"Approximate levered IRR from unlevered IRR, LTV, and borrow rate.",category:"returns",pattern:"A + (B × (A − C)) / (1 − B)   [unlev + leverage × spread]",tips:["Formula: Levered IRR ≈ Unlevered + LTV × (Unlev − Borrow) / (1 − LTV). Assumes parallel cash flows.","Leverage multiplier: LTV / (1 − LTV). At 60% LTV = 1.5x; at 70% = 2.33x; at 75% = 3x.","If unlevered IRR > borrow rate, leverage is accretive. If unlevered < borrow, leverage destroys returns.","Example: unlev 8%, borrow 5%, 60% LTV → 8% + 3% × 1.5 = 12.5%. Actual levered is usually within 100 bps of this estimate."],generate(e,t="intermediate"){const n=E(e,N.unleveredIrr,t),r=E(e,N.interestRate,t),l=E(e,N.ltv,t),o=ld({unleveredIrr:n,borrowRate:r,ltv:l});return{id:F("levIrr"),kind:"leveredIrr",prompt:`Unlevered IRR is ${k(n)} and you can borrow at ${k(r)} with ${k(l)} LTV. Approximately what's the levered IRR?`,context:{unleveredIrr:n,borrowRate:r,ltv:l},expected:o,unit:"pct",tolerance:{type:"abs",band:.01},solution:t0(n,r,l)}}};function md(e){const t=e.leaseTermYears*12,n=e.grossRentPerSf*e.leaseTermYears,r=e.grossRentPerSf/12*e.freeMonths;return(n-e.tiPerSf-r)/t*12}function $l(e){return(e.rentPerSf*e.leaseTermYears-e.tiPerSf)/e.leaseTermYears}function hd(e){const t=$l({rentPerSf:e.rentA,tiPerSf:e.tiA,leaseTermYears:e.leaseTermYears}),n=$l({rentPerSf:e.rentB,tiPerSf:e.tiB,leaseTermYears:e.leaseTermYears});return t-n}function vd(e){return e.tiPerSf/e.paybackYears}function gd(e){return(e.newRentPerSf-e.oldRentPerSf)*e.subjectSf*(1-e.vacancy)}function yd(e){return gd(e)/e.capRate}function xd(e){return-(e.purchasePrice*e.newTaxRate-e.oldAnnualTax)/e.capRate}function r0(e){const t=e.years*12,n=e.grossRent/12*e.freeMonths,r=md({grossRentPerSf:e.grossRent,leaseTermYears:e.years,tiPerSf:e.tiPerSf,freeMonths:e.freeMonths});return{formula:"NER = (Gross × Term − TI − Free Rent) / Term",steps:[{label:"Gross over term",expression:`${A(e.grossRent)} × ${he(e.years)}`,result:A(e.grossRent*e.years)},{label:"Free rent /SF",expression:`${A(e.grossRent/12)} × ${e.freeMonths} months`,result:A(n)},{label:"NER",expression:`(${A(e.grossRent*e.years)} − ${A(e.tiPerSf)} − ${A(n)}) / ${t}mo × 12`,result:A(r)}],answerDisplay:A(r)}}const l0={kind:"netEffectiveRent",label:"Net Effective Rent",description:"Rent after spreading TI + free rent across the lease term.",category:"valuation",pattern:"A − B/n − (f × A / 12) / n   [face − TI/yr − freeRent/yr]",tips:["Annualize every concession. $15/SF TI over 5 years = $3/SF/yr. 3 months free on a $20 rent = $5/SF total = $1/SF/yr over 5y.","Shortcut: NER ≈ face rent − (TI ÷ term years) − (free months × face rent ÷ 12 ÷ term years).","NER drives cap-rate math — always u
